# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Codex
spec:
  description: |
    OpenAI Codex CLI - an AI coding agent that runs in your terminal. Deploy as a persistent cloud workstation with Zeabur Terminal access.
  icon: https://cdn.zeabur.com/marketplace/codex.svg
  tags:
    - AI
    - Developer Tools
  readme: |
    # OpenAI Codex CLI

    [Codex](https://github.com/openai/codex) is OpenAI's open-source AI coding agent that runs in your terminal. It can understand your codebase, propose changes, execute commands, and help you build software faster — all through natural language conversation.

    This template deploys Codex as a persistent cloud workstation. There is no web UI; you interact with Codex entirely through the Zeabur Terminal.

    ## Getting Started

    1. Deploy the template and wait for the service to start.
    2. Open the Zeabur **Terminal** for the Codex service.
    3. Run Codex commands using the `runuser` prefix:
       ```
       runuser -u node -- codex
       ```
    4. Codex will start an interactive session where you can describe what you want to build or modify.

    ## Authentication

    There are two ways to authenticate Codex with OpenAI:

    ### Method 1: API Key (Environment Variable)

    Set the `OPENAI_API_KEY` environment variable in the Zeabur dashboard. This is the simplest method and works immediately after deployment.

    ### Method 2: Device Auth (Interactive Login)

    1. **Important:** First enable "Enable device code authorization for Codex" in your [ChatGPT Security Settings](https://chatgpt.com/settings/security).
    2. Open the Zeabur Terminal and run:
       ```
       runuser -u node -- codex login --device-auth
       ```
    3. Follow the on-screen instructions to authorize in your browser.

    ## Zeabur AI Hub Integration

    You can use Codex with [Zeabur AI Hub](https://zeabur.com/ai) instead of connecting directly to OpenAI. Set the `OPENAI_BASE_URL` environment variable to your Zeabur AI Hub endpoint (e.g., `https://hub.zeabur.com/v1`). This allows you to use Zeabur's unified AI gateway with billing, rate limiting, and model routing.

    ## Running Commands in Terminal

    **You must always use the `runuser -u node --` prefix** when running commands in the Zeabur Terminal. The container runs as root by default, but Codex and development tools should run as the `node` user to avoid permission issues.

    ```
    # Start interactive Codex session
    runuser -u node -- codex

    # Check Codex version
    runuser -u node -- codex --version

    # Run any shell command as node user
    runuser -u node -- git clone https://github.com/example/repo.git
    ```

    ## Persistent Storage

    All data under `/home/node/` is persisted across restarts and redeployments. Clone your repositories and do your work inside this directory.

    Any files outside `/home/node/` are ephemeral and will be lost on restart.

    ## Common Commands

    | Command | Description |
    |---------|-------------|
    | `runuser -u node -- codex` | Start interactive Codex session |
    | `runuser -u node -- codex "describe task here"` | Run Codex with a specific prompt |
    | `runuser -u node -- codex login --device-auth` | Authenticate via device auth flow |
    | `runuser -u node -- codex --version` | Check installed Codex version |

    ## Links

    - [GitHub](https://github.com/openai/codex)
    - [OpenAI Documentation](https://platform.openai.com/docs)
  services:
    - name: codex
      icon: https://cdn.zeabur.com/marketplace/codex.svg
      template: PREBUILT_V2
      spec:
        source:
          image: zeabur/codex:latest
          command:
            - /bin/sh
            - -c
            - /opt/startup.sh
        volumes:
          - id: home
            dir: /home/node
        configs:
          - path: /opt/startup.sh
            permission: 493
            template: |
              #!/bin/sh
              chown -R node:node /home/node
              exec runuser -u node -- sleep infinity
        env:
          OPENAI_API_KEY:
            default: ""
            required: true
          OPENAI_BASE_URL:
            default: ""
localization:
  zh-TW:
    description: |
      OpenAI Codex CLI - 在終端機中運行的 AI 編程代理。部署為持久化雲端工作站，透過 Zeabur 終端機存取。
    readme: |
      # OpenAI Codex CLI

      [Codex](https://github.com/openai/codex) 是 OpenAI 的開源 AI 編程代理，在終端機中運行。它能理解您的程式碼庫、提出修改建議、執行指令，並透過自然語言對話幫助您更快地建構軟體。

      此模板將 Codex 部署為持久化雲端工作站。沒有 Web UI；您完全透過 Zeabur 終端機與 Codex 互動。

      ## 開始使用

      1. 部署模板並等待服務啟動。
      2. 開啟 Zeabur **終端機**（Codex 服務）。
      3. 使用 `runuser` 前綴執行 Codex 指令：
         ```
         runuser -u node -- codex
         ```
      4. Codex 將啟動互動式會話，您可以描述想要建構或修改的內容。

      ## 認證方式

      有兩種方式可以將 Codex 與 OpenAI 認證：

      ### 方法一：API 金鑰（環境變數）

      在 Zeabur 儀表板中設定 `OPENAI_API_KEY` 環境變數。這是最簡單的方法，部署後即可立即使用。

      ### 方法二：裝置驗證（互動式登入）

      1. **重要：** 首先在 [ChatGPT Security Settings](https://chatgpt.com/settings/security) 中啟用「Enable device code authorization for Codex」。
      2. 開啟 Zeabur 終端機並執行：
         ```
         runuser -u node -- codex login --device-auth
         ```
      3. 按照螢幕上的說明在瀏覽器中授權。

      ## Zeabur AI Hub 整合

      您可以透過 [Zeabur AI Hub](https://zeabur.com/ai) 使用 Codex，而非直接連接 OpenAI。將 `OPENAI_BASE_URL` 環境變數設定為您的 Zeabur AI Hub 端點（例如 `https://hub.zeabur.com/v1`）。這讓您可以使用 Zeabur 的統一 AI 閘道，享有計費、速率限制和模型路由功能。

      ## 在終端機中執行指令

      **您必須始終使用 `runuser -u node --` 前綴**在 Zeabur 終端機中執行指令。容器預設以 root 身份執行，但 Codex 和開發工具應以 `node` 使用者執行以避免權限問題。

      ## 持久化儲存

      `/home/node/` 下的所有資料在重啟和重新部署後都會保留。請在此目錄中克隆您的倉庫並進行工作。

      `/home/node/` 以外的所有檔案都是暫存的，重啟後會遺失。

      ## 常用指令

      | 指令 | 說明 |
      |------|------|
      | `runuser -u node -- codex` | 啟動互動式 Codex 會話 |
      | `runuser -u node -- codex "描述任務"` | 使用特定提示執行 Codex |
      | `runuser -u node -- codex login --device-auth` | 透過裝置驗證流程認證 |
      | `runuser -u node -- codex --version` | 檢查已安裝的 Codex 版本 |

      ## 連結

      - [GitHub](https://github.com/openai/codex)
      - [OpenAI 文件](https://platform.openai.com/docs)
