  ja-JP:
    description: |
      OpenAI Codex CLI - ターミナルで動作するAIコーディングエージェント。Zeaburターミナルアクセス付きの永続クラウドワークステーションとしてデプロイ。
    readme: |
      # OpenAI Codex CLI

      [Codex](https://github.com/openai/codex) は、ターミナルで動作するOpenAIのオープンソースAIコーディングエージェントです。コードベースを理解し、変更を提案し、コマンドを実行し、自然言語の会話を通じてより速くソフトウェアを構築するお手伝いをします。

      このテンプレートはCodexを永続クラウドワークステーションとしてデプロイします。Web UIはありません。Zeaburターミナルを通じてCodexと対話します。

      ## はじめに

      1. テンプレートをデプロイし、サービスの起動を待ちます。
      2. Codexサービスの Zeabur **ターミナル**を開きます。
      3. `runuser` プレフィックスを使用してCodexコマンドを実行します：
         ```
         runuser -u node -- codex
         ```
      4. Codexがインタラクティブセッションを開始し、構築または変更したい内容を説明できます。

      ## 認証方法

      CodexをOpenAIで認証する方法は2つあります：

      ### 方法1：APIキー（環境変数）

      Zeaburダッシュボードで `OPENAI_API_KEY` 環境変数を設定します。最もシンプルな方法で、デプロイ後すぐに使用できます。

      ### 方法2：デバイス認証（インタラクティブログイン）

      1. **重要：** まず [ChatGPT Security Settings](https://chatgpt.com/settings/security) で「Enable device code authorization for Codex」を有効にしてください。
      2. Zeaburターミナルを開いて実行します：
         ```
         runuser -u node -- codex login --device-auth
         ```
      3. 画面の指示に従ってブラウザで認可します。

      ## Zeabur AI Hub 統合

      OpenAIに直接接続する代わりに、[Zeabur AI Hub](https://zeabur.com/ai) を通じてCodexを使用できます。`OPENAI_BASE_URL` 環境変数をZeabur AI Hubエンドポイント（例：`https://hub.zeabur.com/v1`）に設定します。これにより、課金、レート制限、モデルルーティング機能を備えたZeaburの統合AIゲートウェイを利用できます。

      ## ターミナルでのコマンド実行

      **Zeaburターミナルでコマンドを実行する際は、必ず `runuser -u node --` プレフィックスを使用してください。** コンテナはデフォルトでrootとして実行されますが、Codexと開発ツールは権限の問題を避けるため `node` ユーザーとして実行する必要があります。

      ## 永続ストレージ

      `/home/node/` 配下のすべてのデータは、再起動や再デプロイ後も保持されます。このディレクトリ内でリポジトリをクローンし作業してください。

      `/home/node/` 以外のファイルは一時的なもので、再起動時に失われます。

      ## よく使うコマンド

      | コマンド | 説明 |
      |---------|------|
      | `runuser -u node -- codex` | インタラクティブCodexセッションを開始 |
      | `runuser -u node -- codex "タスクを説明"` | 特定のプロンプトでCodexを実行 |
      | `runuser -u node -- codex login --device-auth` | デバイス認証フローで認証 |
      | `runuser -u node -- codex --version` | インストール済みCodexバージョンを確認 |

      ## リンク

      - [GitHub](https://github.com/openai/codex)
      - [OpenAIドキュメント](https://platform.openai.com/docs)
  es-ES:
    description: |
      OpenAI Codex CLI - un agente de codificacion IA que se ejecuta en tu terminal. Despliega como estacion de trabajo en la nube persistente con acceso al Terminal de Zeabur.
    readme: |
      # OpenAI Codex CLI

      [Codex](https://github.com/openai/codex) es el agente de codificacion IA de codigo abierto de OpenAI que se ejecuta en tu terminal. Puede entender tu base de codigo, proponer cambios, ejecutar comandos y ayudarte a construir software mas rapido, todo a traves de conversacion en lenguaje natural.

      Esta plantilla despliega Codex como una estacion de trabajo en la nube persistente. No hay interfaz web; interactuas con Codex completamente a traves del Terminal de Zeabur.

      ## Primeros pasos

      1. Despliega la plantilla y espera a que el servicio se inicie.
      2. Abre el **Terminal** de Zeabur para el servicio Codex.
      3. Ejecuta comandos de Codex usando el prefijo `runuser`:
         ```
         runuser -u node -- codex
         ```
      4. Codex iniciara una sesion interactiva donde puedes describir lo que quieres construir o modificar.

      ## Autenticacion

      Hay dos formas de autenticar Codex con OpenAI:

      ### Metodo 1: Clave API (Variable de entorno)

      Configura la variable de entorno `OPENAI_API_KEY` en el panel de Zeabur. Es el metodo mas simple y funciona inmediatamente despues del despliegue.

      ### Metodo 2: Autenticacion de dispositivo (Login interactivo)

      1. **Importante:** Primero habilita "Enable device code authorization for Codex" en [ChatGPT Security Settings](https://chatgpt.com/settings/security).
      2. Abre el Terminal de Zeabur y ejecuta:
         ```
         runuser -u node -- codex login --device-auth
         ```
      3. Sigue las instrucciones en pantalla para autorizar en tu navegador.

      ## Integracion con Zeabur AI Hub

      Puedes usar Codex con [Zeabur AI Hub](https://zeabur.com/ai) en lugar de conectarte directamente a OpenAI. Configura la variable de entorno `OPENAI_BASE_URL` con tu endpoint de Zeabur AI Hub (ej. `https://hub.zeabur.com/v1`). Esto te permite usar la puerta de enlace IA unificada de Zeabur con facturacion, limites de velocidad y enrutamiento de modelos.

      ## Ejecutar comandos en el Terminal

      **Siempre debes usar el prefijo `runuser -u node --`** al ejecutar comandos en el Terminal de Zeabur. El contenedor se ejecuta como root por defecto, pero Codex y las herramientas de desarrollo deben ejecutarse como el usuario `node` para evitar problemas de permisos.

      ## Almacenamiento persistente

      Todos los datos bajo `/home/node/` se conservan entre reinicios y redespliegues. Clona tus repositorios y trabaja dentro de este directorio.

      Los archivos fuera de `/home/node/` son efimeros y se perderan al reiniciar.

      ## Comandos comunes

      | Comando | Descripcion |
      |---------|-------------|
      | `runuser -u node -- codex` | Iniciar sesion interactiva de Codex |
      | `runuser -u node -- codex "describir tarea"` | Ejecutar Codex con un prompt especifico |
      | `runuser -u node -- codex login --device-auth` | Autenticar via flujo de autenticacion de dispositivo |
      | `runuser -u node -- codex --version` | Verificar la version instalada de Codex |

      ## Enlaces

      - [GitHub](https://github.com/openai/codex)
      - [Documentacion de OpenAI](https://platform.openai.com/docs)
  id-ID:
    description: |
      OpenAI Codex CLI - agen coding AI yang berjalan di terminal Anda. Deploy sebagai workstation cloud persisten dengan akses Terminal Zeabur.
    readme: |
      # OpenAI Codex CLI

      [Codex](https://github.com/openai/codex) adalah agen coding AI open-source dari OpenAI yang berjalan di terminal Anda. Dapat memahami codebase Anda, mengusulkan perubahan, menjalankan perintah, dan membantu Anda membangun perangkat lunak lebih cepat — semuanya melalui percakapan bahasa alami.

      Template ini mendeploy Codex sebagai workstation cloud persisten. Tidak ada UI web; Anda berinteraksi dengan Codex sepenuhnya melalui Terminal Zeabur.

      ## Memulai

      1. Deploy template dan tunggu layanan dimulai.
      2. Buka **Terminal** Zeabur untuk layanan Codex.
      3. Jalankan perintah Codex menggunakan prefiks `runuser`:
         ```
         runuser -u node -- codex
         ```
      4. Codex akan memulai sesi interaktif di mana Anda dapat mendeskripsikan apa yang ingin dibangun atau dimodifikasi.

      ## Autentikasi

      Ada dua cara untuk mengautentikasi Codex dengan OpenAI:

      ### Metode 1: API Key (Variabel Lingkungan)

      Atur variabel lingkungan `OPENAI_API_KEY` di dashboard Zeabur. Ini adalah metode paling sederhana dan langsung berfungsi setelah deployment.

      ### Metode 2: Autentikasi Perangkat (Login Interaktif)

      1. **Penting:** Pertama aktifkan "Enable device code authorization for Codex" di [ChatGPT Security Settings](https://chatgpt.com/settings/security).
      2. Buka Terminal Zeabur dan jalankan:
         ```
         runuser -u node -- codex login --device-auth
         ```
      3. Ikuti instruksi di layar untuk mengotorisasi di browser Anda.

      ## Integrasi Zeabur AI Hub

      Anda dapat menggunakan Codex dengan [Zeabur AI Hub](https://zeabur.com/ai) alih-alih terhubung langsung ke OpenAI. Atur variabel lingkungan `OPENAI_BASE_URL` ke endpoint Zeabur AI Hub Anda (contoh: `https://hub.zeabur.com/v1`). Ini memungkinkan Anda menggunakan gateway AI terpadu Zeabur dengan fitur billing, rate limiting, dan routing model.

      ## Menjalankan Perintah di Terminal

      **Anda harus selalu menggunakan prefiks `runuser -u node --`** saat menjalankan perintah di Terminal Zeabur. Container berjalan sebagai root secara default, tetapi Codex dan alat pengembangan harus dijalankan sebagai pengguna `node` untuk menghindari masalah izin.

      ## Penyimpanan Persisten

      Semua data di bawah `/home/node/` dipertahankan setelah restart dan redeployment. Clone repositori Anda dan lakukan pekerjaan di dalam direktori ini.

      File di luar `/home/node/` bersifat sementara dan akan hilang saat restart.

      ## Perintah Umum

      | Perintah | Deskripsi |
      |----------|-----------|
      | `runuser -u node -- codex` | Mulai sesi Codex interaktif |
      | `runuser -u node -- codex "deskripsikan tugas"` | Jalankan Codex dengan prompt tertentu |
      | `runuser -u node -- codex login --device-auth` | Autentikasi via alur autentikasi perangkat |
      | `runuser -u node -- codex --version` | Periksa versi Codex yang terinstal |

      ## Tautan

      - [GitHub](https://github.com/openai/codex)
      - [Dokumentasi OpenAI](https://platform.openai.com/docs)
