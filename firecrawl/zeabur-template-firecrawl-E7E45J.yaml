# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: Firecrawl
spec:
    description: Open-source web crawler and scraper API for AI applications, knowledge bases, and data pipelines.
    icon: https://cdn-console.zeabur.com/f/xrty/firecrawl_logo-removebg-preview.png
    variables:
        - key: PUBLIC_DOMAIN
          type: DOMAIN
          name: Domain
          description: Domain for the Firecrawl API endpoint.
        - key: ZEABUR_AI_HUB_API_KEY
          type: AI_HUB_KEY
          name: Zeabur AI Hub API Key (Optional)
          description: "Optional — only needed for LLM-powered features (llm-extract, summary, /v2/extract, /v2/agent). Click Generate to mint an AI Hub key on the spot; the api service will be auto-configured to use AI Hub (claude-sonnet-4-5 by default). Leave blank to deploy without LLM, or set OPENAI_API_KEY directly on the api service after deploy for non-AI-Hub providers."
    tags:
        - Crawler
        - AI
        - Web
    readme: |-
        # Firecrawl

        🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) is an open-source web crawler and scraper API for AI applications, knowledge bases, and data pipelines.

        This template deploys the full self-hosted Firecrawl stack:

        - **api** — main Firecrawl process. Runs `harness.js --start-docker`, which manages the API server plus worker, extract-worker, and several NUQ queue worker subprocesses inside the same container.
        - **playwright** — browser automation microservice for JS-rendered pages.
        - **redis** — cache and rate-limit store.
        - **rabbitmq** — broker for the NUQ task queue.
        - **postgres** — Postgres 17 + pg_cron, pre-loaded with the NUQ queue schema.

        ## Resource recommendation

        Firecrawl is resource-intensive. The upstream `docker-compose.yaml` recommends **at least 4 vCPU / 8 GB RAM** for the `api` service and **2 vCPU / 4 GB RAM** for `playwright`. We recommend deploying this template on a Pro plan or a dedicated server.

        ## Configuration

        Only the public domain is required. The deploy form also offers an optional **Zeabur AI Hub API Key** field — click **Generate** to mint one on the spot, and the api container auto-configures itself to use [AI Hub](https://zeabur.com/ai-hub) on first start: `OPENAI_BASE_URL=https://hnd1.aihub.zeabur.ai/v1`, `MODEL_NAME=claude-sonnet-4-5`. AI Hub bills against your Zeabur credits, no separate OpenAI signup needed.

        **Other LLM providers (OpenAI direct, OpenRouter, xAI, Ollama, …):** leave the AI Hub field blank, deploy, then set `OPENAI_API_KEY` (and optionally `OPENAI_BASE_URL`, `MODEL_NAME`) on the api service env tab. The auto-config only fires when AI Hub is chosen at deploy time, so user-set values are never overwritten. The full list of supported variables lives in [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts).

        **Already deployed with AI Hub and want to switch later?** Just set `OPENAI_API_KEY` (your own key) on the api env tab and restart the api service — the wrapper sees the user-set value and skips the AI Hub auto-config.

        **Caveats when running on AI Hub:**
        - AI Hub does not currently provide embedding models. Crawl link relevance ranking falls back to no-ranking — the rest of the LLM features (extract, agent, summary) are unaffected.
        - A few Firecrawl features (interactive browser-agent, direct-quote handling) call Google Gemini directly via `@ai-sdk/google` rather than through `OPENAI_BASE_URL`. To enable them, also set `GOOGLE_GENERATIVE_AI_API_KEY` on the api service.

        `BULL_AUTH_KEY` (which protects the internal Bull queue dashboard) is auto-generated; you can find it on the api service env tab.

        Authentication is **disabled** by default (`USE_DB_AUTHENTICATION=false`). The API endpoint is public — protect your domain with Cloudflare, an auth proxy, or a network ACL if exposed to the internet.

        ## Quick test

        After deployment finishes, hit the scrape endpoint:

        ```bash
        curl -X POST https://<your-domain>/v1/scrape \
          -H 'Content-Type: application/json' \
          -d '{"url": "https://docs.firecrawl.dev"}'
        ```

        ## Queue dashboard

        Firecrawl has no end-user UI — it is an API-only service. For operators, a built-in [Bull Dashboard](https://github.com/felixmosh/bull-board) is mounted at:

        ```
        https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
        ```

        Use it to monitor queue throughput, inspect active / completed / failed jobs, and replay errors. Find your `BULL_AUTH_KEY` on the **api** service env tab.

        ## Versioning

        Firecrawl upstream does not publish semver tags — only `:latest`, which is rebuilt every time `main` advances. To give you reproducible deploys, this template pins each image by digest (`@sha256:...`). The current pin corresponds to the build of **2026-05-04**. Updates ship as new template revisions.

        ## Reference

        - GitHub: https://github.com/firecrawl/firecrawl
        - Docs: https://docs.firecrawl.dev/
        - License: AGPL-3.0
    services:
        - name: postgres
          icon: https://cdn.zeabur.com/marketplace/postgresql.svg
          template: PREBUILT
          spec:
            id: postgres
            source:
                image: ghcr.io/firecrawl/nuq-postgres@sha256:f9388bd25ae2e1f1d034518236f993ce236173c1d8800ce24092ea6643a95a33
            ports:
                - id: database
                  port: 5432
                  type: TCP
            volumes:
                - id: data
                  dir: /var/lib/postgresql/data
            env:
                POSTGRES_DB:
                    default: postgres
                    expose: true
                POSTGRES_HOST:
                    default: ${CONTAINER_HOSTNAME}
                    expose: true
                POSTGRES_PASSWORD:
                    default: ${PASSWORD}
                    expose: true
                POSTGRES_PORT:
                    default: ${DATABASE_PORT}
                    expose: true
                POSTGRES_USER:
                    default: postgres
                    expose: true
            healthCheck:
                type: TCP
                port: database
        - name: redis
          icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/redis.svg
          template: PREBUILT
          spec:
            id: redis
            source:
                image: redis:7-alpine
                command:
                    - redis-server
                    - --bind
                    - 0.0.0.0
            ports:
                - id: database
                  port: 6379
                  type: TCP
            volumes:
                - id: data
                  dir: /data
            env:
                REDIS_HOST:
                    default: ${CONTAINER_HOSTNAME}
                    expose: true
                REDIS_PORT:
                    default: ${DATABASE_PORT}
                    expose: true
                REDIS_URL:
                    default: redis://${REDIS_HOST}:${REDIS_PORT}
                    expose: true
            healthCheck:
                type: TCP
                port: database
        - name: rabbitmq
          icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/rabbitmq.svg
          template: PREBUILT
          spec:
            id: rabbitmq
            source:
                image: rabbitmq:3-management
            ports:
                - id: amqp
                  port: 5672
                  type: TCP
            volumes:
                - id: data
                  dir: /var/lib/rabbitmq
            env:
                RABBITMQ_DEFAULT_USER:
                    default: firecrawl
                    expose: true
                RABBITMQ_DEFAULT_PASS:
                    default: ${PASSWORD}
                    expose: true
                RABBITMQ_HOST:
                    default: ${CONTAINER_HOSTNAME}
                    expose: true
                RABBITMQ_PORT:
                    default: ${AMQP_PORT}
                    expose: true
                NUQ_RABBITMQ_URL:
                    default: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}
                    expose: true
            healthCheck:
                type: TCP
                port: amqp
        - name: playwright
          icon: https://raw.githubusercontent.com/github/explore/60cd2530141f67f07a947fa2d310c482e287e387/topics/playwright/playwright.png
          template: PREBUILT
          spec:
            id: playwright
            source:
                image: ghcr.io/firecrawl/playwright-service@sha256:9e0737bc09df28275aab29726b1c0824a7725113945434e843385d487b7f7ec6
            ports:
                - id: web
                  port: 3000
                  type: TCP
            env:
                PORT:
                    default: "3000"
                MAX_CONCURRENT_PAGES:
                    default: "10"
                BLOCK_MEDIA:
                    default: "false"
                PLAYWRIGHT_HOST:
                    default: ${CONTAINER_HOSTNAME}
                    expose: true
                PLAYWRIGHT_PORT:
                    default: ${WEB_PORT}
                    expose: true
                PLAYWRIGHT_MICROSERVICE_URL:
                    default: http://${PLAYWRIGHT_HOST}:${PLAYWRIGHT_PORT}/scrape
                    expose: true
            healthCheck:
                type: TCP
                port: web
        - name: api
          icon: https://cdn-console.zeabur.com/f/xrty/firecrawl_logo-removebg-preview.png
          dependencies:
            - postgres
            - redis
            - rabbitmq
            - playwright
          template: PREBUILT
          spec:
            id: api
            source:
                image: ghcr.io/firecrawl/firecrawl@sha256:3ad8dfb4a4826a187a90a6154c1e9ec253f7dad55756172e094e66df32d75586
                command:
                    - /bin/sh
                    - -c
                    - |
                      # If the deploy form's AI Hub key field was filled, wire OpenAI-compat env vars to AI Hub.
                      # This only runs when the user explicitly chose AI Hub; OPENAI_* vars set by the user are never overwritten.
                      if [ -n "$ZEABUR_AI_HUB_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
                        export OPENAI_API_KEY="$ZEABUR_AI_HUB_API_KEY"
                        : "${OPENAI_BASE_URL:=https://hnd1.aihub.zeabur.ai/v1}"
                        : "${MODEL_NAME:=claude-sonnet-4-5}"
                        export OPENAI_BASE_URL MODEL_NAME
                      fi
                      exec node dist/src/harness.js --start-docker
            ports:
                - id: web
                  port: 3002
                  type: HTTP
            instructions:
                - title: Firecrawl API URL
                  content: https://${ZEABUR_WEB_DOMAIN}
                - title: Bull Queue Dashboard
                  content: https://${ZEABUR_WEB_DOMAIN}/admin/${BULL_AUTH_KEY}/queues
                - title: Quick scrape (curl)
                  content: |-
                    curl -X POST https://${ZEABUR_WEB_DOMAIN}/v1/scrape \
                      -H 'Content-Type: application/json' \
                      -d '{"url":"https://docs.firecrawl.dev"}'
            env:
                HOST:
                    default: 0.0.0.0
                PORT:
                    default: ${WEB_PORT}
                INTERNAL_PORT:
                    default: ${WEB_PORT}
                ENV:
                    default: local
                LOGGING_LEVEL:
                    default: info
                HARNESS_STARTUP_TIMEOUT_MS:
                    default: "120000"
                NUM_WORKERS_PER_QUEUE:
                    default: "8"
                CRAWL_CONCURRENT_REQUESTS:
                    default: "10"
                MAX_CONCURRENT_JOBS:
                    default: "5"
                BROWSER_POOL_SIZE:
                    default: "5"
                USE_DB_AUTHENTICATION:
                    default: "false"
                REDIS_RATE_LIMIT_URL:
                    default: ${REDIS_URL}
                BULL_AUTH_KEY:
                    default: ${PASSWORD}
                ZEABUR_AI_HUB_API_KEY:
                    default: ${ZEABUR_AI_HUB_API_KEY}
                OPENAI_API_KEY:
                    default: ""
            healthCheck:
                type: TCP
                port: web
          domainKey: PUBLIC_DOMAIN
localization:
    zh-TW:
        description: 開源網頁爬蟲與擷取 API，專為 AI 應用、知識庫和資料管線設計。
        readme: |-
            # Firecrawl

            🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) 是一個開源的網頁爬蟲與擷取 API，專為 AI 應用、知識庫和資料管線設計。

            此模板部署完整的自架 Firecrawl 堆疊：

            - **api** — Firecrawl 主程式。執行 `harness.js --start-docker`，在同一個容器內管理 API 伺服器、worker、extract-worker，以及多個 NUQ queue worker 子行程。
            - **playwright** — 處理 JavaScript 渲染頁面的瀏覽器自動化微服務。
            - **redis** — 快取與速率限制儲存。
            - **rabbitmq** — NUQ 任務佇列的 broker。
            - **postgres** — Postgres 17 + pg_cron，預載 NUQ queue schema。

            ## 資源建議

            Firecrawl 是資源密集型服務。upstream 的 `docker-compose.yaml` 建議 `api` 服務至少配置 **4 vCPU / 8 GB RAM**，`playwright` 至少 **2 vCPU / 4 GB RAM**。建議部署在 Pro 方案或 dedicated server 上。

            ## 設定

            必填的只有網域。部署表單還提供一個可選的 **Zeabur AI Hub API Key** 欄位——按 **Generate** 當場生一把 key，api 容器啟動時會自動把自己接到 [AI Hub](https://zeabur.com/ai-hub)：`OPENAI_BASE_URL=https://hnd1.aihub.zeabur.ai/v1`、`MODEL_NAME=claude-sonnet-4-5`。AI Hub 直接從 Zeabur credit 扣費，不用另外申請 OpenAI 帳號。

            **想用其他 provider（OpenAI 直連、OpenRouter、xAI、Ollama…）：** 部署時 AI Hub 欄位留空，完成後到 api 服務 env tab 設 `OPENAI_API_KEY`（可選 `OPENAI_BASE_URL`、`MODEL_NAME`）。auto-config 只有在部署時選了 AI Hub 才會觸發，使用者自己設的值不會被覆寫。完整支援的變數清單見 [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts)。

            **已經用 AI Hub 部署完想換成自己的？** 直接在 api env tab 設 `OPENAI_API_KEY`（你自己的 key）然後 restart api 服務即可——wrapper 看到 user 已設值就會跳過 AI Hub auto-config。

            **AI Hub 上跑的注意事項：**
            - AI Hub 目前沒有 embedding model。Crawl 連結相關度排序會退化為原順序，其他 LLM 功能（extract、agent、summary）不受影響。
            - 少數 Firecrawl 功能（互動式 browser-agent、direct-quote 處理）寫死透過 `@ai-sdk/google` 呼叫 Google Gemini，不走 `OPENAI_BASE_URL`。若要啟用，請另外在 api 服務設 `GOOGLE_GENERATIVE_AI_API_KEY`。

            `BULL_AUTH_KEY`（保護內建 Bull queue dashboard）會自動生成，可在 api 服務 env tab 查看。

            預設 **不啟用** API 認證（`USE_DB_AUTHENTICATION=false`）。API 端點是公開的——若部署於公開網路，請使用 Cloudflare、auth proxy 或網路 ACL 保護你的網域。

            ## 快速測試

            部署完成後，呼叫 scrape 端點：

            ```bash
            curl -X POST https://<your-domain>/v1/scrape \
              -H 'Content-Type: application/json' \
              -d '{"url": "https://docs.firecrawl.dev"}'
            ```

            ## Queue 管理面板

            Firecrawl 沒有給終端用戶的 UI，它是 API-only 服務。維運用的內建 [Bull Dashboard](https://github.com/felixmosh/bull-board) 掛在：

            ```
            https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
            ```

            可監控 queue 吞吐量、檢視 active / completed / failed jobs、重跑失敗任務。`BULL_AUTH_KEY` 可在 **api** 服務的 env tab 查到。

            ## 版本資訊

            Firecrawl upstream 沒有發行 semver 標籤——只有 `:latest`，每次 main 分支推進就會重建。為了讓你的部署可重現，這個模板把每個 image 用 digest（`@sha256:...`）釘住，目前釘的是 **2026-05-04** 那個 build。後續更新會以新版模板的形式釋出。

            ## 參考資料

            - GitHub: https://github.com/firecrawl/firecrawl
            - 官方文件: https://docs.firecrawl.dev/
            - License: AGPL-3.0
