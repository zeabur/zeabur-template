    ja-JP:
        description: AI アプリケーション、ナレッジベース、データパイプライン向けのオープンソース Web クローラー / スクレイピング API。
        readme: |-
            # Firecrawl

            🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) は AI アプリケーション、ナレッジベース、データパイプライン向けのオープンソース Web クローラー / スクレイピング API です。

            このテンプレートはセルフホスト版 Firecrawl のフルスタックをデプロイします:

            - **api** — Firecrawl のメインプロセス。`harness.js --start-docker` を実行し、同一コンテナ内で API サーバー、worker、extract-worker、複数の NUQ キュー worker サブプロセスを管理します。
            - **playwright** — JavaScript レンダリングページ向けのブラウザ自動化マイクロサービス。
            - **redis** — キャッシュとレート制限用のストア。
            - **rabbitmq** — NUQ タスクキューのブローカー。
            - **postgres** — Postgres 17 + pg_cron、NUQ キュースキーマをプリロード済み。

            ## リソース推奨値

            Firecrawl はリソース集約型のサービスです。upstream の `docker-compose.yaml` は `api` に最低 **4 vCPU / 8 GB RAM**、`playwright` に最低 **2 vCPU / 4 GB RAM** を推奨しています。Pro プランまたは専用サーバーへのデプロイを推奨します。

            ## 設定

            必須項目はドメイン名のみです。デプロイフォームには **Zeabur AI Hub API Key** のオプション欄があり、**Generate** をクリックすればその場でキーを発行できます。api コンテナは初回起動時に自動的に [AI Hub](https://zeabur.com/ai-hub) を使うように設定されます（`OPENAI_BASE_URL=https://hnd1.aihub.zeabur.ai/v1`、`MODEL_NAME=claude-sonnet-4-5`）。AI Hub は Zeabur のクレジットから直接課金されるため、別途 OpenAI のサインアップは不要です。

            **OpenAI 以外のプロバイダ（OpenAI 直接、OpenRouter、xAI、Ollama …）を使う場合：** デプロイ時に AI Hub 欄を空のままにし、デプロイ完了後に api サービスの env タブで `OPENAI_API_KEY`（必要に応じて `OPENAI_BASE_URL`、`MODEL_NAME`）を設定してください。auto-config はデプロイ時に AI Hub を選択した場合のみ作動するため、ユーザーが設定した値は上書きされません。サポートされる変数の完全なリストは [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts) を参照してください。

            **AI Hub でデプロイ済みで後から切り替えたい場合：** api サービスの env タブに `OPENAI_API_KEY`（自前のキー）を設定して api サービスを再起動するだけです。wrapper はユーザー設定値を検知し、AI Hub auto-config をスキップします。

            **AI Hub で運用する際の注意点：**
            - AI Hub は現在 embedding model を提供していません。Crawl のリンク関連度ランキングは「ランキングなし」にフォールバックしますが、その他の LLM 機能（extract、agent、summary）には影響しません。
            - 一部の Firecrawl 機能（インタラクティブ browser-agent、direct-quote 処理）は `OPENAI_BASE_URL` を経由せず、`@ai-sdk/google` 経由で直接 Google Gemini を呼び出します。これらを有効化するには、api サービスに `GOOGLE_GENERATIVE_AI_API_KEY` も設定してください。

            `BULL_AUTH_KEY`（内蔵 Bull queue dashboard を保護する認証キー）は自動生成されます。api サービスの env タブから確認できます。

            API 認証はデフォルトで **無効** です（`USE_DB_AUTHENTICATION=false`）。API エンドポイントは公開状態のため、インターネットに公開する場合は Cloudflare、認証プロキシ、ネットワーク ACL などでドメインを保護してください。

            ## クイックテスト

            デプロイ完了後、scrape エンドポイントを呼び出します:

            ```bash
            curl -X POST https://<your-domain>/v1/scrape \
              -H 'Content-Type: application/json' \
              -d '{"url": "https://docs.firecrawl.dev"}'
            ```

            ## キュー管理ダッシュボード

            Firecrawl にはエンドユーザー向け UI はなく、API のみのサービスです。運用者向けに [Bull Dashboard](https://github.com/felixmosh/bull-board) が組み込まれており、以下の URL でアクセスできます:

            ```
            https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
            ```

            キューのスループット監視、active / completed / failed ジョブの確認、失敗ジョブのリトライが可能です。`BULL_AUTH_KEY` は **api** サービスの env タブから確認できます。

            ## バージョン情報

            Firecrawl upstream は semver タグを公開していません — `:latest` のみで、main ブランチが進むたびに再ビルドされます。再現性のあるデプロイのために、このテンプレートでは各 image を digest（`@sha256:...`）で固定しており、現在は **2026-05-04** のビルドに対応します。アップデートは新しいテンプレートリビジョンとして公開されます。

            ## 参考資料

            - GitHub: https://github.com/firecrawl/firecrawl
            - 公式ドキュメント: https://docs.firecrawl.dev/
            - ライセンス: AGPL-3.0
    es-ES:
        description: API de rastreo y extracción web de código abierto para aplicaciones de IA, bases de conocimiento y pipelines de datos.
        readme: |-
            # Firecrawl

            🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) es una API de rastreo y extracción web de código abierto para aplicaciones de IA, bases de conocimiento y pipelines de datos.

            Esta plantilla despliega la pila completa de Firecrawl autoalojada:

            - **api** — proceso principal de Firecrawl. Ejecuta `harness.js --start-docker`, que gestiona el servidor API, worker, extract-worker y varios subprocesos worker de la cola NUQ dentro del mismo contenedor.
            - **playwright** — microservicio de automatización del navegador para páginas con JavaScript.
            - **redis** — almacén para caché y limitación de velocidad.
            - **rabbitmq** — broker para la cola de tareas NUQ.
            - **postgres** — Postgres 17 + pg_cron, con el esquema de cola NUQ precargado.

            ## Recursos recomendados

            Firecrawl consume muchos recursos. El `docker-compose.yaml` upstream recomienda al menos **4 vCPU / 8 GB RAM** para el servicio `api` y **2 vCPU / 4 GB RAM** para `playwright`. Recomendamos desplegar en un plan Pro o un servidor dedicado.

            ## Configuración

            Solo el dominio es obligatorio. El formulario de despliegue también incluye un campo opcional **Zeabur AI Hub API Key** — pulsa **Generate** para crear una clave al instante, y el contenedor api se autoconfigura para usar [AI Hub](https://zeabur.com/ai-hub) en su primer arranque (`OPENAI_BASE_URL=https://hnd1.aihub.zeabur.ai/v1`, `MODEL_NAME=claude-sonnet-4-5`). AI Hub se factura contra tus créditos de Zeabur, sin necesidad de registrarte en OpenAI.

            **Otros proveedores LLM (OpenAI directo, OpenRouter, xAI, Ollama, …):** deja el campo de AI Hub en blanco, despliega y luego define `OPENAI_API_KEY` (y opcionalmente `OPENAI_BASE_URL`, `MODEL_NAME`) en la pestaña env del servicio api. La autoconfiguración solo se activa cuando se elige AI Hub al desplegar, por lo que los valores definidos por el usuario nunca se sobreescriben. La lista completa de variables soportadas está en [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts).

            **¿Ya desplegaste con AI Hub y quieres cambiar luego?** Define `OPENAI_API_KEY` (tu propia clave) en la pestaña env del servicio api y reinicia el servicio api — el wrapper detecta el valor definido por el usuario y omite la autoconfiguración de AI Hub.

            **Consideraciones al ejecutar sobre AI Hub:**
            - AI Hub no proporciona modelos de embedding actualmente. La ordenación de relevancia de enlaces durante el crawl se desactiva (los enlaces se devuelven sin ordenar); el resto de funciones LLM (extract, agent, summary) no se ven afectadas.
            - Algunas funciones de Firecrawl (browser-agent interactivo, manejo de citas directas) llaman a Google Gemini directamente vía `@ai-sdk/google` sin pasar por `OPENAI_BASE_URL`. Para habilitarlas, define también `GOOGLE_GENERATIVE_AI_API_KEY` en el servicio api.

            `BULL_AUTH_KEY` (que protege el panel interno Bull queue) se genera automáticamente; puedes verlo en la pestaña env del servicio api.

            La autenticación está **deshabilitada** por defecto (`USE_DB_AUTHENTICATION=false`). El endpoint de la API es público — protege tu dominio con Cloudflare, un auth proxy o una ACL de red si está expuesto a Internet.

            ## Prueba rápida

            Tras el despliegue, llama al endpoint scrape:

            ```bash
            curl -X POST https://<your-domain>/v1/scrape \
              -H 'Content-Type: application/json' \
              -d '{"url": "https://docs.firecrawl.dev"}'
            ```

            ## Panel de cola

            Firecrawl no tiene UI para usuarios finales — es un servicio solo de API. Para operadores, hay un [Bull Dashboard](https://github.com/felixmosh/bull-board) incorporado en:

            ```
            https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
            ```

            Úsalo para monitorear el rendimiento de la cola, inspeccionar trabajos active / completed / failed y reintentar errores. Encuentra tu `BULL_AUTH_KEY` en la pestaña env del servicio **api**.

            ## Versionado

            Firecrawl upstream no publica etiquetas semver — solo `:latest`, que se reconstruye cada vez que avanza la rama `main`. Para que tu despliegue sea reproducible, esta plantilla fija cada imagen por digest (`@sha256:...`). El pin actual corresponde a la build del **2026-05-04**. Las actualizaciones se publican como nuevas revisiones de la plantilla.

            ## Referencias

            - GitHub: https://github.com/firecrawl/firecrawl
            - Documentación oficial: https://docs.firecrawl.dev/
            - Licencia: AGPL-3.0
    id-ID:
        description: API web crawler dan scraper open-source untuk aplikasi AI, basis pengetahuan, dan pipeline data.
        readme: |-
            # Firecrawl

            🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) adalah API web crawler dan scraper open-source untuk aplikasi AI, basis pengetahuan, dan pipeline data.

            Template ini men-deploy seluruh stack Firecrawl self-hosted:

            - **api** — proses utama Firecrawl. Menjalankan `harness.js --start-docker`, yang mengelola server API, worker, extract-worker, dan beberapa subproses worker antrian NUQ di dalam container yang sama.
            - **playwright** — microservice otomasi browser untuk halaman ber-JavaScript.
            - **redis** — penyimpanan cache dan rate-limit.
            - **rabbitmq** — broker untuk antrian tugas NUQ.
            - **postgres** — Postgres 17 + pg_cron, sudah di-load dengan skema antrian NUQ.

            ## Rekomendasi sumber daya

            Firecrawl membutuhkan banyak sumber daya. `docker-compose.yaml` upstream merekomendasikan minimal **4 vCPU / 8 GB RAM** untuk service `api` dan **2 vCPU / 4 GB RAM** untuk `playwright`. Disarankan deploy di paket Pro atau dedicated server.

            ## Konfigurasi

            Hanya domain yang wajib diisi. Form deploy juga menyediakan field opsional **Zeabur AI Hub API Key** — klik **Generate** untuk membuat key langsung di sana, container api akan otomatis terkonfigurasi untuk pakai [AI Hub](https://zeabur.com/ai-hub) saat pertama kali start (`OPENAI_BASE_URL=https://hnd1.aihub.zeabur.ai/v1`, `MODEL_NAME=claude-sonnet-4-5`). AI Hub ditagih ke kredit Zeabur Anda, tidak perlu daftar OpenAI terpisah.

            **Provider LLM lain (OpenAI langsung, OpenRouter, xAI, Ollama, …):** kosongkan field AI Hub saat deploy, lalu set `OPENAI_API_KEY` (dan opsional `OPENAI_BASE_URL`, `MODEL_NAME`) di tab env service api setelah deploy. Auto-config hanya aktif kalau AI Hub dipilih saat deploy, jadi nilai yang user set sendiri tidak akan ditimpa. Daftar lengkap variabel yang didukung ada di [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts).

            **Sudah deploy dengan AI Hub tapi mau ganti nanti?** Cukup set `OPENAI_API_KEY` (key Anda sendiri) di tab env service api lalu restart service api — wrapper akan mendeteksi nilai yang user set dan melewatkan AI Hub auto-config.

            **Catatan saat menjalankan di AI Hub:**
            - AI Hub saat ini tidak menyediakan embedding model. Ranking relevansi link saat crawl akan fallback ke "tanpa ranking"; fitur LLM lain (extract, agent, summary) tidak terpengaruh.
            - Beberapa fitur Firecrawl (browser-agent interaktif, penanganan direct-quote) memanggil Google Gemini langsung via `@ai-sdk/google` tanpa melalui `OPENAI_BASE_URL`. Untuk mengaktifkannya, set juga `GOOGLE_GENERATIVE_AI_API_KEY` di service api.

            `BULL_AUTH_KEY` (untuk melindungi Bull queue dashboard internal) dibuat otomatis; bisa dilihat di tab env service api.

            Autentikasi API **dinonaktifkan** secara default (`USE_DB_AUTHENTICATION=false`). Endpoint API bersifat publik — lindungi domain Anda dengan Cloudflare, auth proxy, atau ACL jaringan jika dipublikasikan ke internet.

            ## Tes cepat

            Setelah deploy selesai, panggil endpoint scrape:

            ```bash
            curl -X POST https://<your-domain>/v1/scrape \
              -H 'Content-Type: application/json' \
              -d '{"url": "https://docs.firecrawl.dev"}'
            ```

            ## Dashboard antrian

            Firecrawl tidak punya UI untuk pengguna akhir — ini adalah service API saja. Untuk operator, tersedia [Bull Dashboard](https://github.com/felixmosh/bull-board) bawaan di:

            ```
            https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
            ```

            Gunakan untuk memantau throughput antrian, melihat job active / completed / failed, dan menjalankan ulang error. `BULL_AUTH_KEY` bisa ditemukan di tab env service **api**.

            ## Versi

            Firecrawl upstream tidak menerbitkan tag semver — hanya `:latest`, yang di-build ulang setiap kali branch `main` maju. Agar deploy Anda reprodusibel, template ini mengunci setiap image dengan digest (`@sha256:...`). Pin saat ini sesuai dengan build pada **2026-05-04**. Update dirilis sebagai revisi template baru.

            ## Referensi

            - GitHub: https://github.com/firecrawl/firecrawl
            - Dokumentasi resmi: https://docs.firecrawl.dev/
            - Lisensi: AGPL-3.0
