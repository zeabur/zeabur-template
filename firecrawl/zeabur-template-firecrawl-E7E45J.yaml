    ja-JP:
        description: AI アプリケーション、ナレッジベース、データパイプライン向けのオープンソース Web クローラー / スクレイピング API。
        readme: |-
            # Firecrawl

            🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) は AI アプリケーション、ナレッジベース、データパイプライン向けのオープンソース Web クローラー / スクレイピング API です。

            このテンプレートはセルフホスト版 Firecrawl のフルスタックをデプロイします:

            - **api** — Firecrawl のメインプロセス。`harness.js --start-docker` を実行し、同一コンテナ内で API サーバー、worker、extract-worker、複数の NUQ キュー worker サブプロセスを管理します。
            - **playwright** — JavaScript レンダリングページ向けのブラウザ自動化マイクロサービス。
            - **redis** — キャッシュとレート制限用のストア。
            - **rabbitmq** — NUQ タスクキューのブローカー。
            - **postgres** — Postgres 17 + pg_cron、NUQ キュースキーマをプリロード済み。

            ## リソース推奨値

            Firecrawl はリソース集約型のサービスです。upstream の `docker-compose.yaml` は `api` に最低 **4 vCPU / 8 GB RAM**、`playwright` に最低 **2 vCPU / 4 GB RAM** を推奨しています。Pro プランまたは専用サーバーへのデプロイを推奨します。

            ## 設定

            デプロイ時に必要なのはドメイン名のみです。LLM 機能（`llm-extract`、`summary` 出力フォーマット、`/v2/extract`、`/v2/agent`）を有効化するには、デプロイ完了後に **api** サービスの env タブで `OPENAI_API_KEY` を設定してください。

            OpenAI 以外のプロバイダを使いたい場合：Firecrawl は OpenRouter、xAI（Grok）、Ollama、および `OPENAI_BASE_URL` 経由で任意の OpenAI 互換エンドポイントをネイティブサポートしています。**api** サービスに対応する env var を自身で追加してください。サポートされる変数の完全なリストは [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts) を参照してください。

            `BULL_AUTH_KEY`（内蔵 Bull queue dashboard を保護する認証キー）は自動生成されます。api サービスの env タブから確認できます。

            API 認証はデフォルトで **無効** です（`USE_DB_AUTHENTICATION=false`）。API エンドポイントは公開状態のため、インターネットに公開する場合は Cloudflare、認証プロキシ、ネットワーク ACL などでドメインを保護してください。

            ## クイックテスト

            デプロイ完了後、scrape エンドポイントを呼び出します:

            ```bash
            curl -X POST https://<your-domain>/v1/scrape \
              -H 'Content-Type: application/json' \
              -d '{"url": "https://docs.firecrawl.dev"}'
            ```

            ## キュー管理ダッシュボード

            Firecrawl にはエンドユーザー向け UI はなく、API のみのサービスです。運用者向けに [Bull Dashboard](https://github.com/felixmosh/bull-board) が組み込まれており、以下の URL でアクセスできます:

            ```
            https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
            ```

            キューのスループット監視、active / completed / failed ジョブの確認、失敗ジョブのリトライが可能です。`BULL_AUTH_KEY` は **api** サービスの env タブから確認できます。

            ## バージョン情報

            Firecrawl upstream は semver タグを公開していません — `:latest` のみで、main ブランチが進むたびに再ビルドされます。再現性のあるデプロイのために、このテンプレートでは各 image を digest（`@sha256:...`）で固定しており、現在は **2026-05-04** のビルドに対応します。アップデートは新しいテンプレートリビジョンとして公開されます。

            ## 参考資料

            - GitHub: https://github.com/firecrawl/firecrawl
            - 公式ドキュメント: https://docs.firecrawl.dev/
            - ライセンス: AGPL-3.0
    es-ES:
        description: API de rastreo y extracción web de código abierto para aplicaciones de IA, bases de conocimiento y pipelines de datos.
        readme: |-
            # Firecrawl

            🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) es una API de rastreo y extracción web de código abierto para aplicaciones de IA, bases de conocimiento y pipelines de datos.

            Esta plantilla despliega la pila completa de Firecrawl autoalojada:

            - **api** — proceso principal de Firecrawl. Ejecuta `harness.js --start-docker`, que gestiona el servidor API, worker, extract-worker y varios subprocesos worker de la cola NUQ dentro del mismo contenedor.
            - **playwright** — microservicio de automatización del navegador para páginas con JavaScript.
            - **redis** — almacén para caché y limitación de velocidad.
            - **rabbitmq** — broker para la cola de tareas NUQ.
            - **postgres** — Postgres 17 + pg_cron, con el esquema de cola NUQ precargado.

            ## Recursos recomendados

            Firecrawl consume muchos recursos. El `docker-compose.yaml` upstream recomienda al menos **4 vCPU / 8 GB RAM** para el servicio `api` y **2 vCPU / 4 GB RAM** para `playwright`. Recomendamos desplegar en un plan Pro o un servidor dedicado.

            ## Configuración

            En el despliegue solo se necesita el dominio. Para habilitar funciones LLM (formatos `llm-extract`, `summary`, `/v2/extract`, `/v2/agent`), establece `OPENAI_API_KEY` en la pestaña env del servicio **api** tras el despliegue.

            ¿Necesitas un proveedor LLM distinto? Firecrawl admite de forma nativa OpenRouter, xAI (Grok), Ollama y cualquier endpoint compatible con OpenAI mediante `OPENAI_BASE_URL`. Añade tú mismo las variables de entorno correspondientes en el servicio **api**. La lista completa de variables soportadas está en [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts).

            `BULL_AUTH_KEY` (que protege el panel interno Bull queue) se genera automáticamente; puedes verlo en la pestaña env del servicio api.

            La autenticación está **deshabilitada** por defecto (`USE_DB_AUTHENTICATION=false`). El endpoint de la API es público — protege tu dominio con Cloudflare, un auth proxy o una ACL de red si está expuesto a Internet.

            ## Prueba rápida

            Tras el despliegue, llama al endpoint scrape:

            ```bash
            curl -X POST https://<your-domain>/v1/scrape \
              -H 'Content-Type: application/json' \
              -d '{"url": "https://docs.firecrawl.dev"}'
            ```

            ## Panel de cola

            Firecrawl no tiene UI para usuarios finales — es un servicio solo de API. Para operadores, hay un [Bull Dashboard](https://github.com/felixmosh/bull-board) incorporado en:

            ```
            https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
            ```

            Úsalo para monitorear el rendimiento de la cola, inspeccionar trabajos active / completed / failed y reintentar errores. Encuentra tu `BULL_AUTH_KEY` en la pestaña env del servicio **api**.

            ## Versionado

            Firecrawl upstream no publica etiquetas semver — solo `:latest`, que se reconstruye cada vez que avanza la rama `main`. Para que tu despliegue sea reproducible, esta plantilla fija cada imagen por digest (`@sha256:...`). El pin actual corresponde a la build del **2026-05-04**. Las actualizaciones se publican como nuevas revisiones de la plantilla.

            ## Referencias

            - GitHub: https://github.com/firecrawl/firecrawl
            - Documentación oficial: https://docs.firecrawl.dev/
