# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: Firecrawl
spec:
    description: Open-source web crawler and scraper API for AI applications, knowledge bases, and data pipelines.
    icon: https://cdn-console.zeabur.com/f/xrty/firecrawl_logo-removebg-preview.png
    variables:
        - key: PUBLIC_DOMAIN
          type: DOMAIN
          name: Domain
          description: Domain for the Firecrawl API endpoint.
    tags:
        - Crawler
        - AI
        - Web
    readme: |-
        # Firecrawl

        🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) is an open-source web crawler and scraper API for AI applications, knowledge bases, and data pipelines.

        This template deploys the full self-hosted Firecrawl stack:

        - **api** — main Firecrawl process. Runs `harness.js --start-docker`, which manages the API server plus worker, extract-worker, and several NUQ queue worker subprocesses inside the same container.
        - **playwright** — browser automation microservice for JS-rendered pages.
        - **redis** — cache and rate-limit store.
        - **rabbitmq** — broker for the NUQ task queue.
        - **postgres** — Postgres 17 + pg_cron, pre-loaded with the NUQ queue schema.

        ## Resource recommendation

        Firecrawl is resource-intensive. The upstream `docker-compose.yaml` recommends **at least 4 vCPU / 8 GB RAM** for the `api` service and **2 vCPU / 4 GB RAM** for `playwright`. We recommend deploying this template on a Pro plan or a dedicated server.

        ## Configuration

        Only the public domain is required at deploy time. To enable LLM-powered features (`llm-extract`, `summary` output formats, `/v2/extract`, `/v2/agent`), set `OPENAI_API_KEY` on the **api** service env after deployment.

        Need a different LLM provider? Firecrawl natively supports OpenRouter, xAI (Grok), Ollama, and any OpenAI-compatible endpoint via `OPENAI_BASE_URL`. Add the relevant env vars yourself on the **api** service. The full list of supported variables lives in [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts).

        `BULL_AUTH_KEY` (which protects the internal Bull queue dashboard) is auto-generated; you can find it on the api service env tab.

        Authentication is **disabled** by default (`USE_DB_AUTHENTICATION=false`). The API endpoint is public — protect your domain with Cloudflare, an auth proxy, or a network ACL if exposed to the internet.

        ## Quick test

        After deployment finishes, hit the scrape endpoint:

        ```bash
        curl -X POST https://<your-domain>/v1/scrape \
          -H 'Content-Type: application/json' \
          -d '{"url": "https://docs.firecrawl.dev"}'
        ```

        ## Queue dashboard

        Firecrawl has no end-user UI — it is an API-only service. For operators, a built-in [Bull Dashboard](https://github.com/felixmosh/bull-board) is mounted at:

        ```
        https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
        ```

        Use it to monitor queue throughput, inspect active / completed / failed jobs, and replay errors. Find your `BULL_AUTH_KEY` on the **api** service env tab.

        ## Versioning

        Firecrawl upstream does not publish semver tags — only `:latest`, which is rebuilt every time `main` advances. To give you reproducible deploys, this template pins each image by digest (`@sha256:...`). The current pin corresponds to the build of **2026-05-04**. Updates ship as new template revisions.

        ## Reference

        - GitHub: https://github.com/firecrawl/firecrawl
        - Docs: https://docs.firecrawl.dev/
        - License: AGPL-3.0
    services:
        - name: postgres
          icon: https://cdn.zeabur.com/marketplace/postgresql.svg
          template: PREBUILT
          spec:
            id: postgres
            source:
                image: ghcr.io/firecrawl/nuq-postgres@sha256:f9388bd25ae2e1f1d034518236f993ce236173c1d8800ce24092ea6643a95a33
            ports:
                - id: database
                  port: 5432
                  type: TCP
            volumes:
                - id: data
                  dir: /var/lib/postgresql/data
            env:
                POSTGRES_DB:
                    default: postgres
                    expose: true
                    readonly: true
                POSTGRES_HOST:
                    default: ${CONTAINER_HOSTNAME}
                    expose: true
                    readonly: true
                POSTGRES_PASSWORD:
                    default: ${PASSWORD}
                    expose: true
                POSTGRES_PORT:
                    default: ${DATABASE_PORT}
                    expose: true
                    readonly: true
                POSTGRES_USER:
                    default: postgres
                    expose: true
                    readonly: true
            healthCheck:
                type: TCP
                port: database
        - name: redis
          icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/redis.svg
          template: PREBUILT
          spec:
            id: redis
            source:
                image: redis:7-alpine
                command:
                    - redis-server
                    - --bind
                    - 0.0.0.0
            ports:
                - id: database
                  port: 6379
                  type: TCP
            volumes:
                - id: data
                  dir: /data
            env:
                REDIS_HOST:
                    default: ${CONTAINER_HOSTNAME}
                    expose: true
                    readonly: true
                REDIS_PORT:
                    default: ${DATABASE_PORT}
                    expose: true
                    readonly: true
                REDIS_URL:
                    default: redis://${REDIS_HOST}:${REDIS_PORT}
                    expose: true
                    readonly: true
            healthCheck:
                type: TCP
                port: database
        - name: rabbitmq
          icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/rabbitmq.svg
          template: PREBUILT
          spec:
            id: rabbitmq
            source:
                image: rabbitmq:3-management
            ports:
                - id: amqp
                  port: 5672
                  type: TCP
            volumes:
                - id: data
                  dir: /var/lib/rabbitmq
            env:
                RABBITMQ_DEFAULT_USER:
                    default: firecrawl
                    expose: true
                RABBITMQ_DEFAULT_PASS:
                    default: ${PASSWORD}
                    expose: true
                RABBITMQ_HOST:
                    default: ${CONTAINER_HOSTNAME}
                    expose: true
                    readonly: true
                RABBITMQ_PORT:
                    default: ${AMQP_PORT}
                    expose: true
                    readonly: true
                NUQ_RABBITMQ_URL:
                    default: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}
                    expose: true
                    readonly: true
            healthCheck:
                type: TCP
                port: amqp
        - name: playwright
          icon: https://raw.githubusercontent.com/github/explore/60cd2530141f67f07a947fa2d310c482e287e387/topics/playwright/playwright.png
          template: PREBUILT
          spec:
            id: playwright
            source:
                image: ghcr.io/firecrawl/playwright-service@sha256:9e0737bc09df28275aab29726b1c0824a7725113945434e843385d487b7f7ec6
            ports:
                - id: web
                  port: 3000
                  type: TCP
            env:
                PORT:
                    default: "3000"
                MAX_CONCURRENT_PAGES:
                    default: "10"
                BLOCK_MEDIA:
                    default: "false"
                PLAYWRIGHT_HOST:
                    default: ${CONTAINER_HOSTNAME}
                    expose: true
                    readonly: true
                PLAYWRIGHT_PORT:
                    default: ${WEB_PORT}
                    expose: true
                    readonly: true
                PLAYWRIGHT_MICROSERVICE_URL:
                    default: http://${PLAYWRIGHT_HOST}:${PLAYWRIGHT_PORT}/scrape
                    expose: true
                    readonly: true
            healthCheck:
                type: TCP
                port: web
        - name: api
          icon: https://cdn-console.zeabur.com/f/xrty/firecrawl_logo-removebg-preview.png
          dependencies:
            - postgres
            - redis
            - rabbitmq
            - playwright
          template: PREBUILT
          spec:
            id: api
            source:
                image: ghcr.io/firecrawl/firecrawl@sha256:3ad8dfb4a4826a187a90a6154c1e9ec253f7dad55756172e094e66df32d75586
            ports:
                - id: web
                  port: 3002
                  type: HTTP
            env:
                HOST:
                    default: 0.0.0.0
                PORT:
                    default: ${WEB_PORT}
                INTERNAL_PORT:
                    default: ${WEB_PORT}
                ENV:
                    default: local
                LOGGING_LEVEL:
                    default: info
                HARNESS_STARTUP_TIMEOUT_MS:
                    default: "120000"
                NUM_WORKERS_PER_QUEUE:
                    default: "8"
                CRAWL_CONCURRENT_REQUESTS:
                    default: "10"
                MAX_CONCURRENT_JOBS:
                    default: "5"
                BROWSER_POOL_SIZE:
                    default: "5"
                USE_DB_AUTHENTICATION:
                    default: "false"
                REDIS_RATE_LIMIT_URL:
                    default: ${REDIS_URL}
                BULL_AUTH_KEY:
                    default: ${PASSWORD}
                OPENAI_API_KEY:
                    default: ""
            healthCheck:
                type: TCP
                port: web
          domainKey: PUBLIC_DOMAIN
localization:
    zh-TW:
        description: 開源網頁爬蟲與擷取 API，專為 AI 應用、知識庫和資料管線設計。
        readme: |-
            # Firecrawl

            🚀 [Firecrawl](https://github.com/firecrawl/firecrawl) 是一個開源的網頁爬蟲與擷取 API，專為 AI 應用、知識庫和資料管線設計。

            此模板部署完整的自架 Firecrawl 堆疊：

            - **api** — Firecrawl 主程式。執行 `harness.js --start-docker`，在同一個容器內管理 API 伺服器、worker、extract-worker，以及多個 NUQ queue worker 子行程。
            - **playwright** — 處理 JavaScript 渲染頁面的瀏覽器自動化微服務。
            - **redis** — 快取與速率限制儲存。
            - **rabbitmq** — NUQ 任務佇列的 broker。
            - **postgres** — Postgres 17 + pg_cron，預載 NUQ queue schema。

            ## 資源建議

            Firecrawl 是資源密集型服務。upstream 的 `docker-compose.yaml` 建議 `api` 服務至少配置 **4 vCPU / 8 GB RAM**，`playwright` 至少 **2 vCPU / 4 GB RAM**。建議部署在 Pro 方案或 dedicated server 上。

            ## 設定

            部署時只需要填網域。如要啟用 LLM 功能（`llm-extract`、`summary` 輸出格式、`/v2/extract`、`/v2/agent`），部署完成後到 **api** 服務的 env tab 設定 `OPENAI_API_KEY`。

            想換成 OpenAI 以外的 provider？Firecrawl 原生支援 OpenRouter、xAI（Grok）、Ollama，以及任何 OpenAI-compatible endpoint（透過 `OPENAI_BASE_URL`）。自行在 **api** 服務新增對應 env var 即可。完整支援的變數清單見 [`apps/api/src/config.ts`](https://github.com/firecrawl/firecrawl/blob/main/apps/api/src/config.ts)。

            `BULL_AUTH_KEY`（保護內建 Bull queue dashboard）會自動生成，可在 api 服務 env tab 查看。

            預設 **不啟用** API 認證（`USE_DB_AUTHENTICATION=false`）。API 端點是公開的——若部署於公開網路，請使用 Cloudflare、auth proxy 或網路 ACL 保護你的網域。

            ## 快速測試

            部署完成後，呼叫 scrape 端點：

            ```bash
            curl -X POST https://<your-domain>/v1/scrape \
              -H 'Content-Type: application/json' \
              -d '{"url": "https://docs.firecrawl.dev"}'
            ```

            ## Queue 管理面板

            Firecrawl 沒有給終端用戶的 UI，它是 API-only 服務。維運用的內建 [Bull Dashboard](https://github.com/felixmosh/bull-board) 掛在：

            ```
            https://<your-domain>/admin/<BULL_AUTH_KEY>/queues
            ```

            可監控 queue 吞吐量、檢視 active / completed / failed jobs、重跑失敗任務。`BULL_AUTH_KEY` 可在 **api** 服務的 env tab 查到。

            ## 版本資訊

            Firecrawl upstream 沒有發行 semver 標籤——只有 `:latest`，每次 main 分支推進就會重建。為了讓你的部署可重現，這個模板把每個 image 用 digest（`@sha256:...`）釘住，目前釘的是 **2026-05-04** 那個 build。後續更新會以新版模板的形式釋出。

            ## 參考資料

            - GitHub: https://github.com/firecrawl/firecrawl
            - 官方文件: https://docs.firecrawl.dev/
            - License: AGPL-3.0
