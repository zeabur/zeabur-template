      [Open-LLM-VTuber](https://github.com/Open-LLM-VTuber/Open-LLM-VTuber) 是一个开源 AI VTuber，可与任何 LLM 进行免提语音对话、支持打断，并搭配 Live2D 动态头像。此**云端 API** 版本将所有推理都走云端 API — 无需 GPU，一键部署到任何 Zeabur 主机。

