        - **ファイル権限：** コンテナは root で起動し、openab 実行前に agent ユーザー（uid 1000）に切り替わります。権限の問題が発生した場合、サービスを再起動してください — 起動時に自動的に権限が修正されます。

        ## セットアップ

        ### 1. Discord Bot Token の取得

        1. https://discord.com/developers/applications にアクセスし、**New Application** をクリック
