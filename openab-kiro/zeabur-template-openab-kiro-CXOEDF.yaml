        このテンプレートは Kiro バリアントをデプロイし、ベース `openab` イメージと `kiro-cli` をエージェントバックエンドとして使用します。

        ## 注意事項

        - **イメージタグ：** このテンプレートは `ghcr.io/openabdev/openab:latest` を使用しています。イメージはいつでも破壊的変更が入る可能性があります。安定版が必要な場合は、Zeabur Dashboard → サービス → 設定でバージョンを固定してください（例：`ghcr.io/openabdev/openab:v0.7.1`）。利用可能なタグ：[GitHub Packages](https://github.com/openabdev/openab/pkgs/container/openab)。
