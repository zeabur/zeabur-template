        2. **或使用 Zeabur Exec：** 在 Zeabur Dashboard 中打开服务终端，运行 `kiro-cli login --use-device-flow`
        3. 按照屏幕上的指示完成认证

        ### 3. 获取 Discord 频道 ID

        1. 打开 Discord → 前往 **用户设置**（齿轮图标）→ **高级** → 启用 **开发者模式**
        2. 右键点击你要 Bot 回应的频道 → **复制频道 ID**
        3. 多个频道用逗号分隔：`123456789012345678,234567890123456789`

        ### 4. 部署

        填入 Discord Bot Token 后点击部署即可。服务会自动连接到 Discord。然后使用上述方法之一认证 Kiro。

