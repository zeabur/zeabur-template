        # OpenAB Kiro（简体中文）

        [OpenAB](https://github.com/openabdev/openab) 是一个轻量的开源 Rust 程序，通过 stdio JSON-RPC 将 Discord 桥接到任何支持 [Agent Client Protocol](https://github.com/anthropics/agent-protocol) 的 coding CLI。

        此模板部署的是 Kiro 变体，使用基础 `openab` 镜像搭配 `kiro-cli` 作为 agent 后端。

        ## 注意事项

        - **镜像标签：** 此模板使用 `ghcr.io/openabdev/openab:latest`，镜像可能随时有破坏性变更。如需稳定版本，请在 Zeabur Dashboard → 服务 → 设置中固定版本（例如 `ghcr.io/openabdev/openab:v0.7.1`）。可用标签：[GitHub Packages](https://github.com/openabdev/openab/pkgs/container/openab)。
