        1. **Discord で Bot に伝える：** Bot に「Kiro にログイン」と伝えてください — device flow 認証を案内してくれます
        2. **または Zeabur Exec を使用：** Zeabur Dashboard でサービスターミナルを開き、`kiro-cli login --use-device-flow` を実行
        3. 画面の指示に従って認証を完了

        ### 3. Discord チャンネル ID の取得

        1. Discord を開く → **ユーザー設定**（歯車アイコン）→ **詳細設定** → **開発者モード** を有効化
        2. Bot に応答させたいチャンネルを右クリック → **チャンネル ID をコピー**
        3. 複数チャンネルはカンマで区切る：`123456789012345678,234567890123456789`

        ### 4. デプロイ

        Discord Bot Token を入力してデプロイをクリック。サービスは自動的に Discord に接続します。その後、上記の方法で Kiro を認証してください。

        ## 使い方

        - 許可されたチャンネルで **Bot を @mention** して会話を開始
        - OpenAB は自動的に **thread** を作成してマルチターン会話を行います — 以降のメッセージでは @mention 不要
        - 各 thread は永続的な Kiro session に対応（デフォルト 24 時間 TTL）

        ## GitHub 連携（オプション）

        エージェントは `gh`（GitHub CLI）を使って PR レビュー、Issue 作成、コメント、マージなどができます。コンテナにはブラウザがないため、device flow で認証します：

        1. Discord で Bot に **「GitHub にログイン」** と伝える
        2. Bot がワンタイムコードと URL（例：`https://github.com/login/device`）を返信
        3. スマートフォンまたは PC で URL を開き、コードを入力して認証
        4. Bot がログイン完了を確認 — `gh` がこのセッションで認証済みになります

        詳細は [gh-auth-device-flow.md](https://github.com/openabdev/openab/blob/main/docs/gh-auth-device-flow.md) を参照。

        ## カスタマイズ

        | ファイル | 説明 |
        |---------|------|
        | `/home/agent/.config/openab/config.toml` | OpenAB 設定（sessions、reactions、STT など） |

        `config.toml` は初回起動時に内蔵テンプレートから作成されます。以降の変更はファイルを直接編集してください。環境変数は初期設定時のみ使用されます。デフォルトに戻すにはファイルを削除して再起動：`rm /home/agent/.config/openab/config.toml`

        設定オプションは [OpenAB ドキュメント](https://github.com/openabdev/openab) を参照。

        ## 無効化

        デプロイ時に `Discord Bot Token` を空にしてください。サービスはクラッシュせずスリープ状態になります。

        ## リンク

        - [OpenAB GitHub](https://github.com/openabdev/openab)
        - [Agent Client Protocol](https://github.com/anthropics/agent-protocol)
