        `config.toml` 在首次启动时从内建模板创建。之后请直接编辑文件，环境变量仅用于初始设置。要恢复默认值请删除后重启：`rm /home/agent/.config/openab/config.toml`

        设置选项请参阅 [OpenAB 文档](https://github.com/openabdev/openab)。

        ## 停用

        部署时将 `Discord Bot Token` 留空即可。服务会进入 sleep 状态，不会崩溃。

