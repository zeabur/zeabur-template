# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Talk to the City
spec:
  description: |
    Talk to the City (T3C) is an open-source LLM-powered tool for collective deliberation and decision-making. It processes qualitative data and organizes similar claims into structured topic trees.
  icon: https://avatars.githubusercontent.com/u/130554778
  tags:
    - AI
    - Analytics
    - Tool
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Client Domain
      description: Domain for the Talk to the City frontend
    - key: PIPELINE_WORKER_DOMAIN
      type: DOMAIN
      name: Pipeline Worker Domain
      description: Public domain for the pipeline worker. Required as the push endpoint for Google Pub/Sub.
    - key: OPENAI_API_KEY
      type: STRING
      name: OpenAI API Key
      description: Your OpenAI API key for LLM processing
    - key: FIREBASE_CREDENTIALS_ENCODED
      type: STRING
      name: Firebase Service Account (Base64)
      description: Base64-encoded Firebase service account JSON credentials
    - key: NEXT_PUBLIC_FIREBASE_API_KEY
      type: STRING
      name: Firebase API Key
      description: Firebase API key from Firebase console
    - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      type: STRING
      name: Firebase Auth Domain
      description: "Firebase authentication domain (e.g., project-id.firebaseapp.com)"
    - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
      type: STRING
      name: Firebase Project ID
      description: Firebase project identifier
    - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      type: STRING
      name: Firebase Storage Bucket
      description: "Firebase storage bucket (e.g., project-id.appspot.com)"
    - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      type: STRING
      name: Firebase Messaging Sender ID
      description: Firebase Cloud Messaging sender ID
    - key: NEXT_PUBLIC_FIREBASE_APP_ID
      type: STRING
      name: Firebase App ID
      description: Firebase application ID
    - key: GOOGLE_CREDENTIALS_ENCODED
      type: STRING
      name: Google Cloud Credentials (Base64)
      description: Base64-encoded Google Cloud service account JSON for Cloud Storage and Pub/Sub
    - key: GCLOUD_STORAGE_BUCKET
      type: STRING
      name: GCS Bucket Name
      description: Google Cloud Storage bucket name for report storage
    - key: GOOGLE_CLOUD_PROJECT_ID
      type: STRING
      name: Google Cloud Project ID
      description: GCP project ID hosting your Pub/Sub topic
    - key: NODE_WORKER_TOPIC_NAME
      type: STRING
      name: Pub/Sub Topic Name
      description: Google Pub/Sub topic name for pipeline jobs
    - key: NODE_WORKER_SUBSCRIPTION_NAME
      type: STRING
      name: Pub/Sub Subscription Name
      description: Google Pub/Sub push subscription name for pipeline jobs
  readme: |
    # Talk to the City (T3C)

    [Talk to the City](https://github.com/aIObjectives/tttc-light-js) is an open-source, LLM-powered tool for improving collective deliberation and decision-making. It processes qualitative data and organizes similar claims into structured topic trees.

    ## Architecture

    This template deploys 4 services:

    | Service | Port | Role |
    |---------|------|------|
    | **next-client** | 3000 | Next.js frontend |
    | **express-server** | 8080 | Node.js backend API (publishes jobs to Pub/Sub) |
    | **pipeline-worker** | 8080 | Node.js LLM processing worker (receives Pub/Sub push) |
    | **redis** | 6379 | Pipeline state and caching |

    ## External Services Setup

    This template requires 4 external services. **Set up steps 1-3 before deploying;** Pub/Sub (step 4) requires the deployed `pipeline-worker` URL, so configure it after the first deploy.

    ### 1. OpenAI API (LLM Processing)

    T3C uses OpenAI to extract claims, generate topic trees, deduplicate, and create summaries. Default model: `gpt-4o-mini`.

    1. Go to [OpenAI Platform](https://platform.openai.com/api-keys)
    2. Click **Create new secret key**, copy the key (starts with `sk-`)
    3. Enter as `OPENAI_API_KEY` during deployment

    ### 2. Firebase (User Authentication + Database)

    T3C uses Firebase Authentication (Email/Password + Google sign-in) and Cloud Firestore (user profiles, report metadata).

    #### 2.1 Create Project

    1. Go to [Firebase Console](https://console.firebase.google.com/) → **Add project**
    2. Enter a project name (e.g., `tttc-prod`) → **Create project**

    #### 2.2 Enable Authentication

    1. Go to **Authentication** → **Get started**
    2. **Sign-in method** tab → Enable **Email/Password** and **Google**
    3. For Google: set a support email → **Save**

    #### 2.3 Add Authorized Domain

    After deployment, add your Zeabur domain:

    1. **Authentication** → **Settings** → **Authorized domains**
    2. Click **Add domain** → enter your domain (e.g., `tttc.zeabur.app`)

    > Required for email verification links and Google sign-in popup to work.

    #### 2.4 Register Web App & Get Config

    1. **Project Settings** (gear icon) → **Your apps** → click Web icon (`</>`)
    2. Enter nickname (e.g., `tttc-web`) → **Register app**
    3. Copy the `firebaseConfig` values:

    ```javascript
    // Maps to template variables:
    apiKey: "..."            → NEXT_PUBLIC_FIREBASE_API_KEY
    authDomain: "..."        → NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    projectId: "..."         → NEXT_PUBLIC_FIREBASE_PROJECT_ID
    storageBucket: "..."     → NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    messagingSenderId: "..." → NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    appId: "..."             → NEXT_PUBLIC_FIREBASE_APP_ID
    ```

    #### 2.5 Generate Service Account Key

    1. **Project Settings** → **Service accounts** tab
    2. Click **Generate new private key** → download the JSON file
    3. Base64-encode it:

    ```bash
    # macOS
    base64 -i firebase-service-account.json | tr -d '\n'
    # Linux
    base64 -w 0 firebase-service-account.json
    ```

    4. Enter the result as `FIREBASE_CREDENTIALS_ENCODED`

    > **No rebuild needed!** The Docker image includes an entrypoint script that automatically injects Firebase config from environment variables at startup. Just set the `NEXT_PUBLIC_FIREBASE_*` variables and restart the service.

    ### 3. Google Cloud (Storage + Pub/Sub)

    T3C stores generated reports in GCS and dispatches LLM jobs via Pub/Sub.

    #### 3.1 Create GCS Bucket

    1. Go to [Google Cloud Console — Storage](https://console.cloud.google.com/storage)
    2. **Create bucket** → enter a unique name (e.g., `tttc-reports-prod`)
    3. Choose a region, Standard storage class → **Create**
    4. Enter the bucket name as `GCLOUD_STORAGE_BUCKET`

    #### 3.2 Note Your Project ID

    The Pub/Sub topic and the bucket live in the same GCP project. Find the project ID at the top of the [Cloud Console](https://console.cloud.google.com/) and enter it as `GOOGLE_CLOUD_PROJECT_ID`.

    #### 3.3 Create Service Account & Key

    1. Go to [IAM & Admin → Service Accounts](https://console.cloud.google.com/iam-admin/service-accounts)
    2. **Create Service Account** → name: `tttc-backend`
    3. Grant roles:
       - **Storage Object Admin** (for GCS report storage)
       - **Pub/Sub Publisher** (for express-server to enqueue jobs)
       - **Pub/Sub Subscriber** (for pipeline-worker push acknowledgement)
    4. Click the service account → **Keys** tab → **Add Key** → **Create new key** → **JSON**
    5. Base64-encode the downloaded key:

    ```bash
    # macOS
    base64 -i gcp-service-account.json | tr -d '\n'
    # Linux
    base64 -w 0 gcp-service-account.json
    ```

    6. Enter the result as `GOOGLE_CREDENTIALS_ENCODED`

    ### 4. Google Pub/Sub (Job Queue) — configure AFTER first deploy

    Pub/Sub push needs the public URL of the deployed `pipeline-worker` as its endpoint. Complete this step after services come up:

    #### 4.1 Deploy first, copy the worker URL

    1. Deploy this template with placeholder values for `NODE_WORKER_TOPIC_NAME` / `NODE_WORKER_SUBSCRIPTION_NAME` (any string — Pub/Sub doesn't exist yet)
    2. Once the services start, open the `pipeline-worker` service in the Zeabur dashboard and copy its public URL (`https://<pipeline-worker-domain>`)

    #### 4.2 Create Pub/Sub topic and push subscription

    1. Go to [Pub/Sub → Topics](https://console.cloud.google.com/cloudpubsub/topic/list)
    2. **Create topic** → name (e.g., `tttc-pipeline-jobs`) → uncheck "Add a default subscription" → **Create**
    3. Enter the topic name as `NODE_WORKER_TOPIC_NAME`
    4. **Subscriptions** → **Create subscription**:
       - Subscription ID (e.g., `tttc-pipeline-jobs-sub`)
       - Topic: the topic you just created
       - Delivery type: **Push**
       - Endpoint URL: `https://<pipeline-worker-domain>/pubsub/push`
       - Ack deadline: at least `600` seconds (LLM steps are long-running)
    5. Enter the subscription name as `NODE_WORKER_SUBSCRIPTION_NAME`

    #### 4.3 Restart express-server

    After filling the three Pub/Sub variables, restart `express-server` so it picks up the new env vars.

    > **Security note**: The `pipeline-worker`'s `/pubsub/push` endpoint does not verify a Pub/Sub OIDC token. The endpoint is publicly reachable; anyone who knows the URL can inject jobs. Treat the URL as a shared secret, or front it with an auth proxy if you need defence-in-depth.

    ## Variables Reference

    | Variable | Required | Description |
    |----------|----------|-------------|
    | `OPENAI_API_KEY` | Yes | OpenAI API key for LLM processing |
    | `FIREBASE_CREDENTIALS_ENCODED` | Yes | Base64-encoded Firebase service account JSON |
    | `NEXT_PUBLIC_FIREBASE_API_KEY` | Yes* | Firebase web app API key |
    | `NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN` | Yes* | e.g., `project.firebaseapp.com` |
    | `NEXT_PUBLIC_FIREBASE_PROJECT_ID` | Yes* | Firebase project ID |
    | `NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET` | Yes* | e.g., `project.appspot.com` |
    | `NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID` | Yes* | Firebase messaging sender ID |
    | `NEXT_PUBLIC_FIREBASE_APP_ID` | Yes* | Firebase app ID |
    | `GOOGLE_CREDENTIALS_ENCODED` | Yes | Base64-encoded GCP service account JSON (GCS + Pub/Sub) |
    | `GCLOUD_STORAGE_BUCKET` | Yes | GCS bucket name for report storage |
    | `GOOGLE_CLOUD_PROJECT_ID` | Yes | GCP project ID hosting your Pub/Sub topic |
    | `NODE_WORKER_TOPIC_NAME` | Yes** | Pub/Sub topic name for pipeline jobs |
    | `NODE_WORKER_SUBSCRIPTION_NAME` | Yes** | Pub/Sub push subscription name |

    \* Injected at runtime via entrypoint script. Set the variables and restart `next-client`.
    \*\* Set during initial deploy (any string), then update to the real Pub/Sub names after step 4 and restart `express-server`.

    ## Post-Deployment Checklist

    1. Add your Zeabur domain to Firebase Authorized Domains
    2. Complete Pub/Sub setup (step 4 above) using the deployed `pipeline-worker` URL
    3. Restart `express-server` after filling Pub/Sub variables
    4. Verify all 4 services show **Running** in the Dashboard
    5. Check `express-server` logs for: `Firebase admin app initialized successfully`
    6. Check `pipeline-worker` logs for: `Pipeline worker started successfully`
    7. Visit your domain and test sign-in

    ## Links

    - [GitHub Repository](https://github.com/aIObjectives/tttc-light-js)
    - [Development Guide](https://github.com/aIObjectives/tttc-light-js/blob/main/DEVELOPMENT.md)
  services:
    # Redis - Job Queue
    - name: redis
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/redis.svg
      template: PREBUILT_V2
      spec:
        source:
          image: redis:7-alpine
          command:
            - redis-server
            - --save
            - "60"
            - "1"
            - --loglevel
            - warning
        ports:
          - id: database
            port: 6379
            type: TCP
        volumes:
          - id: data
            dir: /data
        env:
          REDIS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          REDIS_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true
          REDIS_CONNECTION_STRING:
            default: redis://${REDIS_HOST}:${REDIS_PORT}
            expose: true
            readonly: true

    # Pipeline Worker — receives jobs via Google Pub/Sub push, runs LLM pipeline
    - name: pipeline-worker
      icon: https://avatars.githubusercontent.com/u/130554778
      template: PREBUILT_V2
      domainKey: PIPELINE_WORKER_DOMAIN
      dependencies:
        - redis
      spec:
        source:
          image: ghcr.io/zeabur/tttc-pipeline-worker:latest
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          PORT:
            default: "8080"
          NODE_ENV:
            default: production
          REDIS_HOST:
            default: ${REDIS_HOST}
          REDIS_PORT:
            default: ${REDIS_PORT}
          REDIS_URL:
            default: ${REDIS_CONNECTION_STRING}
          GOOGLE_CREDENTIALS_ENCODED:
            default: ${GOOGLE_CREDENTIALS_ENCODED}
          FIREBASE_CREDENTIALS_ENCODED:
            default: ${FIREBASE_CREDENTIALS_ENCODED}
          GCLOUD_STORAGE_BUCKET:
            default: ${GCLOUD_STORAGE_BUCKET}

    # Express Backend API
    - name: express-server
      icon: https://avatars.githubusercontent.com/u/130554778
      template: PREBUILT_V2
      dependencies:
        - redis
      spec:
        source:
          image: ghcr.io/zeabur/tttc-express-server:latest
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          NODE_ENV:
            default: production
          PORT:
            default: "8080"
          CLIENT_BASE_URL:
            default: https://${NEXT_CLIENT_DOMAIN}
          ALLOWED_ORIGINS:
            default: https://${NEXT_CLIENT_DOMAIN}
          REDIS_HOST:
            default: ${REDIS_HOST}
          REDIS_PORT:
            default: ${REDIS_PORT}
          REDIS_URL:
            default: ${REDIS_CONNECTION_STRING}
          REDIS_QUEUE_NAME:
            default: prod-queue
          OPENAI_API_KEY:
            default: ${OPENAI_API_KEY}
          FIREBASE_CREDENTIALS_ENCODED:
            default: ${FIREBASE_CREDENTIALS_ENCODED}
          GOOGLE_CREDENTIALS_ENCODED:
            default: ${GOOGLE_CREDENTIALS_ENCODED}
          GCLOUD_STORAGE_BUCKET:
            default: ${GCLOUD_STORAGE_BUCKET}
          ALLOWED_GCS_BUCKETS:
            default: ${GCLOUD_STORAGE_BUCKET}
          GOOGLE_CLOUD_PROJECT_ID:
            default: ${GOOGLE_CLOUD_PROJECT_ID}
          NODE_WORKER_TOPIC_NAME:
            default: ${NODE_WORKER_TOPIC_NAME}
          NODE_WORKER_SUBSCRIPTION_NAME:
            default: ${NODE_WORKER_SUBSCRIPTION_NAME}
          FEATURE_FLAG_PROVIDER:
            default: local
          LOCAL_FLAGS:
            default: '{"exampleBool": true}'
          ANALYTICS_PROVIDER:
            default: local
          ANALYTICS_ENABLED:
            default: "false"
          EXPRESS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true

    # Next.js Frontend
    - name: next-client
      icon: https://avatars.githubusercontent.com/u/130554778
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - express-server
      spec:
        source:
          image: ghcr.io/zeabur/tttc-next-client:latest
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          PORT:
            default: "3000"
          HOSTNAME:
            default: "0.0.0.0"
          PIPELINE_EXPRESS_URL:
            default: http://${EXPRESS_HOST}:8080
          NEXT_PUBLIC_FIREBASE_API_KEY:
            default: ${NEXT_PUBLIC_FIREBASE_API_KEY}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:
            default: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:
            default: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:
            default: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:
            default: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
          NEXT_PUBLIC_FIREBASE_APP_ID:
            default: ${NEXT_PUBLIC_FIREBASE_APP_ID}
          NEXT_CLIENT_DOMAIN:
            default: ${ZEABUR_WEB_DOMAIN}
            expose: true
            readonly: true

