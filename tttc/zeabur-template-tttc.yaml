    readme: |
      # Talk to the City (T3C)

      [Talk to the City](https://github.com/aIObjectives/tttc-light-js) は、集団的な審議と意思決定を改善するためのオープンソース LLM 搭載ツールです。定性データを処理し、類似の意見を構造化されたトピックツリーに整理します。

      ## アーキテクチャ

      このテンプレートは 4 つのサービスをデプロイします：

      | サービス | ポート | 役割 |
      |----------|--------|------|
      | **next-client** | 3000 | Next.js フロントエンド |
      | **express-server** | 8080 | Node.js バックエンド API（Pub/Sub へジョブを発行） |
      | **pipeline-worker** | 8080 | Node.js LLM 処理ワーカー（Pub/Sub push で受信） |
      | **redis** | 6379 | Pipeline 状態とキャッシュ |

      ## 外部サービスの設定

      このテンプレートには 4 つの外部サービスが必要です。**ステップ 1〜3 はデプロイ前に完了；** Pub/Sub（ステップ 4）はデプロイ後の `pipeline-worker` URL が必要なので、初回デプロイ後に設定してください。

      ### 1. OpenAI API（LLM 処理）

      T3C は OpenAI を使用して意見の抽出、トピックツリーの生成、重複排除、要約の作成を行います。デフォルトモデル：`gpt-4o-mini`。

      1. [OpenAI Platform](https://platform.openai.com/api-keys) にアクセス
      2. **Create new secret key** をクリックし、キーをコピー（`sk-` で始まります）
      3. デプロイ時に `OPENAI_API_KEY` として入力

      ### 2. Firebase（ユーザー認証 + データベース）

      T3C は Firebase Authentication（メール/パスワード + Google サインイン）と Cloud Firestore（ユーザープロファイル、レポートメタデータ）を使用します。

      #### 2.1 プロジェクトの作成

      1. [Firebase コンソール](https://console.firebase.google.com/) → **プロジェクトを追加**
      2. プロジェクト名を入力（例：`tttc-prod`）→ **プロジェクトを作成**

      #### 2.2 認証の有効化

      1. **Authentication** → **始める**
      2. **ログイン方法**タブ → **メール/パスワード**と **Google** を有効化
      3. Google の場合：サポートメールを設定 → **保存**

      #### 2.3 承認済みドメインの追加

      デプロイ後、Zeabur ドメインを承認リストに追加します：

      1. **Authentication** → **設定** → **承認済みドメイン**
      2. **ドメインを追加** をクリック → ドメインを入力（例：`tttc.zeabur.app`）

      > メール確認リンクと Google サインインポップアップが正常に動作するために必要です。

      #### 2.4 Web アプリの登録と設定の取得

      1. **プロジェクトの設定**（歯車アイコン）→ **マイアプリ** → Web アイコン（`</>`）をクリック
      2. ニックネームを入力（例：`tttc-web`）→ **アプリを登録**
      3. `firebaseConfig` の値をコピー：

      ```javascript
      // Maps to template variables:
      apiKey: "..."            → NEXT_PUBLIC_FIREBASE_API_KEY
      authDomain: "..."        → NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      projectId: "..."         → NEXT_PUBLIC_FIREBASE_PROJECT_ID
      storageBucket: "..."     → NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      messagingSenderId: "..." → NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      appId: "..."             → NEXT_PUBLIC_FIREBASE_APP_ID
      ```

      #### 2.5 サービスアカウントキーの生成

      1. **プロジェクトの設定** → **サービスアカウント**タブ
      2. **新しい秘密鍵の生成** をクリック → JSON ファイルをダウンロード
      3. Base64 エンコードを実行：

      ```bash
      # macOS
      base64 -i firebase-service-account.json | tr -d '\n'
      # Linux
      base64 -w 0 firebase-service-account.json
      ```

      4. 結果を `FIREBASE_CREDENTIALS_ENCODED` として入力

      > **再ビルド不要！** Docker イメージには entrypoint スクリプトが含まれており、起動時に環境変数から Firebase 設定を自動的に注入します。`NEXT_PUBLIC_FIREBASE_*` 変数を設定してサービスを再起動するだけで反映されます。

      ### 3. Google Cloud（Storage + Pub/Sub）

      T3C は生成されたレポートを GCS に保存し、LLM ジョブを Pub/Sub 経由で配信します。

      #### 3.1 GCS バケットを作成

      1. [Google Cloud コンソール — Storage](https://console.cloud.google.com/storage) にアクセス
      2. **バケットを作成** → 一意の名前を入力（例：`tttc-reports-prod`）
      3. リージョンを選択、Standard ストレージクラス → **作成**
      4. バケット名を `GCLOUD_STORAGE_BUCKET` として入力

      #### 3.2 プロジェクト ID をメモ

      Pub/Sub トピックとバケットは同じ GCP プロジェクトに置きます。[Cloud Console](https://console.cloud.google.com/) の上部からプロジェクト ID を確認し、`GOOGLE_CLOUD_PROJECT_ID` として入力してください。

      #### 3.3 サービスアカウントとキーを作成

      1. [IAM と管理 → サービスアカウント](https://console.cloud.google.com/iam-admin/service-accounts) にアクセス
      2. **サービスアカウントを作成** → 名前：`tttc-backend`
      3. ロールを付与：
         - **Storage Object Admin**（GCS レポート保存用）
         - **Pub/Sub Publisher**（express-server がジョブをキューイングするため）
         - **Pub/Sub Subscriber**（pipeline-worker の push 確認用）
      4. サービスアカウントをクリック → **鍵**タブ → **鍵を追加** → **新しい鍵を作成** → **JSON**
      5. ダウンロードした鍵を Base64 エンコード：

      ```bash
      # macOS
      base64 -i gcp-service-account.json | tr -d '\n'
      # Linux
      base64 -w 0 gcp-service-account.json
      ```

      6. 結果を `GOOGLE_CREDENTIALS_ENCODED` として入力

      ### 4. Google Pub/Sub（ジョブキュー）— 初回デプロイ後に設定

      Pub/Sub push はデプロイ済みの `pipeline-worker` の公開 URL を endpoint として要求するため、サービス起動後に実行してください：

      #### 4.1 まずデプロイ、worker の URL をコピー

      1. このテンプレートをデプロイ。`NODE_WORKER_TOPIC_NAME` / `NODE_WORKER_SUBSCRIPTION_NAME` には仮の文字列を入れておきます（Pub/Sub はまだ存在しないため、任意の値で OK）
      2. サービスが起動したら、Zeabur ダッシュボードで `pipeline-worker` サービスを開き、公開 URL（`https://<pipeline-worker-domain>`）をコピー

      #### 4.2 Pub/Sub topic と push subscription を作成

      1. [Pub/Sub → Topics](https://console.cloud.google.com/cloudpubsub/topic/list) にアクセス
      2. **topic を作成** → 名前を入力（例：`tttc-pipeline-jobs`）→ 「Add a default subscription」のチェックを外す → **作成**
      3. topic 名を `NODE_WORKER_TOPIC_NAME` として入力
      4. **Subscriptions** → **Create subscription**：
         - Subscription ID（例：`tttc-pipeline-jobs-sub`）
         - Topic：先ほど作成した topic
         - Delivery type：**Push**
         - Endpoint URL：`https://<pipeline-worker-domain>/pubsub/push`
         - Ack deadline：`600` 秒以上（LLM ステップは長時間かかります）
      5. サブスクリプション名を `NODE_WORKER_SUBSCRIPTION_NAME` として入力

      #### 4.3 express-server を再起動

      3 つの Pub/Sub 変数を入力したら、`express-server` を再起動して新しい環境変数を読み込ませます。

      > **セキュリティ注意**：`pipeline-worker` の `/pubsub/push` エンドポイントは OIDC トークンを検証しないため、URL を知っている人なら誰でもジョブを投入できます。URL は共有シークレットとして扱うか、防御を厚くしたい場合は前段に認証 proxy を置いてください。

      ## 変数リファレンス

      | 変数 | 必須 | 説明 |
      |------|------|------|
      | `OPENAI_API_KEY` | はい | LLM 処理用の OpenAI API キー |
      | `FIREBASE_CREDENTIALS_ENCODED` | はい | Base64 エンコードされた Firebase サービスアカウント JSON |
      | `NEXT_PUBLIC_FIREBASE_API_KEY` | はい* | Firebase Web アプリの API キー |
      | `NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN` | はい* | 例：`project.firebaseapp.com` |
      | `NEXT_PUBLIC_FIREBASE_PROJECT_ID` | はい* | Firebase プロジェクト ID |
      | `NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET` | はい* | 例：`project.appspot.com` |
      | `NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID` | はい* | Firebase メッセージング送信者 ID |
      | `NEXT_PUBLIC_FIREBASE_APP_ID` | はい* | Firebase アプリ ID |
      | `GOOGLE_CREDENTIALS_ENCODED` | はい | Base64 エンコードされた GCP サービスアカウント JSON（GCS + Pub/Sub） |
      | `GCLOUD_STORAGE_BUCKET` | はい | レポート保存用の GCS バケット名 |
      | `GOOGLE_CLOUD_PROJECT_ID` | はい | Pub/Sub トピックが置かれる GCP プロジェクト ID |
      | `NODE_WORKER_TOPIC_NAME` | はい** | Pub/Sub トピック名 |
      | `NODE_WORKER_SUBSCRIPTION_NAME` | はい** | Pub/Sub push サブスクリプション名 |

      \* entrypoint スクリプトにより実行時に注入されます。変数を設定して `next-client` を再起動してください。
      \*\* 初回デプロイ時は任意の文字列を入れておき、ステップ 4 完了後に実際の Pub/Sub 名へ更新して `express-server` を再起動してください。

      ## デプロイ後チェックリスト

      1. Zeabur ドメインを Firebase の承認済みドメインに追加
      2. デプロイ済みの `pipeline-worker` URL を使ってステップ 4 の Pub/Sub 設定を完了
      3. Pub/Sub 変数を入力したら `express-server` を再起動
      4. 4 つのサービスすべてがダッシュボードで**実行中**と表示されていることを確認
      5. `express-server` のログに `Firebase admin app initialized successfully` と表示されていることを確認
      6. `pipeline-worker` のログに `Pipeline worker started successfully` と表示されていることを確認
      7. ドメインにアクセスしてサインインをテスト

      ## リンク

      - [GitHub リポジトリ](https://github.com/aIObjectives/tttc-light-js)
      - [開発ガイド](https://github.com/aIObjectives/tttc-light-js/blob/main/DEVELOPMENT.md)
