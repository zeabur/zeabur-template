    readme: |
      # Talk to the City (T3C)

      [Talk to the City](https://github.com/aIObjectives/tttc-light-js) 是一個開源的 LLM 驅動工具，用於改善集體審議和決策。它處理定性資料並將相似的觀點組織成結構化的主題樹。

      ## 架構

      此範本部署 4 個服務：

      | 服務 | 連接埠 | 角色 |
      |------|--------|------|
      | **next-client** | 3000 | Next.js 前端 |
      | **express-server** | 8080 | Node.js 後端 API（將工作發佈到 Pub/Sub） |
      | **pipeline-worker** | 8080 | Node.js LLM 處理 worker（透過 Pub/Sub push 接收工作） |
      | **redis** | 6379 | Pipeline 狀態與快取 |

      ## 外部服務設定

      此範本需要 4 個外部服務。**步驟 1-3 請在部署前完成；** Pub/Sub（步驟 4）需要 `pipeline-worker` 部署後的網址，所以要在第一次部署之後設定。

      ### 1. OpenAI API（LLM 處理）

      T3C 使用 OpenAI 來提取觀點、產生主題樹、去重和產生摘要。預設模型：`gpt-4o-mini`。

      1. 前往 [OpenAI Platform](https://platform.openai.com/api-keys)
      2. 點擊 **Create new secret key**，複製金鑰（以 `sk-` 開頭）
      3. 部署時輸入為 `OPENAI_API_KEY`

      ### 2. Firebase（使用者驗證 + 資料庫）

      T3C 使用 Firebase Authentication（電子郵件/密碼 + Google 登入）和 Cloud Firestore（使用者資料、報告元資料）。

      #### 2.1 建立專案

      1. 前往 [Firebase 控制台](https://console.firebase.google.com/) → **新增專案**
      2. 輸入專案名稱（例如 `tttc-prod`）→ **建立專案**

      #### 2.2 啟用身份驗證

      1. 前往 **Authentication** → **開始使用**
      2. **登入方式**分頁 → 啟用**電子郵件/密碼**和 **Google**
      3. Google 登入：設定支援電子郵件 → **儲存**

      #### 2.3 新增授權網域

      部署後，將您的 Zeabur 網域加入授權清單：

      1. **Authentication** → **設定** → **授權網域**
      2. 點擊**新增網域** → 輸入您的網域（例如 `tttc.zeabur.app`）

      > 電子郵件驗證連結和 Google 登入彈窗需要此設定才能正常運作。

      #### 2.4 註冊 Web 應用程式並取得設定

      1. **專案設定**（齒輪圖示）→ **您的應用程式** → 點擊 Web 圖示（`</>`）
      2. 輸入暱稱（例如 `tttc-web`）→ **註冊應用程式**
      3. 複製 `firebaseConfig` 的值：

      ```javascript
      // 對應到範本變數：
      apiKey: "..."            → NEXT_PUBLIC_FIREBASE_API_KEY
      authDomain: "..."        → NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      projectId: "..."         → NEXT_PUBLIC_FIREBASE_PROJECT_ID
      storageBucket: "..."     → NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      messagingSenderId: "..." → NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      appId: "..."             → NEXT_PUBLIC_FIREBASE_APP_ID
      ```

      #### 2.5 產生服務帳號金鑰

      1. **專案設定** → **服務帳號**分頁
      2. 點擊**產生新的私密金鑰** → 下載 JSON 檔案
      3. 進行 Base64 編碼：

      ```bash
      # macOS
      base64 -i firebase-service-account.json | tr -d '\n'
      # Linux
      base64 -w 0 firebase-service-account.json
      ```

      4. 將結果輸入為 `FIREBASE_CREDENTIALS_ENCODED`

      > **不需要重新建置映像檔！** Docker 映像檔內建 entrypoint 腳本，會在啟動時自動將環境變數注入 Firebase 設定。只需設定 `NEXT_PUBLIC_FIREBASE_*` 變數並重啟服務即可。

      ### 3. Google Cloud（Storage + Pub/Sub）

      T3C 將報告存到 GCS，並透過 Pub/Sub 分派 LLM 工作。

      #### 3.1 建立 GCS 儲存桶

      1. 前往 [Google Cloud 控制台 — Storage](https://console.cloud.google.com/storage)
      2. **建立儲存桶** → 輸入唯一名稱（例如 `tttc-reports-prod`）
      3. 選擇區域、Standard 儲存類別 → **建立**
      4. 將儲存桶名稱輸入為 `GCLOUD_STORAGE_BUCKET`

      #### 3.2 記下你的專案 ID

      Pub/Sub topic 和儲存桶位在同一個 GCP 專案。在 [Cloud Console](https://console.cloud.google.com/) 頂部可以找到專案 ID，將它輸入為 `GOOGLE_CLOUD_PROJECT_ID`。

      #### 3.3 建立服務帳號與金鑰

      1. 前往 [IAM 與管理 → 服務帳號](https://console.cloud.google.com/iam-admin/service-accounts)
      2. **建立服務帳號** → 名稱：`tttc-backend`
      3. 授予角色：
         - **Storage Object Admin**（GCS 報告儲存）
         - **Pub/Sub Publisher**（express-server 發佈工作）
         - **Pub/Sub Subscriber**（pipeline-worker 確認 push 訊息）
      4. 點擊該服務帳號 → **金鑰**分頁 → **新增金鑰** → **建立新金鑰** → **JSON**
      5. 將下載的金鑰進行 Base64 編碼：

      ```bash
      # macOS
      base64 -i gcp-service-account.json | tr -d '\n'
      # Linux
      base64 -w 0 gcp-service-account.json
      ```

      6. 將結果輸入為 `GOOGLE_CREDENTIALS_ENCODED`

      ### 4. Google Pub/Sub（工作佇列）— 第一次部署後再設定

      Pub/Sub push 需要 `pipeline-worker` 的公開網址作為 endpoint，所以這一步要在服務上線後執行：

      #### 4.1 先部署、複製 worker 網址

      1. 部署此範本，`NODE_WORKER_TOPIC_NAME` / `NODE_WORKER_SUBSCRIPTION_NAME` 暫時填任意字串（Pub/Sub 尚未建立）
      2. 服務啟動後，在 Zeabur Dashboard 開啟 `pipeline-worker` 服務，複製其公開網址（`https://<pipeline-worker-domain>`）

      #### 4.2 建立 Pub/Sub topic 與 push 訂閱

      1. 前往 [Pub/Sub → Topics](https://console.cloud.google.com/cloudpubsub/topic/list)
      2. **建立 topic** → 輸入名稱（例如 `tttc-pipeline-jobs`）→ 取消「Add a default subscription」→ **建立**
      3. 將 topic 名稱輸入為 `NODE_WORKER_TOPIC_NAME`
      4. **Subscriptions** → **Create subscription**：
         - Subscription ID（例如 `tttc-pipeline-jobs-sub`）
         - Topic：剛建的 topic
         - Delivery type：**Push**
         - Endpoint URL：`https://<pipeline-worker-domain>/pubsub/push`
         - Ack deadline：至少 `600` 秒（LLM 步驟需要較長時間）
      5. 將訂閱名稱輸入為 `NODE_WORKER_SUBSCRIPTION_NAME`

      #### 4.3 重啟 express-server

      填完 3 個 Pub/Sub 變數後，重啟 `express-server` 讓它讀到新的環境變數。

      > **安全提示**：`pipeline-worker` 的 `/pubsub/push` endpoint 不會驗證 Pub/Sub 的 OIDC token，是公開可達的；任何知道網址的人都能塞工作進去。請將此網址視為共享密碼，或在前面加一層驗證 proxy。

      ## 變數對照表

      | 變數 | 必填 | 說明 |
      |------|------|------|
      | `OPENAI_API_KEY` | 是 | OpenAI API 金鑰，用於 LLM 處理 |
      | `FIREBASE_CREDENTIALS_ENCODED` | 是 | Base64 編碼的 Firebase 服務帳號 JSON |
      | `NEXT_PUBLIC_FIREBASE_API_KEY` | 是* | Firebase Web 應用程式 API 金鑰 |
      | `NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN` | 是* | 例如 `project.firebaseapp.com` |
      | `NEXT_PUBLIC_FIREBASE_PROJECT_ID` | 是* | Firebase 專案 ID |
      | `NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET` | 是* | 例如 `project.appspot.com` |
      | `NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID` | 是* | Firebase 訊息傳送者 ID |
      | `NEXT_PUBLIC_FIREBASE_APP_ID` | 是* | Firebase 應用程式 ID |
      | `GOOGLE_CREDENTIALS_ENCODED` | 是 | Base64 編碼的 GCP 服務帳號 JSON（GCS + Pub/Sub） |
      | `GCLOUD_STORAGE_BUCKET` | 是 | 用於報告儲存的 GCS 儲存桶名稱 |
      | `GOOGLE_CLOUD_PROJECT_ID` | 是 | Pub/Sub topic 所在的 GCP 專案 ID |
      | `NODE_WORKER_TOPIC_NAME` | 是** | Pub/Sub topic 名稱 |
      | `NODE_WORKER_SUBSCRIPTION_NAME` | 是** | Pub/Sub push 訂閱名稱 |

      \* 透過 entrypoint 腳本在執行時注入。設定變數後重啟 `next-client` 即可。
      \*\* 初次部署時先填任意字串，等完成步驟 4 後改為實際 Pub/Sub 名稱並重啟 `express-server`。

      ## 部署後檢查清單

      1. 將您的 Zeabur 網域加入 Firebase 授權網域
      2. 使用部署完成的 `pipeline-worker` 網址完成步驟 4 的 Pub/Sub 設定
      3. 填完 Pub/Sub 變數後重啟 `express-server`
      4. 確認所有 4 個服務在 Dashboard 中顯示**執行中**
      5. 檢查 `express-server` 紀錄是否出現：`Firebase admin app initialized successfully`
      6. 檢查 `pipeline-worker` 紀錄是否出現：`Pipeline worker started successfully`
      7. 造訪您的網域並測試登入

      ## 連結

      - [GitHub 倉庫](https://github.com/aIObjectives/tttc-light-js)
      - [開發指南](https://github.com/aIObjectives/tttc-light-js/blob/main/DEVELOPMENT.md)
