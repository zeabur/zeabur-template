    readme: |
      # Talk to the City (T3C)

      [Talk to the City](https://github.com/aIObjectives/tttc-light-js) 是一个开源的 LLM 驱动工具，用于改善集体审议和决策。它处理定性数据并将相似的观点组织成结构化的主题树。

      ## 架构

      此模板部署 4 个服务：

      | 服务 | 端口 | 角色 |
      |------|------|------|
      | **next-client** | 3000 | Next.js 前端 |
      | **express-server** | 8080 | Node.js 后端 API（发布任务到 Pub/Sub） |
      | **pipeline-worker** | 8080 | Node.js LLM 处理 worker（通过 Pub/Sub push 接收任务） |
      | **redis** | 6379 | Pipeline 状态与缓存 |

      ## 外部服务设置

      此模板需要 4 个外部服务。**步骤 1-3 请在部署前完成；** Pub/Sub（步骤 4）需要 `pipeline-worker` 部署后的 URL，所以要在第一次部署之后设定。

      ### 1. OpenAI API（LLM 处理）

      T3C 使用 OpenAI 来提取观点、生成主题树、去重和生成摘要。默认模型：`gpt-4o-mini`。

      1. 前往 [OpenAI Platform](https://platform.openai.com/api-keys)
      2. 点击 **Create new secret key**，复制密钥（以 `sk-` 开头）
      3. 部署时输入为 `OPENAI_API_KEY`

      ### 2. Firebase（用户认证 + 数据库）

      T3C 使用 Firebase Authentication（邮箱/密码 + Google 登录）和 Cloud Firestore（用户资料、报告元数据）。

      #### 2.1 创建项目

      1. 前往 [Firebase 控制台](https://console.firebase.google.com/) → **添加项目**
      2. 输入项目名称（例如 `tttc-prod`）→ **创建项目**

      #### 2.2 启用身份验证

      1. 前往 **Authentication** → **开始使用**
      2. **登录方式**选项卡 → 启用**邮箱/密码**和 **Google**
      3. Google 登录：设置支持邮箱 → **保存**

      #### 2.3 添加授权域名

      部署后，将您的 Zeabur 域名添加到授权列表：

      1. **Authentication** → **设置** → **授权域名**
      2. 点击**添加域名** → 输入您的域名（例如 `tttc.zeabur.app`）

      > 邮箱验证链接和 Google 登录弹窗需要此设置才能正常工作。

      #### 2.4 注册 Web 应用并获取配置

      1. **项目设置**（齿轮图标）→ **您的应用** → 点击 Web 图标（`</>`）
      2. 输入昵称（例如 `tttc-web`）→ **注册应用**
      3. 复制 `firebaseConfig` 的值：

      ```javascript
      // Maps to template variables:
      apiKey: "..."            → NEXT_PUBLIC_FIREBASE_API_KEY
      authDomain: "..."        → NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      projectId: "..."         → NEXT_PUBLIC_FIREBASE_PROJECT_ID
      storageBucket: "..."     → NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      messagingSenderId: "..." → NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      appId: "..."             → NEXT_PUBLIC_FIREBASE_APP_ID
      ```

      #### 2.5 生成服务账号密钥

      1. **项目设置** → **服务账号**选项卡
      2. 点击**生成新的私钥** → 下载 JSON 文件
      3. 进行 Base64 编码：

      ```bash
      # macOS
      base64 -i firebase-service-account.json | tr -d '\n'
      # Linux
      base64 -w 0 firebase-service-account.json
      ```

      4. 将结果输入为 `FIREBASE_CREDENTIALS_ENCODED`

      > **无需重新构建镜像！** Docker 镜像内置 entrypoint 脚本，会在启动时自动将环境变量注入 Firebase 配置。只需设置 `NEXT_PUBLIC_FIREBASE_*` 变量并重启服务即可。

      ### 3. Google Cloud（Storage + Pub/Sub）

      T3C 将报告存到 GCS，并通过 Pub/Sub 分派 LLM 任务。

      #### 3.1 创建 GCS 存储桶

      1. 前往 [Google Cloud 控制台 — Storage](https://console.cloud.google.com/storage)
      2. **创建存储桶** → 输入唯一名称（例如 `tttc-reports-prod`）
      3. 选择区域、Standard 存储类别 → **创建**
      4. 将存储桶名称输入为 `GCLOUD_STORAGE_BUCKET`

      #### 3.2 记下你的项目 ID

      Pub/Sub topic 和存储桶位于同一个 GCP 项目。在 [Cloud Console](https://console.cloud.google.com/) 顶部可以找到项目 ID，将它输入为 `GOOGLE_CLOUD_PROJECT_ID`。

      #### 3.3 创建服务账号与密钥

      1. 前往 [IAM 与管理 → 服务账号](https://console.cloud.google.com/iam-admin/service-accounts)
      2. **创建服务账号** → 名称：`tttc-backend`
      3. 授予角色：
         - **Storage Object Admin**（GCS 报告存储）
         - **Pub/Sub Publisher**（express-server 发布任务）
         - **Pub/Sub Subscriber**（pipeline-worker 确认 push 消息）
      4. 点击该服务账号 → **密钥**选项卡 → **添加密钥** → **创建新密钥** → **JSON**
      5. 将下载的密钥进行 Base64 编码：

      ```bash
      # macOS
      base64 -i gcp-service-account.json | tr -d '\n'
      # Linux
      base64 -w 0 gcp-service-account.json
      ```

      6. 将结果输入为 `GOOGLE_CREDENTIALS_ENCODED`

      ### 4. Google Pub/Sub（任务队列）— 第一次部署后再设定

      Pub/Sub push 需要 `pipeline-worker` 的公开 URL 作为 endpoint，所以这一步要在服务上线后执行：

      #### 4.1 先部署、复制 worker URL

      1. 部署此模板，`NODE_WORKER_TOPIC_NAME` / `NODE_WORKER_SUBSCRIPTION_NAME` 暂时填任意字符串（Pub/Sub 尚未建立）
      2. 服务启动后，在 Zeabur Dashboard 打开 `pipeline-worker` 服务，复制其公开 URL（`https://<pipeline-worker-domain>`）

      #### 4.2 创建 Pub/Sub topic 与 push 订阅

      1. 前往 [Pub/Sub → Topics](https://console.cloud.google.com/cloudpubsub/topic/list)
      2. **创建 topic** → 输入名称（例如 `tttc-pipeline-jobs`）→ 取消「Add a default subscription」→ **创建**
      3. 将 topic 名称输入为 `NODE_WORKER_TOPIC_NAME`
      4. **Subscriptions** → **Create subscription**：
         - Subscription ID（例如 `tttc-pipeline-jobs-sub`）
         - Topic：刚建的 topic
         - Delivery type：**Push**
         - Endpoint URL：`https://<pipeline-worker-domain>/pubsub/push`
         - Ack deadline：至少 `600` 秒（LLM 步骤需要较长时间）
      5. 将订阅名称输入为 `NODE_WORKER_SUBSCRIPTION_NAME`

      #### 4.3 重启 express-server

      填完 3 个 Pub/Sub 变量后，重启 `express-server` 让它读到新的环境变量。

      > **安全提示**：`pipeline-worker` 的 `/pubsub/push` endpoint 不会验证 Pub/Sub 的 OIDC token，是公开可达的；任何知道 URL 的人都能塞任务进去。请将此 URL 视为共享密钥，或在前面加一层验证 proxy。

      ## 变量参考表

      | 变量 | 必填 | 说明 |
      |------|------|------|
      | `OPENAI_API_KEY` | 是 | OpenAI API 密钥，用于 LLM 处理 |
      | `FIREBASE_CREDENTIALS_ENCODED` | 是 | Base64 编码的 Firebase 服务账号 JSON |
      | `NEXT_PUBLIC_FIREBASE_API_KEY` | 是* | Firebase Web 应用 API 密钥 |
      | `NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN` | 是* | 例如 `project.firebaseapp.com` |
      | `NEXT_PUBLIC_FIREBASE_PROJECT_ID` | 是* | Firebase 项目 ID |
      | `NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET` | 是* | 例如 `project.appspot.com` |
      | `NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID` | 是* | Firebase 消息发送者 ID |
      | `NEXT_PUBLIC_FIREBASE_APP_ID` | 是* | Firebase 应用 ID |
      | `GOOGLE_CREDENTIALS_ENCODED` | 是 | Base64 编码的 GCP 服务账号 JSON（GCS + Pub/Sub） |
      | `GCLOUD_STORAGE_BUCKET` | 是 | 用于报告存储的 GCS 存储桶名称 |
      | `GOOGLE_CLOUD_PROJECT_ID` | 是 | Pub/Sub topic 所在的 GCP 项目 ID |
      | `NODE_WORKER_TOPIC_NAME` | 是** | Pub/Sub topic 名称 |
      | `NODE_WORKER_SUBSCRIPTION_NAME` | 是** | Pub/Sub push 订阅名称 |

      \* 通过 entrypoint 脚本在运行时注入。设置变量后重启 `next-client` 即可。
      \*\* 初次部署时先填任意字符串，等完成步骤 4 后改为实际 Pub/Sub 名称并重启 `express-server`。

      ## 部署后检查清单

      1. 将您的 Zeabur 域名添加到 Firebase 授权域名
      2. 使用部署完成的 `pipeline-worker` URL 完成步骤 4 的 Pub/Sub 设定
      3. 填完 Pub/Sub 变量后重启 `express-server`
      4. 确认所有 4 个服务在 Dashboard 中显示**运行中**
      5. 检查 `express-server` 日志是否出现：`Firebase admin app initialized successfully`
      6. 检查 `pipeline-worker` 日志是否出现：`Pipeline worker started successfully`
      7. 访问您的域名并测试登录

      ## 链接

      - [GitHub 仓库](https://github.com/aIObjectives/tttc-light-js)
      - [开发指南](https://github.com/aIObjectives/tttc-light-js/blob/main/DEVELOPMENT.md)
