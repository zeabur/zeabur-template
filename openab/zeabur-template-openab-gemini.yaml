        [discord]
        allow_bot_messages = "mentions"
        ```

        设置后，openab 会响应任何 @mention 它的 bot 或 webhook 消息。若要限制为特定 webhook，还可添加：

        ```toml
        trusted_bot_ids = ["YOUR_WEBHOOK_USER_ID"]
        ```

        Webhook 用户 ID 为 webhook URL 中的数字 ID：`https://discord.com/api/webhooks/<ID>/...`

