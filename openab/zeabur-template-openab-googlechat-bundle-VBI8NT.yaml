         - **Connection settings**：选 **App URL** → 粘贴 URL → **Authentication Audience** 保持 **HTTP Endpoint URL**。
         - **Visibility**：限制 Workspace 域名或特定用户。
      4. **SAVE**。

      `openab-gateway` 服务 Instructions 区显示已自动填好的完整 App URL，可直接复制。

