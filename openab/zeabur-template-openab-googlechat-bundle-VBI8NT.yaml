      ### 4. 通过 Device Flow 认证 Kiro（仅免费方案）

      若步骤 2 已填入 `KIRO_API_KEY`，跳过此步骤。

      待 `openab` 服务启动后，在 Zeabur Dashboard 打开该服务的终端，运行：

      ```
      runuser -u agent -- kiro-cli login --use-device-flow
      ```

      ### 5. 于 Google Cloud Console 设置 Chat App

