      在 Google Chat（`mail.google.com/chat` 或独立 app）内搜 app 名称 → 开 DM → 发消息。Gateway 验证 JWT → 通过 WebSocket 转发给 OAB → OAB 通过 service account 调用 Chat REST API 回复。

