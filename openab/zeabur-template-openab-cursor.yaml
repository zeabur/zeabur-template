        - key: OPENAB_ALLOWED_CHANNELS
          name: Discord チャンネル ID（オプション）
          description: "オプション。Bot が監視する Discord チャンネル ID（カンマ区切り）。空の場合、全チャンネルで応答。"
        - key: OPENAB_ALLOWED_USERS
          name: Discord ユーザー ID（オプション）
