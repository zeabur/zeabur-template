# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: OpenAB Gateway
spec:
  description: |
    Standalone webhook gateway for OpenAB — bridges Telegram, LINE, Feishu/Lark, Google Chat, and MS Teams to any running OAB instance via WebSocket. Deploy alongside an existing OpenAB service to enable messaging platform support. At least one platform must be configured.
    Source: https://github.com/openabdev/openab
  icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
  coverImage: https://cdn-console.zeabur.com/f/Xp0H6/openab-cover.webp
  tags:
    - AI
    - Developer Tools
    - Telegram
    - LINE
    - Feishu
    - Google Chat
    - Teams
  variables:
    - key: TELEGRAM_BOT_TOKEN
      type: STRING
      name: Telegram Bot Token (optional)
      description: "Optional. Bot token from @BotFather (https://t.me/BotFather). Leave empty to disable Telegram. At least one platform must be configured."
    - key: LINE_CHANNEL_SECRET
      type: STRING
      name: LINE Channel Secret (optional)
      description: "Optional. Channel secret from LINE Developers Console. Leave empty to disable LINE."
    - key: LINE_CHANNEL_ACCESS_TOKEN
      type: STRING
      name: LINE Channel Access Token (optional)
      description: "Optional. Channel access token from LINE Developers Console. Required when LINE Channel Secret is set."
    - key: FEISHU_APP_ID
      type: STRING
      name: Feishu/Lark App ID (optional)
      description: "Optional. App ID from Feishu (open.feishu.cn) or Lark (open.larksuite.com) Open Platform. Leave empty to disable Feishu/Lark."
    - key: FEISHU_APP_SECRET
      type: STRING
      name: Feishu/Lark App Secret (optional)
      description: "Optional. App Secret from Feishu/Lark Open Platform. Required when Feishu App ID is set."
    - key: FEISHU_DOMAIN
      type: STRING
      name: Feishu/Lark Domain (optional)
      description: "Optional. 'feishu' for China (leave empty for default) or 'lark' for international Lark."
    - key: GOOGLE_CHAT_ENABLED
      type: STRING
      name: Enable Google Chat (optional)
      description: "Optional. Set to 'true' to enable Google Chat. Requires a Google Workspace account and Service Account JSON key."
    - key: GOOGLE_CHAT_SA_KEY_JSON
      type: STRING
      name: Google Chat Service Account JSON (optional)
      description: "Optional. Service Account JSON key (single line). Required when Google Chat is enabled."
    - key: GOOGLE_CHAT_AUDIENCE
      type: STRING
      name: Google Chat Webhook Audience (optional)
      description: "Optional but recommended. Full webhook URL (e.g. https://your-domain/webhook/googlechat) used to verify incoming JWTs."
    - key: TEAMS_APP_ID
      type: STRING
      name: MS Teams App ID (optional)
      description: "Optional. Bot Framework App ID. Leave empty to disable Teams."
    - key: TEAMS_APP_SECRET
      type: STRING
      name: MS Teams App Secret (optional)
      description: "Optional. Bot Framework App Secret. Required when Teams App ID is set."
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Gateway Domain
      description: "Public HTTPS domain for receiving webhooks (Telegram, LINE, Google Chat, Teams, Feishu webhook mode)."
  readme: |
    # OpenAB Gateway

    [OpenAB Gateway](https://github.com/openabdev/openab) is a standalone webhook bridge that connects messaging platforms to any running [OpenAB](https://github.com/openabdev/openab) instance via WebSocket.

    ```
    Telegram     ──POST──▶ ┌──────────────────┐
    LINE         ──POST──▶ │                  │
    Feishu/Lark  ──POST──▶ │  OpenAB Gateway  │ ◀──WebSocket── OAB Pod
    Google Chat  ──POST──▶ │     :8080        │   (OAB connects out)
    MS Teams     ──POST──▶ │                  │
                           └──────────────────┘
    ```

    Deploy this template alongside an existing OpenAB service (Claude, Cursor, Codex, etc.) to add messaging support without redeploying OAB. Configure one or more of the supported platforms — leave the rest blank to disable them.

    ## Supported Platforms

    | Platform | Setup section | Required variables |
    |---|---|---|
    | Telegram | [#telegram](#telegram-setup) | `TELEGRAM_BOT_TOKEN` |
    | LINE | [#line](#line-setup-optional) | `LINE_CHANNEL_SECRET`, `LINE_CHANNEL_ACCESS_TOKEN` |
    | Feishu / Lark | [#feishu](#feishu--lark-setup-optional) | `FEISHU_APP_ID`, `FEISHU_APP_SECRET` |
    | Google Chat | [#google-chat](#google-chat-setup-optional) | `GOOGLE_CHAT_ENABLED=true`, `GOOGLE_CHAT_SA_KEY_JSON` |
    | MS Teams | [#teams](#ms-teams-setup-optional) | `TEAMS_APP_ID`, `TEAMS_APP_SECRET` |

    ## Prerequisites

    - A running OpenAB service (any variant) in the same Zeabur project
    - **At least one** of the supported platforms above configured

    ## Setup

    ### 1. Create a Telegram Bot

    1. Open [@BotFather](https://t.me/BotFather) in Telegram
    2. Send `/newbot` and follow the prompts
    3. Copy the bot token (e.g. `123456:ABC-DEF...`) → paste into **Telegram Bot Token**
    4. Optional: send `/setprivacy` → `Disable` so the bot sees all group messages

    ### 2. Deploy

    Fill in the tokens for the platform(s) you want to enable and click deploy. A public HTTPS domain is auto-assigned. You can enable Telegram only, LINE only, or both.

    ### 3. Register the Telegram Webhook

    After deployment, register your gateway URL with Telegram (replace `YOUR_TOKEN`, `YOUR_DOMAIN`, and optionally `YOUR_SECRET`):

    ```bash
    # Without webhook secret (simpler, less secure)
    curl "https://api.telegram.org/botYOUR_TOKEN/setWebhook?url=https://YOUR_DOMAIN/webhook/telegram"

    # With webhook secret (recommended — matches TELEGRAM_SECRET_TOKEN you set)
    curl "https://api.telegram.org/botYOUR_TOKEN/setWebhook?url=https://YOUR_DOMAIN/webhook/telegram&secret_token=YOUR_SECRET"
    ```

    Expected response: `{"ok":true,"result":true,"description":"Webhook was set"}`

    ### 4. Configure OAB to Use the Gateway

    In your OpenAB service (same Zeabur project), edit `/home/agent/.config/openab/config.toml` and add:

    ```toml
    [gateway]
    url = "ws://openab-gateway:8080/ws"
    ```

    Then restart the OpenAB service. OAB connects outbound to the gateway — no inbound ports needed on OAB.

    > **Internal hostname:** `openab-gateway` resolves within the same Zeabur project via internal DNS. If your gateway service has a different name, use that name instead.

    ### 5. Test

    Send a message to your Telegram bot. The gateway receives it and forwards it to OAB via WebSocket. OAB processes it and replies through the gateway.

    ## LINE Setup (Optional)

    ### 1. Create a LINE Official Account

    1. Go to [LINE Official Account Manager](https://manager.line.biz) and create a new account
    2. **Settings** → **Messaging API** → **Enable Messaging API**
    3. Open [LINE Developers Console](https://developers.line.biz) → your channel:
       - **Basic settings** → **Channel secret** → copy → paste into **LINE Channel Secret**
       - **Messaging API** → **Channel access token** → Issue → copy → paste into **LINE Channel Access Token**

    ### 2. Set Webhook URL

    In LINE Developers Console → **Messaging API** tab:

    1. **Webhook URL** → Edit → enter: `https://YOUR_DOMAIN/webhook/line`
    2. **Use webhook** → ON
    3. **Auto-reply messages** → OFF
    4. Click **Verify**

    ### 3. Configure OAB for LINE

    In `config.toml`, add `platform = "line"` to the gateway section:

    ```toml
    [gateway]
    url = "ws://openab-gateway:8080/ws"
    platform = "line"
    ```

    Restart the OpenAB service after saving.

    ## Feishu / Lark Setup (Optional)

    1. Create an app at [open.feishu.cn](https://open.feishu.cn) (China) or [open.larksuite.com](https://open.larksuite.com) (international).
    2. Enable the **Bot** capability.
    3. **Event Subscriptions** → choose **Long Connection** (WebSocket) mode → add the `im.message.receive_v1` event.
    4. **Permissions & Scopes** → grant: `im:message`, `im:message:send_as_bot`, `contact:user.base:readonly`.
    5. From **Credentials & Basic Info**, copy **App ID** → `FEISHU_APP_ID`, **App Secret** → `FEISHU_APP_SECRET`.
    6. Set `FEISHU_DOMAIN` to `lark` if using Lark international, otherwise leave at `feishu`.

    Default connection mode is WebSocket — the gateway connects outbound to Feishu, no inbound webhook URL needed.

    Then configure OAB to use the gateway with `platform = "feishu"`:

    ```toml
    [gateway]
    url = "ws://openab-gateway:8080/ws"
    platform = "feishu"
    ```

    Full guide: [docs/feishu.md](https://github.com/openabdev/openab/blob/main/docs/feishu.md)

    ## Google Chat Setup (Optional)

    > Requires a Google Workspace account (Business/Enterprise tier). Consumer `@gmail.com` accounts cannot create Google Chat apps.

    1. In [Google Cloud Console](https://console.cloud.google.com), enable the **Google Chat API** in your project.
    2. **APIs & Services → Google Chat API → Configuration**:
       - **Connection settings** → **App URL** → enter `https://YOUR_DOMAIN/webhook/googlechat`
       - **Authentication Audience** → leave as **HTTP Endpoint URL**
    3. Create a Service Account (no special roles needed) and download a JSON key.
    4. Set the env vars:
       - `GOOGLE_CHAT_ENABLED=true`
       - `GOOGLE_CHAT_SA_KEY_JSON` → paste the full Service Account JSON (single line)
       - `GOOGLE_CHAT_AUDIENCE` → `https://YOUR_DOMAIN/webhook/googlechat` (recommended for JWT verification)

    Configure OAB with `platform = "googlechat"`. Full guide: [docs/google-chat.md](https://github.com/openabdev/openab/blob/main/docs/google-chat.md)

    ## MS Teams Setup (Optional)

    1. Register a Bot Framework app at [dev.botframework.com](https://dev.botframework.com) or via Azure Bot Service.
    2. Set the **Messaging endpoint** to `https://YOUR_DOMAIN/webhook/teams`.
    3. From the bot's app registration, copy **App ID** → `TEAMS_APP_ID`, generate a client secret → `TEAMS_APP_SECRET`.
    4. Add the bot to your Teams tenant and install it in a channel or chat.

    Configure OAB with `platform = "teams"`. Full guide: [docs/msteams-selfhosted.md](https://github.com/openabdev/openab/blob/main/docs/msteams-selfhosted.md)

    ## Webhook Endpoints

    | Path | Platform |
    |------|----------|
    | `POST /webhook/telegram` | Telegram |
    | `POST /webhook/line` | LINE |
    | `POST /webhook/feishu` | Feishu/Lark (webhook mode only; default uses WebSocket) |
    | `POST /webhook/googlechat` | Google Chat |
    | `POST /webhook/teams` | MS Teams |
    | `GET /ws` | OAB WebSocket (internal) |
    | `GET /health` | Health check |

    ## Links

    - [OpenAB GitHub](https://github.com/openabdev/openab)
    - [Telegram Setup Guide](https://github.com/openabdev/openab/blob/main/docs/telegram.md)
    - [LINE Setup Guide](https://github.com/openabdev/openab/blob/main/docs/line.md)
    - [Feishu/Lark Setup Guide](https://github.com/openabdev/openab/blob/main/docs/feishu.md)
    - [Google Chat Setup Guide](https://github.com/openabdev/openab/blob/main/docs/google-chat.md)
    - [MS Teams Setup Guide](https://github.com/openabdev/openab/blob/main/docs/msteams-selfhosted.md)
    - [Gateway README](https://github.com/openabdev/openab/blob/main/gateway/README.md)
  services:
    - name: openab-gateway
      icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: ghcr.io/openabdev/openab-gateway:0.4.0
        ports:
          - id: web
            port: 8080
            type: HTTP
        healthCheck:
          type: TCP
          port: web
        instructions:
          - type: TEXT
            title: Register Telegram Webhook
            content: "curl \"https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook?url=${ZEABUR_WEB_URL}/webhook/telegram&secret_token=${TELEGRAM_SECRET_TOKEN}\""
          - type: TEXT
            title: Unregister Telegram Webhook
            content: "curl \"https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook\""
        env:
          TELEGRAM_BOT_TOKEN:
            default: ${TELEGRAM_BOT_TOKEN}
          LINE_CHANNEL_SECRET:
            default: ${LINE_CHANNEL_SECRET}
          LINE_CHANNEL_ACCESS_TOKEN:
            default: ${LINE_CHANNEL_ACCESS_TOKEN}
          TELEGRAM_SECRET_TOKEN:
            default: ${PASSWORD}
          FEISHU_APP_ID:
            default: ${FEISHU_APP_ID}
          FEISHU_APP_SECRET:
            default: ${FEISHU_APP_SECRET}
          FEISHU_DOMAIN:
            default: ${FEISHU_DOMAIN}
          GOOGLE_CHAT_ENABLED:
            default: ${GOOGLE_CHAT_ENABLED}
          GOOGLE_CHAT_SA_KEY_JSON:
            default: ${GOOGLE_CHAT_SA_KEY_JSON}
          GOOGLE_CHAT_AUDIENCE:
            default: ${GOOGLE_CHAT_AUDIENCE}
          TEAMS_APP_ID:
            default: ${TEAMS_APP_ID}
          TEAMS_APP_SECRET:
            default: ${TEAMS_APP_SECRET}
localization:
