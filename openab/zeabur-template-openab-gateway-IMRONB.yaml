      - [Google Chat 設定指南](https://github.com/openabdev/openab/blob/main/docs/google-chat.md)
      - [MS Teams 設定指南](https://github.com/openabdev/openab/blob/main/docs/msteams-selfhosted.md)
      - [Gateway README](https://github.com/openabdev/openab/blob/main/gateway/README.md)
