    readme: |
      # OpenAB Telegram Bundle

      дёҖйҚөйғЁзҪІзҡ„ [OpenAB](https://github.com/openabdev/openab) Telegram bot вҖ” bot agent иҲҮ webhook gateway жү“еҢ…еңЁдёҖиө·пјҢеҸӘйңҖеЎ«е…Ҙ Telegram Bot Token еҚіеҸҜдҪҝз”ЁгҖӮ

      ```
      Telegram в”Җв”ҖPOSTв”Җв”Җв–¶ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в—Җв”Җв”ҖWebSocketв”Җв”Җ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
                         в”Ӯ  openab-gateway  в”Ӯ                в”Ӯ   openab   в”Ӯ
                         в”Ӯ  пјҲеғ… Telegramпјү в”Ӯ                в”Ӯ пјҲKiro CLIпјүв”Ӯ
                         в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
                            е…¬й–Ӣ HTTPS                          е…§йғЁдҪҝз”Ё
      ```

      ## йғЁзҪІе…§е®№

      | жңҚеӢҷ | з”ЁйҖ” | е…¬й–Ӣ |
      |---|---|---|
      | `openab` | еҹ·иЎҢ Kiro CLI зҡ„ OAB agent | еҗҰ |
      | `openab-gateway` | Telegram webhook вҶ’ WebSocket ж©ӢжҺҘ | жҳҜпјҲиҮӘеӢ• HTTPSпјү |

      з„ЎйңҖе…ұз”Ё PVCгҖҒз„ЎйңҖжүӢеӢ•дҝ®ж”№ `config.toml`гҖӮAgent зҡ„ `config.toml` еңЁйҰ–ж¬Ўе•ҹеӢ•жҷӮиҮӘеӢ•з”ҹжҲҗпјҢgateway URL е·Ій җе…ҲиЁӯзӮә `ws://openab-gateway:8080/ws`гҖҒ`platform = "telegram"`гҖӮ

      ## иЁӯе®ҡжӯҘй©ҹ

      ### 1. е»әз«Ӣ Telegram Bot

      1. еңЁ Telegram й–Ӣе•ҹ [@BotFather](https://t.me/BotFather)
      2. зҷјйҖҒ `/newbot` дёҰдҫқз…§жҸҗзӨәж“ҚдҪң
      3. **дҪ иЁӯе®ҡзҡ„ username**пјҲдҫӢеҰӮ `my_zeabur_bot`пјҢеҝ…й Ҳд»Ҙ `bot` зөҗе°ҫпјүвҶ’ иІјеҲ° **Bot Username**
      4. **з”ўз”ҹзҡ„ bot token**пјҲдҫӢеҰӮ `123456:ABC-DEF...`пјүвҶ’ иІјеҲ° **Telegram Bot Token**
      5. зҫӨзө„ / supergroup дҪҝз”ЁпјҡзҷјйҖҒ `/setprivacy` вҶ’ `Disable`пјҢи®“ Bot еҸҜд»ҘзңӢеҲ°жүҖжңүиЁҠжҒҜпјҲ@mention еҲӨе®ҡйңҖиҰҒжӯӨиЁӯе®ҡпјү
      6. Supergroup еҗ« forum topicпјҲиҮӘеӢ•гҖҢжҜҸж®өе°Қи©ұдёҖеҖӢ threadгҖҚпјүпјҡжҠҠ bot еҠ е…ҘзҫӨзө„ вҶ’ зҫӨзө„иЁӯе®ҡ вҶ’ з®ЎзҗҶе“Ў вҶ’ й–Ӣе•ҹ **Manage Topics** ж¬Ҡйҷҗ

      ### 2. пјҲйҒёеЎ«пјүеҸ–еҫ— Kiro API Key

      еҰӮжһңдҪ жңүд»ҳиІ»зҡ„ Kiro иЁӮй–ұпјҢеүҚеҫҖ [kiro.dev](https://kiro.dev) вҶ’ Settings вҶ’ API Keys е»әз«Ӣ keyпјҢеЎ«е…Ҙ `KIRO_API_KEY`гҖӮе…ҚиІ»ж–№жЎҲи·ійҒҺжӯӨжӯҘй©ҹпјҢж–јжӯҘй©ҹ 4 йғЁзҪІеҫҢеҶҚиӘҚиӯүгҖӮ

      ### 3. йғЁзҪІ

      й»һж“ҠйғЁзҪІгҖӮзі»зөұжңғиҮӘеӢ•еҲҶй…Қе…¬й–Ӣ HTTPS з¶ІеҹҹзөҰ gateway жңҚеӢҷгҖӮ

      ### 4. йҖҸйҒҺ Device Flow иӘҚиӯү KiroпјҲеғ…е…ҚиІ»ж–№жЎҲпјү

      иӢҘжӯҘй©ҹ 2 е·ІеЎ«е…Ҙ `KIRO_API_KEY`пјҢи·ійҒҺжӯӨжӯҘй©ҹгҖӮ

      еҫ… `openab` жңҚеӢҷе•ҹеӢ•еҫҢпјҢж–ј Zeabur Dashboard й–Ӣе•ҹи©ІжңҚеӢҷзҡ„зөӮз«Ҝж©ҹпјҢеҹ·иЎҢпјҡ

      ```
      runuser -u agent -- kiro-cli login --use-device-flow
      ```

      дҫқз…§з•«йқўйЎҜзӨәзҡ„ URL иҲҮ code е®ҢжҲҗзҖҸиҰҪеҷЁжҺҲж¬ҠгҖӮ

      ### 5. жё¬и©Ұ

      еҗ‘дҪ зҡ„ Telegram Bot зҷјйҖҒиЁҠжҒҜгҖӮGateway ж”¶еҲ°еҫҢйҖҸйҒҺ WebSocket иҪүзҷјзөҰ OABпјҢOAB иҷ•зҗҶеҫҢйҖҸйҒҺ Gateway еӣһиҰҶгҖӮ

      **Telegram webhook з”ұ `openab-gateway` жңҚеӢҷзҡ„ init container еңЁе•ҹеӢ•жҷӮиҮӘеӢ•иЁ»еҶҠ**вҖ”вҖ”ж–ј gateway log жүҫ `openab-gateway: telegram webhook registered вҶ’ https://...` зўәиӘҚгҖӮдёҚйңҖиҰҒжүӢеӢ•и·‘ `curl setWebhook`гҖӮ

      иӢҘж—ҘеҫҢйңҖиҰҒйҮҚж–°и§ёзҷјпјҲдҫӢеҰӮ revoke bot token еҫҢгҖҒжҲ–жӣҙжҸӣ gateway з¶ІеҹҹпјүпјҢеҸҜиҮі **openab-gateway** жңҚеӢҷй Ғйқў вҶ’ **Instructions** еҚҖпјҢе·Ій җеЎ«еҘҪзҡ„ `Re-register Telegram Webhook` curl жҢҮд»ӨеҸҜжүӢеӢ•еҹ·иЎҢгҖӮ

      ## иҮӘиЁӮиЁӯе®ҡ

      - **`/home/agent/.config/openab/config.toml`** вҖ” OAB иЁӯе®ҡпјҲsessionsгҖҒreactions зӯүпјүгҖӮйҰ–ж¬Ўе•ҹеӢ•жҷӮеҫһе…§е»әзҜ„жң¬е»әз«ӢпјҢ`[gateway]` еҚҖеЎҠе·Ій җе…ҲиЁӯеҘҪгҖӮеҰӮйңҖйҮҚе»әпјҢеҲӘйҷӨжӘ”жЎҲеҫҢйҮҚе•ҹжңҚеӢҷгҖӮ
      - **жҳ еғҸжЁҷзұӨ** вҖ” bot иҝҪи№Ө floating `beta` жЁҷзұӨпјҲ`ghcr.io/openabdev/openab:beta-kiro`пјүпјҢжҜҸж¬ЎжҺЁеҮәж–° beta зүҲжҷӮиҮӘеӢ•жӣҙж–°гҖӮжӯЈејҸз’°еўғе»әиӯ°еҲҮжҸӣиҮі `stable`гҖӮGateway зӣ®еүҚ pin еңЁ `ghcr.io/openabdev/openab-gateway:0.6.0-rc.9`пјҲе°ҡжңӘзҷјеёғ `:stable` жЁҷзұӨпјүгҖӮиӢҘиҰҒ pin иҮізү№е®ҡзүҲжң¬жҲ–жүӢеӢ•еҚҮзүҲпјҢи«ӢиҮі Zeabur Dashboard вҶ’ жңҚеӢҷ вҶ’ иЁӯе®ҡдҝ®ж”№жҳ еғҸжЁҷзұӨгҖӮеҸҜз”ЁжЁҷзұӨпјҡ[OpenAB](https://github.com/openabdev/openab/pkgs/container/openab) / [Gateway](https://github.com/openabdev/openab/pkgs/container/openab-gateway)гҖӮ

      ## жғіжҸӣдёҚеҗҢзҡ„ agent еҫҢз«Ҝпјҹ

      жң¬ bundle й җиЁӯдҪҝз”Ё KiroгҖӮиӢҘжғіз”Ё Claude / Codex / Cursor / Gemini / OpenCode / Hermes / GrokпјҢи«Ӣж”№йғЁзҪІе°ҚжҮүзҡ„ [bot template](https://zeabur.com/templates) жҗӯй…ҚзҚЁз«Ӣзҡ„ [OpenAB Gateway](https://zeabur.com/templates/IMRONB)гҖӮ

      ## жғіз”Ёе…¶д»–йҖҡиЁҠе№іеҸ°пјҹ

      и«ӢеҸғиҖғ [OpenAB Gateway](https://zeabur.com/templates/IMRONB)пјҢж”ҜжҸҙ LINEгҖҒFeishu/LarkгҖҒGoogle ChatгҖҒMS TeamsгҖҒWeComгҖӮ

      ## йҖЈзөҗ

      - [OpenAB GitHub](https://github.com/openabdev/openab)
      - [Telegram иЁӯе®ҡжҢҮеҚ—](https://github.com/openabdev/openab/blob/main/docs/telegram.md)
      - [зҚЁз«Ӣ OpenAB Gateway жЁЎжқҝ](https://zeabur.com/templates/IMRONB)
