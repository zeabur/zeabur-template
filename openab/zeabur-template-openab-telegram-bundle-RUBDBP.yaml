    readme: |
      # OpenAB Telegram Bundle

      дёҖй”®йғЁзҪІзҡ„ [OpenAB](https://github.com/openabdev/openab) Telegram bot вҖ” bot agent дёҺ webhook gateway жү“еҢ…еңЁдёҖиө·пјҢеҸӘйңҖеЎ«е…Ҙ Telegram Bot Token еҚіеҸҜдҪҝз”ЁгҖӮ

      ## йғЁзҪІеҶ…е®№

      | жңҚеҠЎ | з”ЁйҖ” | е…¬ејҖ |
      |---|---|---|
      | `openab` | иҝҗиЎҢ Kiro CLI зҡ„ OAB agent | еҗҰ |
      | `openab-gateway` | Telegram webhook вҶ’ WebSocket жЎҘжҺҘ | жҳҜпјҲиҮӘеҠЁ HTTPSпјү |

      ж— йңҖе…ұдә« PVCгҖҒж— йңҖжүӢеҠЁдҝ®ж”№ `config.toml`гҖӮAgent зҡ„ `config.toml` еңЁйҰ–ж¬ЎеҗҜеҠЁж—¶иҮӘеҠЁз”ҹжҲҗпјҢgateway URL е·Ійў„е…Ҳи®ҫдёә `ws://openab-gateway:8080/ws`гҖҒ`platform = "telegram"`гҖӮ

      ## и®ҫзҪ®жӯҘйӘӨ

      ### 1. еҲӣе»ә Telegram Bot

      1. еңЁ Telegram жү“ејҖ [@BotFather](https://t.me/BotFather)
      2. еҸ‘йҖҒ `/newbot` е№¶жҢүз…§жҸҗзӨәж“ҚдҪң
      3. **дҪ и®ҫзҪ®зҡ„ username**пјҲдҫӢеҰӮ `my_zeabur_bot`пјҢеҝ…йЎ»д»Ҙ `bot` з»“е°ҫпјүвҶ’ зІҳиҙҙеҲ° **Bot Username**
      4. **з”ҹжҲҗзҡ„ bot token**пјҲдҫӢеҰӮ `123456:ABC-DEF...`пјүвҶ’ зІҳиҙҙеҲ° **Telegram Bot Token**
      5. зҫӨз»„ / supergroup дҪҝз”ЁпјҡеҸ‘йҖҒ `/setprivacy` вҶ’ `Disable`пјҢи®© Bot еҸҜд»ҘзңӢеҲ°жүҖжңүж¶ҲжҒҜпјҲ@mention еҲӨе®ҡйңҖиҰҒжӯӨи®ҫзҪ®пјү
      6. Supergroup еҗ« forum topicпјҲиҮӘеҠЁгҖҢжҜҸж®өеҜ№иҜқдёҖдёӘ threadгҖҚпјүпјҡжҠҠ bot еҠ е…ҘзҫӨз»„ вҶ’ зҫӨз»„и®ҫзҪ® вҶ’ з®ЎзҗҶе‘ҳ вҶ’ ејҖеҗҜ **Manage Topics** жқғйҷҗ

      ### 2. пјҲйҖүеЎ«пјүиҺ·еҸ– Kiro API Key

      еҰӮжңүд»ҳиҙ№ Kiro и®ўйҳ…пјҢеүҚеҫҖ [kiro.dev](https://kiro.dev) вҶ’ Settings вҶ’ API Keys еҲӣе»ә keyпјҢеЎ«е…Ҙ `KIRO_API_KEY`гҖӮе…Қиҙ№ж–№жЎҲи·іиҝҮжӯӨжӯҘйӘӨпјҢдәҺжӯҘйӘӨ 4 йғЁзҪІеҗҺеҶҚи®ӨиҜҒгҖӮ

      ### 3. йғЁзҪІ

      зӮ№еҮ»йғЁзҪІгҖӮзі»з»ҹдјҡиҮӘеҠЁеҲҶй…Қе…¬ејҖ HTTPS еҹҹеҗҚз»ҷ gateway жңҚеҠЎгҖӮ

      ### 4. йҖҡиҝҮ Device Flow и®ӨиҜҒ KiroпјҲд»…е…Қиҙ№ж–№жЎҲпјү

      иӢҘжӯҘйӘӨ 2 е·ІеЎ«е…Ҙ `KIRO_API_KEY`пјҢи·іиҝҮжӯӨжӯҘйӘӨгҖӮ

      еҫ… `openab` жңҚеҠЎеҗҜеҠЁеҗҺпјҢеңЁ Zeabur Dashboard жү“ејҖиҜҘжңҚеҠЎзҡ„з»Ҳз«ҜпјҢиҝҗиЎҢпјҡ

      ```
      runuser -u agent -- kiro-cli login --use-device-flow
      ```

      жҢүз…§еұҸе№•жҳҫзӨәзҡ„ URL е’Ң code е®ҢжҲҗжөҸи§ҲеҷЁжҺҲжқғгҖӮ

      ### 5. жөӢиҜ•

      еҗ‘ Telegram Bot еҸ‘йҖҒж¶ҲжҒҜгҖӮGateway ж”¶еҲ°еҗҺйҖҡиҝҮ WebSocket иҪ¬еҸ‘з»ҷ OABпјҢOAB еӨ„зҗҶеҗҺйҖҡиҝҮ Gateway еӣһеӨҚгҖӮ

      **Telegram webhook з”ұ `openab-gateway` жңҚеҠЎзҡ„ init container еңЁеҗҜеҠЁж—¶иҮӘеҠЁжіЁеҶҢ**вҖ”вҖ”дәҺ gateway log жүҫ `openab-gateway: telegram webhook registered вҶ’ https://...` зЎ®и®ӨгҖӮдёҚйңҖиҰҒжүӢеҠЁи·‘ `curl setWebhook`гҖӮ

      иӢҘж—ҘеҗҺйңҖиҰҒйҮҚж–°и§ҰеҸ‘пјҲдҫӢеҰӮ revoke bot token еҗҺгҖҒжҲ–жӣҙжҚў gateway еҹҹеҗҚпјүпјҢеҸҜеҲ° **openab-gateway** жңҚеҠЎйЎөйқў вҶ’ **Instructions** еҢәпјҢе·Ійў„еЎ«еҘҪзҡ„ `Re-register Telegram Webhook` curl жҢҮд»ӨеҸҜжүӢеҠЁжү§иЎҢгҖӮ

      ## жғіжҚўдёҚеҗҢзҡ„ agent еҗҺз«Ҝпјҹ

      жң¬ bundle й»ҳи®ӨдҪҝз”Ё KiroгҖӮиӢҘжғіз”Ё Claude / Codex / Cursor / Gemini / OpenCode / Hermes / GrokпјҢиҜ·ж”№йғЁзҪІеҜ№еә”зҡ„ [bot template](https://zeabur.com/templates) жҗӯй…ҚзӢ¬з«Ӣзҡ„ [OpenAB Gateway](https://zeabur.com/templates/IMRONB)гҖӮ

      ## жғіз”Ёе…¶д»–йҖҡи®Ҝе№іеҸ°пјҹ

      иҜ·еҸӮиҖғ [OpenAB Gateway](https://zeabur.com/templates/IMRONB)пјҢж”ҜжҢҒ LINEгҖҒйЈһд№Ұ/LarkгҖҒGoogle ChatгҖҒMS TeamsгҖҒWeComгҖӮ

      ## й“ҫжҺҘ

      - [OpenAB GitHub](https://github.com/openabdev/openab)
