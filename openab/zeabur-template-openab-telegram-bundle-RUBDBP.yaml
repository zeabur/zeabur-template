# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: OpenAB Telegram Bundle
spec:
  description: |
    All-in-one Telegram bot powered by OpenAB + Kiro. Deploys the OAB agent and the Telegram gateway together вҖ” fill in one bot token and you're done. No separate gateway setup, no manual config.toml edits.
    Source: https://github.com/openabdev/openab
  icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
  coverImage: https://cdn-console.zeabur.com/f/Xp0H6/openab-cover.webp
  tags:
    - AI
    - Developer Tools
    - Telegram
  resourceRequirement:
    minConfig:
      cpu: 2
      ram: 4
    recommendedConfig:
      cpu: 4
      ram: 8
  variables:
    - key: TELEGRAM_BOT_TOKEN
      type: STRING
      name: Telegram Bot Token
      description: "Bot token from @BotFather (https://t.me/BotFather). Required."
    - key: BOT_USERNAME
      type: STRING
      name: Bot Username
      description: "Your bot's username without the @ (e.g. `my_zeabur_bot`). Required for @mention gating in Telegram groups."
    - key: KIRO_API_KEY
      type: STRING
      name: Kiro API Key (optional, Pro+)
      description: "Optional. API key for Kiro Pro/Pro+/Power subscribers. Leave empty to authenticate via device flow after deployment (free tier)."
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Gateway Domain
      description: "Public HTTPS domain for receiving Telegram webhooks. Auto-assigned."
    - key: OPENAB_AGENT_COMMAND
      type: STRING
      name: Agent Command (optional)
      description: "Optional. Override the agent CLI command (default: kiro-cli). Only change if you know what you're doing."
    - key: OPENAB_CONFIG_URL
      type: STRING
      name: Config URL (optional)
      description: "Optional. URL to a remote config.toml (https://). When set, the local config file is ignored and this URL is used instead."
  readme: |
    # OpenAB Telegram Bundle

    One-click [OpenAB](https://github.com/openabdev/openab) deployment for Telegram вҖ” bot agent + webhook gateway bundled together. Just fill in your Telegram bot token.

    ```
    Telegram в”Җв”ҖPOSTв”Җв”Җв–¶ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ в—Җв”Җв”ҖWebSocketв”Җв”Җ в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
                       в”Ӯ  openab-gateway  в”Ӯ                в”Ӯ   openab   в”Ӯ
                       в”Ӯ  (telegram only) в”Ӯ                в”Ӯ  (Kiro CLI) в”Ӯ
                       в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
                          public HTTPS                       internal only
    ```

    ## What's deployed

    | Service | Purpose | Public |
    |---|---|---|
    | `openab` | OAB agent running Kiro CLI | No |
    | `openab-gateway` | Telegram webhook вҶ’ WebSocket bridge | Yes (auto HTTPS) |

    No PVC sharing, no manual `config.toml` edits. The agent's `config.toml` is generated on first boot with the gateway URL pre-wired to `ws://openab-gateway:8080/ws` and `platform = "telegram"`.

    ## Setup

    ### 1. Create a Telegram Bot

    1. Open [@BotFather](https://t.me/BotFather) in Telegram
    2. Send `/newbot` and follow the prompts
    3. **Username** you chose (e.g. `my_zeabur_bot`, must end in `bot`) вҶ’ paste into **Bot Username**
    4. **Bot token** that follows (e.g. `123456:ABC-DEF...`) вҶ’ paste into **Telegram Bot Token**
    5. For group/supergroup use: send `/setprivacy` вҶ’ `Disable` so the bot can see all messages (required for @mention gating)
    6. For supergroups with forum topics (auto thread-per-conversation): add the bot to the group вҶ’ group settings вҶ’ Administrators вҶ’ enable **Manage Topics**

    ### 2. (Optional) Get a Kiro API Key

    If you have a paid Kiro subscription, go to [kiro.dev](https://kiro.dev) вҶ’ Settings вҶ’ API Keys вҶ’ create a key and paste it into `KIRO_API_KEY`. Free tier users skip this and authenticate post-deploy in step 4.

    ### 3. Deploy

    Click deploy. A public HTTPS domain is auto-assigned to the gateway service.

    ### 4. Authenticate Kiro via Device Flow (free tier only)

    Skip if you set `KIRO_API_KEY` in step 2.

    After the `openab` service is running, open its terminal in Zeabur Dashboard and run:

    ```
    runuser -u agent -- kiro-cli login --use-device-flow
    ```

    Follow the URL and code to authorize in your browser.

    ### 5. Test

    Send a message to your Telegram bot. The gateway receives it, forwards it to OAB via WebSocket, and OAB replies through the gateway.

    **The Telegram webhook is registered automatically** by an init container in the `openab-gateway` service at startup вҖ” look for `openab-gateway: telegram webhook registered вҶ’ https://...` in the gateway logs. No manual `curl setWebhook` needed.

    If you ever need to re-trigger it (e.g. after rotating the bot token or changing the gateway domain), open the **openab-gateway** service page in Zeabur Dashboard вҖ” under **Instructions**, the `Re-register Telegram Webhook` curl is pre-filled.

    ## Customization

    - **`/home/agent/.config/openab/config.toml`** вҖ” OAB config (sessions, reactions, etc.). Created on first boot from a built-in template with the `[gateway]` block pre-wired. To regenerate, delete and restart.
    - **Image tags** вҖ” bot tracks the floating `beta` channel (`ghcr.io/openabdev/openab:beta-kiro`) and auto-updates with each new beta release. Switch to `stable` for production use. Gateway is pinned at `ghcr.io/openabdev/openab-gateway:0.6.0-rc.9` (no `:stable` tag yet). To pin or bump, change the tag in Zeabur Dashboard вҶ’ Service вҶ’ Settings. Available tags: [OpenAB](https://github.com/openabdev/openab/pkgs/container/openab) / [Gateway](https://github.com/openabdev/openab/pkgs/container/openab-gateway).

    ## Want a different agent backend?

    This bundle uses Kiro as the default agent. For Claude / Codex / Cursor / Gemini / OpenCode / Hermes / Grok, deploy the corresponding [bot template](https://zeabur.com/templates) separately together with the standalone [OpenAB Gateway](https://zeabur.com/templates/IMRONB).

    ## Want a different platform?

    See [OpenAB Gateway](https://zeabur.com/templates/IMRONB) for LINE, Feishu/Lark, Google Chat, MS Teams, WeCom.

    ## Links

    - [OpenAB GitHub](https://github.com/openabdev/openab)
    - [Telegram Setup Guide](https://github.com/openabdev/openab/blob/main/docs/telegram.md)
    - [Standalone OpenAB Gateway Template](https://zeabur.com/templates/IMRONB)
  services:
    - name: openab
      icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
      template: PREBUILT_V2
      spec:
        source:
          image: ghcr.io/openabdev/openab:beta-kiro
          runAsUserID: 1000
          command:
            - tini
            - --
            - /bin/sh
            - -c
            - /opt/start-openab.sh
        volumes:
          - id: agent-home
            dir: /home/agent
        configs:
          - path: /opt/start-openab.sh
            permission: 493
            template: |
              #!/bin/sh
              set -e

              # Initialize shell dotfiles and fix ownership for persistent volume
              if [ ! -f /home/agent/.bashrc ]; then
                cp /etc/skel/.bashrc /home/agent/.bashrc 2>/dev/null || true
                cp /etc/skel/.profile /home/agent/.profile 2>/dev/null || true
                cp /etc/skel/.bash_logout /home/agent/.bash_logout 2>/dev/null || true
              fi

              if [ "$(id -u)" = "0" ]; then
                chown -R agent:agent /home/agent
                chmod 755 /home/agent/.config 2>/dev/null || true
              fi

              CONFIG_DIR=/home/agent/.config/openab
              CONFIG_FILE=$CONFIG_DIR/config.toml
              mkdir -p "$CONFIG_DIR"

              if [ ! -f "$CONFIG_FILE" ]; then
                cp /opt/config.toml.template "$CONFIG_FILE"

                # [gateway] block вҖ” always set (this bundle is gateway-bound)
                printf '\n[gateway]\nurl = "%s"\nplatform = "%s"\n' \
                  "${GATEWAY_URL:-ws://openab-gateway:8080/ws}" \
                  "${GATEWAY_PLATFORM:-telegram}" >> "$CONFIG_FILE"

                if [ -n "$BOT_USERNAME" ]; then
                  printf 'bot_username = "%s"\n' "$BOT_USERNAME" >> "$CONFIG_FILE"
                fi

                if [ -n "$OPENAB_MAX_SESSIONS" ]; then
                  printf '\n[pool]\nmax_sessions = %s\n' "$OPENAB_MAX_SESSIONS" >> "$CONFIG_FILE"
                fi

                echo "openab: config.toml generated"
              else
                echo "openab: using existing config.toml (delete to regenerate)"
              fi

              if [ "$(id -u)" = "0" ]; then
                chown -R agent:agent "$CONFIG_DIR"
                exec runuser -u agent --preserve-environment -- openab run --config "${OPENAB_CONFIG_URL:-$CONFIG_FILE}"
              fi

              exec openab run --config "${OPENAB_CONFIG_URL:-$CONFIG_FILE}"
          - path: /opt/config.toml.template
            template: |
              [agent]
              args = ["acp", "--trust-all-tools"]
        env:
          GATEWAY_URL:
            default: ws://openab-gateway:8080/ws
          GATEWAY_PLATFORM:
            default: telegram
          BOT_USERNAME:
            default: ${BOT_USERNAME}
          KIRO_API_KEY:
            default: ${KIRO_API_KEY}
          OPENAB_MAX_SESSIONS:
            default: ""
          OPENAB_AGENT_COMMAND:
            default: "kiro-cli"
          OPENAB_CONFIG_URL:
            default: ""
    - name: openab-gateway
      icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: ghcr.io/openabdev/openab-gateway:0.6.0-rc.9
        ports:
          - id: web
            port: 8080
            type: HTTP
        healthCheck:
          type: TCP
          port: web
        init:
          - id: register-telegram-webhook
            image: curlimages/curl:8.5.0
            volumes: []
            command:
              - sh
              - -c
              - |
                for i in 1 2 3 4 5; do
                  if curl -fsS -m 10 \
                       "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
                       --data-urlencode "url=https://${ZEABUR_WEB_DOMAIN}/webhook/telegram" \
                       --data-urlencode "secret_token=${TELEGRAM_SECRET_TOKEN}"; then
                    echo
                    echo "openab-gateway: telegram webhook registered вҶ’ https://${ZEABUR_WEB_DOMAIN}/webhook/telegram"
                    exit 0
                  fi
                  echo "openab-gateway: webhook register attempt $i failed, retrying in 3s"
                  sleep 3
                done
                echo "openab-gateway: all webhook register attempts failed вҖ” gateway will still start; use the dashboard 'Re-register Telegram Webhook' instruction to recover."
                exit 0
        instructions:
          - type: TEXT
            title: Re-register Telegram Webhook (auto-runs at deploy вҖ” use this only to manually re-trigger)
            content: "curl \"https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook?url=${ZEABUR_WEB_URL}/webhook/telegram&secret_token=${TELEGRAM_SECRET_TOKEN}\""
          - type: TEXT
            title: Unregister Telegram Webhook
            content: "curl \"https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook\""
        env:
          TELEGRAM_BOT_TOKEN:
            default: ${TELEGRAM_BOT_TOKEN}
          TELEGRAM_SECRET_TOKEN:
            default: ${PASSWORD}
localization:
