      待 `openab` 服务启动后，在 Zeabur Dashboard 打开该服务的终端，运行：

      ```
      runuser -u agent -- kiro-cli login --use-device-flow
      ```

      按照屏幕显示的 URL 和 code 完成浏览器授权。

      ### 5. 测试

