      2. Buat aplikasi baru dan tambahkan Bot
      3. Aktifkan **Message Content Intent** di Privileged Gateway Intents
      4. Salin token bot dan masukkan sebagai `DISCORD_BOT_TOKEN`
      5. Undang bot ke server Anda

