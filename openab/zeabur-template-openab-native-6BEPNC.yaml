      部署 OpenAB 搭配原生 Rust coding agent（openab-agent）作為 Discord/Slack 機器人。單一靜態 binary、無 Node.js 或 Python runtime、冷啟動 ~50ms。支援 Anthropic API key 或 OpenAI Codex（ChatGPT Plus/Pro）OAuth device flow 訂閱認證。
