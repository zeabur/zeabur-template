      | `OPENAB_AGENT_OPENAI_MODEL` | `gpt-4.1-nano`（Codex） | provider 为 `codex` 时使用 |

      Auto-detect 顺序：先试 `ANTHROPIC_API_KEY`，再试 OAuth token store。
