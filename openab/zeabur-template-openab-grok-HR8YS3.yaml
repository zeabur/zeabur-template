      Open Agent Broker — 輕量的 Rust 程式，透過 stdio JSON-RPC 將 Discord 和 Slack 橋接到任何 ACP 相容的 coding CLI。此模板使用 Grok Build（xAI 官方 coding agent CLI）作為後端，透過 `grok agent stdio` 啟動。
