  id-ID:
    name: OpenClaw 🦞
    description: OpenClaw 🦞 (sebelumnya Clawdbot, Moltbot) adalah asisten AI pribadi yang berjalan secara lokal dan terhubung ke berbagai platform perpesanan (WhatsApp, Telegram, Slack, Discord, dll.) melalui arsitektur Gateway berbasis WebSocket.
    variables:
      - key: PUBLIC_DOMAIN
        name: Domain
        description: Domain untuk mengakses OpenClaw Control UI (contoh my-openclaw)
      - key: ENABLE_CONTROL_UI
        name: Aktifkan Control UI
        description: "'true' untuk mengaktifkan Control UI via domain publik (default). 'false' untuk hanya koneksi lokal (lebih aman)."
      - key: ZEABUR_AI_HUB_API_KEY
        name: Kunci API Zeabur AI Hub (Opsional)
        description: "Opsional — kosongkan untuk melewati. Jika dilewati, model default adalah anthropic/claude-opus-4-6 (memerlukan API key sendiri). Dengan AI Hub, Anda dapat menggunakan Gemini, GPT, Claude, DeepSeek. Dapat ditambahkan nanti di tab Variabel."
    readme: |
      # OpenClaw 🦞
      OpenClaw 🦞 (sebelumnya Clawdbot, Moltbot) adalah asisten AI pribadi yang berjalan secara lokal dan terhubung ke berbagai platform perpesanan melalui arsitektur Gateway berbasis WebSocket.

      ⚠️ Template ini menggunakan `ghcr.io/openclaw/openclaw:2026.3.22`. OpenClaw 🦞 sedang dalam pengembangan cepat, jadi mungkin ada bug yang belum ditemukan. Mengubah versi juga tidak menjamin stabilitas.

      ⚠️ Jika Anda mengalami masalah, silakan kunjungi [GitHub issues](https://github.com/openclaw/openclaw/issues) untuk mencari solusi atau melaporkan masalah baru. Untuk masalah terkait platform Zeabur, silakan hubungi dukungan Zeabur.


      ⚠️ Template ini memerlukan [Dedicated Server](https://zeabur.com/docs/dedicated-server) di Zeabur. Tidak dapat berjalan di kluster bersama.

      ⚠️ Template ini sudah dikonfigurasi dan siap digunakan - tidak perlu menjalankan `openclaw onboard`. Jika Anda menjalankannya, Anda perlu memperbarui pengaturan terkait secara manual. Lihat [dokumentasi resmi](https://docs.openclaw.ai) untuk detailnya.

      ---

      ## Variabel Deploy

      Anda akan diminta mengisi variabel berikut saat deploy:

      | Variabel | Wajib | Deskripsi |
      |----------|-------|-----------|
      | **Domain** | Ya | Subdomain untuk mengakses OpenClaw (contoh `my-openclaw` → `my-openclaw.zeabur.app`). Dapat dihapus setelah beralih ke mode loopback. |
      | **Aktifkan Control UI** | Ya | `true` (default) — mengaktifkan Control UI web via domain publik. `false` — hanya loopback, tanpa akses web publik (lebih aman, gunakan dengan Tailscale atau channel yang didukung seperti Telegram) |
      | **Kunci API Zeabur AI Hub** | Tidak | Kosongkan untuk melewati. Tanpa ini, model default adalah `anthropic/claude-opus-4-6` (memerlukan API key sendiri). Dengan AI Hub, Anda dapat menggunakan Gemini, GPT, Claude, DeepSeek. Dapat ditambahkan nanti di tab **Variabel**. |

      ## Sumber Daya yang Direkomendasikan
      - **Minimum**: 2 vCPU / 4 GB RAM
      - **Disarankan**: 4 vCPU / 8 GB RAM

      ## Ekstensi Fitur
      - **Browser**: Jika Anda memerlukan fitur browser (browsing web, screenshot, dll.), deploy [Template Browser](https://zeabur.com/templates/H8L4G1)
      - **Devbox**: Jika Anda memerlukan eksekusi kode multi-bahasa (Python, Go, Rust, C/C++), deploy [Template Devbox](https://zeabur.com/templates/ZBVZNH) ke proyek yang sama

      ## Penggunaan
      1. Setelah deploy, buka URL layanan dari tab **Networking**. Di halaman login, tempelkan **Gateway Token** (tersedia di tab **Instruksi** atau **Variables** → `OPENCLAW_GATEWAY_TOKEN`) dan klik **Connect**
      2. **Konfigurasi model AI** (pilih salah satu):
         - **Zeabur AI Hub** (model default: `glm-4.7-flash`): Jika sudah memasukkan API Key saat deploy, langsung ke langkah 3. Bisa juga menambahkan `ZEABUR_AI_HUB_API_KEY` nanti di tab **Variables** dashboard Zeabur (restart layanan setelah menambahkan).
         - **Penyedia lain** (Anthropic, OpenAI, dll.): Jika tidak memasukkan API Key Zeabur AI Hub, model default adalah `anthropic/claude-opus-4-6`. Buka Control UI Settings atau tambahkan kunci API melalui variabel lingkungan. Info: https://docs.openclaw.ai/providers/anthropic
      3. Buka halaman **Chat** untuk menguji apakah model AI Anda berfungsi
      4. (Opsional) Atur platform pesan seperti Telegram, WhatsApp, dll.

      Untuk konfigurasi model AI, lihat [dokumentasi resmi](https://docs.openclaw.ai/providers).

      ### Pergantian Model dan Failover
      Template ini menyertakan model failover yang otomatis beralih saat model utama tidak tersedia. Rantai default: `glm-4.7-flash` → `grok-4-fast-non-reasoning` → `minimax-m2.5` → `kimi-k2.5` → `qwen-3-235b` → `gpt-5-mini`.

      Anda dapat mengelola model dari **Control UI Chat** atau **Perintah** di dashboard Zeabur.

      **Dari Control UI Chat** — ketik slash command langsung di kotak chat:
      - `/model zeabur-ai/glm-4.7-flash` — ganti model utama
      - `/model` — lihat model saat ini
      - `/models` — daftar penyedia model
      - `/models <provider>` — daftar model dari penyedia tertentu (mis. `/models zeabur-ai`)

      **Dari Perintah** (dashboard Zeabur) — perintah yang sama di terminal:
      ```bash
      openclaw models set zeabur-ai/glm-4.7-flash
      openclaw models status
      openclaw models list --all
      openclaw models fallbacks list
      openclaw models fallbacks add zeabur-ai/gpt-5-mini
      openclaw models fallbacks remove zeabur-ai/gpt-5-mini
      openclaw models fallbacks clear
      ```

      **Atau edit file konfigurasi langsung** (`~/.openclaw/config.json5`):
      ```json
      "agents": {
        "defaults": {
          "model": {
            "primary": "zeabur-ai/glm-4.7-flash",
            "fallbacks": ["zeabur-ai/grok-4-fast-non-reasoning", "zeabur-ai/minimax-m2.5"]
          }
        }
      }
      ```
      Setelah mengedit file konfigurasi, restart layanan.

      ### Menambahkan Penyedia Model Eksternal
      Selain Zeabur AI Hub, Anda dapat menambahkan penyedia eksternal seperti Anthropic, OpenAI, Google, dll.

      **Metode 1: Variabel lingkungan** — tambahkan API key di tab **Variables** dashboard Zeabur:
      - `ANTHROPIC_API_KEY` — model Claude
      - `OPENAI_API_KEY` — model GPT
      - `GOOGLE_API_KEY` — model Gemini

      Setelah menambahkan, restart layanan, lalu ganti model:
      - Control UI Chat: `/model anthropic/claude-opus-4-6`
      - Perintah: `openclaw models set anthropic/claude-opus-4-6`

      **Metode 2: Auth token** — buka **Perintah** di dashboard Zeabur:
      ```bash
      # Tempel API key dari penyedia
      openclaw models auth paste-token --provider anthropic

      # Atau gunakan pembantu autentikasi interaktif
      openclaw models auth add
      ```

      **Metode 3: File konfigurasi** — edit `~/.openclaw/config.json5`:
      ```json
      "models": {
        "providers": {
          "anthropic": { "apiKey": "sk-ant-..." },
          "openai": { "apiKey": "sk-..." }
        }
      }
      ```

      Untuk semua penyedia yang didukung, lihat [dokumentasi resmi](https://docs.openclaw.ai/providers).

      ## Pengaturan Bot Telegram
      **Mendapatkan token dari BotFather:**
      1. Buka Telegram dan cari [@BotFather](https://t.me/BotFather)
      2. Kirim `/newbot` untuk membuat bot baru
      3. Ikuti petunjuk untuk mengatur nama dan username bot
      4. BotFather akan mengirimkan token (contoh: `123456789:ABCdefGHIjklMNOpqrsTUVwxyz`)

      **Menambahkan token ke Zeabur:**
      1. Buka tab **Variabel** layanan Anda di dashboard Zeabur
      2. Tambahkan `TELEGRAM_BOT_TOKEN` dengan token bot Anda
      3. Restart layanan
      4. Setelah restart, buka **Settings → Config** dan aktifkan plugin Telegram: `"plugins": { "entries": { "telegram": { "enabled": true } } }`. Untuk menonaktifkan, atur `enabled` ke `false`.

      **Menghubungkan akun Telegram Anda:**
      1. Kirim `/start` ke bot Anda di Telegram
      2. Bot akan membalas dengan kode pairing (mis. `JN4MSY23`)
      3. Setujui pairing menggunakan salah satu metode berikut:
         - **Web Chat**: Di antarmuka web OpenClaw, ketik `openclaw pairing approve telegram <kode>`
         - **Terminal**: Buka **Perintah** di dashboard Zeabur, jalankan `openclaw pairing approve telegram <kode>`
      4. Anda akan melihat: `Approved telegram sender <user-id>.`
      5. Sekarang Anda dapat mengobrol dengan bot!

      ## Pengaturan WhatsApp
      **Langkah 1: Konfigurasi kanal WhatsApp**
      Tambahkan konfigurasi berikut melalui OpenClaw Control UI (Settings → Config) atau tempelkan ke chat:
      ```json
      "channels": {
        "whatsapp": {
          "selfChatMode": true,
          "dmPolicy": "allowlist",
          "allowFrom": ["+15551234567"]
        }
      }
      ```
      Ganti `+15551234567` dengan nomor telepon WhatsApp Anda (dengan kode negara). Restart layanan setelah menyimpan.

      **Langkah 2: Hubungkan WhatsApp**
      1. Buka **Perintah** di dashboard Zeabur untuk mengakses terminal container
      2. Jalankan: `openclaw channels login`
      3. QR Code akan muncul - pindai dengan WhatsApp di ponsel Anda
      4. Koneksi selesai! Sekarang Anda dapat mengirim pesan ke diri sendiri di WhatsApp untuk mengobrol dengan OpenClaw

      ## Pengaturan Bot LINE
      **Membuat channel LINE Messaging API:**
      1. Jika belum memiliki [Akun Resmi LINE](https://entry.line.biz/), buat terlebih dahulu
      2. Buka [LINE Developers Console](https://developers.line.biz/console/)
      3. Buat atau pilih **Provider**
      4. Buat channel **Messaging API** baru dan hubungkan ke Akun Resmi LINE Anda
      4. Di tab **Messaging API**, terbitkan **Channel access token** (berlaku lama)
      5. Di tab **Basic settings**, salin **Channel secret**

      **Menambahkan kredensial ke Zeabur:**
      1. Buka tab **Variabel** layanan Anda di dashboard Zeabur
      2. Tambahkan `LINE_CHANNEL_ACCESS_TOKEN` dengan Channel access token Anda
      3. Tambahkan `LINE_CHANNEL_SECRET` dengan Channel secret Anda
      4. Restart layanan
      5. Setelah restart, buka **Settings → Config** dan aktifkan plugin LINE: `"plugins": { "entries": { "line": { "enabled": true } } }`

      **Mengatur Webhook:**
      1. Setelah restart, URL webhook Anda adalah: `https://<your-domain>/line/webhook`
      2. Di [LINE Developers Console](https://developers.line.biz/console/), buka tab **Messaging API** channel Anda
      3. Atur **Webhook URL** ke `https://<your-domain>/line/webhook`
      4. Aktifkan **Use webhook**
      5. (Disarankan) Nonaktifkan **Pesan balasan otomatis** dan **Pesan sambutan** di LINE Official Account Manager

      **Menghubungkan akun LINE Anda:**
      1. Tambahkan bot sebagai teman di LINE dan kirim pesan apa saja
      2. Bot akan membalas dengan kode pairing (mis. `JN4MSY23`)
      3. Setujui pairing menggunakan salah satu metode berikut:
         - **Web Chat**: Di antarmuka web OpenClaw, ketik `openclaw pairing approve line <kode>`
         - **Terminal**: Buka **Perintah** di dashboard Zeabur, jalankan `openclaw pairing approve line <kode>`
      4. Anda akan melihat: `Approved line sender <user-id>.`
      5. Sekarang Anda dapat mengobrol dengan bot di LINE!

      Untuk platform perpesanan lainnya (Discord, Slack, dll.), lihat [dokumentasi Channels](https://docs.openclaw.ai/channels).

      ## Konfigurasi Model AI

      **Verifikasi setup Anda:**
      1. Model default tergantung pada cara deploy:
         - Dengan Zeabur AI Hub API Key → model default: `zeabur-ai/glm-4.7-flash`
         - Tanpa → model default: `anthropic/claude-opus-4-6` (memerlukan kunci API)
      2. Buka halaman **Chat** dan kirim pesan percobaan
      3. Jika mendapat balasan → model berfungsi dengan baik
      4. Jika ada error → pastikan kunci API sudah dikonfigurasi dengan benar

      **Ganti model untuk percakapan saat ini** (melalui perintah chat):
      - `/models` - Lihat model yang tersedia
      - `/model <model-id>` - Ganti model hanya untuk percakapan ini (tidak mempengaruhi percakapan lain)

      **Ganti model default untuk semua percakapan baru** (via Control UI Settings):
      - Buka Settings → Agents → Default model
      - **Tips:** Tetapkan model berbiaya rendah sebagai default (misal: `gemini-2.5-flash-lite`, `gpt-5-nano`). Jika model tidak tersedia, gunakan `/new` untuk memulai percakapan baru dengan model default.

      **Tambah penyedia AI** (via Control UI Settings atau variabel lingkungan):
      - Tambahkan kunci API penyedia lain (misal: Anthropic, OpenAI)
      - Info: https://docs.openclaw.ai/providers

      **Modifikasi model Zeabur AI Hub** (via dashboard Zeabur):
      - Buka **Settings** → **Configs** → Edit `/opt/openclaw/providers/zeabur-ai-hub.json5`, lalu restart layanan (perubahan disinkronkan saat startup)
      - Versi lama (tanpa perintah): Edit `/home/node/.openclaw/openclaw.json` via tab **Files** atau Control UI Settings. Tambahkan berikut ke array `models.providers.zeabur-ai.models`:
