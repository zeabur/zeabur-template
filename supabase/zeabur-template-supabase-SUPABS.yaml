                        plugins:
                          - name: cors
                          - name: key-auth
                            config:
                              hide_credentials: false
                          - name: acl
                            config:
                              hide_groups_header: true
                              allow:
                                - admin
                                - anon

                      ## Secure REST routes
                      - name: rest-v1
                        _comment: 'PostgREST: /rest/v1/* -> http://rest:3000/*'
                        url: http://rest:3000/
                        routes:
                          - name: rest-v1-all
                            strip_path: true
                            paths:
                              - /rest/v1/
                        plugins:
                          - name: cors
                          - name: key-auth
                            config:
                              hide_credentials: true
                          - name: acl
                            config:
                              hide_groups_header: true
                              allow:
                                - admin
                                - anon

                      ## Secure GraphQL routes
                      - name: graphql-v1
                        _comment: 'PostgREST: /graphql/v1/* -> http://rest:3000/rpc/graphql'
                        url: http://rest:3000/rpc/graphql
                        routes:
                          - name: graphql-v1-all
                            strip_path: true
                            paths:
                              - /graphql/v1
                        plugins:
                          - name: cors
                          - name: key-auth
                            config:
