                        url: http://studio:3000/
                        routes:
                          - name: dashboard-all
                            strip_path: true
                            paths:
                              - /
                        plugins:
                          - name: cors
                          - name: basic-auth
                            config:
                              hide_credentials: true
                  permission: null
                  envsubst: true
          domainKey: PUBLIC_DOMAIN
