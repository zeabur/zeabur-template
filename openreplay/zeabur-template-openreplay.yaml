# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: OpenReplay
spec:
  description: |
    Open-source session replay platform. Debug your web app with session recordings, network logs, console errors, and more — self-hosted and privacy-friendly.
  icon: https://avatars.githubusercontent.com/u/66554311?s=200&v=4
  tags:
    - Analytics
    - Session Replay
    - Developer Tools
    - Open Source
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: OpenReplay Domain
      description: The public domain for your OpenReplay instance (e.g. replay.example.com)
  readme: |
    # OpenReplay

    [OpenReplay](https://openreplay.com) is an open-source session replay suite. It lets you replay everything your users experience — DOM snapshots, network requests, console logs, JS errors — and integrates with your existing stack.

    ## Architecture

    This template deploys the full OpenReplay stack:

    | Layer | Services |
    |-------|----------|
    | Database | PostgreSQL, ClickHouse |
    | Cache | Redis (Valkey) |
    | Object storage | MinIO (S3-compatible) |
    | Message bus | Kafka (KRaft mode) |
    | Application | 17 microservices |
    | Proxy | Nginx |

    ## Resource Requirements

    **Minimum: 8 GB RAM, 4 vCPU.** Each service runs in its own container. Consider a dedicated server plan.

    ## After Deployment

    1. Visit your configured domain
    2. Register your admin account
    3. Copy the tracking snippet from Settings → Projects into your app

    ## License

    [Elastic License 2.0 (ELv2)](https://github.com/openreplay/openreplay/blob/main/LICENSE) · [GitHub](https://github.com/openreplay/openreplay) · [openreplay.com](https://openreplay.com)

  services:

    # ── INFRASTRUCTURE ────────────────────────────────────────────────────────

    - name: kafka
      icon: https://cdn.zeabur.com/kafka.png
      template: PREBUILT_V2
      spec:
        source:
          image: bitnami/kafka:latest
        ports:
          - id: client
            port: 9092
            type: TCP
        volumes:
          - id: data
            dir: /bitnami/kafka/data
        healthCheck:
          type: TCP
          port: client
        env:
          KAFKA_CFG_NODE_ID:
            default: "0"
            readonly: true
          KAFKA_CFG_PROCESS_ROLES:
            default: "broker,controller"
            readonly: true
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS:
            default: "0@kafka.zeabur.internal:9093"
            readonly: true
          KAFKA_CFG_LISTENERS:
            default: "PLAINTEXT://:9092,CONTROLLER://:9093"
            readonly: true
          KAFKA_CFG_ADVERTISED_LISTENERS:
            default: "PLAINTEXT://kafka.zeabur.internal:9092"
            readonly: true
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP:
            default: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            readonly: true
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES:
            default: "CONTROLLER"
            readonly: true
          KAFKA_CFG_INTER_BROKER_LISTENER_NAME:
            default: "PLAINTEXT"
            readonly: true
          KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE:
            default: "true"
            readonly: true
          KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR:
            default: "1"
            readonly: true
        instructions:
          - title: Internal connection (within Zeabur project)
            content: kafka.zeabur.internal:9092

    - name: postgresql
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:17
          # Install curl as root before the entrypoint drops to postgres user,
          # so init scripts can use curl to download the OpenReplay schema.
          command:
            - /bin/bash
            - -c
            - "apt-get update -qq && apt-get install -y -qq curl && exec /usr/local/bin/docker-entrypoint.sh postgres"
        ports:
          - id: db
            port: 5432
            type: TCP
        portForwarding:
          enabled: true
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        healthCheck:
          type: TCP
          port: db
        configs:
          - path: /docker-entrypoint-initdb.d/openreplay-schema.sh
            permission: 493
            envsubst: false
            template: |
              #!/bin/bash
              set -e
              echo "[OpenReplay] Downloading PostgreSQL schema..."
              curl -sf "https://raw.githubusercontent.com/openreplay/openreplay/main/scripts/schema/db/init_dbs/postgresql/init_schema.sql" -o /tmp/or_schema.sql
              echo "[OpenReplay] Applying PostgreSQL schema..."
              psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" -f /tmp/or_schema.sql
              echo "[OpenReplay] Schema applied."
        env:
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_USER:
            default: postgres
            expose: true
            readonly: true
          POSTGRES_DB:
            default: postgres
            expose: true
            readonly: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          # Shared secrets — all app services depend on postgresql so they inherit these
          S3_KEY:
            default: openreplay
            expose: true
          S3_SECRET:
            default: ${PASSWORD}
            expose: true
          JWT_SECRET:
            default: ${PASSWORD}
            expose: true
          JWT_SPOT_SECRET:
            default: ${PASSWORD}
            expose: true
          JWT_REFRESH_SECRET:
            default: ${PASSWORD}
            expose: true
          JWT_SPOT_REFRESH_SECRET:
            default: ${PASSWORD}
            expose: true
          ASSIST_JWT_SECRET:
            default: ${PASSWORD}
            expose: true
          ASSIST_KEY:
            default: ${PASSWORD}
            expose: true
          TOKEN_SECRET:
            default: ${PASSWORD}
            expose: true
        instructions:
          - title: Connection String
            content: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PORT_FORWARDED_HOSTNAME}:${DB_PORT_FORWARDED_PORT}/${POSTGRES_DB}
          - title: PostgreSQL Connect Command
            content: psql "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${PORT_FORWARDED_HOSTNAME}:${DB_PORT_FORWARDED_PORT}/${POSTGRES_DB}"
          - title: PostgreSQL username
            content: ${POSTGRES_USER}
          - title: PostgreSQL password
            content: ${POSTGRES_PASSWORD}
          - title: PostgreSQL database
            content: ${POSTGRES_DB}
          - title: PostgreSQL host
            content: ${PORT_FORWARDED_HOSTNAME}
          - title: PostgreSQL port
            content: ${DB_PORT_FORWARDED_PORT}

    - name: clickhouse
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/clickhouse.svg
      template: PREBUILT_V2
      spec:
        source:
          image: clickhouse/clickhouse-server:25.11-alpine
        ports:
          - id: tcp
            port: 9000
            type: TCP
          - id: http
            port: 8123
            type: TCP
        portForwarding:
          enabled: true
        volumes:
          - id: data
            dir: /var/lib/clickhouse
        configs:
          - path: /docker-entrypoint-initdb.d/openreplay-schema.sh
            permission: 493
            envsubst: false
            template: |
              #!/bin/sh
              set -e
              echo "[OpenReplay] Downloading ClickHouse schema..."
              wget -qO /tmp/ch_schema.sql "https://raw.githubusercontent.com/openreplay/openreplay/main/scripts/schema/db/init_dbs/clickhouse/create/init_schema.sql"
              echo "[OpenReplay] Applying ClickHouse schema..."
              clickhouse-client --multiquery < /tmp/ch_schema.sql || true
              echo "[OpenReplay] ClickHouse schema applied."
        env:
          CLICKHOUSE_USER:
            default: default
          CLICKHOUSE_PASSWORD:
            default: ""
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT:
            default: "1"
          CH_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        instructions:
          - title: ClickHouse HTTP interface URL
            content: http://${PORT_FORWARDED_HOSTNAME}:${HTTP_PORT_FORWARDED_PORT}
          - title: ClickHouse username
            content: ${CLICKHOUSE_USER}
          - title: ClickHouse password
            content: ${CLICKHOUSE_PASSWORD}
          - title: ClickHouse host
            content: ${PORT_FORWARDED_HOSTNAME}
          - title: ClickHouse TCP port
            content: ${TCP_PORT_FORWARDED_PORT}

    - name: redis
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/redis.svg
      template: PREBUILT_V2
      spec:
        source:
          image: ghcr.io/openreplay/valkey:8
        ports:
          - id: db
            port: 6379
            type: TCP
        portForwarding:
          enabled: true
        volumes:
          - id: data
            dir: /data
        env:
          ALLOW_EMPTY_PASSWORD:
            default: "yes"
          REDIS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        instructions:
          - title: Command to connect to your Redis
            content: redis-cli -h ${PORT_FORWARDED_HOSTNAME} -p ${DB_PORT_FORWARDED_PORT}
          - title: Redis Connection String
            content: redis://${PORT_FORWARDED_HOSTNAME}:${DB_PORT_FORWARDED_PORT}
          - title: Redis host
            content: ${PORT_FORWARDED_HOSTNAME}
          - title: Redis port
            content: ${DB_PORT_FORWARDED_PORT}

    - name: minio
      template: PREBUILT_V2
      spec:
        source:
          image: ghcr.io/openreplay/minio:2025
        ports:
          - id: api
            port: 9000
            type: TCP
        portForwarding:
          enabled: true
        volumes:
          - id: data
            dir: /bitnami/minio/data
        env:
          MINIO_ROOT_USER:
            default: ${S3_KEY}
          MINIO_ROOT_PASSWORD:
            default: ${S3_SECRET}
          MINIO_DEFAULT_BUCKETS:
            default: "mobs,sessions-assets,sourcemaps,uxtesting-records,records,spots,ios-images"
          MINIO_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        instructions:
          - title: MinIO S3 API Endpoint
            content: http://${PORT_FORWARDED_HOSTNAME}:${API_PORT_FORWARDED_PORT}
          - title: S3 Access Key ID
            content: ${MINIO_ROOT_USER}
          - title: S3 Secret Access Key
            content: ${MINIO_ROOT_PASSWORD}
          - title: Default Buckets
            content: ${MINIO_DEFAULT_BUCKETS}
        dependencies:
          - postgresql

    # ── NGINX-ROUTED APPLICATION SERVICES ────────────────────────────────────

    - name: http-openreplay
      template: PREBUILT_V2
      spec:
        source:
          image: public.ecr.aws/p1t3u8a3/http:v1.23.0
        ports:
          - id: web
            port: 8080
            type: TCP
          - id: metrics
            port: 8888
            type: TCP
        volumes:
          - id: efs
            dir: /mnt/efs
        env:
          BUCKET_NAME:
            default: uxtesting-records
          CACHE_ASSETS:
            default: "true"
          AWS_ACCESS_KEY_ID:
            default: ${S3_KEY}
          AWS_SECRET_ACCESS_KEY:
            default: ${S3_SECRET}
          AWS_REGION:
            default: us-east-1
          AWS_ENDPOINT:
            default: "http://${MINIO_HOST}:9000"
          LICENSE_KEY:
            default: ""
          KAFKA_SERVERS:
            default: "kafka.zeabur.internal:9092"
          KAFKA_USE_SSL:
            default: "false"
          pg_password:
            default: ${POSTGRES_PASSWORD}
          POSTGRES_STRING:
            default: "postgres://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/postgres?sslmode=disable"
          REDIS_STRING:
            default: "redis://${REDIS_HOST}:6379"
          JWT_SECRET:
            default: ${JWT_SECRET}
          JWT_SPOT_SECRET:
            default: ${JWT_SPOT_SECRET}
          TOKEN_SECRET:
            default: ${TOKEN_SECRET}
          HTTP_OPENREPLAY_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        dependencies:
          - postgresql
          - redis
          - minio
          - kafka

    - name: api-openreplay
      template: PREBUILT_V2
      spec:
        source:
          image: public.ecr.aws/p1t3u8a3/api:v1.23.0
        ports:
          - id: web
            port: 8080
            type: TCP
        volumes:
          - id: efs
            dir: /mnt/efs
        env:
          AWS_ACCESS_KEY_ID:
            default: ${S3_KEY}
          AWS_SECRET_ACCESS_KEY:
            default: ${S3_SECRET}
          AWS_REGION:
            default: us-east-1
          AWS_ENDPOINT:
            default: "http://${MINIO_HOST}:9000"
          LICENSE_KEY:
            default: ""
          KAFKA_SERVERS:
            default: "kafka.zeabur.internal:9092"
          KAFKA_USE_SSL:
            default: "false"
          pg_password:
            default: ${POSTGRES_PASSWORD}
          POSTGRES_STRING:
            default: "postgres://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/postgres?sslmode=disable"
          REDIS_STRING:
            default: "redis://${REDIS_HOST}:6379"
          JWT_SECRET:
            default: ${JWT_SECRET}
          JWT_SPOT_SECRET:
            default: ${JWT_SPOT_SECRET}
          JWT_REFRESH_SECRET:
            default: ${JWT_REFRESH_SECRET}
          JWT_SPOT_REFRESH_SECRET:
            default: ${JWT_SPOT_REFRESH_SECRET}
          ASSIST_JWT_SECRET:
            default: ${ASSIST_JWT_SECRET}
          ASSIST_KEY:
            default: ${ASSIST_KEY}
          TOKEN_SECRET:
            default: ${TOKEN_SECRET}
          ch_host:
            default: ${CH_HOST}
          ch_port:
            default: "9000"
          ch_port_http:
            default: "8123"
          ch_username:
            default: default
          ch_password:
            default: ""
          CLICKHOUSE_STRING:
            default: "tcp://${CH_HOST}:9000"
          CLICKHOUSE_HTTP_STRING:
            default: "http://${CH_HOST}:8123"
          ASSIST_URL:
            default: "http://${ASSIST_HOST}:9001/assist/%s"
          SITE_URL:
            default: ${ZEABUR_WEB_URL}
          API_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        dependencies:
          - postgresql
          - redis
          - minio
          - clickhouse
          - assist-openreplay
          - kafka

    - name: sourcemapreader-openreplay
      template: PREBUILT_V2
      spec:
        source:
          image: public.ecr.aws/p1t3u8a3/sourcemapreader:v1.23.0
        ports:
          - id: web
            port: 9000
            type: TCP
          - id: metrics
            port: 8888
            type: TCP
        volumes:
          - id: efs
            dir: /mnt/efs
        env:
          SMR_HOST:
            default: "0.0.0.0"
          S3_HOST:
            default: "http://${MINIO_HOST}:9000"
          S3_KEY:
            default: ${S3_KEY}
          S3_SECRET:
            default: ${S3_SECRET}
          AWS_REGION:
            default: us-east-1
          LICENSE_KEY:
            default: ""
          ASSETS_ORIGIN:
            default: "https://${PUBLIC_DOMAIN}/sessions-assets"
          SOURCEMAPREADER_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        dependencies:
          - minio
          - postgresql

    - name: assist-openreplay
      template: PREBUILT_V2
      spec:
        source:
          image: public.ecr.aws/p1t3u8a3/assist:v1.23.0
        ports:
          - id: web
            port: 9001
            type: TCP
          - id: metrics
            port: 8888
            type: TCP
        volumes:
          - id: efs
            dir: /mnt/efs
        env:
          ASSIST_JWT_SECRET:
            default: ${ASSIST_JWT_SECRET}
          ASSIST_KEY:
            default: ${ASSIST_KEY}
          AWS_DEFAULT_REGION:
            default: us-east-1
          REDIS_URL:
            default: ${REDIS_HOST}
          CLEAR_SOCKET_TIME:
            default: "720"
          debug:
            default: "0"
          redis:
            default: "false"
          ASSIST_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        dependencies:
          - postgresql
          - redis

    - name: chalice-openreplay
      template: PREBUILT_V2
      spec:
        source:
          image: public.ecr.aws/p1t3u8a3/chalice:v1.23.0
          command:
            - /bin/sh
            - /opt/zeabur-ns-wrapper.sh
        ports:
          - id: web
            port: 8000
            type: TCP
        volumes:
          - id: efs
            dir: /mnt/efs
        configs:
          - path: /opt/zeabur-ns-wrapper.sh
            permission: 493
            envsubst: false
            template: |
              #!/bin/sh
              # Resolve the k8s namespace from Zeabur's DNS so health.py can reach
              # backend services via their FQDN (e.g. alerts-openreplay.<ns>.zeabur.internal).
              # assist-openreplay has a declared port (9001) so it always has a ClusterIP DNS entry.
              FQDN=$(nslookup assist-openreplay 2>/dev/null | awk '/^Name:/{print $2; exit}')
              if [ -n "$FQDN" ]; then
                export POD_NAMESPACE=$(echo "$FQDN" | cut -d. -f2)
                export CLUSTER_URL=$(echo "$FQDN" | cut -d. -f3-)
              fi
              exec /sbin/tini -- ./entrypoint.sh
        env:
          REDIS_STRING:
            default: "redis://${REDIS_HOST}:6379"
          KAFKA_SERVERS:
            default: "kafka.zeabur.internal:9092"
          ch_username:
            default: default
          ch_password:
            default: ""
          ch_host:
            default: ${CH_HOST}
          ch_port:
            default: "9000"
          ch_port_http:
            default: "8123"
          sourcemaps_reader:
            default: "http://${SOURCEMAPREADER_HOST}:9000/{}/sourcemaps"
          ASSIST_URL:
            default: "http://${ASSIST_HOST}:9001/assist/%s"
          JWT_REFRESH_SECRET:
            default: ${JWT_REFRESH_SECRET}
          JWT_SPOT_REFRESH_SECRET:
            default: ${JWT_SPOT_REFRESH_SECRET}
          ASSIST_JWT_SECRET:
            default: ${ASSIST_JWT_SECRET}
          JWT_SECRET:
            default: ${JWT_SECRET}
          ASSIST_KEY:
            default: ${ASSIST_KEY}
          JWT_SPOT_SECRET:
            default: ${JWT_SPOT_SECRET}
          LICENSE_KEY:
            default: ""
          pg_host:
            default: ${POSTGRES_HOST}
          pg_port:
            default: "5432"
          pg_dbname:
            default: postgres
          pg_user:
            default: postgres
          pg_password:
            default: ${POSTGRES_PASSWORD}
          SITE_URL:
            default: ${OR_SITE_URL}
          S3_HOST:
            default: "http://${MINIO_HOST}:9000"
          S3_KEY:
            default: ${S3_KEY}
          S3_SECRET:
            default: ${S3_SECRET}
          AWS_DEFAULT_REGION:
            default: us-east-1
          sessions_region:
            default: us-east-1
          sessions_bucket:
            default: mobs
          js_cache_bucket:
            default: sessions-assets
          sourcemaps_bucket:
            default: sourcemaps
          ASSIST_RECORDS_BUCKET:
            default: records
          IOS_VIDEO_BUCKET:
            default: mobs
          EMAIL_HOST:
            default: ""
          EMAIL_PORT:
            default: "587"
          EMAIL_USER:
            default: ""
          EMAIL_PASSWORD:
            default: ""
          EMAIL_USE_TLS:
            default: "true"
          EMAIL_USE_SSL:
            default: "false"
          EMAIL_FROM:
            default: "OpenReplay<do-not-reply@openreplay.com>"
          LOGLEVEL:
            default: INFO
          PYTHONUNBUFFERED:
            default: "0"
          JWT_EXPIRATION:
            default: "86400"
          SCIM_ACCESS_SECRET_KEY:
            default: ${PASSWORD}
          SCIM_REFRESH_SECRET_KEY:
            default: ${PASSWORD}
          SCIM_ACCESS_TOKEN_EXPIRE_SECONDS:
            default: "86400"
          root_path:
            default: /api
          CHALICE_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        dependencies:
          - postgresql
          - redis
          - clickhouse
          - sourcemapreader-openreplay
          - assist-openreplay
          - nginx
          - kafka

    - name: integrations-openreplay
      template: PREBUILT_V2
      spec:
        source:
          image: public.ecr.aws/p1t3u8a3/integrations:v1.23.0
        ports:
          - id: web
            port: 8080
            type: TCP
          - id: metrics
            port: 8888
            type: TCP
        volumes:
          - id: efs
            dir: /mnt/efs
        env:
          AWS_ACCESS_KEY_ID:
            default: ${S3_KEY}
          AWS_SECRET_ACCESS_KEY:
            default: ${S3_SECRET}
          AWS_ENDPOINT:
            default: "http://${MINIO_HOST}:9000"
          AWS_REGION:
            default: us-east-1
          BUCKET_NAME:
            default: mobs
          JWT_SECRET:
            default: ${JWT_SECRET}
          LICENSE_KEY:
            default: ""
          KAFKA_SERVERS:
            default: "kafka.zeabur.internal:9092"
          KAFKA_USE_SSL:
            default: "false"
          pg_password:
            default: ${POSTGRES_PASSWORD}
          POSTGRES_STRING:
            default: "postgres://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/postgres?sslmode=disable"
          REDIS_STRING:
            default: "redis://${REDIS_HOST}:6379"
          TOKEN_SECRET:
            default: ${TOKEN_SECRET}
          INTEGRATIONS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        dependencies:
          - postgresql
          - redis
          - minio
          - kafka

    - name: spot-openreplay
      template: PREBUILT_V2
      spec:
        source:
          image: public.ecr.aws/p1t3u8a3/spot:v1.23.0
        ports:
          - id: web
            port: 8080
            type: TCP
        volumes:
          - id: efs
            dir: /mnt/efs
        env:
          CACHE_ASSETS:
            default: "true"
          FS_CLEAN_HRS:
            default: "24"
          TOKEN_SECRET:
            default: ${TOKEN_SECRET}
          AWS_ACCESS_KEY_ID:
            default: ${S3_KEY}
          AWS_SECRET_ACCESS_KEY:
            default: ${S3_SECRET}
          BUCKET_NAME:
            default: spots
          AWS_REGION:
            default: us-east-1
          AWS_ENDPOINT:
            default: "http://${MINIO_HOST}:9000"
          LICENSE_KEY:
            default: ""
          KAFKA_SERVERS:
            default: "kafka.zeabur.internal:9092"
          KAFKA_USE_SSL:
            default: "false"
          JWT_SECRET:
            default: ${JWT_SECRET}
          JWT_SPOT_SECRET:
            default: ${JWT_SPOT_SECRET}
          pg_password:
            default: ${POSTGRES_PASSWORD}
          POSTGRES_STRING:
            default: "postgres://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/postgres?sslmode=disable"
          REDIS_STRING:
            default: "redis://${REDIS_HOST}:6379"
          SPOT_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
        dependencies:
          - postgresql
          - redis
          - minio
          - kafka

    - name: frontend-openreplay
      template: PREBUILT_V2
      spec:
        source:
