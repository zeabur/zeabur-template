# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: AIRI
spec:
    description: |
      AIRI is an open-source AI virtual character platform inspired by Neuro-sama. Features realtime voice chat, 3D character rendering (VRM/Live2D), memory system, and game integration (Minecraft, Factorio). Supports 20+ LLM providers.
    icon: https://raw.githubusercontent.com/moeru-ai/airi/main/apps/stage-web/public/favicon.svg
    tags:
      - AI
      - VTuber
    variables:
      - key: AUTH_GOOGLE_CLIENT_ID
        type: STRING
        name: Google OAuth Client ID
        description: Google OAuth 2.0 Client ID for user authentication. Leave empty to skip Google login.
      - key: AUTH_GOOGLE_CLIENT_SECRET
        type: STRING
        name: Google OAuth Client Secret
        description: Google OAuth 2.0 Client Secret for user authentication. Leave empty to skip Google login.
      - key: AUTH_GITHUB_CLIENT_ID
        type: STRING
        name: GitHub OAuth Client ID
        description: GitHub OAuth Client ID for user authentication. Leave empty to skip GitHub login.
      - key: AUTH_GITHUB_CLIENT_SECRET
        type: STRING
        name: GitHub OAuth Client Secret
        description: GitHub OAuth Client Secret for user authentication. Leave empty to skip GitHub login.
    readme: |
      # AIRI

      [AIRI](https://github.com/moeru-ai/airi) is an open-source AI virtual character platform by [Moeru AI](https://github.com/moeru-ai), inspired by Neuro-sama. Build your own AI companion with realtime voice chat, 3D character rendering, memory, and game integration.

      ## Services

      This template deploys three services:

      | Service | Description |
      |---------|-------------|
      | **stage-web** | Vue 3 frontend SPA with 3D character rendering (VRM/Live2D) |
      | **server** | Hono API server for authentication and memory storage |
      | **db** | PostgreSQL with vchord vector extension for memory search |

      ## Quick Start

      1. After deployment, open the **stage-web** service URL in your browser
      2. Configure your preferred LLM provider API key in the web UI settings
      3. Start chatting with your AI character

      ## OAuth Setup (Optional)

      To enable user login, create OAuth apps and fill in the credentials:

      - **Google**: [Google Cloud Console](https://console.cloud.google.com/apis/credentials) - set redirect URI to `<server-url>/api/auth/callback/google`
      - **GitHub**: [GitHub Developer Settings](https://github.com/settings/developers) - set callback URL to `<server-url>/api/auth/callback/github`

      ## Supported LLM Providers

      OpenAI, Anthropic (Claude), Google Gemini, OpenRouter, Ollama, vLLM, and 20+ more via the xsAI abstraction layer. Configure in the web UI.

      ## Links

      - [GitHub Repository](https://github.com/moeru-ai/airi)
      - [Live Demo](https://airi.moeru.ai)
    services:
      - name: db
        icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
        template: PREBUILT_V2
        spec:
          source:
            image: ghcr.io/tensorchord/vchord-postgres:pg18-v1.0.0
            command:
              - /bin/sh
            args:
              - -c
              - |
                echo 'CREATE EXTENSION IF NOT EXISTS vchord CASCADE;' > /docker-entrypoint-initdb.d/init.sql
                exec docker-entrypoint.sh postgres -c shared_preload_libraries=vchord
          ports:
            - id: database
              port: 5432
              type: TCP
          volumes:
            - id: data
              dir: /var/lib/postgresql
          env:
            POSTGRES_USER:
              default: postgres
              expose: true
            POSTGRES_PASSWORD:
              default: ${PASSWORD}
              expose: true
            POSTGRES_DB:
              default: airi
              expose: true
            POSTGRES_HOST:
              default: ${CONTAINER_HOSTNAME}
              expose: true
              readonly: true
            POSTGRES_PORT:
              default: ${DATABASE_PORT}
              expose: true
              readonly: true
            POSTGRES_CONNECTION_STRING:
              default: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
              expose: true
              readonly: true
      - name: server
        icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/nodejs.svg
        template: GIT
        dependencies:
          - db
        spec:
          source:
            source: GITHUB
            repo: 896924279
            branch: main
            rootDirectory: apps/server
          ports:
            - id: web
              port: 3000
              type: HTTP
          env:
            DATABASE_URL:
              default: ${POSTGRES_CONNECTION_STRING}
              readonly: true
            API_SERVER_URL:
              default: ${ZEABUR_WEB_URL}
              readonly: true
            AUTH_GOOGLE_CLIENT_ID:
              default: ${AUTH_GOOGLE_CLIENT_ID}
            AUTH_GOOGLE_CLIENT_SECRET:
              default: ${AUTH_GOOGLE_CLIENT_SECRET}
            AUTH_GITHUB_CLIENT_ID:
              default: ${AUTH_GITHUB_CLIENT_ID}
            AUTH_GITHUB_CLIENT_SECRET:
              default: ${AUTH_GITHUB_CLIENT_SECRET}
      - name: stage-web
        icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/vue.svg
        template: GIT
        spec:
          source:
            source: GITHUB
            repo: 896924279
            branch: main
            rootDirectory: apps/stage-web
          ports:
            - id: web
              port: 80
              type: HTTP
localization:
  zh-TW:
    description: |
      AIRI 是一個開源 AI 虛擬角色平台，靈感來自 Neuro-sama。支援即時語音聊天、3D 角色渲染（VRM/Live2D）、記憶系統，以及遊戲整合（Minecraft、Factorio）。支援 20+ 種 LLM 供應商。
    variables:
      - key: AUTH_GOOGLE_CLIENT_ID
        name: Google OAuth Client ID
