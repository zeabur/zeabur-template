      - key: AUTH_GOOGLE_CLIENT_SECRET
        name: Google OAuth Client Secret
        description: Google OAuth 2.0 Client Secret，用於使用者登入驗證。留空則跳過 Google 登入。
      - key: AUTH_GITHUB_CLIENT_ID
        name: GitHub OAuth Client ID
        description: GitHub OAuth Client ID，用於使用者登入驗證。留空則跳過 GitHub 登入。
      - key: AUTH_GITHUB_CLIENT_SECRET
        name: GitHub OAuth Client Secret
        description: GitHub OAuth Client Secret，用於使用者登入驗證。留空則跳過 GitHub 登入。
    readme: |
      # AIRI

      [AIRI](https://github.com/moeru-ai/airi) 是由 [Moeru AI](https://github.com/moeru-ai) 開發的開源 AI 虛擬角色平台，靈感來自 Neuro-sama。打造你自己的 AI 夥伴，支援即時語音聊天、3D 角色渲染、記憶系統和遊戲整合。

      ## 服務元件

      此模板會部署三個服務：

      | 服務 | 說明 |
      |------|------|
      | **stage-web** | Vue 3 前端 SPA，含 3D 角色渲染（VRM/Live2D） |
      | **server** | Hono API 後端，處理認證和記憶儲存 |
      | **db** | PostgreSQL + vchord 向量擴展，用於記憶搜尋 |

      ## 快速開始

      1. 部署完成後，打開 **stage-web** 的服務網址
      2. 在網頁設定中填入你偏好的 LLM 供應商 API Key
      3. 開始與你的 AI 角色對話

      ## OAuth 設定（可選）

      如需啟用使用者登入功能，請建立 OAuth 應用程式並填入憑證：

      - **Google**：[Google Cloud Console](https://console.cloud.google.com/apis/credentials) — 將重導向 URI 設為 `<server-url>/api/auth/callback/google`
      - **GitHub**：[GitHub Developer Settings](https://github.com/settings/developers) — 將回呼網址設為 `<server-url>/api/auth/callback/github`

      ## 支援的 LLM 供應商

      OpenAI、Anthropic (Claude)、Google Gemini、OpenRouter、Ollama、vLLM 等 20+ 種供應商，可在網頁介面中設定。

      ## 連結

      - [GitHub 原始碼](https://github.com/moeru-ai/airi)
      - [線上 Demo](https://airi.moeru.ai)
