    readme: |
      # Paperclip

      > **Beta:** Paperclip masih dalam tahap pengembangan awal. Template ini dan perangkat lunaknya mungkin mengalami masalah yang tidak terduga.

      [Paperclip](https://github.com/paperclipai/paperclip) adalah platform orkestrasi untuk mengoordinasikan beberapa agen AI (Claude, Codex, Cursor, OpenClaw, dll.) untuk menjalankan bisnis otonom. Menyediakan server Node.js dengan UI React untuk mengelola tim agen, menetapkan tujuan, melacak pekerjaan, dan memantau biaya.

      ## Memulai

      1. Deploy template dan tunggu layanan dimulai.
      2. Buka **Terminal** Zeabur untuk layanan Paperclip.
      3. Buat akun admin pertama:
         ```
         pnpm paperclipai auth bootstrap-ceo
         ```
      4. Salin URL undangan dari output dan buka di browser untuk mendaftar.
      5. Login ke alat AI pilihan Anda — Codex atau Claude Code (lihat **Autentikasi Agen AI** di bawah).
      6. Saat membuat agen, atur **Working directory** ke path di bawah `/paperclip/` (contoh: `/paperclip/workspaces/my-project`).
      7. Klik **Test now** untuk menjalankan pemeriksaan adapter. Hasil sukses menampilkan `hello probe succeeded`.
      8. Setelah selesai, atur `PAPERCLIP_AUTH_DISABLE_SIGN_UP` menjadi `true` di variabel lingkungan Zeabur untuk mencegah pendaftaran tidak sah.

      ## Autentikasi Agen AI

      Saat ini hanya **login Terminal** yang didukung. Autentikasi variabel lingkungan (OPENAI_API_KEY / ANTHROPIC_API_KEY) belum berfungsi.

      | Alat | Login Terminal |
      |------|----------------|
      | Codex | `gosu node codex login --device-auth` |
      | Claude Code | `gosu node claude login` |

      ### Catatan

      - **Selalu gunakan prefiks `gosu node`** saat menjalankan alat CLI di Terminal. Menjalankan sebagai root akan menyebabkan masalah izin.
      - **Autentikasi perangkat Codex:** Aktifkan "Enable device code authorization for Codex" di [ChatGPT Security Settings](https://chatgpt.com/settings/security) sebelum menjalankan perintah login.
      - **Peringatan `OPENAI_API_KEY is not set`:** Peringatan ini dapat diabaikan dengan aman jika Anda telah melakukan autentikasi melalui `codex login`.

      ## Catatan Penting

      - **Penyimpanan persisten:** Hanya data di bawah `/paperclip/` yang bertahan setelah restart. Semua path lainnya bersifat sementara.
      - **Direktori kerja:** Jangan gunakan `/app` — berisi kode sumber Paperclip dan akan ditimpa saat pembaruan. Selalu gunakan path di bawah `/paperclip/` (persisten).
      - **Kontrol pendaftaran:** Atur `PAPERCLIP_AUTH_DISABLE_SIGN_UP` menjadi `true` setelah membuat akun admin Anda. Ubah sementara ke `false` saat perlu mengundang pengguna baru, lalu kembalikan ke `true`.

      ## Catatan Perubahan

      ### 2026-04-22 — v2026.416.0

      - Image diperbarui ke rilis upstream `v2026.416.0` (`ghcr.io/paperclipai/paperclip:sha-b8725c5`)
      - Baru: Sistem plugin adaptor eksternal dengan parser UI dinamis dan skema konfigurasi deklaratif
      - Baru: Tampilan hierarki issue (ciutkan/perluas, jumlah sub-tugas, status persisten)
      - Baru: Alur voting umpan balik dan jempol untuk evaluasi
      - Baru: Ruang kerja eksekusi dengan kontrol runtime dan tab ruang kerja per proyek
      - Baru: Eksekusi Routine yang sadar ruang kerja
      - Ditingkatkan: Pintasan keyboard ala klien email di kotak masuk dan pembatas "Hari Ini"
      - Ditingkatkan: Tata letak mobile, mode gelap, dan UI override adaptor
      - Keamanan: `BETTER_AUTH_SECRET` dan `PAPERCLIP_AGENT_JWT_SECRET` kini wajib saat startup (template sudah mengaturnya)

      ### 2026-04-07 — v2026.403.0

      - Image diperbarui ke rilis upstream `v2026.403.0` (`ghcr.io/paperclipai/paperclip:sha-a072377`)
      - Beralih dari Docker Hub (`zeabur/paperclip`) ke GitHub Container Registry upstream (`ghcr.io/paperclipai/paperclip`)
      - Path volume persisten diubah dari `/home/node/` ke `/paperclip/`
      - Prefiks perintah CLI diubah dari `runuser -u node --` ke `gosu node`
      - Baru: Relasi blocker/dependency kelas satu dengan pembangunan otomatis saat sub-tugas selesai
      - Ditingkatkan: Penyembunyian token Bearer di log server
      - Ditingkatkan: Onboarding agen CEO dengan path relatif
      - Ditingkatkan: Format otomatis saat tempel markdown di editor inline
      - Berbagai perbaikan untuk routing UI, sidebar, worktree, dan alur agen

      ### 2026-03-30 — v2026.325.0

      - Image diperbarui ke rilis upstream `v2026.325.0` (652 commit sejak v0.3.1)
      - Baru: Tab "Milik Saya" di kotak masuk dengan alur arsip
      - Baru: Dukungan adaptor Hermes
      - Baru: Panel kontrol biaya (tagihan, kuota, manajemen anggaran)
      - Baru: Plugin SDK dengan CRUD dokumen dan event bus
      - Baru: Dukungan Worktree untuk ruang kerja agen terisolasi
      - Baru: Impor/ekspor perusahaan dengan bagan organisasi SVG
      - Ditingkatkan: Tab detail agen direorganisasi (Prompts, Skills, Instructions)
      - Ditingkatkan: Stabilitas Postgres tertanam di Docker
      - Berbagai perbaikan adaptor (Codex, Pi, OpenCode, Cursor)

      ### 2026-03-16 — Rilis Pertama

      - Template Zeabur untuk platform orkestrasi agen AI Paperclip
      - Layanan: PostgreSQL 17 + Paperclip (image siap pakai `zeabur/paperclip`, amd64 + arm64)
      - Skrip startup otomatis menghasilkan `config.json` pada boot pertama
      - Server berjalan sebagai pengguna `node` melalui `runuser` (diperlukan untuk Claude Code CLI)
      - Volume persisten tunggal di `/home/node/`
      - Alat CLI terinstal: `claude-code`, `codex`, `opencode-ai`

