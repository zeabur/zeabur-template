      # Paperclip

      > **ベータ版：** Paperclip は初期開発段階です。このテンプレートとソフトウェアには予期しない問題が発生する可能性があります。

      [Paperclip](https://github.com/paperclipai/paperclip) は、複数のAIエージェント（Claude、Codex、Cursor、OpenClawなど）を協調して自律的なビジネスを運営するためのオーケストレーションプラットフォームです。Node.jsサーバーとReact UIを提供し、エージェントチームの管理、目標の割り当て、作業の追跡、コストの監視を行います。

      ## はじめに

      1. テンプレートをデプロイし、サービスの起動を待ちます。
      2. Zeabur **ターミナル**（Paperclipサービス）を開きます。
      3. 最初の管理者アカウントを作成します：
         ```
         pnpm paperclipai auth bootstrap-ceo
         ```
      4. 出力された招待URLをコピーし、ブラウザで開いて登録します。
      5. お好みのAIツール（Codex または Claude Code）にログインします（下記の **AIエージェント認証** を参照）。
      6. エージェント作成時、**Working directory** を `/paperclip/` 配下のパスに設定します（例：`/paperclip/workspaces/my-project`）。
      7. **Test now** をクリックしてアダプター環境チェックを実行します。成功すると `hello probe succeeded` と表示されます。
      8. セットアップ完了後、Zeabur環境変数の `PAPERCLIP_AUTH_DISABLE_SIGN_UP` を `true` に設定し、不正な登録を防止します。

      ## AIエージェント認証

      現在**ターミナルログイン**のみサポートされています。環境変数認証（OPENAI_API_KEY / ANTHROPIC_API_KEY）はまだ動作しません。

      | ツール | ターミナルログイン |
      |--------|----------------|
      | Codex | `gosu node codex login --device-auth` |
      | Claude Code | `gosu node claude login` |

      ### 注意事項

      - **ターミナルで CLIツールを実行する際は必ず `gosu node` プレフィックスを使用してください。** rootで実行すると権限の問題が発生します。
      - **Codexデバイス認証：** ログインコマンドを実行する前に、[ChatGPT Security Settings](https://chatgpt.com/settings/security) で「Enable device code authorization for Codex」を有効にしてください。
      - **`OPENAI_API_KEY is not set` 警告：** `codex login` で認証済みの場合、この警告は無視して問題ありません。

      ## 重要事項

      - **永続ストレージ：** `/paperclip/` 配下のデータのみ再起動後も保持されます。その他のパスは一時的です。
      - **作業ディレクトリ：** `/app` は使用しないでください。Paperclipのソースコードが含まれており、更新時に上書きされます。必ず `/paperclip/` 配下のパス（永続化）を使用してください。
      - **登録制御：** 管理者アカウント作成後、`PAPERCLIP_AUTH_DISABLE_SIGN_UP` を `true` に設定してください。新しいユーザーを招待する際は一時的に `false` に変更し、完了後 `true` に戻してください。

      ## 変更履歴

      ### 2026-04-22 — v2026.416.0

      - イメージをアップストリームリリース `v2026.416.0` に更新（`ghcr.io/paperclipai/paperclip:sha-b8725c5`）
      - 新機能：動的UIパーサーと宣言的設定スキーマを備えた外部アダプタープラグインシステム
      - 新機能：Issue階層表示（折りたたみ/展開、サブタスク数、状態の永続化）
      - 新機能：評価用のフィードバック投票・サムズキャプチャフロー
      - 新機能：実行ワークスペース（ランタイム制御、プロジェクト単位のワークスペースタブ）
      - 新機能：ワークスペース対応のRoutine実行
      - 改善：受信トレイのメールクライアント風キーボードショートカット、「今日」区切り線
      - 改善：モバイルレイアウト、ダークモード、アダプターオーバーライドUI
      - セキュリティ：`BETTER_AUTH_SECRET` と `PAPERCLIP_AGENT_JWT_SECRET` が起動時に必須となりました（本テンプレートは既に設定済み）

      ### 2026-04-07 — v2026.403.0

      - イメージをアップストリームリリース `v2026.403.0` に更新（`ghcr.io/paperclipai/paperclip:sha-a072377`）
      - Docker Hub（`zeabur/paperclip`）から上流のGitHub Container Registry（`ghcr.io/paperclipai/paperclip`）に切り替え
      - 永続ボリュームのパスを `/home/node/` から `/paperclip/` に変更
      - CLIコマンドのプレフィックスを `runuser -u node --` から `gosu node` に変更
      - 新機能：ファーストクラスのブロッカー/依存関係、サブタスク完了時の自動起動付き
      - 改善：サーバーログ内のBearerトークンの秘匿化
      - 改善：CEOエージェントのオンボーディングを相対パス化
      - 改善：インラインエディタでのmarkdown貼り付けの自動フォーマット
      - UIルーティング、サイドバー、worktree、エージェントフローに関する複数のバグ修正

      ### 2026-03-30 — v2026.325.0

      - イメージをアップストリームリリース `v2026.325.0` に更新（v0.3.1以降652コミット）
      - 新機能：受信トレイ「マイ」タブとアーカイブフロー
      - 新機能：Hermesアダプターサポート
      - 新機能：コスト管理パネル（請求、クォータ、予算管理）
      - 新機能：Plugin SDK（ドキュメントCRUDとイベントバス対応）
      - 新機能：Worktreeサポート（エージェント用の隔離ワークスペース）
      - 新機能：会社インポート/エクスポート（組織図SVG付き）
      - 改善：エージェント詳細タブの再構成（プロンプト、スキル、指示）
      - 改善：Docker内蔵PostgreSQLの安定性向上
      - 複数のアダプター修正（Codex、Pi、OpenCode、Cursor）

      ### 2026-03-16 — 初回リリース

      - Paperclip AIエージェントオーケストレーションプラットフォームのZeaburテンプレート
      - サービス：PostgreSQL 17 + Paperclip（ビルド済みイメージ `zeabur/paperclip`、amd64 + arm64）
      - 起動スクリプトが初回起動時に `config.json` を自動生成
      - サーバーは `runuser` を使用して `node` ユーザーとして実行（Claude Code CLIに必要）
      - `/home/node/` に単一の永続ボリューム
      - プリインストール済みCLIツール：`claude-code`、`codex`、`opencode-ai`

      ## リンク

