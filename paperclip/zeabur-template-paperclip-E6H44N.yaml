    readme: |
      # Paperclip

      > **Beta:** Paperclip está en desarrollo temprano. Esta plantilla y el software pueden presentar problemas inesperados.

      [Paperclip](https://github.com/paperclipai/paperclip) es una plataforma de orquestación para coordinar múltiples agentes de IA (Claude, Codex, Cursor, OpenClaw, etc.) para operar negocios autónomos. Proporciona un servidor Node.js con una interfaz React para gestionar equipos de agentes, asignar objetivos, rastrear trabajo y monitorear costos.

      ## Primeros pasos

      1. Despliegue la plantilla y espere a que el servicio se inicie.
      2. Abra el **Terminal** de Zeabur (servicio Paperclip).
      3. Cree la primera cuenta de administrador:
         ```
         pnpm paperclipai auth bootstrap-ceo
         ```
      4. Copie la URL de invitación de la salida y ábrala en su navegador para registrarse.
      5. Inicie sesión en su herramienta de IA preferida — Codex o Claude Code (consulte **Autenticación de agentes IA** más abajo).
      6. Al crear un agente, establezca **Working directory** en una ruta bajo `/paperclip/` (ej. `/paperclip/workspaces/my-project`).
      7. Haga clic en **Test now** para ejecutar la verificación del adaptador. Un resultado exitoso muestra `hello probe succeeded`.
      8. Después de la configuración, establezca `PAPERCLIP_AUTH_DISABLE_SIGN_UP` en `true` en las variables de entorno de Zeabur para evitar registros no autorizados.

      ## Autenticación de agentes IA

      Actualmente solo se admite **login en Terminal**. La autenticación por variables de entorno (OPENAI_API_KEY / ANTHROPIC_API_KEY) aún no funciona.

      | Herramienta | Login en Terminal |
      |-------------|------------------|
      | Codex | `gosu node codex login --device-auth` |
      | Claude Code | `gosu node claude login` |

      ### Notas

      - **Use siempre el prefijo `gosu node`** al ejecutar herramientas CLI en el Terminal. Ejecutar como root causará problemas de permisos.
      - **Autenticación de dispositivo Codex:** Habilite "Enable device code authorization for Codex" en [ChatGPT Security Settings](https://chatgpt.com/settings/security) antes de ejecutar el comando de inicio de sesión.
      - **Advertencia `OPENAI_API_KEY is not set`:** Esta advertencia puede ignorarse de forma segura si se autenticó mediante `codex login`.

      ## Notas importantes

      - **Almacenamiento persistente:** Solo los datos bajo `/paperclip/` sobreviven a los reinicios. Todas las demás rutas son efímeras.
      - **Directorio de trabajo:** No use `/app` — contiene el código fuente de Paperclip y se sobrescribirá en actualizaciones. Use siempre rutas bajo `/paperclip/` (persistente).
      - **Control de registro:** Establezca `PAPERCLIP_AUTH_DISABLE_SIGN_UP` en `true` después de crear su cuenta de administrador. Cambie temporalmente a `false` cuando necesite invitar nuevos usuarios, luego vuelva a `true`.

      ## Registro de cambios

      ### 2026-04-22 — v2026.416.0

      - Imagen actualizada a la versión upstream `v2026.416.0` (`ghcr.io/paperclipai/paperclip:sha-b8725c5`)
      - Nuevo: Sistema de plugins de adaptadores externos con parsers UI dinámicos y esquemas de configuración declarativos
      - Nuevo: Visualización de jerarquía de issues (contraer/expandir, conteo de subtareas, estado persistido)
      - Nuevo: Flujo de votación y captura con pulgar para evaluaciones
      - Nuevo: Espacios de trabajo de ejecución con controles de runtime y pestaña por proyecto
      - Nuevo: Ejecuciones de Routine conscientes del workspace
      - Mejorado: Atajos de teclado estilo cliente de correo en la bandeja de entrada y divisor "Hoy"
      - Mejorado: Diseños móviles, modo oscuro e interfaz de override de adaptadores
      - Seguridad: `BETTER_AUTH_SECRET` y `PAPERCLIP_AGENT_JWT_SECRET` son ahora estrictamente requeridos al inicio (la plantilla ya los establece)

      ### 2026-04-07 — v2026.403.0

      - Imagen actualizada a la versión upstream `v2026.403.0` (`ghcr.io/paperclipai/paperclip:sha-a072377`)
      - Migración desde Docker Hub (`zeabur/paperclip`) al GitHub Container Registry upstream (`ghcr.io/paperclipai/paperclip`)
      - Ruta del volumen persistente cambiada de `/home/node/` a `/paperclip/`
      - Prefijo de comandos CLI cambiado de `runuser -u node --` a `gosu node`
      - Nuevo: Relaciones de primera clase de bloqueadores/dependencias con reactivación al completar subtareas
      - Mejorado: Ocultación de tokens Bearer en los logs del servidor
      - Mejorado: Onboarding del agente CEO con rutas relativas
      - Mejorado: Formato automático al pegar markdown en el editor en línea
      - Múltiples correcciones en enrutamiento UI, barra lateral, worktree y flujos de agentes

      ### 2026-03-30 — v2026.325.0

      - Imagen actualizada a la versión upstream `v2026.325.0` (652 commits desde v0.3.1)
      - Nuevo: Pestaña "Mío" en la bandeja de entrada con flujo de archivo
      - Nuevo: Soporte para adaptador Hermes
      - Nuevo: Panel de control de costos (facturación, cuotas, gestión de presupuesto)
      - Nuevo: Plugin SDK con CRUD de documentos y bus de eventos
      - Nuevo: Soporte Worktree para espacios de trabajo aislados de agentes
      - Nuevo: Importación/exportación de empresas con organigrama SVG
      - Mejorado: Pestañas de detalle de agente reorganizadas (Prompts, Skills, Instructions)
      - Mejorado: Estabilidad de Postgres embebido en Docker
      - Múltiples correcciones de adaptadores (Codex, Pi, OpenCode, Cursor)

      ### 2026-03-16 — Lanzamiento inicial

      - Plantilla de Zeabur para la plataforma de orquestación de agentes IA Paperclip
      - Servicios: PostgreSQL 17 + Paperclip (imagen preconstruida `zeabur/paperclip`, amd64 + arm64)
      - El script de inicio genera automáticamente `config.json` en el primer arranque
      - El servidor se ejecuta como usuario `node` mediante `runuser` (requerido para Claude Code CLI)
      - Un único volumen persistente en `/home/node/`
      - Herramientas CLI preinstaladas: `claude-code`, `codex`, `opencode-ai`

      ## Enlaces

      - [Documentación](https://docs.paperclip.ing/start/what-is-paperclip)
      - [GitHub](https://github.com/paperclipai/paperclip)
