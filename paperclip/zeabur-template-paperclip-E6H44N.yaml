# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Paperclip
spec:
  description: |
    An orchestration platform for coordinating multiple AI agents to run autonomous businesses. Manages agent teams, assigns goals, tracks work, and monitors costs from a central dashboard.
  icon: https://raw.githubusercontent.com/paperclipai/paperclip/master/ui/public/android-chrome-192x192.png
  coverImage: https://raw.githubusercontent.com/paperclipai/paperclip/master/doc/assets/header.png
  tags:
    - AI
    - Agent
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: The domain to access Paperclip dashboard
  readme: |
    # Paperclip

    > **Beta:** Paperclip is in early development. This template and the software may have unexpected issues.

    [Paperclip](https://github.com/paperclipai/paperclip) is an orchestration platform for coordinating multiple AI agents (Claude, Codex, Cursor, OpenClaw, etc.) to run autonomous businesses. It provides a Node.js server with a React UI that manages agent teams, assigns goals, tracks work, and monitors costs from a central dashboard.

    ## Getting Started

    1. Deploy the template and wait for the service to start.
    2. Open the Zeabur **Terminal** for the Paperclip service.
    3. Create the first admin account:
       ```
       gosu node pnpm paperclipai auth bootstrap-ceo
       ```
    4. Copy the invite URL from the output and open it in your browser to register.
    5. Configure AI agent authentication (see **AI Agent Authentication** below).
    6. When creating an agent, set **Working directory** to a path under `/paperclip/` (e.g. `/paperclip/workspaces/my-project`).
    7. Click **Test now** to run the adapter environment check. A successful result shows `hello probe succeeded`.
    8. After setup, set `PAPERCLIP_AUTH_DISABLE_SIGN_UP` to `true` in Zeabur environment variables to prevent unauthorized signups.

    ## AI Agent Authentication

    **Option 1: Environment variables (recommended)**

    Set these in Zeabur environment variables:

    | Tool | Environment Variable |
    |------|---------------------|
    | Claude Code | `ANTHROPIC_API_KEY` |
    | Codex | `OPENAI_API_KEY` |

    **Option 2: Terminal login**

    Open the Zeabur Terminal and run:

    | Tool | Terminal Login |
    |------|----------------|
    | Claude Code | `gosu node claude login` |
    | Codex | `gosu node codex login --device-auth` |

    ### Notes

    - **Always use `gosu node` prefix** when running CLI tools in Terminal. The terminal runs as root, but credentials must be stored under the `node` user's home (`/paperclip/`) to persist and be accessible by the server.
    - **Codex device auth:** Enable "Enable device code authorization for Codex" in [ChatGPT Security Settings](https://chatgpt.com/settings/security) before running the login command.

    ## Important Notes

    - **Persistent storage:** Only data under `/paperclip/` survives restarts. All other paths are ephemeral.
    - **Working directory:** Do not use `/app` — it contains the Paperclip source code and will be overwritten on updates. Always use paths under `/paperclip/` which is persistent.
    - **Sign-up control:** Set `PAPERCLIP_AUTH_DISABLE_SIGN_UP` to `true` after creating your admin account. Temporarily set to `false` when you need to invite new users, then set back to `true`.

    ## Changelog

    ### 2026-04-22 — v2026.416.0

    - Updated image to upstream release `v2026.416.0` (`ghcr.io/paperclipai/paperclip:sha-b8725c5`)
    - New: External adapter plugin system with dynamic UI parsers and declarative config schemas
    - New: Issue hierarchy display with collapse/expand, sub-task counts, and persisted state
    - New: Feedback voting and thumbs-capture flow for evals
    - New: Execution workspaces with runtime controls and per-project workspace tab
    - New: Workspace-aware routine runs
    - Improved: Inbox mail-client keyboard shortcuts and "Today" divider
    - Improved: Mobile layouts, dark mode, and adapter override UI
    - Security: `BETTER_AUTH_SECRET` and `PAPERCLIP_AGENT_JWT_SECRET` are now strictly required at startup (template already sets these)

    ### 2026-04-07 — v2026.403.0

    - Updated image to upstream release `v2026.403.0` (`ghcr.io/paperclipai/paperclip:sha-a072377`)
    - Switched from Docker Hub (`zeabur/paperclip`) to upstream GitHub Container Registry (`ghcr.io/paperclipai/paperclip`)
    - Changed persistent volume path from `/home/node/` to `/paperclip/`
    - Switched CLI command prefix from `runuser -u node --` to `gosu node`
    - New: First-class blocker/dependency relations with wake-on-subtasks-done
    - Improved: Bearer token redaction in server logs
    - Improved: CEO agent onboarding with relative paths
    - Improved: Markdown paste auto-formatting in inline editor
    - Many bug fixes for UI routing, sidebar, worktree, and agent workflows

    ### 2026-03-30 — v2026.325.0

    - Updated image to upstream release `v2026.325.0` (652 commits since v0.3.1)
    - New: Inbox "Mine" tab with archive flow
    - New: Hermes adapter support
    - New: Cost control plane with billing, quota, and budget management
    - New: Plugin SDK with document CRUD and event bus
    - New: Worktree support for isolated agent workspaces
    - New: Company import/export with org chart SVG
    - Improved: Agent detail tabs reorganized (Prompts, Skills, Instructions)
    - Improved: Embedded Postgres reliability in Docker
    - Many bug fixes for adapters (Codex, Pi, OpenCode, Cursor)

    ### 2026-03-16 — Initial Release

    - Zeabur template for Paperclip AI agent orchestration platform
    - Services: PostgreSQL 17 + Paperclip (prebuilt image `zeabur/paperclip`, amd64 + arm64)
    - Startup script auto-generates `config.json` on first boot
    - Server runs as `node` user via `runuser` (required for Claude Code CLI)
    - Single persistent volume at `/home/node/`
    - Pre-installed CLI tools: `claude-code`, `codex`, `opencode-ai`

    ## Links

    - [Documentation](https://docs.paperclip.ing/start/what-is-paperclip)
    - [GitHub](https://github.com/paperclipai/paperclip)
  services:
    - name: postgresql
      icon: https://cdn.zeabur.com/marketplace/postgresql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:17-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_USER:
            default: paperclip
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_DB:
            default: paperclip
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true

          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true

          POSTGRES_CONNECTION_STRING:
            default: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
            expose: true

    - name: paperclip
      icon: https://raw.githubusercontent.com/paperclipai/paperclip/master/ui/public/android-chrome-192x192.png
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - postgresql
      spec:
        source:
          image: ghcr.io/paperclipai/paperclip:sha-b8725c5
          command:
            - /bin/sh
            - -c
            - /opt/paperclip/init.sh
        ports:
          - id: web
            port: 3100
            type: HTTP
        volumes:
          - id: paperclip
            dir: /paperclip
        configs:
          - path: /opt/paperclip/init.sh
            permission: 493
            template: |
              #!/bin/sh
              set -e
              CONFIG="/paperclip/instances/default/config.json"
              if [ ! -f "$CONFIG" ]; then
                mkdir -p "$(dirname "$CONFIG")"
                cat > "$CONFIG" <<'CONF'
              { "$meta": { "version": 1, "updatedAt": "2026-01-01T00:00:00.000Z", "source": "onboard" }, "database": { "mode": "postgres" }, "logging": { "mode": "file" }, "server": { "deploymentMode": "authenticated", "exposure": "private", "host": "0.0.0.0", "port": 3100, "serveUi": true } }
              CONF
                echo "Generated $CONFIG"
              fi
              chown -R node:node /paperclip
              exec gosu node node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
        env:
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}
          PAPERCLIP_PUBLIC_URL:
            default: ${ZEABUR_WEB_URL}
          BETTER_AUTH_BASE_URL:
            default: ${ZEABUR_WEB_URL}
          BETTER_AUTH_SECRET:
            default: ${PASSWORD}
          PAPERCLIP_AGENT_JWT_SECRET:
            default: ${PASSWORD}
          PAPERCLIP_MIGRATION_AUTO_APPLY:
            default: "true"
          PAPERCLIP_AUTH_DISABLE_SIGN_UP:
            default: "false"
localization:
  zh-TW:
    description: |
      AI 多代理協調平台，用於管理多個 AI 代理自主運營業務。提供團隊管理、目標分配、工作追蹤和成本監控的集中儀表板。
    variables:
      - key: PUBLIC_DOMAIN
        name: 網域
        description: 存取 Paperclip 儀表板的網域
    readme: |
      # Paperclip

      > **測試版：** Paperclip 仍處於早期開發階段。此模板和軟體可能會有無法預期的問題。

      [Paperclip](https://github.com/paperclipai/paperclip) 是一個 AI 多代理協調平台，用於協調多個 AI 代理（Claude、Codex、Cursor、OpenClaw 等）自主運營業務。提供 Node.js 伺服器搭配 React UI，管理代理團隊、分配目標、追蹤工作並監控成本。

      ## 開始使用

      1. 部署模板並等待服務啟動。
      2. 開啟 Zeabur **指令**（Paperclip 服務）。
      3. 建立第一個管理員帳號：
         ```
         pnpm paperclipai auth bootstrap-ceo
         ```
      4. 複製輸出的邀請連結，在瀏覽器中開啟並註冊。
      5. 登入您偏好的 AI 工具 — Codex 或 Claude Code（請參閱下方 **AI 代理認證**）。
      6. 建立代理時，將 **Working directory** 設定為 `/paperclip/` 下的路徑（例如 `/paperclip/workspaces/my-project`）。
      7. 點擊 **Test now** 執行適配器環境檢查。成功結果會顯示 `hello probe succeeded`。
      8. 設定完成後，將 Zeabur 環境變數 `PAPERCLIP_AUTH_DISABLE_SIGN_UP` 設為 `true` 以禁止未授權的註冊。

      ## AI 代理認證

      目前僅支援**指令登入**。環境變數認證（OPENAI_API_KEY / ANTHROPIC_API_KEY）尚無法使用。

      | 工具 | 指令登入 |
      |------|--------|
      | Codex | `gosu node codex login --device-auth` |
      | Claude Code | `gosu node claude login` |

      ### 注意事項

      - **請務必使用 `gosu node` 前綴**執行指令中的 CLI 工具。以 root 執行會導致權限問題。
      - **Codex 裝置驗證：** 執行登入指令前，請先至 [ChatGPT Security Settings](https://chatgpt.com/settings/security) 開啟「Enable device code authorization for Codex」。
      - **`OPENAI_API_KEY is not set` 警告：** 如果您已透過 `codex login` 驗證，可以安全忽略此警告。

      ## 重要事項

      - **持久化儲存：** 僅 `/paperclip/` 下的資料在重啟後保留。其他路徑皆為暫存。
      - **工作目錄：** 請勿使用 `/app`——該路徑包含 Paperclip 原始碼，更新時會被覆蓋。請使用 `/paperclip/` 下的路徑（持久化）。
      - **註冊控管：** 建立管理員帳號後，將 `PAPERCLIP_AUTH_DISABLE_SIGN_UP` 設為 `true`。需要邀請新使用者時暫時設為 `false`，完成後再改回 `true`。

      ## 變更紀錄

      ### 2026-04-22 — v2026.416.0

      - 更新映像至上游版本 `v2026.416.0`（`ghcr.io/paperclipai/paperclip:sha-b8725c5`）
      - 新增：外部適配器插件系統，支援動態 UI 解析器與宣告式設定 schema
      - 新增：議題層級顯示（可摺疊、子任務計數、狀態持久化）
      - 新增：回饋投票與評估用的拇指投票流程
      - 新增：執行工作區，支援執行階段控制與專案工作區分頁
      - 新增：工作區感知的 Routine 執行
      - 改進：收件匣郵件客戶端式鍵盤快捷鍵與「今天」分隔線
      - 改進：行動版版型、深色模式、適配器覆寫 UI
      - 安全性：`BETTER_AUTH_SECRET` 與 `PAPERCLIP_AGENT_JWT_SECRET` 啟動時現為必要（本模板已預設）

      ### 2026-04-07 — v2026.403.0

      - 更新映像至上游版本 `v2026.403.0`（`ghcr.io/paperclipai/paperclip:sha-a072377`）
      - 從 Docker Hub（`zeabur/paperclip`）切換至上游 GitHub Container Registry（`ghcr.io/paperclipai/paperclip`）
      - 持久化磁碟路徑由 `/home/node/` 改為 `/paperclip/`
      - CLI 指令前綴由 `runuser -u node --` 改為 `gosu node`
      - 新增：一級阻礙/依賴關係支援，子任務完成時自動喚醒
      - 改進：伺服器 log 中的 Bearer token 遮罩
      - 改進：CEO 代理 onboarding 改用相對路徑
      - 改進：行內編輯器貼上 markdown 自動格式化
      - 多項 UI 路由、側邊欄、worktree 及代理流程的錯誤修正

      ### 2026-03-30 — v2026.325.0

      - 更新映像至上游版本 `v2026.325.0`（自 v0.3.1 以來 652 個 commit）
      - 新增：收件匣「我的」分頁與封存流程
      - 新增：Hermes 適配器支援
      - 新增：成本控制面板（帳務、配額、預算管理）
      - 新增：Plugin SDK，支援文件 CRUD 與事件匯流排
      - 新增：Worktree 支援，提供隔離的代理工作區
      - 新增：公司匯入/匯出，含組織圖 SVG
      - 改進：代理詳情分頁重整（提示詞、技能、指令）
      - 改進：Docker 中嵌入式 Postgres 穩定性
      - 多項適配器修正（Codex、Pi、OpenCode、Cursor）

      ### 2026-03-16 — 首次發佈

      - Paperclip AI 代理協調平台的 Zeabur 模板
      - 服務：PostgreSQL 17 + Paperclip（預建映像 `zeabur/paperclip`，amd64 + arm64）
      - 啟動腳本在首次啟動時自動產生 `config.json`
      - 伺服器透過 `runuser` 以 `node` 使用者身份執行（Claude Code CLI 所需）
      - 單一持久化磁碟掛載於 `/home/node/`
      - 預裝 CLI 工具：`claude-code`、`codex`、`opencode-ai`

      ## 連結

      - [官方文件](https://docs.paperclip.ing/start/what-is-paperclip)
      - [GitHub](https://github.com/paperclipai/paperclip)
