      # Paperclip

      > **ベータ版：** このテンプレートは開発中であり、予期しない問題が発生する可能性があります。最新情報は[公式ドキュメント](https://docs.paperclip.ing/start/what-is-paperclip)をご覧ください。

      [Paperclip](https://github.com/paperclipai/paperclip) は、複数のAIエージェント（Claude、Codex、Cursor、OpenClawなど）を協調して自律的なビジネスを運営するためのオーケストレーションプラットフォームです。Node.jsサーバーとReact UIを提供し、エージェントチームの管理、目標の割り当て、作業の追跡、コストの監視を行います。

      ## はじめに

