# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Paperclip
spec:
  description: |
    An orchestration platform for coordinating multiple AI agents to run autonomous businesses. Manages agent teams, assigns goals, tracks work, and monitors costs from a central dashboard.
  icon: https://raw.githubusercontent.com/paperclipai/paperclip/master/ui/public/favicon.svg
  coverImage: https://raw.githubusercontent.com/paperclipai/paperclip/master/ui/public/android-chrome-512x512.png
  tags:
    - AI
    - Agent
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: The domain to access Paperclip dashboard
  readme: |
    # Paperclip

    > **Beta:** This template is under active development and may have unexpected issues. For the latest information, see the [official documentation](https://docs.paperclip.ing/start/what-is-paperclip).

    [Paperclip](https://github.com/paperclipai/paperclip) is an orchestration platform for coordinating multiple AI agents (Claude, Codex, Cursor, OpenClaw, etc.) to run autonomous businesses. It provides a Node.js server with a React UI that manages agent teams, assigns goals, tracks work, and monitors costs from a central dashboard.

    ## Getting Started

    1. Deploy the template and wait for the service to start.
    2. Open the Zeabur **Terminal** for the Paperclip service.
    3. Create the first admin account:
       ```
       pnpm paperclipai auth bootstrap-ceo
       ```
    4. Copy the invite URL from the output and open it in your browser to register.
    5. Login to your preferred AI tool — Codex or Claude Code (see **AI Agent Authentication** below).
    6. When creating an agent, set **Working directory** to a path under `/home/node/` (e.g. `/home/node/workspaces/my-project`).
    7. Click **Test now** to run the adapter environment check. A successful result shows `hello probe succeeded`.
    8. After setup, set `PAPERCLIP_AUTH_DISABLE_SIGN_UP` to `true` in Zeabur environment variables to prevent unauthorized signups.

    ## AI Agent Authentication

    Two options: environment variable or terminal login.

    | Adapter | Environment Variable | Terminal Login |
    |---------|---------------------|----------------|
    | Codex | `OPENAI_API_KEY` | `runuser -u node -- codex login --device-auth` |
    | Claude Code | `ANTHROPIC_API_KEY` | `runuser -u node -- claude login` |

    ### Notes

    - **Always use `runuser -u node --` prefix** when running CLI tools in Terminal. Running as root will cause permission issues.
    - **Codex device auth:** Enable "Enable device code authorization for Codex" in [ChatGPT Security Settings](https://chatgpt.com/settings/security) before running the login command.
    - **`OPENAI_API_KEY is not set` warning:** This warning can be safely ignored if you authenticated via `codex login`.

    ## Important Notes

    - **Persistent storage:** Only data under `/home/node/` survives restarts. All other paths are ephemeral.
    - **Working directory:** Do not use `/app` — it contains the Paperclip source code and will be overwritten on updates. Always use paths under `/home/node/` which is persistent.
    - **Sign-up control:** Set `PAPERCLIP_AUTH_DISABLE_SIGN_UP` to `true` after creating your admin account. Temporarily set to `false` when you need to invite new users, then set back to `true`.

    ## Changelog

    ### 2026-03-16 — Initial Release

    - Zeabur template for Paperclip AI agent orchestration platform
    - Services: PostgreSQL 17 + Paperclip (prebuilt image `zeabur/paperclip`, amd64 + arm64)
    - Startup script auto-generates `config.json` on first boot
    - Server runs as `node` user via `runuser` (required for Claude Code CLI)
    - Single persistent volume at `/home/node/`
    - Pre-installed CLI tools: `claude-code`, `codex`, `opencode-ai`
  services:
    - name: postgresql
      icon: https://cdn.zeabur.com/marketplace/postgresql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:17-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_USER:
            default: paperclip
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_DB:
            default: paperclip
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true

          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true

          POSTGRES_CONNECTION_STRING:
            default: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
            expose: true

    - name: paperclip
      icon: https://raw.githubusercontent.com/paperclipai/paperclip/master/ui/public/favicon.svg
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - postgresql
      spec:
        source:
          image: zeabur/paperclip:latest
          command:
            - /bin/sh
            - -c
            - /opt/paperclip/startup.sh
        ports:
          - id: web
            port: 3100
            type: HTTP
        volumes:
          - id: home
            dir: /home/node
        configs:
          - path: /opt/paperclip/startup.sh
            permission: 493
            template: |
              #!/bin/sh
              H="/home/node"
              CONFIG_PATH="$H/instances/default/config.json"
              if [ ! -f "$CONFIG_PATH" ]; then
                mkdir -p "$(dirname "$CONFIG_PATH")"
                cat > "$CONFIG_PATH" <<'CONF'
              {
                "$meta": {
                  "version": 1,
                  "updatedAt": "2026-01-01T00:00:00.000Z",
                  "source": "onboard"
                },
                "database": {
                  "mode": "postgres",
                  "embeddedPostgresPort": 54329,
                  "backup": {
                    "enabled": true,
                    "intervalMinutes": 60,
                    "retentionDays": 30,
                    "dir": "/home/node/instances/default/data/backups"
                  }
                },
                "logging": {
                  "mode": "file",
                  "logDir": "/home/node/instances/default/logs"
                },
                "server": {
                  "deploymentMode": "authenticated",
                  "exposure": "private",
                  "host": "0.0.0.0",
                  "port": 3100,
                  "allowedHostnames": [],
                  "serveUi": true
                },
                "auth": {
                  "baseUrlMode": "auto",
                  "disableSignUp": false
                },
                "storage": {
                  "provider": "local_disk",
                  "localDisk": {
                    "baseDir": "/home/node/instances/default/data/storage"
                  },
                  "s3": {
                    "bucket": "paperclip",
                    "region": "us-east-1",
                    "prefix": "",
                    "forcePathStyle": false
                  }
                },
                "secrets": {
                  "provider": "local_encrypted",
                  "strictMode": false,
                  "localEncrypted": {
                    "keyFilePath": "/home/node/instances/default/secrets/master.key"
                  }
                }
              }
              CONF
                echo "Generated config.json at $CONFIG_PATH"
              fi
              # Fix permissions and run as node user (required for Claude Code)
              chown -R node:node "$H"
              exec runuser -u node -- node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
        env:
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}

          PORT:
            default: "3100"
          HOST:
            default: 0.0.0.0
          SERVE_UI:
            default: "true"
          PAPERCLIP_HOME:
            default: /home/node
          PAPERCLIP_CONFIG:
            default: /home/node/instances/default/config.json
          PAPERCLIP_DEPLOYMENT_MODE:
            default: authenticated
          PAPERCLIP_DEPLOYMENT_EXPOSURE:
            default: private
          PAPERCLIP_PUBLIC_URL:
            default: ${ZEABUR_WEB_URL}

          BETTER_AUTH_SECRET:
            default: ${PASSWORD}
          PAPERCLIP_AGENT_JWT_SECRET:
            default: ${PASSWORD}
          PAPERCLIP_MIGRATION_AUTO_APPLY:
            default: "true"
          NODE_ENV:
            default: production
          PAPERCLIP_AUTH_DISABLE_SIGN_UP:
            default: "false"
localization:
  zh-TW:
    description: |
      AI 多代理協調平台，用於管理多個 AI 代理自主運營業務。提供團隊管理、目標分配、工作追蹤和成本監控的集中儀表板。
    variables:
      - key: PUBLIC_DOMAIN
        name: 網域
        description: 存取 Paperclip 儀表板的網域
    readme: |
      # Paperclip

      > **測試版：** 此模板仍在積極開發中，可能會有無法預期的問題。最新資訊請參閱[官方文件](https://docs.paperclip.ing/start/what-is-paperclip)。

      [Paperclip](https://github.com/paperclipai/paperclip) 是一個 AI 多代理協調平台，用於協調多個 AI 代理（Claude、Codex、Cursor、OpenClaw 等）自主運營業務。提供 Node.js 伺服器搭配 React UI，管理代理團隊、分配目標、追蹤工作並監控成本。

      ## 開始使用

      1. 部署模板並等待服務啟動。
      2. 開啟 Zeabur **Terminal**（Paperclip 服務）。
      3. 建立第一個管理員帳號：
         ```
         pnpm paperclipai auth bootstrap-ceo
         ```
      4. 複製輸出的邀請連結，在瀏覽器中開啟並註冊。
      5. 登入您偏好的 AI 工具 — Codex 或 Claude Code（請參閱下方 **AI 代理認證**）。
      6. 建立代理時，將 **Working directory** 設定為 `/home/node/` 下的路徑（例如 `/home/node/workspaces/my-project`）。
      7. 點擊 **Test now** 執行適配器環境檢查。成功結果會顯示 `hello probe succeeded`。
      8. 設定完成後，將 Zeabur 環境變數 `PAPERCLIP_AUTH_DISABLE_SIGN_UP` 設為 `true` 以禁止未授權的註冊。

      ## AI 代理認證

      兩種方式：環境變數或 Terminal 登入。

      | 適配器 | 環境變數 | Terminal 登入 |
      |--------|---------|--------------|
      | Codex | `OPENAI_API_KEY` | `runuser -u node -- codex login --device-auth` |
      | Claude Code | `ANTHROPIC_API_KEY` | `runuser -u node -- claude login` |

      ### 注意事項

      - **請務必使用 `runuser -u node --` 前綴**執行 Terminal 中的 CLI 工具。以 root 執行會導致權限問題。
      - **Codex 裝置驗證：** 執行登入指令前，請先至 [ChatGPT Security Settings](https://chatgpt.com/settings/security) 開啟「Enable device code authorization for Codex」。
      - **`OPENAI_API_KEY is not set` 警告：** 如果您已透過 `codex login` 驗證，可以安全忽略此警告。

      ## 重要事項

      - **持久化儲存：** 僅 `/home/node/` 下的資料在重啟後保留。其他路徑皆為暫存。
      - **工作目錄：** 請勿使用 `/app`——該路徑包含 Paperclip 原始碼，更新時會被覆蓋。請使用 `/home/node/` 下的路徑（持久化）。
      - **註冊控管：** 建立管理員帳號後，將 `PAPERCLIP_AUTH_DISABLE_SIGN_UP` 設為 `true`。需要邀請新使用者時暫時設為 `false`，完成後再改回 `true`。

      ## 變更紀錄

      ### 2026-03-16 — 首次發佈

      - Paperclip AI 代理協調平台的 Zeabur 模板
      - 服務：PostgreSQL 17 + Paperclip（預建映像 `zeabur/paperclip`，amd64 + arm64）
      - 啟動腳本在首次啟動時自動產生 `config.json`
      - 伺服器透過 `runuser` 以 `node` 使用者身份執行（Claude Code CLI 所需）
      - 單一持久化磁碟掛載於 `/home/node/`
      - 預裝 CLI 工具：`claude-code`、`codex`、`opencode-ai`
