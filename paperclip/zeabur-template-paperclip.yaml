      ## AIエージェント認証

      2つの方法：環境変数またはTerminalログイン。

      | アダプター | 環境変数 | Terminalログイン |
      |-----------|---------|----------------|
      | Codex | `OPENAI_API_KEY` | `runuser -u node -- codex login --device-auth` |
      | Claude Code | `ANTHROPIC_API_KEY` | `runuser -u node -- claude login` |

      ### 注意事項

      - **Terminalで CLIツールを実行する際は必ず `runuser -u node --` プレフィックスを使用してください。** rootで実行すると権限の問題が発生します。
      - **Codexデバイス認証：** ログインコマンドを実行する前に、[ChatGPT Security Settings](https://chatgpt.com/settings/security) で「Enable device code authorization for Codex」を有効にしてください。
