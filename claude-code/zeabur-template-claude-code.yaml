# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Claude Code
spec:
  description: |
    Anthropic's AI coding agent CLI running as a persistent developer workstation. Connect via Zeabur Terminal to use Claude Code for code generation, editing, debugging, and git operations.
  icon: https://cdn.zeabur.com/marketplace/claude-code.svg
  tags:
    - AI
    - Developer Tools
  readme: |
    # Claude Code

    [Claude Code](https://docs.anthropic.com/en/docs/claude-code) is Anthropic's official AI-powered coding agent CLI. It understands your codebase, generates and edits code, runs commands, and helps with complex development tasks -- all from the command line.

    This template deploys Claude Code as a persistent developer workstation on Zeabur. There is no web UI; you interact with it entirely through the Zeabur Terminal.

    ## Getting Started

    1. **Set your API key:** Before deploying, set the `ANTHROPIC_API_KEY` environment variable in Zeabur to your Anthropic API key. You can obtain one from [console.anthropic.com](https://console.anthropic.com/).
    2. **Deploy the template** and wait for the service to start.
    3. **Open the Zeabur Terminal** for the Claude Code service.
    4. **Start using Claude Code:**
       ```
       runuser -u node -- claude
       ```

    ## Using Zeabur AI Hub (Optional)

    If you want to use [Zeabur AI Hub](https://zeabur.com/ai) instead of a direct Anthropic API key:

    1. Set `ANTHROPIC_BASE_URL` to your Zeabur AI Hub endpoint (e.g., `https://ai.hub.zeabur.com`).
    2. Set `ANTHROPIC_API_KEY` to your Zeabur AI Hub token.

    This allows you to manage API usage and billing through Zeabur's unified AI gateway.

    ## Important: Running Commands in Terminal

    The container runs as `root` by default, but Claude Code must run as the `node` user. **Always prefix your commands with `runuser -u node --`** when using the Zeabur Terminal:

    ```bash
    # Start Claude Code interactive mode
    runuser -u node -- claude

    # Check Claude Code version
    runuser -u node -- claude --version

    # Log in to Anthropic (alternative to API key)
    runuser -u node -- claude login

    # Run a one-shot command
    runuser -u node -- claude -p "explain this project"
    ```

    Running commands as `root` directly will cause permission issues with Claude Code's configuration files.

    ## Common Commands

    | Command | Description |
    |---------|-------------|
    | `claude` | Start interactive Claude Code session |
    | `claude -p "prompt"` | Run a one-shot prompt |
    | `claude login` | Authenticate with Anthropic |
    | `claude --version` | Check installed version |
    | `claude config` | View or modify configuration |

    ## Persistent Storage

    The `/home/node` directory is mounted as a persistent volume. All your projects, Claude Code configuration, and session data stored under `/home/node` will survive service restarts and redeployments.

    **Recommended workflow:**
    - Clone repositories into `/home/node/projects/`
    - Your Claude Code settings are stored in `/home/node/.claude/`

    ## Environment Variables

    | Variable | Required | Description |
    |----------|----------|-------------|
    | `ANTHROPIC_API_KEY` | Yes | Your Anthropic API key or Zeabur AI Hub token |
    | `ANTHROPIC_BASE_URL` | No | Custom API endpoint (set this for Zeabur AI Hub) |

    ## Changelog

    ### 2026-03-17 -- Initial Release

    - Zeabur template for Claude Code developer workstation
    - Prebuilt image `zeabur/claude-code:latest`
    - Persistent volume at `/home/node`
    - Startup script with proper `node` user permissions
    - Support for direct Anthropic API and Zeabur AI Hub

    ## Links

    - [Claude Code Documentation](https://docs.anthropic.com/en/docs/claude-code)
    - [Anthropic Console](https://console.anthropic.com/)
    - [Zeabur AI Hub](https://zeabur.com/ai)
  services:
    - name: claude-code
      icon: https://cdn.zeabur.com/marketplace/claude-code.svg
      template: PREBUILT_V2
      spec:
        source:
          image: zeabur/claude-code:latest
          command:
            - /bin/sh
            - -c
            - /opt/startup.sh
        volumes:
          - id: home
            dir: /home/node
        configs:
          - path: /opt/startup.sh
            permission: 493
            template: |
              #!/bin/sh
              chown -R node:node /home/node
              exec runuser -u node -- sleep infinity
        env:
          ANTHROPIC_API_KEY:
            default: ""
          ANTHROPIC_BASE_URL:
            default: ""
localization:
  zh-TW:
    description: |
      Anthropic 的 AI 程式設計代理 CLI，以持久化開發者工作站形式運行。透過 Zeabur 指令連線使用 Claude Code 進行程式碼生成、編輯、除錯和 Git 操作。
    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) 是 Anthropic 官方的 AI 程式設計代理 CLI。它能理解您的程式碼庫、生成和編輯程式碼、執行命令，並協助完成複雜的開發任務——全部透過命令列完成。

      此模板將 Claude Code 部署為 Zeabur 上的持久化開發者工作站。沒有網頁介面，您完全透過 Zeabur 指令與其互動。

      ## 開始使用

      1. **設定 API 金鑰：** 部署前，在 Zeabur 環境變數中設定 `ANTHROPIC_API_KEY` 為您的 Anthropic API 金鑰。可從 [console.anthropic.com](https://console.anthropic.com/) 取得。
      2. **部署模板**並等待服務啟動。
      3. **開啟 Zeabur 指令**（Claude Code 服務）。
      4. **開始使用 Claude Code：**
         ```
         runuser -u node -- claude
         ```

      ## 使用 Zeabur AI Hub（選用）

      如果您想使用 [Zeabur AI Hub](https://zeabur.com/ai) 而非直接使用 Anthropic API 金鑰：

      1. 將 `ANTHROPIC_BASE_URL` 設定為您的 Zeabur AI Hub 端點（例如 `https://ai.hub.zeabur.com`）。
      2. 將 `ANTHROPIC_API_KEY` 設定為您的 Zeabur AI Hub Token。

      ## 重要：在指令中執行命令

      容器預設以 `root` 身份執行，但 Claude Code 必須以 `node` 使用者執行。**在 Zeabur 指令中請務必使用 `runuser -u node --` 前綴：**

      ```bash
      # 啟動 Claude Code 互動模式
      runuser -u node -- claude

      # 檢查版本
      runuser -u node -- claude --version

      # 登入 Anthropic（API 金鑰的替代方案）
      runuser -u node -- claude login

      # 執行單次命令
      runuser -u node -- claude -p "解釋這個專案"
      ```

      以 `root` 直接執行命令會導致 Claude Code 設定檔的權限問題。

      ## 常用命令

      | 命令 | 說明 |
      |------|------|
      | `claude` | 啟動互動式 Claude Code 工作階段 |
      | `claude -p "提示"` | 執行單次提示 |
      | `claude login` | 驗證 Anthropic 帳號 |
      | `claude --version` | 檢查已安裝版本 |
      | `claude config` | 檢視或修改設定 |

      ## 持久化儲存

      `/home/node` 目錄掛載為持久化磁碟。所有儲存在 `/home/node` 下的專案、Claude Code 設定和工作階段資料，在服務重啟和重新部署後都會保留。

      **建議工作流程：**
      - 將程式碼庫複製到 `/home/node/projects/`
      - Claude Code 設定儲存在 `/home/node/.claude/`

      ## 環境變數

      | 變數 | 必填 | 說明 |
      |------|------|------|
      | `ANTHROPIC_API_KEY` | 是 | 您的 Anthropic API 金鑰或 Zeabur AI Hub Token |
      | `ANTHROPIC_BASE_URL` | 否 | 自訂 API 端點（使用 Zeabur AI Hub 時設定） |

      ## 變更紀錄

      ### 2026-03-17 — 首次發佈

      - Claude Code 開發者工作站的 Zeabur 模板
      - 預建映像 `zeabur/claude-code:latest`
      - `/home/node` 持久化磁碟
      - 啟動腳本自動設定 `node` 使用者權限
      - 支援直接 Anthropic API 和 Zeabur AI Hub

      ## 連結

      - [Claude Code 官方文件](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
