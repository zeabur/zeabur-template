    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) は Anthropic 公式の AI コーディングエージェント CLI です。コードベースを理解し、コードの生成・編集、コマンドの実行、複雑な開発タスクの支援をすべてコマンドラインから行います。

      このテンプレートは Claude Code を Zeabur 上の永続的な開発者ワークステーションとしてデプロイします。Web UI はありません。Zeabur ターミナルを通じてすべての操作を行います。

      ## はじめに

      1. **API キーを設定：** デプロイ前に、Zeabur 環境変数で `ANTHROPIC_API_KEY` を Anthropic API キーに設定してください。[console.anthropic.com](https://console.anthropic.com/) から取得できます。
      2. **テンプレートをデプロイ**し、サービスの起動を待ちます。
      3. **Zeabur ターミナルを開きます**（Claude Code サービス）。
      4. **Claude Code の使用を開始：**
         ```
         runuser -u node -- claude
         ```

      ## Zeabur AI Hub の使用（オプション）

      [Zeabur AI Hub](https://zeabur.com/ai) を直接の Anthropic API キーの代わりに使用する場合：

      1. `ANTHROPIC_BASE_URL` を Zeabur AI Hub エンドポイントに設定します（例：`https://ai.hub.zeabur.com`）。
      2. `ANTHROPIC_API_KEY` を Zeabur AI Hub トークンに設定します。

      ## 重要：ターミナルでのコマンド実行

      コンテナはデフォルトで `root` として実行されますが、Claude Code は `node` ユーザーで実行する必要があります。**Zeabur ターミナルでは必ず `runuser -u node --` プレフィックスを使用してください：**

      ```bash
      # Claude Code インタラクティブモードを起動
      runuser -u node -- claude

      # バージョンを確認
      runuser -u node -- claude --version

      # Anthropic にログイン（API キーの代替）
      runuser -u node -- claude login

      # ワンショットコマンドを実行
      runuser -u node -- claude -p "このプロジェクトを説明して"
      ```

      `root` で直接コマンドを実行すると、Claude Code の設定ファイルの権限問題が発生します。

      ## よく使うコマンド

      | コマンド | 説明 |
      |----------|------|
      | `claude` | インタラクティブな Claude Code セッションを起動 |
      | `claude -p "プロンプト"` | ワンショットプロンプトを実行 |
      | `claude login` | Anthropic アカウントで認証 |
      | `claude --version` | インストール済みバージョンを確認 |
      | `claude config` | 設定を表示・変更 |

      ## 永続ストレージ

      `/home/node` ディレクトリは永続ボリュームとしてマウントされています。`/home/node` 配下に保存されたプロジェクト、Claude Code の設定、セッションデータはすべてサービスの再起動や再デプロイ後も保持されます。

      **推奨ワークフロー：**
      - リポジトリを `/home/node/projects/` にクローン
      - Claude Code の設定は `/home/node/.claude/` に保存されます

      ## 環境変数

      | 変数 | 必須 | 説明 |
      |------|------|------|
      | `ANTHROPIC_API_KEY` | はい | Anthropic API キーまたは Zeabur AI Hub トークン |
      | `ANTHROPIC_BASE_URL` | いいえ | カスタム API エンドポイント（Zeabur AI Hub 使用時に設定） |

      ## 変更履歴

      ### 2026-03-17 — 初回リリース

      - Claude Code 開発者ワークステーションの Zeabur テンプレート
      - ビルド済みイメージ `zeabur/claude-code:latest`
      - `/home/node` の永続ボリューム
      - 起動スクリプトで `node` ユーザー権限を自動設定
      - Anthropic API 直接接続と Zeabur AI Hub の両方をサポート

      ## リンク

      - [Claude Code 公式ドキュメント](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
  es-ES:
    description: |
      CLI del agente de programacion IA de Anthropic ejecutandose como estacion de trabajo persistente para desarrolladores. Conectese a traves del Terminal de Zeabur para usar Claude Code para generar, editar, depurar codigo y realizar operaciones Git.
    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) es el agente de programacion CLI oficial de Anthropic. Comprende su base de codigo, genera y edita codigo, ejecuta comandos y ayuda con tareas de desarrollo complejas, todo desde la linea de comandos.

      Esta plantilla despliega Claude Code como una estacion de trabajo persistente para desarrolladores en Zeabur. No hay interfaz web; la interaccion es completamente a traves del Terminal de Zeabur.

      ## Primeros pasos

      1. **Configure su clave API:** Antes de desplegar, establezca la variable de entorno `ANTHROPIC_API_KEY` en Zeabur con su clave API de Anthropic. Puede obtenerla en [console.anthropic.com](https://console.anthropic.com/).
      2. **Despliegue la plantilla** y espere a que el servicio se inicie.
      3. **Abra el Terminal de Zeabur** (servicio Claude Code).
      4. **Comience a usar Claude Code:**
         ```
         runuser -u node -- claude
         ```

      ## Uso de Zeabur AI Hub (Opcional)

      Si desea usar [Zeabur AI Hub](https://zeabur.com/ai) en lugar de una clave API directa de Anthropic:

      1. Establezca `ANTHROPIC_BASE_URL` a su endpoint de Zeabur AI Hub (ej. `https://ai.hub.zeabur.com`).
      2. Establezca `ANTHROPIC_API_KEY` a su token de Zeabur AI Hub.

      ## Importante: Ejecucion de comandos en Terminal

      El contenedor se ejecuta como `root` por defecto, pero Claude Code debe ejecutarse como usuario `node`. **Siempre use el prefijo `runuser -u node --` en el Terminal de Zeabur:**

      ```bash
      # Iniciar modo interactivo de Claude Code
      runuser -u node -- claude

      # Verificar version
      runuser -u node -- claude --version

      # Iniciar sesion en Anthropic (alternativa a clave API)
      runuser -u node -- claude login

      # Ejecutar un comando unico
      runuser -u node -- claude -p "explica este proyecto"
      ```

      Ejecutar comandos directamente como `root` causara problemas de permisos con los archivos de configuracion de Claude Code.

      ## Comandos comunes

      | Comando | Descripcion |
      |---------|-------------|
      | `claude` | Iniciar sesion interactiva de Claude Code |
      | `claude -p "prompt"` | Ejecutar un prompt unico |
      | `claude login` | Autenticarse con Anthropic |
      | `claude --version` | Verificar version instalada |
      | `claude config` | Ver o modificar configuracion |

      ## Almacenamiento persistente

      El directorio `/home/node` esta montado como un volumen persistente. Todos los proyectos, configuracion de Claude Code y datos de sesion almacenados en `/home/node` se mantendran tras reinicios y redespliegues.

      **Flujo de trabajo recomendado:**
      - Clone repositorios en `/home/node/projects/`
      - La configuracion de Claude Code se almacena en `/home/node/.claude/`

      ## Variables de entorno

      | Variable | Requerida | Descripcion |
      |----------|-----------|-------------|
      | `ANTHROPIC_API_KEY` | Si | Su clave API de Anthropic o token de Zeabur AI Hub |
      | `ANTHROPIC_BASE_URL` | No | Endpoint API personalizado (configurar para Zeabur AI Hub) |

      ## Registro de cambios

      ### 2026-03-17 -- Lanzamiento inicial

      - Plantilla de Zeabur para estacion de trabajo Claude Code
      - Imagen preconstruida `zeabur/claude-code:latest`
      - Volumen persistente en `/home/node`
      - Script de inicio con permisos de usuario `node`
      - Soporte para API directa de Anthropic y Zeabur AI Hub

      ## Enlaces

      - [Documentacion de Claude Code](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
  id-ID:
    description: |
      CLI agen pemrograman AI dari Anthropic yang berjalan sebagai workstation pengembang persisten. Hubungkan melalui Terminal Zeabur untuk menggunakan Claude Code dalam pembuatan, pengeditan, debugging kode, dan operasi Git.
    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) adalah CLI agen pemrograman AI resmi dari Anthropic. Ia memahami basis kode Anda, menghasilkan dan mengedit kode, menjalankan perintah, dan membantu tugas pengembangan kompleks -- semuanya dari baris perintah.

      Template ini men-deploy Claude Code sebagai workstation pengembang persisten di Zeabur. Tidak ada antarmuka web; Anda berinteraksi sepenuhnya melalui Terminal Zeabur.

      ## Memulai

      1. **Atur kunci API:** Sebelum deploy, atur variabel lingkungan `ANTHROPIC_API_KEY` di Zeabur dengan kunci API Anthropic Anda. Dapatkan di [console.anthropic.com](https://console.anthropic.com/).
      2. **Deploy template** dan tunggu layanan dimulai.
      3. **Buka Terminal Zeabur** (layanan Claude Code).
      4. **Mulai menggunakan Claude Code:**
         ```
         runuser -u node -- claude
         ```

      ## Menggunakan Zeabur AI Hub (Opsional)

      Jika Anda ingin menggunakan [Zeabur AI Hub](https://zeabur.com/ai) alih-alih kunci API Anthropic langsung:

      1. Atur `ANTHROPIC_BASE_URL` ke endpoint Zeabur AI Hub Anda (misalnya `https://ai.hub.zeabur.com`).
      2. Atur `ANTHROPIC_API_KEY` ke token Zeabur AI Hub Anda.

      ## Penting: Menjalankan Perintah di Terminal

      Container berjalan sebagai `root` secara default, tetapi Claude Code harus dijalankan sebagai pengguna `node`. **Selalu gunakan prefiks `runuser -u node --` di Terminal Zeabur:**

      ```bash
      # Mulai mode interaktif Claude Code
      runuser -u node -- claude

      # Periksa versi
      runuser -u node -- claude --version

      # Login ke Anthropic (alternatif kunci API)
      runuser -u node -- claude login

      # Jalankan perintah sekali
      runuser -u node -- claude -p "jelaskan proyek ini"
      ```

      Menjalankan perintah langsung sebagai `root` akan menyebabkan masalah izin pada file konfigurasi Claude Code.

      ## Perintah Umum

      | Perintah | Deskripsi |
      |----------|-----------|
      | `claude` | Mulai sesi interaktif Claude Code |
      | `claude -p "prompt"` | Jalankan prompt sekali |
      | `claude login` | Autentikasi dengan Anthropic |
      | `claude --version` | Periksa versi terinstal |
      | `claude config` | Lihat atau ubah konfigurasi |

      ## Penyimpanan Persisten

      Direktori `/home/node` di-mount sebagai volume persisten. Semua proyek, konfigurasi Claude Code, dan data sesi yang disimpan di `/home/node` akan bertahan setelah restart dan redeploy layanan.

      **Alur kerja yang disarankan:**
      - Clone repositori ke `/home/node/projects/`
      - Konfigurasi Claude Code disimpan di `/home/node/.claude/`

      ## Variabel Lingkungan

      | Variabel | Wajib | Deskripsi |
      |----------|-------|-----------|
      | `ANTHROPIC_API_KEY` | Ya | Kunci API Anthropic atau token Zeabur AI Hub Anda |
      | `ANTHROPIC_BASE_URL` | Tidak | Endpoint API kustom (atur untuk Zeabur AI Hub) |

