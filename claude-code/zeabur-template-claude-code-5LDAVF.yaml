  ja-JP:
    description: |
      Anthropic の AI コーディングエージェント CLI を永続的な開発者ワークステーションとして実行。Zeabur ターミナルから接続し、Claude Code でコード生成、編集、デバッグ、Git 操作を行えます。
    variables:
