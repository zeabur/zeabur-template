    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) adalah CLI agen pemrograman AI resmi dari Anthropic. Ia memahami basis kode Anda, menghasilkan dan mengedit kode, menjalankan perintah, dan membantu tugas pengembangan kompleks -- semuanya dari baris perintah.

      Template ini men-deploy Claude Code sebagai workstation pengembang persisten di Zeabur, dengan terminal web (ttyd) yang dapat diakses dari browser.

      ## Memulai

      1. **Deploy template** dan tunggu layanan dimulai. Boot pertama menginstal Claude Code dan plugin channel secara otomatis — tunggu hingga health check berwarna hijau sebelum melanjutkan.
      2. **Buka URL layanan** di browser Anda (domain yang terikat ke layanan).
      3. **Login** — masukkan password dari tab **Instructions** di dashboard Zeabur.
      4. **Pilih opsi** — centang fitur yang dibutuhkan (seperti lewati izin, channel Telegram/Discord).
      5. **Masukkan Bot Token** (jika menggunakan channel) — tempel di kolom input yang muncul.
      6. **Salin perintah** dan klik **Enter Terminal**.
      7. **Autentikasi Claude Code** — tempel perintah, lalu ikuti petunjuk untuk login dengan langganan Claude Pro/Max/Team/Enterprise Anda.

      ## Channel (Telegram / Discord)

      Fitur channel memungkinkan Anda mengobrol dengan Claude Code dari ponsel melalui Telegram atau Discord, sementara ia mengoperasikan file Anda di server.

      ### Langkah Pengaturan

      1. **Buat bot** — Untuk Telegram gunakan [BotFather](https://t.me/BotFather), untuk Discord buka [Developer Portal](https://discord.com/developers/applications) (aktifkan Message Content Intent, undang bot ke server dengan izin kirim pesan).
      2. **Pilih channel di halaman landing** dan tempel Bot Token.
      3. **Salin dan jalankan perintah di terminal** — channel akan dimulai secara otomatis.
      4. **Pasangkan akun** — kirim pesan langsung ke bot Anda, Anda akan menerima kode pairing. Jalankan `/discord:access pair <code>` atau `/telegram:access pair <code>` di Claude Code.
      5. **Kunci akses** — jalankan `/discord:access policy allowlist` atau `/telegram:access policy allowlist` agar hanya Anda yang bisa mengirim pesan.

      Setelah dipasangkan, Anda dapat mengobrol dengan Claude melalui Telegram/Discord. Bot Token disimpan di browser dan tidak perlu dimasukkan ulang.

      ### Catatan

      - Channel memerlukan langganan Claude Pro/Max/Team/Enterprise (tidak bisa menggunakan API key).
      - Bot Token diteruskan sebagai variabel lingkungan dalam perintah (misalnya `DISCORD_BOT_TOKEN=xxx claude ...`), **tidak disimpan di server**.
      - Channel adalah [fitur eksperimental](https://code.claude.com/docs/en/channels) Claude Code.

      ## Menggunakan API Key (Opsional)

      Jika Anda lebih memilih autentikasi API key daripada langganan:

      1. Atur `ANTHROPIC_API_KEY` ke kunci API Anthropic Anda dari [console.anthropic.com](https://console.anthropic.com/).
      2. Opsional atur `ANTHROPIC_BASE_URL` untuk menggunakan [Zeabur AI Hub](https://zeabur.com/ai) (misalnya `https://ai.hub.zeabur.com`).

      ## Perintah Umum

      | Perintah | Deskripsi |
      |----------|-----------|
      | `claude` | Mulai sesi interaktif Claude Code |
      | `claude -p "prompt"` | Jalankan prompt sekali |
      | `claude login` | Autentikasi dengan Anthropic |
      | `claude --version` | Periksa versi terinstal |
      | `claude config` | Lihat atau ubah konfigurasi |

      ## Penyimpanan Persisten

      Direktori `/home/node` di-mount sebagai volume persisten. Semua proyek, konfigurasi Claude Code, dan data sesi yang disimpan di `/home/node` akan bertahan setelah restart dan redeploy layanan.

      **Alur kerja yang disarankan:**
      - Clone repositori ke `/home/node/projects/`
      - Konfigurasi Claude Code disimpan di `/home/node/.claude/`

      ## Variabel Lingkungan

      | Variabel | Wajib | Deskripsi |
      |----------|-------|-----------|
      | `ANTHROPIC_API_KEY` | Tidak | Kunci API Anthropic atau token Zeabur AI Hub (hanya diperlukan jika tidak menggunakan login langganan) |
      | `ANTHROPIC_BASE_URL` | Tidak | Endpoint API kustom (atur untuk Zeabur AI Hub) |
      | `WEB_TERMINAL_PASSWORD` | Otomatis | Password login terminal web (dibuat otomatis, dapat dilihat di dashboard) |

      ## Sumber Daya yang Direkomendasikan (Persyaratan Resmi)
      - **Minimum**: 1 vCPU / 4 GB RAM
      - **Disarankan**: 2 vCPU / 4 GB RAM

      Persyaratan resmi Claude Code adalah RAM 4 GB+. Pemrosesan AI dilakukan di API Anthropic, sehingga secara lokal hanya menjalankan CLI Node.js dan alat shell, dengan kebutuhan CPU yang minimal.

      ## Catatan Perubahan

      ### 2026-04-02 -- Dukungan Channel & Desain Ulang Halaman Landing

      - Halaman landing didesain ulang dengan pembangun perintah berbasis checkbox
      - Dukungan channel: Telegram, Discord (via `--channels`)
      - Plugin channel terpasang otomatis dengan `CLAUDE_CODE_PLUGIN_SEED_DIR`
      - Runtime Bun terpasang otomatis (dependensi plugin channel)
      - Input Bot Token di halaman landing (sebagai variabel lingkungan dalam perintah)

      ### 2026-03-31 -- Rilis Pertama

      - Terminal web ttyd (autentikasi password)
      - Installer native Claude Code (instalasi otomatis saat boot pertama)
      - Homebrew dan paket npm global disimpan persisten di volume
      - Persyaratan sumber daya dan binding domain

      ## Tautan

      - [Dokumentasi Claude Code](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
