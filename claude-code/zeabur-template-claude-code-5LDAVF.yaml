    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) es el agente de programacion CLI oficial de Anthropic. Comprende su base de codigo, genera y edita codigo, ejecuta comandos y ayuda con tareas de desarrollo complejas, todo desde la linea de comandos.

      Esta plantilla despliega Claude Code como una estacion de trabajo persistente para desarrolladores en Zeabur, con un terminal web (ttyd) accesible desde el navegador.

      ## Primeros pasos

      1. **Despliegue la plantilla** y espere a que el servicio se inicie. La primera vez instala Claude Code y los plugins de canales automaticamente — espere hasta que el health check se ponga verde antes de continuar.
      2. **Abra la URL del servicio** en su navegador (el dominio vinculado al servicio).
      3. **Inicie sesion** — ingrese la contrasena de la pestana **Instructions** en el panel de Zeabur.
      4. **Seleccione opciones** — marque las funciones que necesite (como omitir permisos, canal Telegram/Discord).
      5. **Ingrese el Bot Token** (si usa canales) — peguelo en el campo de entrada que aparece.
      6. **Copie el comando** y haga clic en **Enter Terminal**.
      7. **Autentique Claude Code** — pegue el comando y siga las indicaciones para iniciar sesion con su suscripcion Claude Pro/Max/Team/Enterprise.

      ## Canales (Telegram / Discord)

      Los canales le permiten chatear con Claude Code desde su telefono a traves de Telegram o Discord, mientras opera sus archivos en el servidor.

      ### Pasos de configuracion

      1. **Cree un bot** — Para Telegram use [BotFather](https://t.me/BotFather), para Discord vaya al [Developer Portal](https://discord.com/developers/applications) (habilite Message Content Intent e invite al bot al servidor con permiso de enviar mensajes).
      2. **Seleccione el canal en la pagina de inicio** y pegue el Bot Token.
      3. **Copie y ejecute el comando en la terminal** — el canal se inicia automaticamente.
      4. **Vincule su cuenta** — envie un mensaje directo a su bot, recibira un codigo de vinculacion. Ejecute `/discord:access pair <code>` o `/telegram:access pair <code>` en Claude Code.
      5. **Bloquee el acceso** — ejecute `/discord:access policy allowlist` o `/telegram:access policy allowlist` para asegurar que solo usted pueda enviar mensajes.

      Una vez vinculado, puede chatear con Claude a traves de Telegram/Discord. El Bot Token se guarda en el navegador y no necesita reingresarlo.

      ### Notas

      - Los canales requieren suscripcion Claude Pro/Max/Team/Enterprise (no funcionan con clave API).
      - El Bot Token se pasa como variable de entorno en el comando (ej. `DISCORD_BOT_TOKEN=xxx claude ...`), **no se almacena en el servidor**.
      - Los canales son una [funcion experimental](https://code.claude.com/docs/en/channels) de Claude Code.

      ## Usar clave API (Opcional)

      Si prefiere autenticacion por clave API en lugar de suscripcion:

      1. Configure `ANTHROPIC_API_KEY` con su clave API de Anthropic de [console.anthropic.com](https://console.anthropic.com/).
      2. Opcionalmente configure `ANTHROPIC_BASE_URL` para usar [Zeabur AI Hub](https://zeabur.com/ai) (ej. `https://ai.hub.zeabur.com`).

      ## Comandos comunes

      | Comando | Descripcion |
      |---------|-------------|
      | `claude` | Iniciar sesion interactiva de Claude Code |
      | `claude -p "prompt"` | Ejecutar un prompt unico |
      | `claude login` | Autenticarse con Anthropic |
      | `claude --version` | Verificar version instalada |
      | `claude config` | Ver o modificar configuracion |

      ## Almacenamiento persistente

      El directorio `/home/node` esta montado como un volumen persistente. Todos los proyectos, configuracion de Claude Code y datos de sesion almacenados en `/home/node` se mantendran tras reinicios y redespliegues.

      **Flujo de trabajo recomendado:**
      - Clone repositorios en `/home/node/projects/`
      - La configuracion de Claude Code se almacena en `/home/node/.claude/`

      ## Variables de entorno

      | Variable | Requerida | Descripcion |
      |----------|-----------|-------------|
      | `ANTHROPIC_API_KEY` | No | Clave API de Anthropic o token de Zeabur AI Hub (solo necesaria si no usa login por suscripcion) |
      | `ANTHROPIC_BASE_URL` | No | Endpoint API personalizado (configurar para Zeabur AI Hub) |
      | `WEB_TERMINAL_PASSWORD` | Auto | Contrasena del terminal web (generada automaticamente, visible en el panel) |

      ## Recursos Recomendados (Requisitos Oficiales)
      - **Minimo**: 1 vCPU / 4 GB RAM
      - **Recomendado**: 2 vCPU / 4 GB RAM

      El requisito oficial de Claude Code es 4 GB+ de RAM. El procesamiento de IA se realiza en la API de Anthropic, por lo que localmente solo se ejecuta el CLI de Node.js y herramientas de shell, con requisitos minimos de CPU.

      ## Registro de cambios

      ### 2026-04-02 -- Soporte de canales y rediseno de pagina de inicio

      - Pagina de inicio rediseñada con constructor de comandos basado en checkboxes
      - Soporte de canales: Telegram, Discord (via `--channels`)
      - Plugins de canales preinstalados con `CLAUDE_CODE_PLUGIN_SEED_DIR`
      - Runtime Bun preinstalado (dependencia de plugins de canales)
      - Entrada de Bot Token en la pagina de inicio (como variable de entorno en el comando)

      ### 2026-03-31 -- Lanzamiento inicial

      - Terminal web ttyd (autenticacion por contrasena)
      - Instalador nativo de Claude Code (instalacion automatica en primer inicio)
      - Homebrew y paquetes npm globales persistidos en volumen
      - Requisitos de recursos y vinculacion de dominio

      ## Enlaces

      - [Documentacion de Claude Code](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
