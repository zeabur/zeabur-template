# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Claude Code
spec:
  description: |
    Anthropic's AI coding agent CLI running as a persistent developer workstation. Connect via Zeabur Terminal to use Claude Code for code generation, editing, debugging, and git operations.
  icon: https://cdn-console.zeabur.com/f/WpysO/claude-color.webp
  coverImage: https://cdn-console.zeabur.com/f/w7XH6/claude-code-coverimage.png
  tags:
    - AI
    - Developer Tools
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: The domain for accessing the web terminal (e.g. my-claude-code)
  resourceRequirement:
    minConfig:
      cpu: 1
      ram: 4
    recommendedConfig:
      cpu: 2
      ram: 4
  readme: |
    # Claude Code

    [Claude Code](https://docs.anthropic.com/en/docs/claude-code) is Anthropic's official AI-powered coding agent CLI. It understands your codebase, generates and edits code, runs commands, and helps with complex development tasks -- all from the command line.

    This template deploys Claude Code as a persistent developer workstation on Zeabur with a web-based terminal (ttyd) accessible from your browser.

    ## Getting Started

    1. **Deploy the template** and wait for the service to start. The first boot installs Claude Code automatically — wait until the health check turns green before proceeding.
    2. **Open the service URL** in your browser (the domain bound to your service).
    3. **Log in** with username `user` and the password from the **Instructions** tab on the Zeabur dashboard.
    4. **Authenticate Claude Code** — run `claude` and follow the login prompts to sign in with your Claude Pro/Max/Team/Enterprise subscription.

    ## Using API Key (Optional)

    If you prefer API key authentication instead of a subscription:

    1. Set `ANTHROPIC_API_KEY` to your Anthropic API key from [console.anthropic.com](https://console.anthropic.com/).
    2. Optionally set `ANTHROPIC_BASE_URL` to use [Zeabur AI Hub](https://zeabur.com/ai) (e.g., `https://ai.hub.zeabur.com`).

    ## Common Commands

    | Command | Description |
    |---------|-------------|
    | `claude` | Start interactive Claude Code session |
    | `claude -p "prompt"` | Run a one-shot prompt |
    | `claude login` | Authenticate with Anthropic |
    | `claude --version` | Check installed version |
    | `claude config` | View or modify configuration |

    ## Persistent Storage

    The `/home/node` directory is mounted as a persistent volume. All your projects, Claude Code configuration, and session data stored under `/home/node` will survive service restarts and redeployments.

    **Recommended workflow:**
    - Clone repositories into `/home/node/projects/`
    - Your Claude Code settings are stored in `/home/node/.claude/`

    ## Environment Variables

    | Variable | Required | Description |
    |----------|----------|-------------|
    | `ANTHROPIC_API_KEY` | No | Anthropic API key or Zeabur AI Hub token (only needed if not using subscription login) |
    | `ANTHROPIC_BASE_URL` | No | Custom API endpoint (set this for Zeabur AI Hub) |
    | `WEB_TERMINAL_PASSWORD` | Auto | Password for web terminal login (auto-generated, visible in dashboard) |

    ## Recommended Resources (Official Requirements)
    - **Minimum**: 1 vCPU / 4 GB RAM
    - **Recommended**: 2 vCPU / 4 GB RAM

    Claude Code's official system requirement is 4 GB+ RAM. AI processing happens on the Anthropic API side, so locally it only runs the Node.js CLI and shell tools, keeping CPU requirements low.

    ## Changelog

    ### 2026-03-30 -- Initial Release

    - ttyd web terminal with password auth
    - Claude Code native installer (auto-installed on first boot)
    - Resource requirements, domain binding, and health check

    ## Links

    - [Claude Code Documentation](https://docs.anthropic.com/en/docs/claude-code)
    - [Anthropic Console](https://console.anthropic.com/)
    - [Zeabur AI Hub](https://zeabur.com/ai)
  services:
    - name: claude-code
      icon: https://cdn-console.zeabur.com/f/WpysO/claude-color.webp
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: zeabur/claude-code:latest
          command:
            - /bin/sh
            - -c
            - /opt/startup.sh
        ports:
          - id: web
            port: 7681
            type: HTTP
        healthCheck:
            type: TCP
            port: web
        volumes:
          - id: home
            dir: /home/node
        configs:
          - path: /opt/startup.sh
            permission: 493
            template: |
              #!/bin/sh
              chown -R node:node /home/node

              # First boot setup (persisted in volume)
              if [ ! -f /home/node/.profile_initialized ]; then
                runuser -u node -- bash -c 'cat >> ~/.profile << "EOPROFILE"
              # Claude Code
              export PATH="$HOME/.local/bin:$PATH"
              # npm global packages
              export NPM_CONFIG_PREFIX="$HOME/.npm-global"
              export PATH="$HOME/.npm-global/bin:$PATH"
              # Homebrew
              [ -d "$HOME/.linuxbrew" ] && eval "$($HOME/.linuxbrew/bin/brew shellenv)"
              EOPROFILE'
                touch /home/node/.profile_initialized

                # Install Claude Code
                runuser -u node -- bash -c 'curl -fsSL https://claude.ai/install.sh | bash'

                # Install Homebrew
                runuser -u node -- bash -c 'NONINTERACTIVE=1 HOMEBREW_PREFIX=$HOME/.linuxbrew /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
              fi

              exec ttyd \
                --port 7681 \
                --writable \
                --credential "user:$WEB_TERMINAL_PASSWORD" \
                runuser -u node -- bash -l
        env:
          ANTHROPIC_API_KEY:
            default: ""
          ANTHROPIC_BASE_URL:
            default: ""
          WEB_TERMINAL_PASSWORD:
            default: ${PASSWORD}
            expose: true
        instructions:
          - type: TEXT
            title: Username
            content: user
            category: Credentials
          - type: PASSWORD
            title: Password
            content: ${WEB_TERMINAL_PASSWORD}
            category: Credentials
          - type: TEXT
            title: Start Claude Code (full permissions)
            content: claude --dangerously-skip-permissions
            category: Usage
localization:
  zh-TW:
    description: |
      Anthropic 的 AI 程式設計代理 CLI，以持久化開發者工作站形式運行。透過 Zeabur 指令連線使用 Claude Code 進行程式碼生成、編輯、除錯和 Git 操作。
    variables:
      - key: PUBLIC_DOMAIN
        name: 網域
        description: 用來存取 Web 終端機的網域（例如 my-claude-code）
    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) 是 Anthropic 官方的 AI 程式設計代理 CLI。它能理解您的程式碼庫、生成和編輯程式碼、執行命令，並協助完成複雜的開發任務——全部透過命令列完成。

      此模板將 Claude Code 部署為 Zeabur 上的持久化開發者工作站，並提供瀏覽器可存取的 Web 終端機（ttyd）。

      ## 開始使用

      1. **部署模板**並等待服務啟動。首次啟動會自動安裝 Claude Code，請等待健康檢查變為綠色後再繼續。
      2. **在瀏覽器中開啟服務網址**（綁定到服務的網域）。
      3. **登入**，使用者名稱為 `user`，密碼請在 Zeabur 儀表板的 **Instructions** 頁籤查看。
      4. **認證 Claude Code** — 執行 `claude` 並依照提示登入您的 Claude Pro/Max/Team/Enterprise 訂閱帳號。

      ## 使用 API 金鑰（選用）

      如果您偏好使用 API 金鑰而非訂閱認證：

      1. 將 `ANTHROPIC_API_KEY` 設定為您的 Anthropic API 金鑰，可從 [console.anthropic.com](https://console.anthropic.com/) 取得。
      2. 可選擇設定 `ANTHROPIC_BASE_URL` 以使用 [Zeabur AI Hub](https://zeabur.com/ai)（例如 `https://ai.hub.zeabur.com`）。

      ## 常用命令

      | 命令 | 說明 |
      |------|------|
      | `claude` | 啟動互動式 Claude Code 工作階段 |
      | `claude -p "提示"` | 執行單次提示 |
      | `claude login` | 驗證 Anthropic 帳號 |
      | `claude --version` | 檢查已安裝版本 |
      | `claude config` | 檢視或修改設定 |

      ## 持久化儲存

      `/home/node` 目錄掛載為持久化磁碟。所有儲存在 `/home/node` 下的專案、Claude Code 設定和工作階段資料，在服務重啟和重新部署後都會保留。

      **建議工作流程：**
      - 將程式碼庫複製到 `/home/node/projects/`
      - Claude Code 設定儲存在 `/home/node/.claude/`

      ## 環境變數

      | 變數 | 必填 | 說明 |
      |------|------|------|
      | `ANTHROPIC_API_KEY` | 否 | Anthropic API 金鑰或 Zeabur AI Hub Token（僅在不使用訂閱登入時需要） |
      | `ANTHROPIC_BASE_URL` | 否 | 自訂 API 端點（使用 Zeabur AI Hub 時設定） |
      | `WEB_TERMINAL_PASSWORD` | 自動 | Web 終端機登入密碼（自動產生，可在儀表板查看） |

      ## 建議資源配置（官方要求）
      - **最低配置**：1 vCPU / 4 GB RAM
      - **建議配置**：2 vCPU / 4 GB RAM

      Claude Code 官方系統要求為 4 GB 以上記憶體。AI 運算在 Anthropic API 端進行，本機僅運行 Node.js CLI 和 shell 工具，CPU 需求較低。

      ## 變更紀錄

      ### 2026-03-30 — 首次發佈

      - ttyd Web 終端機（密碼驗證）
      - Claude Code 原生安裝器（首次啟動自動安裝）
      - 資源需求、網域綁定及健康檢查

      ## 連結

      - [Claude Code 官方文件](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
