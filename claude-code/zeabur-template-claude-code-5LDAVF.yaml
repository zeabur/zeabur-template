# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Claude Code
spec:
  description: |
    Anthropic's AI coding agent CLI running as a persistent developer workstation. Connect via Zeabur Terminal to use Claude Code for code generation, editing, debugging, and git operations.
  icon: https://cdn-console.zeabur.com/f/WpysO/claude-color.webp
  coverImage: https://cdn-console.zeabur.com/f/w7XH6/claude-code-coverimage.png
  tags:
    - AI
    - Developer Tools
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: The domain for accessing the web terminal (e.g. my-claude-code)
  resourceRequirement:
    minConfig:
      cpu: 1
      ram: 4
    recommendedConfig:
      cpu: 2
      ram: 4
  readme: |
    # Claude Code

    [Claude Code](https://docs.anthropic.com/en/docs/claude-code) is Anthropic's official AI-powered coding agent CLI. It understands your codebase, generates and edits code, runs commands, and helps with complex development tasks -- all from the command line.

    This template deploys Claude Code as a persistent developer workstation on Zeabur with a web-based terminal (ttyd) accessible from your browser.

    ## Getting Started

    1. **Set your API key:** Before deploying, set the `ANTHROPIC_API_KEY` environment variable in Zeabur to your Anthropic API key. You can obtain one from [console.anthropic.com](https://console.anthropic.com/).
    2. **Deploy the template** and wait for the service to start.
    3. **Open the service URL** in your browser (the domain bound to your service).
    4. **Log in** with username `user` and the password shown in the `WEB_TERMINAL_PASSWORD` environment variable on the Zeabur dashboard.
    5. **Start using Claude Code:**
       ```
       claude
       ```

    ## Using Zeabur AI Hub (Optional)

    If you want to use [Zeabur AI Hub](https://zeabur.com/ai) instead of a direct Anthropic API key:

    1. Set `ANTHROPIC_BASE_URL` to your Zeabur AI Hub endpoint (e.g., `https://ai.hub.zeabur.com`).
    2. Set `ANTHROPIC_API_KEY` to your Zeabur AI Hub token.

    This allows you to manage API usage and billing through Zeabur's unified AI gateway.

    ## Common Commands

    | Command | Description |
    |---------|-------------|
    | `claude` | Start interactive Claude Code session |
    | `claude -p "prompt"` | Run a one-shot prompt |
    | `claude login` | Authenticate with Anthropic |
    | `claude --version` | Check installed version |
    | `claude config` | View or modify configuration |

    ## Persistent Storage

    The `/home/node` directory is mounted as a persistent volume. All your projects, Claude Code configuration, and session data stored under `/home/node` will survive service restarts and redeployments.

    **Recommended workflow:**
    - Clone repositories into `/home/node/projects/`
    - Your Claude Code settings are stored in `/home/node/.claude/`

    ## Environment Variables

    | Variable | Required | Description |
    |----------|----------|-------------|
    | `ANTHROPIC_API_KEY` | Yes | Your Anthropic API key or Zeabur AI Hub token |
    | `ANTHROPIC_BASE_URL` | No | Custom API endpoint (set this for Zeabur AI Hub) |
    | `WEB_TERMINAL_PASSWORD` | Auto | Password for web terminal login (auto-generated, visible in dashboard) |

    ## Recommended Resources (Official Requirements)
    - **Minimum**: 1 vCPU / 4 GB RAM
    - **Recommended**: 2 vCPU / 4 GB RAM

    Claude Code's official system requirement is 4 GB+ RAM. AI processing happens on the Anthropic API side, so locally it only runs the Node.js CLI and shell tools, keeping CPU requirements low.

    ## Changelog

    ### 2026-03-30 -- Initial Release

    - ttyd web terminal with password auth
    - Claude Code native installer (auto-installed on first boot)
    - Resource requirements, domain binding, and health check

    ## Links

    - [Claude Code Documentation](https://docs.anthropic.com/en/docs/claude-code)
    - [Anthropic Console](https://console.anthropic.com/)
    - [Zeabur AI Hub](https://zeabur.com/ai)
  services:
    - name: claude-code
      icon: https://cdn-console.zeabur.com/f/WpysO/claude-color.webp
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: zeabur/claude-code:latest
          command:
            - /bin/sh
            - -c
            - /opt/startup.sh
        ports:
          - id: web
            port: 7681
            type: HTTP
        healthCheck:
            type: TCP
            port: web
        volumes:
          - id: home
            dir: /home/node
        configs:
          - path: /opt/startup.sh
            permission: 493
            template: |
              #!/bin/sh
              chown -R node:node /home/node

              # Install Claude Code on first boot (persisted in volume)
              if [ ! -f /home/node/.local/bin/claude ]; then
                runuser -u node -- bash -c 'echo "export PATH=\"\$HOME/.local/bin:\$PATH\"" >> ~/.profile'
                runuser -u node -- bash -c 'curl -fsSL https://claude.ai/install.sh | bash'
              fi

              exec ttyd \
                --port 7681 \
                --writable \
                --credential "user:$WEB_TERMINAL_PASSWORD" \
                runuser -u node -- bash -l
        env:
          ANTHROPIC_API_KEY:
            default: ""
          ANTHROPIC_BASE_URL:
            default: ""
          WEB_TERMINAL_PASSWORD:
            default: ${PASSWORD}
            expose: true
        instructions:
          - type: TEXT
            title: Username
            content: user
            category: Credentials
          - type: PASSWORD
            title: Password
            content: ${WEB_TERMINAL_PASSWORD}
            category: Credentials
          - type: TEXT
            title: Start Claude Code (full permissions)
            content: claude --dangerously-skip-permissions
            category: Usage
