  zh-TW:
    description: |
      Anthropic 的 AI 程式設計代理 CLI，以持久化開發者工作站形式運行。透過 Zeabur 指令連線使用 Claude Code 進行程式碼生成、編輯、除錯和 Git 操作。
    variables:
      - key: PUBLIC_DOMAIN
        name: 網域
        description: 用來存取 Web 終端機的網域（例如 my-claude-code）
    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) 是 Anthropic 官方的 AI 程式設計代理 CLI。它能理解您的程式碼庫、生成和編輯程式碼、執行命令，並協助完成複雜的開發任務——全部透過命令列完成。

      此模板將 Claude Code 部署為 Zeabur 上的持久化開發者工作站，並提供瀏覽器可存取的 Web 終端機（ttyd）。

      ## 開始使用

      1. **設定 API 金鑰：** 部署前，在 Zeabur 環境變數中設定 `ANTHROPIC_API_KEY` 為您的 Anthropic API 金鑰。可從 [console.anthropic.com](https://console.anthropic.com/) 取得。
      2. **部署模板**並等待服務啟動。
      3. **在瀏覽器中開啟服務網址**（綁定到服務的網域）。
      4. **登入**，使用者名稱為 `user`，密碼請在 Zeabur 儀表板的 `WEB_TERMINAL_PASSWORD` 環境變數中查看。
      5. **開始使用 Claude Code：**
         ```
         claude
         ```

      ## 使用 Zeabur AI Hub（選用）

      如果您想使用 [Zeabur AI Hub](https://zeabur.com/ai) 而非直接使用 Anthropic API 金鑰：

      1. 將 `ANTHROPIC_BASE_URL` 設定為您的 Zeabur AI Hub 端點（例如 `https://ai.hub.zeabur.com`）。
      2. 將 `ANTHROPIC_API_KEY` 設定為您的 Zeabur AI Hub Token。

      ## 常用命令

      | 命令 | 說明 |
      |------|------|
      | `claude` | 啟動互動式 Claude Code 工作階段 |
      | `claude -p "提示"` | 執行單次提示 |
      | `claude login` | 驗證 Anthropic 帳號 |
      | `claude --version` | 檢查已安裝版本 |
      | `claude config` | 檢視或修改設定 |

      ## 持久化儲存

      `/home/node` 目錄掛載為持久化磁碟。所有儲存在 `/home/node` 下的專案、Claude Code 設定和工作階段資料，在服務重啟和重新部署後都會保留。

      **建議工作流程：**
      - 將程式碼庫複製到 `/home/node/projects/`
      - Claude Code 設定儲存在 `/home/node/.claude/`

      ## 環境變數

      | 變數 | 必填 | 說明 |
      |------|------|------|
      | `ANTHROPIC_API_KEY` | 是 | 您的 Anthropic API 金鑰或 Zeabur AI Hub Token |
      | `ANTHROPIC_BASE_URL` | 否 | 自訂 API 端點（使用 Zeabur AI Hub 時設定） |
      | `WEB_TERMINAL_PASSWORD` | 自動 | Web 終端機登入密碼（自動產生，可在儀表板查看） |

      ## 建議資源配置（官方要求）
      - **最低配置**：1 vCPU / 4 GB RAM
      - **建議配置**：2 vCPU / 4 GB RAM

      Claude Code 官方系統要求為 4 GB 以上記憶體。AI 運算在 Anthropic API 端進行，本機僅運行 Node.js CLI 和 shell 工具，CPU 需求較低。

      ## 變更紀錄

      ### 2026-03-30 — 首次發佈

      - ttyd Web 終端機（密碼驗證）
      - Claude Code 原生安裝器（首次啟動自動安裝）
      - 資源需求、網域綁定及健康檢查

      ## 連結

      - [Claude Code 官方文件](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
