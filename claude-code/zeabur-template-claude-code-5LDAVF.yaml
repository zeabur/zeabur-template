        name: ドメイン
        description: Web ターミナルにアクセスするためのドメイン（例：my-claude-code）
    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) は Anthropic 公式の AI コーディングエージェント CLI です。コードベースを理解し、コードの生成・編集、コマンドの実行、複雑な開発タスクの支援をすべてコマンドラインから行います。

      このテンプレートは Claude Code を Zeabur 上の永続的な開発者ワークステーションとしてデプロイし、ブラウザからアクセス可能な Web ターミナル（ttyd）を提供します。

      ## はじめに

      1. **テンプレートをデプロイ**し、サービスの起動を待ちます。初回起動時に Claude Code が自動インストールされます。ヘルスチェックが緑になるまでお待ちください。
      2. **ブラウザでサービス URL を開きます**（サービスにバインドされたドメイン）。
      3. **ログイン**：ユーザー名は `user`、パスワードは Zeabur ダッシュボードの **Instructions** タブで確認できます。
      4. **Claude Code を認証** — `claude` を実行し、プロンプトに従って Claude Pro/Max/Team/Enterprise サブスクリプションでログインします。

      ## API キーの使用（オプション）

      サブスクリプションの代わりに API キー認証を使用する場合：

      1. `ANTHROPIC_API_KEY` を Anthropic API キーに設定します。[console.anthropic.com](https://console.anthropic.com/) から取得できます。
      2. オプションで `ANTHROPIC_BASE_URL` を設定し、[Zeabur AI Hub](https://zeabur.com/ai) を使用できます（例：`https://ai.hub.zeabur.com`）。

      ## よく使うコマンド

      | コマンド | 説明 |
      |----------|------|
      | `claude` | インタラクティブな Claude Code セッションを起動 |
      | `claude -p "プロンプト"` | ワンショットプロンプトを実行 |
      | `claude login` | Anthropic アカウントで認証 |
      | `claude --version` | インストール済みバージョンを確認 |
      | `claude config` | 設定を表示・変更 |

      ## 永続ストレージ

      `/home/node` ディレクトリは永続ボリュームとしてマウントされています。`/home/node` 配下に保存されたプロジェクト、Claude Code の設定、セッションデータはすべてサービスの再起動や再デプロイ後も保持されます。

      **推奨ワークフロー：**
      - リポジトリを `/home/node/projects/` にクローン
      - Claude Code の設定は `/home/node/.claude/` に保存されます

      ## 環境変数

      | 変数 | 必須 | 説明 |
      |------|------|------|
      | `ANTHROPIC_API_KEY` | いいえ | Anthropic API キーまたは Zeabur AI Hub トークン（サブスクリプションログインを使用しない場合のみ必要） |
      | `ANTHROPIC_BASE_URL` | いいえ | カスタム API エンドポイント（Zeabur AI Hub 使用時に設定） |
      | `WEB_TERMINAL_PASSWORD` | 自動 | Web ターミナルのログインパスワード（自動生成、ダッシュボードで確認可能） |

      ## 推奨リソース（公式要件）
      - **最小構成**：1 vCPU / 4 GB RAM
      - **推奨構成**：2 vCPU / 4 GB RAM

      Claude Code の公式システム要件は 4 GB 以上の RAM です。AI 処理は Anthropic API 側で行われるため、ローカルでは Node.js CLI とシェルツールのみが動作し、CPU 要件は低めです。

      ## 変更履歴

      ### 2026-03-30 — 初回リリース

      - ttyd Web ターミナル（パスワード認証）
      - Claude Code ネイティブインストーラー（初回起動時に自動インストール）
      - リソース要件、ドメインバインディング、ヘルスチェック

      ## リンク

      - [Claude Code 公式ドキュメント](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
  es-ES:
    description: |
      CLI del agente de programacion IA de Anthropic ejecutandose como estacion de trabajo persistente para desarrolladores. Conectese a traves del Terminal de Zeabur para usar Claude Code para generar, editar, depurar codigo y realizar operaciones Git.
    variables:
      - key: PUBLIC_DOMAIN
        name: Dominio
        description: El dominio para acceder al terminal web (ej. my-claude-code)
    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) es el agente de programacion CLI oficial de Anthropic. Comprende su base de codigo, genera y edita codigo, ejecuta comandos y ayuda con tareas de desarrollo complejas, todo desde la linea de comandos.

      Esta plantilla despliega Claude Code como una estacion de trabajo persistente para desarrolladores en Zeabur, con un terminal web (ttyd) accesible desde el navegador.

      ## Primeros pasos

      1. **Despliegue la plantilla** y espere a que el servicio se inicie. La primera vez instala Claude Code automaticamente — espere hasta que el health check se ponga verde antes de continuar.
      2. **Abra la URL del servicio** en su navegador (el dominio vinculado al servicio).
      3. **Inicie sesion** con usuario `user` y la contrasena de la pestana **Instructions** en el panel de Zeabur.
      4. **Autentique Claude Code** — ejecute `claude` y siga las indicaciones para iniciar sesion con su suscripcion Claude Pro/Max/Team/Enterprise.

      ## Usar clave API (Opcional)

      Si prefiere autenticacion por clave API en lugar de suscripcion:

      1. Configure `ANTHROPIC_API_KEY` con su clave API de Anthropic de [console.anthropic.com](https://console.anthropic.com/).
      2. Opcionalmente configure `ANTHROPIC_BASE_URL` para usar [Zeabur AI Hub](https://zeabur.com/ai) (ej. `https://ai.hub.zeabur.com`).

      ## Comandos comunes

      | Comando | Descripcion |
      |---------|-------------|
      | `claude` | Iniciar sesion interactiva de Claude Code |
      | `claude -p "prompt"` | Ejecutar un prompt unico |
      | `claude login` | Autenticarse con Anthropic |
      | `claude --version` | Verificar version instalada |
      | `claude config` | Ver o modificar configuracion |

      ## Almacenamiento persistente

      El directorio `/home/node` esta montado como un volumen persistente. Todos los proyectos, configuracion de Claude Code y datos de sesion almacenados en `/home/node` se mantendran tras reinicios y redespliegues.

      **Flujo de trabajo recomendado:**
      - Clone repositorios en `/home/node/projects/`
      - La configuracion de Claude Code se almacena en `/home/node/.claude/`

      ## Variables de entorno

      | Variable | Requerida | Descripcion |
      |----------|-----------|-------------|
      | `ANTHROPIC_API_KEY` | No | Clave API de Anthropic o token de Zeabur AI Hub (solo necesaria si no usa login por suscripcion) |
      | `ANTHROPIC_BASE_URL` | No | Endpoint API personalizado (configurar para Zeabur AI Hub) |
      | `WEB_TERMINAL_PASSWORD` | Auto | Contrasena del terminal web (generada automaticamente, visible en el panel) |

      ## Recursos Recomendados (Requisitos Oficiales)
      - **Minimo**: 1 vCPU / 4 GB RAM
      - **Recomendado**: 2 vCPU / 4 GB RAM

      El requisito oficial de Claude Code es 4 GB+ de RAM. El procesamiento de IA se realiza en la API de Anthropic, por lo que localmente solo se ejecuta el CLI de Node.js y herramientas de shell, con requisitos minimos de CPU.

      ## Registro de cambios

      ### 2026-03-30 -- Lanzamiento inicial

      - Terminal web ttyd (autenticacion por contrasena)
      - Instalador nativo de Claude Code (instalacion automatica en primer inicio)
      - Requisitos de recursos, vinculacion de dominio y health check

      ## Enlaces

      - [Documentacion de Claude Code](https://docs.anthropic.com/en/docs/claude-code)
      - [Anthropic Console](https://console.anthropic.com/)
      - [Zeabur AI Hub](https://zeabur.com/ai)
