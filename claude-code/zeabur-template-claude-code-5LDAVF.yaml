    readme: |
      # Claude Code

      [Claude Code](https://docs.anthropic.com/en/docs/claude-code) 是 Anthropic 官方的 AI 编程代理 CLI。它能理解您的代码库、生成和编辑代码、执行命令，并协助完成复杂的开发任务——全部通过命令行完成。

      此模板将 Claude Code 部署为 Zeabur 上的持久化开发者工作站，并提供浏览器可访问的 Web 终端（ttyd）。

      ## 开始使用

      1. **部署模板**并等待服务启动。首次启动会自动安装 Claude Code 及频道插件，请等待健康检查变为绿色后再继续。
      2. **在浏览器中打开服务网址**（绑定到服务的域名）。
      3. **登录** — 输入 Zeabur 仪表板 **Instructions** 页签中的密码。
      4. **选择选项** — 勾选需要的功能（如跳过权限、Telegram/Discord 频道）。
      5. **输入 Bot Token**（使用频道时） — 在出现的输入框中粘贴 Bot Token。
      6. **复制命令**并点击 **Enter Terminal**。
      7. **认证 Claude Code** — 粘贴命令，按照提示登录您的 Claude Pro/Max/Team/Enterprise 订阅账号。

      ## 频道（Telegram / Discord）

      频道功能让您通过 Telegram 或 Discord 在手机上与 Claude Code 对话，同时它在服务器上操作您的文件。

      ### 设置步骤

      1. **创建机器人** — Telegram 使用 [BotFather](https://t.me/BotFather)，Discord 到 [Developer Portal](https://discord.com/developers/applications) 创建（需启用 Message Content Intent，邀请机器人加入服务器并授予发送消息权限）。
      2. **在入口页面勾选频道**并粘贴 Bot Token。
      3. **复制命令并在终端中执行** — 频道会自动启动。
      4. **配对账号** — 私信您的机器人，它会回复配对码。在 Claude Code 中执行 `/discord:access pair <code>` 或 `/telegram:access pair <code>`。
      5. **锁定访问** — 执行 `/discord:access policy allowlist` 或 `/telegram:access policy allowlist`，确保只有您能发送消息。

      配对完成后，即可通过 Telegram/Discord 与 Claude 对话。Bot Token 会保存在浏览器中，下次无需重新输入。

      ### 注意事项

      - 频道需要 Claude Pro/Max/Team/Enterprise 订阅（不支持 API 密钥）。
      - Bot Token 以环境变量方式带入命令（如 `DISCORD_BOT_TOKEN=xxx claude ...`），**不会存储在服务器上**。
      - 频道是 Claude Code 的[实验性功能](https://code.claude.com/docs/en/channels)。

      ## 使用 API 密钥（可选）

      如果您偏好使用 API 密钥而非订阅认证：

      1. 将 `ANTHROPIC_API_KEY` 设置为您的 Anthropic API 密钥，可从 [console.anthropic.com](https://console.anthropic.com/) 获取。
      2. 可选择设置 `ANTHROPIC_BASE_URL` 以使用 [Zeabur AI Hub](https://zeabur.com/ai)（例如 `https://ai.hub.zeabur.com`）。

      ## 常用命令

      | 命令 | 说明 |
      |------|------|
      | `claude` | 启动交互式 Claude Code 会话 |
      | `claude -p "提示"` | 执行单次提示 |
      | `claude login` | 验证 Anthropic 账号 |
      | `claude --version` | 检查已安装版本 |
      | `claude config` | 查看或修改配置 |

      ## 持久化存储

      `/home/node` 目录挂载为持久化卷。所有存储在 `/home/node` 下的项目、Claude Code 配置和会话数据，在服务重启和重新部署后都会保留。

      **建议工作流程：**
      - 将代码库克隆到 `/home/node/projects/`
      - Claude Code 配置存储在 `/home/node/.claude/`

      ## 环境变量

      | 变量 | 必填 | 说明 |
      |------|------|------|
      | `ANTHROPIC_API_KEY` | 否 | Anthropic API 密钥或 Zeabur AI Hub Token（仅在不使用订阅登录时需要） |
      | `ANTHROPIC_BASE_URL` | 否 | 自定义 API 端点（使用 Zeabur AI Hub 时设置） |
      | `WEB_TERMINAL_PASSWORD` | 自动 | Web 终端登录密码（自动生成，可在仪表板查看） |

      ## 建议资源配置（官方要求）
      - **最低配置**：1 vCPU / 4 GB RAM
      - **建议配置**：2 vCPU / 4 GB RAM

      Claude Code 官方系统要求为 4 GB 以上内存。AI 运算在 Anthropic API 端进行，本机仅运行 Node.js CLI 和 shell 工具，CPU 需求较低。

      ## 变更记录

      ### 2026-04-02 — 频道支持与入口页面重新设计

