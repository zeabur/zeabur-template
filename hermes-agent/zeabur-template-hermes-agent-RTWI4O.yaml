      ## 使用 Zeabur AI Hub（OpenRouter 替代方案）

      除了 OpenRouter，也可以使用 [Zeabur AI Hub](https://zeabur.com/ai) — 一个 OpenAI 兼容的 LLM 聚合服务。部署后：

