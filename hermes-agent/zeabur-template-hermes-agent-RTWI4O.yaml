# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Hermes Agent
spec:
  description: |
    Hermes Agent by NousResearch — an autonomous AI agent with persistent memory, tool use, cron scheduling, and 14+ messaging platforms (Telegram, Discord, Slack, WhatsApp, Signal, Matrix, WeChat, WeCom, Feishu, DingTalk, Email, and more). Includes an OpenAI-compatible API server.
  icon: https://raw.githubusercontent.com/NousResearch/hermes-agent/main/website/static/img/logo.png
  coverImage: https://raw.githubusercontent.com/NousResearch/hermes-agent/main/assets/banner.png
  tags:
    - AI
    - Agent
    - Chatbot
  resourceRequirement:
    minConfig:
      cpu: 2
      ram: 4
    recommendedConfig:
      cpu: 4
      ram: 8
  variables:
    - key: OPENROUTER_API_KEY
      type: STRING
      name: OpenRouter API Key
      description: "API key from openrouter.ai — provides access to Claude, GPT, Gemini, and 200+ models through one key."
    - key: TELEGRAM_BOT_TOKEN
      type: STRING
      name: Telegram Bot Token (optional)
      description: "Bot token from @BotFather on Telegram. Leave empty to skip Telegram integration."
    - key: TELEGRAM_ALLOWED_USERS
      type: STRING
      name: Telegram Allowed Users
      description: "Comma-separated Telegram user IDs (required if bot token is set). Get your ID from @userinfobot on Telegram."
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: API Server Domain
      description: "Domain for the OpenAI-compatible API server."
  readme: |
    # Hermes Agent

    [Hermes Agent](https://github.com/NousResearch/hermes-agent) is an autonomous AI agent built by [Nous Research](https://nousresearch.com/). It features persistent memory, 40+ built-in tools, cron scheduling, and multi-platform messaging support.

    ## Quick Start

    1. **Deploy this template** — fill in your OpenRouter API key (required) and optionally a Telegram bot token.
    2. **Access the API server** — after deployment, your instance exposes an OpenAI-compatible endpoint at your domain.
    3. **Use the API** — send requests with your auto-generated API key (shown in the service instructions):

    ```bash
    curl https://YOUR_DOMAIN/v1/chat/completions \
      -H "Authorization: Bearer YOUR_API_SERVER_KEY" \
      -H "Content-Type: application/json" \
      -d '{"model": "default", "messages": [{"role": "user", "content": "Hello!"}]}'
    ```

    ## Messaging Platforms

    **Telegram** is configured at deploy time as an example. You can add any of the 14+ supported platforms (Discord, Slack, WhatsApp, Signal, Matrix, Email, WeChat, WeCom, Feishu, DingTalk, QQ Bot, Mattermost, BlueBubbles/iMessage, SMS, Home Assistant, generic webhooks) by setting the corresponding environment variables after deployment.

    See the official [Messaging Gateway guide](https://hermes-agent.nousresearch.com/docs/user-guide/messaging) for setup instructions for each platform.

    ## Using Zeabur AI Hub (alternative to OpenRouter)

    Instead of an OpenRouter key, you can use [Zeabur AI Hub](https://zeabur.com/ai) — an OpenAI-compatible aggregator. After deployment:

    1. Put your AI Hub key in `OPENROUTER_API_KEY` (reuse the same variable).
    2. Edit `/opt/data/config.yaml` via the Zeabur Files tab:
       - `model.base_url: "https://sfo1.aihub.zeabur.ai/v1"` (or `hnd1` for Tokyo)
       - `model.default: "claude-sonnet-4-5"` (or any [AI Hub model](https://zeabur.com/ai))
    3. Restart the service.

    Note: the `OPENROUTER_BASE_URL` env var does **not** override `config.yaml` — you must edit the file.

    ## Configuration

    - **LLM providers, tools, and all other settings** — refer to the official [Configuration guide](https://hermes-agent.nousresearch.com/docs/user-guide/configuration) and [Environment Variables reference](https://hermes-agent.nousresearch.com/docs/reference/environment-variables).
    - **Edit config files** via the Zeabur Files tab at `/opt/data/`:
      - `config.yaml` — model selection, terminal backend, platform settings
      - `SOUL.md` — agent personality and system prompt
      - `.env` — all environment variables
    - After editing, restart the service to apply changes.

    ## CLI Access

    You can use the Hermes CLI directly via the Zeabur **Exec** tab (or `zeabur service exec`). The `hermes` command is available out of the box:

    | Command | Description |
    |---------|-------------|
    | `hermes` | Interactive chat (REPL) |
    | `hermes --tui` | Modern terminal UI |
    | `hermes -z "prompt"` | One-shot query (for scripting) |
    | `hermes status` | Show status of all components |
    | `hermes model` | Switch model / provider |
    | `hermes config` | View or edit configuration |
    | `hermes sessions list` | List past conversations |
    | `hermes -c` | Resume last conversation |
    | `hermes cron` | Manage scheduled jobs |
    | `hermes skills` | Browse and install skills |

    Run `hermes --help` for the full command list.

    ## Notes

    - The Docker image is ~4.5 GB (includes Playwright + Chromium for browser automation). First deployment may take several minutes to pull the image.
    - First boot may take 30–60 seconds as the agent initializes config files and syncs skills.
    - Using browser tools may cause high memory usage — if you encounter OOM (out of memory) errors, consider upgrading to a larger instance (recommended 4 vCPU / 8 GB RAM).

    ## License

    Hermes Agent is licensed under the [MIT License](https://github.com/NousResearch/hermes-agent/blob/main/LICENSE) by Nous Research.
  services:
    - name: hermes-agent
      icon: https://raw.githubusercontent.com/NousResearch/hermes-agent/main/website/static/img/logo.png
      template: PREBUILT_V2
      spec:
        source:
          image: nousresearch/hermes-agent:v2026.5.16
          runAsUserID: 10000
          command:
            - /bin/bash
            - -c
            - /opt/zeabur/startup.sh
        ports:
          - id: web
            port: 5000
            type: HTTP
        volumes:
          - id: data
            dir: /opt/data
        configs:
          - path: /opt/zeabur/startup.sh
            envsubst: false
            permission: 493
            template: |
              #!/bin/bash
              set -e

              HERMES_HOME="/opt/data"
              INSTALL_DIR="/opt/hermes"

              source "${INSTALL_DIR}/.venv/bin/activate"

              mkdir -p "$HERMES_HOME"/{cron,sessions,logs,hooks,memories,skills,skins,plans,workspace,home,.local/bin}
              ln -sf "${INSTALL_DIR}/.venv/bin/hermes" "$HERMES_HOME/.local/bin/hermes"

              [ -f "$HERMES_HOME/.env" ]        || cp "$INSTALL_DIR/.env.example"          "$HERMES_HOME/.env"
              [ -f "$HERMES_HOME/config.yaml" ]  || cp "$INSTALL_DIR/cli-config.yaml.example" "$HERMES_HOME/config.yaml"
              [ -f "$HERMES_HOME/SOUL.md" ]      || cp "$INSTALL_DIR/docker/SOUL.md"        "$HERMES_HOME/SOUL.md"

              if [ -d "$INSTALL_DIR/skills" ]; then
                  python3 "$INSTALL_DIR/tools/skills_sync.py"
              fi

              exec hermes gateway
        instructions:
          - title: API Server URL
            content: ${ZEABUR_WEB_URL}/v1/chat/completions
          - title: API Server Key
            content: ${API_SERVER_KEY}
        env:
          OPENROUTER_API_KEY:
            default: ${OPENROUTER_API_KEY}
          TELEGRAM_BOT_TOKEN:
            default: ${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ALLOWED_USERS:
            default: ${TELEGRAM_ALLOWED_USERS}
          API_SERVER_ENABLED:
            default: "true"
          API_SERVER_PORT:
            default: "5000"
          API_SERVER_HOST:
            default: "0.0.0.0"
          API_SERVER_KEY:
            default: ${PASSWORD}
            expose: true
      domainKey: PUBLIC_DOMAIN
localization:
  zh-TW:
    description: |
      Hermes Agent 由 NousResearch 開發，是一款具備持久記憶、工具使用、排程任務及 14+ 訊息平台整合（Telegram、Discord、Slack、WhatsApp、Signal、Matrix、微信、企業微信、飛書、釘釘、Email 等）的自主 AI 代理。內建 OpenAI 相容 API 伺服器。
    variables:
      - key: OPENROUTER_API_KEY
        name: OpenRouter API 金鑰
        description: "從 openrouter.ai 取得的 API 金鑰，可存取 Claude、GPT、Gemini 等 200 多種模型。"
      - key: TELEGRAM_BOT_TOKEN
        name: Telegram Bot Token（選填）
        description: "從 Telegram @BotFather 取得的 Bot Token。留空則跳過 Telegram 整合。"
      - key: TELEGRAM_ALLOWED_USERS
        name: Telegram 允許的使用者
        description: "以逗號分隔的 Telegram 使用者 ID（設定了 Bot Token 則為必填）。可透過 @userinfobot 取得 ID。"
      - key: PUBLIC_DOMAIN
        name: API 伺服器網域
        description: "OpenAI 相容 API 伺服器的網域。"
    readme: |
      # Hermes Agent

      [Hermes Agent](https://github.com/NousResearch/hermes-agent) 是由 [Nous Research](https://nousresearch.com/) 開發的自主 AI 代理，具備持久記憶、40 多種內建工具、排程任務及多平台訊息整合。

      ## 快速開始

      1. **部署此模板** — 填入 OpenRouter API 金鑰（必填），以及選填的 Telegram Bot Token。
      2. **存取 API 伺服器** — 部署完成後，您的實例會在網域上提供 OpenAI 相容端點。
      3. **使用 API** — 使用自動產生的 API 金鑰（顯示於服務說明中）發送請求：

      ```bash
      curl https://YOUR_DOMAIN/v1/chat/completions \
        -H "Authorization: Bearer YOUR_API_SERVER_KEY" \
        -H "Content-Type: application/json" \
        -d '{"model": "default", "messages": [{"role": "user", "content": "Hello!"}]}'
      ```

      ## 訊息平台

      部署時預設設定 **Telegram** 作為範例。您可以在部署後設定對應的環境變數，啟用 14+ 支援平台中的任一個（Discord、Slack、WhatsApp、Signal、Matrix、Email、微信、企業微信、飛書、釘釘、QQ Bot、Mattermost、BlueBubbles/iMessage、SMS、Home Assistant、通用 webhook）。

      詳見官方 [Messaging Gateway 指南](https://hermes-agent.nousresearch.com/docs/user-guide/messaging)。

      ## 使用 Zeabur AI Hub（OpenRouter 替代方案）

      除了 OpenRouter，也可以使用 [Zeabur AI Hub](https://zeabur.com/ai) — 一個 OpenAI 相容的 LLM 聚合服務。部署後：

      1. 把 AI Hub 的金鑰填入 `OPENROUTER_API_KEY`（沿用同一個變數）。
      2. 透過 Zeabur「檔案」分頁編輯 `/opt/data/config.yaml`：
         - `model.base_url: "https://sfo1.aihub.zeabur.ai/v1"`（Tokyo 用 `hnd1`）
         - `model.default: "claude-sonnet-4-5"`（或任一 [AI Hub 模型](https://zeabur.com/ai)）
      3. 重啟服務。

      注意：`OPENROUTER_BASE_URL` 環境變數**無法**覆寫 `config.yaml`，必須直接編輯該檔案。

      ## 設定

      - **LLM 供應商、工具及其他設定** — 請參閱官方 [Configuration 指南](https://hermes-agent.nousresearch.com/docs/user-guide/configuration)和[環境變數參考](https://hermes-agent.nousresearch.com/docs/reference/environment-variables)。
      - 透過 Zeabur「檔案」分頁編輯 `/opt/data/` 中的設定檔：
        - `config.yaml` — 模型選擇、終端後端、平台設定
        - `SOUL.md` — 代理人格與系統提示詞
        - `.env` — 所有環境變數
      - 編輯後需重啟服務以套用變更。

      ## CLI 操作

      透過 Zeabur **Exec** 分頁（或 `zeabur service exec`）可直接使用 Hermes CLI：

      | 指令 | 說明 |
      |------|------|
      | `hermes` | 互動式聊天（REPL） |
      | `hermes --tui` | 現代終端 UI |
      | `hermes -z "prompt"` | 單次查詢（適合腳本） |
      | `hermes status` | 查看所有元件狀態 |
      | `hermes model` | 切換模型／供應商 |
      | `hermes config` | 查看或編輯設定 |
      | `hermes sessions list` | 列出對話記錄 |
      | `hermes -c` | 繼續上次對話 |
      | `hermes cron` | 管理排程任務 |
      | `hermes skills` | 瀏覽與安裝技能 |

      執行 `hermes --help` 查看完整指令列表。

      ## 注意事項

      - Docker 映像檔約 4.5 GB（含 Playwright + Chromium 瀏覽器自動化工具）。首次部署拉取映像檔可能需要數分鐘。
      - 首次啟動需要 30-60 秒來初始化設定檔和同步技能。
      - 使用瀏覽器工具可能導致記憶體用量過高，若遇到 OOM（記憶體不足）錯誤，建議升級至較大的實例（建議 4 vCPU / 8 GB RAM）。

      ## 授權

      Hermes Agent 由 Nous Research 以 [MIT 授權條款](https://github.com/NousResearch/hermes-agent/blob/main/LICENSE) 釋出。
