      2. **打开 Dashboard** — 前往你的域名（已自动绑定到 Dashboard）。之后可在「网络」标签页绑定自定义域名。
      3. **登录** — 账号 `admin`，密码为服务的 `PASSWORD`（显示在服务说明中）。直接在浏览器里对话——不需要 Telegram。

