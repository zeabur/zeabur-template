      Hermes Agent（NousResearch 開発）— 永続メモリ、ツール使用、スケジュール実行、14+ メッセージングプラットフォーム（Telegram、Discord、Slack、WhatsApp、Signal、Matrix、WeChat、WeCom、Feishu、DingTalk、Email など）を備えた自律型 AI エージェント。OpenAI 互換 API サーバー内蔵。
    variables:
