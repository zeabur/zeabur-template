  ja-JP:
    description: |
      Google の AI コーディングエージェント CLI ツール。Zeabur 上に永続的なクラウドワークステーションをデプロイし、ターミナルから Gemini CLI を使用できます。
    readme: |
      # Gemini CLI

      [Gemini CLI](https://github.com/google-gemini/gemini-cli) は Google のオープンソース AI コーディングエージェントで、ターミナルから直接実行できます。Google Gemini モデルの機能をコマンドラインに提供し、AI 支援コーディング、ファイル操作、シェルコマンド実行などが可能です。

      このテンプレートは Gemini CLI を Zeabur 上の永続クラウドワークステーションとしてデプロイします。Web UI はありません — Zeabur ターミナルから操作します。

      ## はじめに

      1. **API キーを設定：** デプロイ前（またはデプロイ直後）に、Zeabur ダッシュボードのサービス**環境変数**タブで `GEMINI_API_KEY` を設定します。
      2. **API キーを取得：** お持ちでない場合は、[Google AI Studio](https://aistudio.google.com/) にアクセスして無料の Gemini API キーを作成してください。
      3. **テンプレートをデプロイ**し、サービスの起動を待ちます。
      4. **Zeabur ターミナル**を開きます（Gemini CLI サービス）。
      5. **Gemini CLI を実行：**
         ```
         runuser -u node -- gemini
         ```

      ## 使い方

      Zeabur ターミナルでは、すべてのコマンドに `runuser -u node --` プレフィックスを付ける必要があります。コンテナは root で実行されますが、Gemini CLI は権限の問題を避けるため `node` ユーザーとして実行する必要があります。

      ### よく使うコマンド

      | コマンド | 説明 |
      |----------|------|
      | `runuser -u node -- gemini` | 対話型 Gemini CLI セッションを開始 |
      | `runuser -u node -- gemini --version` | インストール済みの Gemini CLI バージョンを確認 |
      | `runuser -u node -- gemini -p "プロンプト"` | 対話モードに入らず単発のプロンプトを送信 |

      ## API キー設定

      Gemini CLI の動作には有効な Google Gemini API キーが必要です。

      1. [Google AI Studio](https://aistudio.google.com/) にアクセスします。
      2. Google アカウントでサインインします。
      3. **API Keys** に移動し、新しいキーを作成します。
      4. Zeabur ダッシュボードで Gemini CLI サービスの**環境変数**タブを開きます。
      5. `GEMINI_API_KEY` に API キーを設定します。
      6. サービスは新しいキーで自動的に再起動します。

      ## 永続ストレージ

      このテンプレートは `/home/node` に永続ボリュームをマウントします。このパス配下に保存されたすべてのファイルは、コンテナの再起動や再デプロイ後も保持されます。`/home/node` 以外のデータは一時的で、再起動時に失われます。

      ## 重要事項

      - **Web インターフェースなし：** CLI 専用ワークステーションです。Zeabur ターミナルから操作してください。
      - **ターミナルでコマンドを実行する際は必ず `runuser -u node --` プレフィックスを使用してください。** root で実行すると権限の問題が発生します。
      - **永続データ：** `/home/node` のみが永続化されます。重要なファイルは他のパスに保存しないでください。
      - **カスタム Base URL 非対応：** Gemini CLI は Google API に直接接続し、カスタム API Base URL をサポートしていません。

      ## リンク

      - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
      - [Google AI Studio](https://aistudio.google.com/)
      - [Gemini API ドキュメント](https://ai.google.dev/docs)
  es-ES:
    description: |
      Agente de codificación con IA de Google para la línea de comandos. Despliega una estación de trabajo en la nube persistente en Zeabur con acceso por Terminal a Gemini CLI.
    readme: |
      # Gemini CLI

      [Gemini CLI](https://github.com/google-gemini/gemini-cli) es el agente de codificación con IA de código abierto de Google que se ejecuta directamente en tu terminal. Lleva el poder de los modelos Google Gemini a la línea de comandos, permitiendo codificación asistida por IA, manipulación de archivos, ejecución de comandos shell y más.

      Esta plantilla despliega Gemini CLI como una estación de trabajo en la nube persistente en Zeabur. No hay interfaz web — interactúas completamente a través del Terminal de Zeabur.

      ## Primeros pasos

      1. **Configura tu clave API:** Antes de desplegar (o inmediatamente después), establece la variable de entorno `GEMINI_API_KEY` en el panel de Zeabur en la pestaña **Variables de entorno** del servicio.
      2. **Obtén una clave API:** Si no tienes una, visita [Google AI Studio](https://aistudio.google.com/) para crear una clave API de Gemini gratuita.
      3. **Despliega la plantilla** y espera a que el servicio se inicie.
      4. **Abre el Terminal de Zeabur** para el servicio Gemini CLI.
      5. **Ejecuta Gemini CLI:**
         ```
         runuser -u node -- gemini
         ```

      ## Uso

      Todos los comandos en el Terminal de Zeabur deben tener el prefijo `runuser -u node --` porque el contenedor se ejecuta como root, pero Gemini CLI debe ejecutarse como el usuario `node` para evitar problemas de permisos.

      ### Comandos comunes

      | Comando | Descripción |
      |---------|-------------|
      | `runuser -u node -- gemini` | Iniciar una sesión interactiva de Gemini CLI |
      | `runuser -u node -- gemini --version` | Verificar la versión instalada de Gemini CLI |
      | `runuser -u node -- gemini -p "tu prompt"` | Enviar un prompt único sin entrar en modo interactivo |

      ## Configuración de clave API

      Gemini CLI requiere una clave API válida de Google Gemini para funcionar.

      1. Ve a [Google AI Studio](https://aistudio.google.com/).
      2. Inicia sesión con tu cuenta de Google.
      3. Navega a **API Keys** y crea una nueva clave.
      4. En el panel de Zeabur, ve a la pestaña **Variables de entorno** del servicio Gemini CLI.
      5. Establece `GEMINI_API_KEY` con el valor de tu clave API.
      6. El servicio se reiniciará automáticamente con la nueva clave.

      ## Almacenamiento persistente

      Esta plantilla monta un volumen persistente en `/home/node`. Todos los archivos almacenados en esta ruta sobreviven a reinicios del contenedor y redespliegues. Los datos fuera de `/home/node` son efímeros y se perderán al reiniciar.

      ## Notas importantes

      - **Sin interfaz web:** Esta es una estación de trabajo solo CLI. Usa el Terminal de Zeabur para interactuar.
      - **Usa siempre el prefijo `runuser -u node --`** al ejecutar comandos en el Terminal. Ejecutar como root causará problemas de permisos.
      - **Datos persistentes:** Solo `/home/node` es persistente. No almacenes archivos importantes en otras rutas.
      - **Sin URL base personalizada:** Gemini CLI se conecta directamente a la API de Google y no soporta URLs base de API personalizadas.

      ## Enlaces

      - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
      - [Google AI Studio](https://aistudio.google.com/)
      - [Documentación de la API de Gemini](https://ai.google.dev/docs)
  id-ID:
    description: |
      Agen coding AI dari Google untuk command line. Deploy workstation cloud persisten di Zeabur dengan akses Terminal ke Gemini CLI.
    readme: |
      # Gemini CLI

      [Gemini CLI](https://github.com/google-gemini/gemini-cli) adalah agen coding AI open-source dari Google yang berjalan langsung di terminal Anda. Membawa kekuatan model Google Gemini ke command line, memungkinkan coding berbantuan AI, manipulasi file, eksekusi perintah shell, dan lainnya.

      Template ini mendeploy Gemini CLI sebagai workstation cloud persisten di Zeabur. Tidak ada antarmuka web — Anda berinteraksi sepenuhnya melalui Terminal Zeabur.

      ## Memulai

      1. **Atur API key:** Sebelum deploy (atau segera setelahnya), atur variabel lingkungan `GEMINI_API_KEY` di dashboard Zeabur pada tab **Environment Variables** layanan.
      2. **Dapatkan API key:** Jika belum memiliki, kunjungi [Google AI Studio](https://aistudio.google.com/) untuk membuat API key Gemini gratis.
      3. **Deploy template** dan tunggu layanan dimulai.
      4. **Buka Terminal Zeabur** untuk layanan Gemini CLI.
      5. **Jalankan Gemini CLI:**
         ```
         runuser -u node -- gemini
         ```

      ## Penggunaan

      Semua perintah di Terminal Zeabur harus menggunakan prefiks `runuser -u node --` karena container berjalan sebagai root, tetapi Gemini CLI harus dijalankan sebagai pengguna `node` untuk menghindari masalah izin.

      ### Perintah Umum

      | Perintah | Deskripsi |
      |----------|-----------|
      | `runuser -u node -- gemini` | Memulai sesi interaktif Gemini CLI |
      | `runuser -u node -- gemini --version` | Memeriksa versi Gemini CLI yang terinstal |
      | `runuser -u node -- gemini -p "prompt Anda"` | Mengirim prompt tunggal tanpa masuk mode interaktif |

      ## Konfigurasi API Key

      Gemini CLI memerlukan API key Google Gemini yang valid untuk berfungsi.

      1. Buka [Google AI Studio](https://aistudio.google.com/).
      2. Masuk dengan akun Google Anda.
      3. Navigasi ke **API Keys** dan buat key baru.
      4. Di dashboard Zeabur, buka tab **Environment Variables** layanan Gemini CLI.
      5. Atur `GEMINI_API_KEY` dengan nilai API key Anda.
      6. Layanan akan otomatis restart dengan key baru.

      ## Penyimpanan Persisten

      Template ini memasang volume persisten di `/home/node`. Semua file yang disimpan di path ini bertahan setelah restart container dan redeploy. Data di luar `/home/node` bersifat sementara dan akan hilang saat restart.

      ## Catatan Penting

      - **Tanpa antarmuka web:** Ini adalah workstation khusus CLI. Gunakan Terminal Zeabur untuk berinteraksi.
      - **Selalu gunakan prefiks `runuser -u node --`** saat menjalankan perintah di Terminal. Menjalankan sebagai root akan menyebabkan masalah izin.
      - **Data persisten:** Hanya `/home/node` yang persisten. Jangan simpan file penting di path lain.
      - **Tanpa URL base kustom:** Gemini CLI terhubung langsung ke API Google dan tidak mendukung URL base API kustom.

      ## Tautan

      - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
      - [Google AI Studio](https://aistudio.google.com/)
      - [Dokumentasi API Gemini](https://ai.google.dev/docs)
