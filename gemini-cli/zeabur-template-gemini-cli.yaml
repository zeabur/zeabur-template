# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Gemini CLI
spec:
  description: |
    Google's AI-powered coding agent for the command line. Run Gemini CLI in a persistent cloud workstation with Zeabur Terminal access.
  icon: https://cdn-console.zeabur.com/f/AYgtA/geminicli-color.webp
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: The domain for accessing the web terminal (e.g. my-gemini-cli)
    - key: GEMINI_API_KEY
      type: STRING
      name: Gemini API Key
      description: "Your Google Gemini API key. Get one at https://aistudio.google.com/"
  tags:
    - AI
    - Developer Tools
  resourceRequirement:
    minConfig:
      cpu: 1
      ram: 4
    recommendedConfig:
      cpu: 2
      ram: 16
  readme: |
    # Gemini CLI

    [Gemini CLI](https://github.com/google-gemini/gemini-cli) is Google's open-source AI coding agent that runs directly in your terminal. It brings the power of Google's Gemini models to your command line, enabling AI-assisted coding, file manipulation, shell command execution, and more.

    This template deploys Gemini CLI as a persistent cloud workstation on Zeabur with a web-based terminal (ttyd) accessible from your browser.

    ## Getting Started

    1. **Deploy the template** and wait for the service to start. Wait until the health check turns green before proceeding.
    2. **Open the service URL** in your browser (the domain bound to your service).
    3. **Log in** with username `user` and the password from the **Instructions** tab on the Zeabur dashboard.
    4. **Set your API key** — set `GEMINI_API_KEY` in the Zeabur dashboard, or run `gemini` and follow the authentication prompts. Get a free key at [Google AI Studio](https://aistudio.google.com/).
    5. **Start using Gemini CLI:**
       ```
       gemini
       ```

    ## Common Commands

    | Command | Description |
    |---------|-------------|
    | `gemini` | Start an interactive Gemini CLI session |
    | `gemini --version` | Check the installed Gemini CLI version |
    | `gemini -p "your prompt"` | Send a single prompt without entering interactive mode |

    ## Persistent Storage

    All data under `/home/node/` is persisted across restarts and redeployments.

    ## Environment Variables

    | Variable | Required | Description |
    |----------|----------|-------------|
    | `GEMINI_API_KEY` | Yes | Google Gemini API key from [Google AI Studio](https://aistudio.google.com/) |
    | `WEB_TERMINAL_PASSWORD` | Auto | Password for web terminal login (auto-generated) |

    ## Recommended Resources
    - **Minimum**: 1 vCPU / 4 GB RAM (casual use)
    - **Recommended**: 2 vCPU / 16 GB RAM (power use, large codebases)

    ## Links

    - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
    - [Google AI Studio](https://aistudio.google.com/)
    - [Gemini API Documentation](https://ai.google.dev/docs)
  services:
    - name: gemini-cli
      icon: https://cdn-console.zeabur.com/f/AYgtA/geminicli-color.webp
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: zeabur/gemini-cli:latest
          command:
            - /bin/sh
            - -c
            - /opt/startup.sh
        ports:
          - id: web
            port: 7681
            type: HTTP
        healthCheck:
            type: TCP
            port: web
        volumes:
          - id: home
            dir: /home/node
        configs:
          - path: /opt/startup.sh
            permission: 493
            template: |
              #!/bin/sh
              chown -R node:node /home/node
              exec ttyd \
                --port 7681 \
                --writable \
                --credential "user:$WEB_TERMINAL_PASSWORD" \
                runuser -u node -- bash -l
        env:
          GEMINI_API_KEY:
            default: ${GEMINI_API_KEY}
          WEB_TERMINAL_PASSWORD:
            default: ${PASSWORD}
            expose: true
        instructions:
          - type: TEXT
            title: Username
            content: user
            category: Credentials
          - type: PASSWORD
            title: Password
            content: ${WEB_TERMINAL_PASSWORD}
            category: Credentials
          - type: TEXT
            title: Start Gemini CLI (full permissions)
            content: gemini --yolo
            category: Usage
localization:
  zh-TW:
    description: |
      Google 的 AI 程式碼代理 CLI 工具。部署為持久化雲端工作站，透過瀏覽器存取 Web 終端機。
    variables:
      - key: PUBLIC_DOMAIN
        name: 網域
        description: 用來存取 Web 終端機的網域（例如 my-gemini-cli）
    readme: |
      # Gemini CLI

      [Gemini CLI](https://github.com/google-gemini/gemini-cli) 是 Google 的開源 AI 程式碼代理工具。此模板將 Gemini CLI 部署為 Zeabur 上的持久化雲端工作站，並提供瀏覽器可存取的 Web 終端機（ttyd）。

      ## 開始使用

      1. **部署模板**並等待服務啟動。請等待健康檢查變為綠色後再繼續。
      2. **在瀏覽器中開啟服務網址**（綁定到服務的網域）。
      3. **登入**，使用者名稱為 `user`，密碼請在 Zeabur 儀表板的 **Instructions** 頁籤查看。
      4. **設定 API 金鑰** — 在 Zeabur 儀表板設定 `GEMINI_API_KEY`，或執行 `gemini` 依照提示認證。可在 [Google AI Studio](https://aistudio.google.com/) 取得免費金鑰。
      5. **開始使用：** `gemini`

      ## 常用指令

      | 指令 | 說明 |
      |------|------|
      | `gemini` | 啟動互動式 Gemini CLI 會話 |
      | `gemini --version` | 查看已安裝的版本 |
      | `gemini -p "你的提示"` | 發送單次提示 |

      ## 持久化儲存

      `/home/node/` 下的所有資料在重啟和重新部署後都會保留。

      ## 建議資源配置
      - **最低配置**：1 vCPU / 4 GB RAM（輕度使用）
      - **建議配置**：2 vCPU / 16 GB RAM（重度使用、大型程式碼庫）

      ## 連結

      - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
      - [Google AI Studio](https://aistudio.google.com/)
