# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Gemini CLI
spec:
  description: |
    Google's AI-powered coding agent for the command line. Run Gemini CLI in a persistent cloud workstation with Zeabur Terminal access.
  icon: https://cdn.zeabur.com/marketplace/gemini-cli.svg
  tags:
    - AI
    - Developer Tools
  readme: |
    # Gemini CLI

    [Gemini CLI](https://github.com/google-gemini/gemini-cli) is Google's open-source AI coding agent that runs directly in your terminal. It brings the power of Google's Gemini models to your command line, enabling AI-assisted coding, file manipulation, shell command execution, and more.

    This template deploys Gemini CLI as a persistent cloud workstation on Zeabur. There is no web UI — you interact with it entirely through the Zeabur Terminal.

    ## Getting Started

    1. **Set your API key:** Before deploying (or immediately after), set the `GEMINI_API_KEY` environment variable in the Zeabur dashboard under the service's **Environment Variables** tab.
    2. **Get an API key:** If you don't have one, visit [Google AI Studio](https://aistudio.google.com/) to create a free Gemini API key.
    3. **Deploy the template** and wait for the service to start.
    4. **Open the Zeabur Terminal** for the Gemini CLI service.
    5. **Run Gemini CLI:**
       ```
       runuser -u node -- gemini
       ```

    ## Usage

    All commands in the Zeabur Terminal must be prefixed with `runuser -u node --` because the container runs as root but Gemini CLI should execute as the `node` user to avoid permission issues.

    ### Common Commands

    | Command | Description |
    |---------|-------------|
    | `runuser -u node -- gemini` | Start an interactive Gemini CLI session |
    | `runuser -u node -- gemini --version` | Check the installed Gemini CLI version |
    | `runuser -u node -- gemini -p "your prompt"` | Send a single prompt without entering interactive mode |

    ### Interactive Mode

    Once inside the interactive session (`gemini`), you can:

    - Ask coding questions and get AI-generated solutions
    - Request file edits and creation
    - Run shell commands through the AI agent
    - Analyze and refactor code in your workspace

    ## API Key Configuration

    Gemini CLI requires a valid Google Gemini API key to function.

    1. Go to [Google AI Studio](https://aistudio.google.com/).
    2. Sign in with your Google account.
    3. Navigate to **API Keys** and create a new key.
    4. In the Zeabur dashboard, go to the Gemini CLI service's **Environment Variables** tab.
    5. Set `GEMINI_API_KEY` to your API key value.
    6. The service will automatically restart with the new key.

    ## Persistent Storage

    This template mounts a persistent volume at `/home/node`. All files stored under this path survive container restarts and redeployments. Any data outside `/home/node` is ephemeral and will be lost on restart.

    Use `/home/node` as your working directory for all projects and configuration files.

    ## Important Notes

    - **No web interface:** This is a CLI-only workstation. Use the Zeabur Terminal to interact with it.
    - **Always use `runuser -u node --` prefix** when running commands in the Terminal. Running as root will cause permission issues with Gemini CLI.
    - **Persistent data:** Only `/home/node` is persistent. Do not store important files elsewhere.
    - **No custom base URL:** Gemini CLI connects directly to Google's API and does not support custom API base URLs.

    ## Links

    - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
    - [Google AI Studio](https://aistudio.google.com/)
    - [Gemini API Documentation](https://ai.google.dev/docs)
  services:
    - name: gemini-cli
      icon: https://cdn.zeabur.com/marketplace/gemini-cli.svg
      template: PREBUILT_V2
      spec:
        source:
          image: zeabur/gemini-cli:latest
          command:
            - /bin/sh
            - -c
            - /opt/startup.sh
        volumes:
          - id: home
            dir: /home/node
        configs:
          - path: /opt/startup.sh
            permission: 493
            template: |
              #!/bin/sh
              chown -R node:node /home/node
              exec runuser -u node -- sleep infinity
        env:
          GEMINI_API_KEY:
            default: ""
            required: true
localization:
  zh-TW:
    description: |
      Google 的 AI 程式碼代理 CLI 工具。在 Zeabur 上部署持久化的雲端工作站，透過終端機使用 Gemini CLI。
    readme: |
      # Gemini CLI

      [Gemini CLI](https://github.com/google-gemini/gemini-cli) 是 Google 的開源 AI 程式碼代理工具，直接在終端機中運行。它將 Google Gemini 模型的強大能力帶入命令列，支援 AI 輔助編程、檔案操作、Shell 指令執行等功能。

      此模板將 Gemini CLI 部署為 Zeabur 上的持久化雲端工作站。沒有網頁介面——您完全透過 Zeabur 終端機與其互動。

      ## 開始使用

      1. **設定 API 金鑰：** 部署前（或部署後立即），在 Zeabur 控制面板的服務**環境變數**頁面中設定 `GEMINI_API_KEY`。
      2. **取得 API 金鑰：** 如果您還沒有，請前往 [Google AI Studio](https://aistudio.google.com/) 建立免費的 Gemini API 金鑰。
      3. **部署模板**並等待服務啟動。
      4. **開啟 Zeabur 終端機**（Gemini CLI 服務）。
      5. **執行 Gemini CLI：**
         ```
         runuser -u node -- gemini
         ```

      ## 使用方式

      在 Zeabur 終端機中，所有指令必須加上 `runuser -u node --` 前綴，因為容器以 root 身份運行，但 Gemini CLI 需要以 `node` 使用者執行以避免權限問題。

      ### 常用指令

      | 指令 | 說明 |
      |------|------|
      | `runuser -u node -- gemini` | 啟動互動式 Gemini CLI 會話 |
      | `runuser -u node -- gemini --version` | 查看已安裝的 Gemini CLI 版本 |
      | `runuser -u node -- gemini -p "你的提示"` | 發送單次提示，不進入互動模式 |

      ## API 金鑰設定

      Gemini CLI 需要有效的 Google Gemini API 金鑰才能運作。

      1. 前往 [Google AI Studio](https://aistudio.google.com/)。
      2. 使用 Google 帳號登入。
      3. 導覽至 **API Keys** 並建立新金鑰。
      4. 在 Zeabur 控制面板中，前往 Gemini CLI 服務的**環境變數**頁面。
      5. 將 `GEMINI_API_KEY` 設定為您的 API 金鑰。
      6. 服務會自動重新啟動並套用新金鑰。

      ## 持久化儲存

      此模板在 `/home/node` 掛載持久化磁碟區。儲存在此路徑下的所有檔案在容器重啟和重新部署後仍會保留。`/home/node` 以外的資料為暫存，重啟後將遺失。

      ## 重要事項

      - **無網頁介面：** 這是純 CLI 工作站，請使用 Zeabur 終端機操作。
      - **請務必使用 `runuser -u node --` 前綴**執行終端機中的指令。以 root 執行會導致權限問題。
      - **持久化資料：** 僅 `/home/node` 為持久化儲存，請勿將重要檔案存放在其他路徑。
      - **無自訂 Base URL：** Gemini CLI 直接連線至 Google API，不支援自訂 API Base URL。

      ## 連結

      - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
      - [Google AI Studio](https://aistudio.google.com/)
      - [Gemini API 文件](https://ai.google.dev/docs)
