  ja-JP:
    description: |
      Google の AI コーディングエージェント CLI ツール。ブラウザからアクセス可能な Web ターミナル付き永続クラウドワークステーション。
    variables:
      - key: PUBLIC_DOMAIN
        name: ドメイン
        description: Web ターミナルにアクセスするためのドメイン（例：my-gemini-cli）
    readme: |
      # Gemini CLI

      [Gemini CLI](https://github.com/google-gemini/gemini-cli) は Google のオープンソース AI コーディングエージェントです。このテンプレートは Gemini CLI を Zeabur 上の永続クラウドワークステーションとしてデプロイし、ブラウザからアクセス可能な Web ターミナル（ttyd）を提供します。

      ## はじめに

      1. **テンプレートをデプロイ**し、サービスの起動を待ちます。ヘルスチェックが緑になるまでお待ちください。
      2. **ブラウザでサービス URL を開きます**（サービスにバインドされたドメイン）。
      3. **ログイン**：パスワードは Zeabur ダッシュボードの **Instructions** タブで確認できます。
      4. **API キーを設定** — Zeabur ダッシュボードで `GEMINI_API_KEY` を設定するか、`gemini` を実行して認証プロンプトに従います。[Google AI Studio](https://aistudio.google.com/) で無料キーを取得できます。
      5. **使用開始** — ランディングページでオプションを選択し、コマンドをコピーしてターミナルに貼り付けます。

      ## よく使うコマンド

      | コマンド | 説明 |
      |----------|------|
      | `gemini` | 対話型 Gemini CLI セッションを開始 |
      | `gemini --version` | インストール済みバージョンを確認 |
      | `gemini -p "プロンプト"` | 単発のプロンプトを送信 |

      ## 永続ストレージ

      `/home/node/` 配下のすべてのデータは、再起動や再デプロイ後も保持されます。

      ## 推奨リソース
      - **最小構成**：1 vCPU / 4 GB RAM（軽量使用）
