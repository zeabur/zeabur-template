    readme: |
      # Gemini CLI

      [Gemini CLI](https://github.com/google-gemini/gemini-cli) es el agente de codificacion con IA de codigo abierto de Google. Esta plantilla despliega Gemini CLI como una estacion de trabajo en la nube persistente en Zeabur, con un terminal web (ttyd) accesible desde el navegador.

      ## Primeros pasos

      1. **Despliega la plantilla** y espera a que el servicio se inicie. Espera hasta que el health check se ponga verde.
      2. **Abre la URL del servicio** en tu navegador (el dominio vinculado al servicio).
      3. **Inicia sesion** con la contrasena de la pestana **Instructions** en el panel de Zeabur.
      4. **Configura tu clave API** — configura `GEMINI_API_KEY` en el panel de Zeabur, o ejecuta `gemini` y sigue las indicaciones. Obtén una clave gratuita en [Google AI Studio](https://aistudio.google.com/).
      5. **Comienza a usar** — selecciona las opciones en la pagina de inicio, copia el comando, abre la terminal y pegalo.

      ## Comandos comunes

      | Comando | Descripcion |
      |---------|-------------|
      | `gemini` | Iniciar sesion interactiva de Gemini CLI |
      | `gemini --version` | Verificar version instalada |
      | `gemini -p "tu prompt"` | Enviar un prompt unico |

      ## Almacenamiento persistente

      Todos los datos bajo `/home/node/` se conservan entre reinicios y redespliegues.

      ## Recursos Recomendados
      - **Minimo**: 1 vCPU / 4 GB RAM (uso casual)
      - **Recomendado**: 2 vCPU / 16 GB RAM (uso intensivo, grandes bases de codigo)

      ## Problemas conocidos
      - Despues de completar el primer inicio de sesion, el terminal puede congelarse. Recarga la pagina para continuar.

      ## Registro de cambios

      ### 2026-03-31 -- Lanzamiento inicial

      - Terminal web ttyd (autenticacion por contrasena)
      - Homebrew y paquetes npm globales persistidos en volumen
      - Requisitos de recursos y vinculacion de dominio

      ## Enlaces

      - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
      - [Google AI Studio](https://aistudio.google.com/)
