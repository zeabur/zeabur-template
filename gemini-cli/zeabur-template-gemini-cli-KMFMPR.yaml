    readme: |
      # Gemini CLI

      [Gemini CLI](https://github.com/google-gemini/gemini-cli) adalah agen coding AI open-source dari Google. Template ini mendeploy Gemini CLI sebagai workstation cloud persisten di Zeabur, dengan terminal web (ttyd) yang dapat diakses dari browser.

      ## Memulai

      1. **Deploy template** dan tunggu layanan dimulai. Tunggu hingga health check berwarna hijau sebelum melanjutkan.
      2. **Buka URL layanan** di browser Anda (domain yang terikat ke layanan).
      3. **Login** dengan password dari tab **Instructions** di dashboard Zeabur.
      4. **Atur API key** — atur `GEMINI_API_KEY` di dashboard Zeabur, atau jalankan `gemini` dan ikuti petunjuk autentikasi. Dapatkan key gratis di [Google AI Studio](https://aistudio.google.com/).
      5. **Mulai menggunakan** — pilih opsi di halaman landing, salin perintah, buka terminal dan tempelkan.

      ## Perintah Umum

      | Perintah | Deskripsi |
      |----------|-----------|
      | `gemini` | Memulai sesi interaktif Gemini CLI |
      | `gemini --version` | Memeriksa versi terinstal |
      | `gemini -p "prompt Anda"` | Mengirim prompt tunggal |

      ## Penyimpanan Persisten

      Semua data di bawah `/home/node/` dipertahankan setelah restart dan redeployment.

      ## Sumber Daya yang Direkomendasikan
      - **Minimum**: 1 vCPU / 4 GB RAM (penggunaan ringan)
      - **Disarankan**: 2 vCPU / 16 GB RAM (penggunaan berat, codebase besar)

      ## Masalah yang Diketahui
      - Setelah menyelesaikan login pertama kali, terminal mungkin membeku. Muat ulang halaman untuk melanjutkan.

      ## Catatan Perubahan

      ### 2026-03-31 -- Rilis Pertama

      - Terminal web ttyd (autentikasi password)
      - Homebrew dan paket npm global disimpan persisten di volume
      - Persyaratan sumber daya dan binding domain

      ## Tautan

      - [Gemini CLI GitHub](https://github.com/google-gemini/gemini-cli)
      - [Google AI Studio](https://aistudio.google.com/)
