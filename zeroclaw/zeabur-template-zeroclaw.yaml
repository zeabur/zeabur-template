  zh-TW:
    description: |
      ZeroClaw 🦀 是一個輕量級的 Rust AI 助手基礎設施。零開銷、零妥協——僅需 <5MB 記憶體、亞 10 毫秒冷啟動、單一執行檔部署。支援 29+ AI 供應商和 10+ 訊息平台。
    variables:
      - key: PUBLIC_DOMAIN
        name: 網域
        description: 您想將 ZeroClaw 綁定到哪個網域？
      - key: ZEABUR_AI_HUB_API_KEY
        name: Zeabur AI Hub API 金鑰（推薦）
        description: 您的 Zeabur AI Hub API 金鑰，可透過 AI Hub 使用 GPT/Claude/Gemini/DeepSeek（選填，可稍後設定）
    readme: |
      # ZeroClaw 🦀
      ZeroClaw 是一個輕量級的 Rust AI 助手基礎設施。零開銷、零妥協。100% Rust、100% 不受限。

      - **超輕量**：<5MB 記憶體，亞 10 毫秒冷啟動
      - **29+ AI 供應商**：OpenRouter、OpenAI、Anthropic、Gemini、Groq、Ollama 等
      - **10+ 訊息平台**：Telegram、Discord、Slack、WhatsApp、Matrix、LINE 等
      - **內建記憶體**：SQLite 混合向量 + BM25 搜尋（無需外部向量資料庫）

      ## 使用方式
      1. **配對裝置**：部署後，在瀏覽器打開綁定的網域。Web Dashboard 會顯示配對對話框——輸入 Zeabur 控制台「日誌」分頁中的 6 位配對碼。請妥善保存回傳的 bearer token，只會顯示一次。
      2. **開始對話**：如果部署時已輸入 AI Hub API 金鑰，AI 模型已自動設定完成。打開 Web Dashboard 發送訊息確認正常運作。也可使用 API：`POST /webhook` 帶上 `{"message": "hello"}`。
      3. **切換模型或供應商**（選擇性）：要換模型，在「變數」分頁修改 `ZEROCLAW_MODEL`（如 `gpt-4o-mini`、`deepseek-v3`）。要換供應商，同時修改 `PROVIDER` 和 `API_KEY`（如 `PROVIDER=openrouter`、`API_KEY=sk-or-...`）。修改後重啟服務。

      ## 連接 Telegram（選擇性）
      1. 透過 [@BotFather](https://t.me/BotFather) 建立 bot 並複製 bot token
      2. 打開 Web Dashboard，前往 **Settings** 並加入以下設定：
         ```toml
         [channels_config.telegram]
         bot_token = "123456:your-bot-token"
         allowed_users = []
         ```
         （`allowed_users = []` 會啟用一次性綁定流程；使用 `["*"]` 允許所有人）
      3. 在 Zeabur 控制台重啟服務
      4. 查看「日誌」分頁中的一次性 Telegram 綁定碼，然後在 Telegram 對 bot 發送 `/bind <code>`

      Discord、Slack、WhatsApp、Matrix、LINE 等其他頻道請參考 [Channels Reference](https://github.com/zeroclaw-labs/zeroclaw/blob/main/docs/channels-reference.md)。

      ## 已知問題：透過 Web Dashboard 儲存設定
      在 Web Dashboard Settings 頁面編輯設定時，敏感欄位（如 `api_keys`）會被遮蔽為 `"***MASKED***"`。未修正直接儲存會導致錯誤。解決方法：
      1. 將 `api_keys = "***MASKED***"` 改為 `api_keys = []`（必須是陣列，不是字串）
      2. `api_key = "***MASKED***"` 可以保持不變——環境變數會覆蓋它

      此為上游已知問題，將在未來的 ZeroClaw 版本中修復。

      ## 版本更新
      模板使用 `latest` 映像標籤。要更新 ZeroClaw 到最新版本，只需在 Zeabur 控制台重啟服務——會自動拉取最新映像。`/zeroclaw-data` 中的所有資料在重啟後保留。

      ## 資料持久化
      所有資料（設定、記憶、工作區檔案）皆持久化於 `/zeroclaw-data`。

