    readme: |
      # ZeroClaw 🦀
      ZeroClaw は軽量な Rust ベースの AI アシスタント基盤です。ゼロオーバーヘッド。ゼロ妥協。100% Rust。100% アグノスティック。

      - **超軽量**：5MB 未満のメモリ、10ms 未満のコールドスタート
      - **29 以上の AI プロバイダー**：OpenRouter、OpenAI、Anthropic、Gemini、Groq、Ollama など
      - **10 以上のメッセージングプラットフォーム**：Telegram、Discord、Slack、WhatsApp、Matrix、LINE など
      - **組み込みメモリ**：SQLite ハイブリッドベクター + BM25 検索（外部ベクター DB 不要）

      ## 使い方
      1. **デバイスをペアリング**：デプロイ後、バインドしたドメインをブラウザで開きます。Web Dashboard にペアリングダイアログが表示されるので、Zeabur ダッシュボードの「ログ」タブにある 6 桁コードを入力。返された bearer token を保存してください。一度しか表示されません。
      2. **チャットを開始**：デプロイ時に AI Hub API キーを入力済みなら、AI モデルは設定済みです。Web Dashboard を開いてメッセージを送信し、正常に動作することを確認。API も使用可能：`POST /webhook` に `{"message": "hello"}` を送信。
      3. **モデルやプロバイダーを変更**（オプション）：モデルを変更するには「変数」タブで `ZEROCLAW_MODEL` を変更（例：`gpt-4o-mini`、`deepseek-v3`）。プロバイダーを変更するには `PROVIDER` と `API_KEY` も変更（例：`PROVIDER=openrouter`、`API_KEY=sk-or-...`）。変更後サービスを再起動。

      ## Telegram を接続（オプション）
      1. [@BotFather](https://t.me/BotFather) で bot を作成し、bot token をコピー
      2. Web Dashboard を開き、**Settings** で以下の設定を追加：
         ```toml
         [channels_config.telegram]
         bot_token = "123456:your-bot-token"
         allowed_users = []
         ```
         （`allowed_users = []` でワンタイムバインドフローが有効に。`["*"]` で全員許可）
      3. Zeabur ダッシュボードからサービスを再起動
      4. 「ログ」タブでワンタイム Telegram バインドコードを確認し、bot に `/bind <code>` を送信

      Discord、Slack、WhatsApp、Matrix、LINE などの他チャネルは [Channels Reference](https://github.com/zeroclaw-labs/zeroclaw/blob/main/docs/channels-reference.md) を参照。

      ## 既知の問題：Web Dashboard からの設定保存
      Web Dashboard の Settings ページで設定を編集する際、機密フィールド（例：`api_keys`）は `"***MASKED***"` としてマスクされます。修正せずに保存するとエラーが発生します。回避策：
      1. `api_keys = "***MASKED***"` を `api_keys = []` に変更（文字列ではなく配列にする必要があります）
      2. `api_key = "***MASKED***"` はそのままで OK — 環境変数が上書きします

      これは上流の既知の問題であり、今後の ZeroClaw リリースで修正される予定です。

      ## アップデート
      テンプレートは `latest` イメージタグを使用。ZeroClaw を最新版に更新するには、Zeabur ダッシュボードからサービスを再起動するだけで、最新イメージが自動的にプルされます。`/zeroclaw-data` のデータは再起動後も保持されます。

      ## データ永続化
      すべてのデータ（設定、メモリ、ワークスペースファイル）は `/zeroclaw-data` に永続化されます。

