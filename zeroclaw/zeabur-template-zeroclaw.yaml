      - **Ultra ringan**: <5MB RAM, cold start di bawah 10ms
      - **29+ penyedia AI**: OpenRouter, OpenAI, Anthropic, Gemini, Groq, Ollama, dan lainnya
      - **10+ platform pesan**: Telegram, Discord, Slack, WhatsApp, Matrix, LINE, dan lainnya
      - **Memori bawaan**: SQLite dengan pencarian hibrida vektor + BM25 (tanpa database vektor eksternal)

      ## Penggunaan
      1. **Pasangkan perangkat**: Setelah deployment, buka domain yang telah diikat di browser. Web Dashboard akan menampilkan dialog pairing — masukkan kode 6 digit dari tab "Logs" di dashboard Zeabur. Simpan bearer token yang dikembalikan — hanya ditampilkan sekali.
      2. **Mulai chat**: Jika Anda memasukkan kunci API AI Hub saat deployment, model AI sudah dikonfigurasi. Buka Web Dashboard dan kirim pesan untuk memverifikasi berfungsi. Anda juga dapat menggunakan API: `POST /webhook` dengan `{"message": "hello"}`.
      3. **Ganti model atau penyedia** (opsional): Untuk mengganti model, ubah `ZEROCLAW_MODEL` di tab variabel (contoh: `gpt-4o-mini`, `deepseek-v3`). Untuk mengganti penyedia, ubah juga `PROVIDER` dan `API_KEY` (contoh: `PROVIDER=openrouter`, `API_KEY=sk-or-...`). Restart layanan setelah perubahan.

      ## Hubungkan Telegram (Opsional)
      1. Buat bot melalui [@BotFather](https://t.me/BotFather) dan salin bot token
      2. Buka Web Dashboard, buka **Settings** dan tambahkan konfigurasi berikut:
         ```toml
         [channels_config.telegram]
         bot_token = "123456:your-bot-token"
         allowed_users = []
         ```
         (`allowed_users = []` mengaktifkan alur bind satu kali; gunakan `["*"]` untuk mengizinkan semua orang)
      3. Restart layanan dari dashboard Zeabur
      4. Periksa tab "Logs" untuk kode bind Telegram satu kali, lalu kirim `/bind <code>` ke bot Anda di Telegram

      Untuk Discord, Slack, WhatsApp, Matrix, LINE, dan channel lainnya, lihat [Channels Reference](https://github.com/zeroclaw-labs/zeroclaw/blob/main/docs/channels-reference.md).

      ## Masalah Diketahui: Menyimpan Konfigurasi via Web Dashboard
      Saat mengedit konfigurasi di halaman Settings Web Dashboard, field sensitif (misalnya `api_keys`) disamarkan sebagai `"***MASKED***"`. Menyimpan tanpa memperbaikinya akan menyebabkan error. Solusi:
      1. Ubah `api_keys = "***MASKED***"` menjadi `api_keys = []` (harus berupa array, bukan string)
      2. `api_key = "***MASKED***"` bisa dibiarkan apa adanya — variabel environment akan menimpanya

      Ini adalah masalah upstream yang diketahui dan akan diperbaiki di rilis ZeroClaw mendatang.

      ## Pembaruan
      Template menggunakan tag image `latest`. Untuk memperbarui ZeroClaw ke versi terbaru, cukup restart layanan dari dashboard Zeabur — image terbaru akan diunduh secara otomatis. Semua data di `/zeroclaw-data` tetap tersimpan setelah restart.

      ## Persistensi Data
      Semua data (konfigurasi, memori, file workspace) disimpan secara persisten di `/zeroclaw-data`.
