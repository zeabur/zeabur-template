# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: ZeroClaw
spec:
    description: |
      ZeroClaw 🦀 is a lightweight, Rust-based AI assistant infrastructure. Zero overhead, zero compromise — runs on minimal hardware with <5MB RAM, sub-10ms cold starts, and single-binary deployment. Connects to 29+ AI providers and 10+ messaging platforms.
    icon: https://raw.githubusercontent.com/openagen/zeroclaw/main/zeroclaw.png
    coverImage: https://raw.githubusercontent.com/openagen/zeroclaw/main/zeroclaw.png
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: Domain
        description: What domain do you want to bind ZeroClaw to?
      - key: ZEABUR_AI_HUB_API_KEY
        type: AI_HUB_KEY
        name: Zeabur AI Hub API Key (Recommended)
        description: Your Zeabur AI Hub API key for using GPT/Claude/Gemini/DeepSeek via AI Hub (optional, can be configured later)
    tags:
      - AI
      - Assistant
      - Chatbot
      - Rust
      - Telegram
      - Discord
    resourceRequirement:
      minConfig:
        cpu: 0.25
        ram: 0.25
      recommendedConfig:
        cpu: 0.5
        ram: 0.5
    readme: |
      # ZeroClaw 🦀
      ZeroClaw is a lightweight, Rust-based AI assistant infrastructure. Zero overhead. Zero compromise. 100% Rust. 100% Agnostic.

      - **Ultra-lightweight**: <5MB RAM, sub-10ms cold starts
      - **29+ AI providers**: OpenRouter, OpenAI, Anthropic, Gemini, Groq, Ollama, and more
      - **10+ messaging platforms**: Telegram, Discord, Slack, WhatsApp, Matrix, LINE, DingTalk, Lark, and more
      - **Built-in memory**: SQLite with hybrid vector + BM25 search (no external vector DB needed)
      - **Single binary**: No runtime dependencies

      ## Usage
      1. **Pair your device**: After deployment, open your bound domain in a browser. The Web Dashboard will show a pairing dialog — enter the 6-digit code from the **Logs** tab in Zeabur dashboard. Save the returned bearer token — it is only shown once.
      2. **Start chatting**: If you entered the AI Hub API Key during deployment, your AI model is already configured. Open the Web Dashboard and send a message to verify it works. You can also use the API: `POST /webhook` with `{"message": "hello"}`.
      3. **Change model or provider** (optional): To switch models, change `ZEROCLAW_MODEL` in the **Variables** tab (e.g., `gpt-4o-mini`, `deepseek-v3`). To use a different provider, also change `PROVIDER` and `API_KEY` (e.g., `PROVIDER=openrouter` and `API_KEY=sk-or-...`). Restart the service after changes.

      ## Connect Telegram (Optional)
      1. Create a bot via [@BotFather](https://t.me/BotFather) and copy the bot token
      2. Open the Web Dashboard, go to **Settings** and add the following to your config:
         ```toml
         [channels_config.telegram]
         bot_token = "123456:your-bot-token"
         allowed_users = []
         ```
         (`allowed_users = []` enables the one-time bind flow; use `["*"]` to allow everyone)
      3. Restart the service from Zeabur dashboard
      4. Check the **Logs** tab for a one-time Telegram bind code, then send `/bind <code>` to your bot in Telegram

      For Discord, Slack, WhatsApp, Matrix, LINE, and other channels, see the [Channels Reference](https://github.com/zeroclaw-labs/zeroclaw/blob/main/docs/channels-reference.md).

      ## Known Issue: Saving Config via Web Dashboard
      When editing config in the Web Dashboard Settings page, sensitive fields (e.g. `api_keys`) are masked as `"***MASKED***"`. Saving without fixing these will cause errors. Workaround:
      1. Change `api_keys = "***MASKED***"` to `api_keys = []` (it must be an array, not a string)
      2. You may leave `api_key = "***MASKED***"` as-is — the environment variable overrides it

      This is a known upstream issue and will be fixed in a future ZeroClaw release.

      ## Environment Variables
      | Variable | Description | Default |
      |----------|-------------|---------|
      | `PROVIDER` | AI provider endpoint | `custom:https://hnd1.aihub.zeabur.ai/v1` (AI Hub) |
      | `API_KEY` | API key for the provider | AI Hub key (auto-filled) |
      | `ZEROCLAW_MODEL` | Model override (e.g., `gpt-4o-mini`) | provider default |

      ## Updating
      The template uses the `latest` image tag. To update ZeroClaw to the newest version, simply restart the service from the Zeabur dashboard — it will pull the latest image automatically. All data in `/zeroclaw-data` is preserved across restarts.

      ## Data Persistence
      All data is persisted under `/zeroclaw-data`, including configuration, memory, and workspace files.

      ## Resources
      - [GitHub Repository](https://github.com/openagen/zeroclaw)
      - [Channels Reference](https://github.com/zeroclaw-labs/zeroclaw/blob/main/docs/channels-reference.md)

    services:
      - name: zeroclaw
        icon: https://raw.githubusercontent.com/openagen/zeroclaw/main/zeroclaw.png
        template: PREBUILT_V2
        domainKey: PUBLIC_DOMAIN
        spec:
          source:
            image: ghcr.io/zeroclaw-labs/zeroclaw:latest
          ports:
            - id: web
              port: 42617
              type: HTTP
          volumes:
            - id: data
              dir: /zeroclaw-data
          instructions:
            - type: URL
              title: Web Dashboard
              content: ${ZEABUR_WEB_URL}
          env:
            API_KEY:
              default: ${ZEABUR_AI_HUB_API_KEY}
            PROVIDER:
              default: "custom:https://hnd1.aihub.zeabur.ai/v1"
            ZEROCLAW_MODEL:
              default: "claude-sonnet-4-5"
            ZEROCLAW_GATEWAY_HOST:
              default: "0.0.0.0"
              readonly: true
            ZEROCLAW_ALLOW_PUBLIC_BIND:
              default: "true"
              readonly: true

