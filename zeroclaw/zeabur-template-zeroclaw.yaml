        name: Clave API de Zeabur AI Hub (Recomendado)
        description: Su clave API de Zeabur AI Hub para usar GPT/Claude/Gemini/DeepSeek a través de AI Hub (opcional, se puede configurar después)
    readme: |
      # ZeroClaw 🦀
      ZeroClaw es una infraestructura de asistente de IA ligera basada en Rust. Cero sobrecarga. Cero compromisos. 100% Rust. 100% Agnóstico.

      - **Ultra ligero**: <5MB de RAM, arranques en frío de menos de 10ms
      - **Más de 29 proveedores de IA**: OpenRouter, OpenAI, Anthropic, Gemini, Groq, Ollama y más
      - **Más de 10 plataformas de mensajería**: Telegram, Discord, Slack, WhatsApp, Matrix, LINE y más
      - **Memoria integrada**: SQLite con búsqueda híbrida vectorial + BM25 (sin base de datos vectorial externa)

      ## Uso
      1. **Emparejar dispositivo**: Después del despliegue, abra su dominio vinculado en un navegador. El Web Dashboard mostrará un diálogo de emparejamiento — ingrese el código de 6 dígitos de la pestaña "Logs" del panel de Zeabur. Guarde el bearer token devuelto — solo se muestra una vez.
      2. **Comenzar a chatear**: Si ingresó la clave API de AI Hub durante el despliegue, el modelo de IA ya está configurado. Abra el Web Dashboard y envíe un mensaje para verificar que funciona. También puede usar la API: `POST /webhook` con `{"message": "hello"}`.
      3. **Cambiar modelo o proveedor** (opcional): Para cambiar el modelo, modifique `ZEROCLAW_MODEL` en la pestaña de variables (ej. `gpt-4o-mini`, `deepseek-v3`). Para cambiar de proveedor, modifique también `PROVIDER` y `API_KEY` (ej. `PROVIDER=openrouter`, `API_KEY=sk-or-...`). Reinicie el servicio después de los cambios.

      ## Conectar Telegram (Opcional)
      1. Cree un bot en [@BotFather](https://t.me/BotFather) y copie el token del bot
      2. Abra el Web Dashboard, vaya a **Settings** y agregue la siguiente configuración:
         ```toml
         [channels_config.telegram]
         bot_token = "123456:your-bot-token"
         allowed_users = []
         ```
         (`allowed_users = []` habilita el flujo de vinculación única; use `["*"]` para permitir a todos)
      3. Reinicie el servicio desde el panel de Zeabur
      4. Busque el código de vinculación de Telegram en la pestaña "Logs", luego envíe `/bind <code>` a su bot en Telegram

      Para Discord, Slack, WhatsApp, Matrix, LINE y otros canales, consulte [Channels Reference](https://github.com/zeroclaw-labs/zeroclaw/blob/main/docs/channels-reference.md).

      ## Problema conocido: Guardar configuración desde Web Dashboard
      Al editar la configuración en la página Settings del Web Dashboard, los campos sensibles (ej. `api_keys`) se enmascaran como `"***MASKED***"`. Guardar sin corregirlos causará errores. Solución:
      1. Cambie `api_keys = "***MASKED***"` a `api_keys = []` (debe ser un array, no una cadena)
      2. Puede dejar `api_key = "***MASKED***"` como está — la variable de entorno lo sobrescribe

      Este es un problema conocido del proyecto y se corregirá en una futura versión de ZeroClaw.

      ## Actualización
      La plantilla usa la etiqueta de imagen `latest`. Para actualizar ZeroClaw a la versión más reciente, simplemente reinicie el servicio desde el panel de Zeabur — se descargará la imagen más reciente automáticamente. Todos los datos en `/zeroclaw-data` se conservan entre reinicios.

      ## Persistencia de datos
      Todos los datos (configuración, memoria, archivos de trabajo) se persisten en `/zeroclaw-data`.

