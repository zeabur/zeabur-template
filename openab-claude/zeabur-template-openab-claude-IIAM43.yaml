# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: OpenAB Claude
spec:
  description: |
    Open Agent Broker — a lightweight Rust harness that bridges Discord to any ACP-compatible coding CLI (Claude Code, Codex, Gemini, Kiro) over stdio JSON-RPC.
    Source: https://github.com/openabdev/openab
  icon: https://cdn-console.zeabur.com/f/WpysO/claude-color.webp
  tags:
    - AI
    - Developer Tools
    - Discord
  resourceRequirement:
    minConfig:
      cpu: 2
      ram: 4
    recommendedConfig:
      cpu: 4
      ram: 8
  variables:
    - key: DISCORD_BOT_TOKEN
      type: STRING
      name: Discord Bot Token
      description: Token from https://discord.com/developers/applications
    - key: OPENAB_AUTH_TOKEN
      type: STRING
      name: Auth Token
      description: "Anthropic API key, Zeabur AI Hub token, or Claude OAuth token (from: claude setup-token)"
    - key: OPENAB_ALLOWED_CHANNELS
      type: STRING
      name: Discord Channel IDs
      description: "Comma-separated Discord channel IDs where the bot listens. Example: 123456789012345678,234567890123456789"
  readme: |
    # OpenAB

    [OpenAB](https://github.com/openabdev/openab) is a lightweight, open-source Rust harness that bridges Discord to any [Agent Client Protocol](https://github.com/anthropics/agent-protocol)-compatible coding CLI over stdio JSON-RPC.

    This template deploys the Claude variant (`openab-claude`) which uses `claude-agent-acp` as the agent backend.

    ## Setup

    ### 1. Get a Discord Bot Token

    1. Go to https://discord.com/developers/applications and click **New Application**
    2. Navigate to **Bot** tab → click **Reset Token** → copy the token
    3. On the same page, scroll down and enable **Message Content Intent** under Privileged Gateway Intents
    4. Go to **OAuth2 → URL Generator** → check scope `bot` → check permissions: Send Messages, Send Messages in Threads, Create Public Threads, Read Message History, Add Reactions, Manage Messages
    5. Copy the generated URL and open it in your browser to invite the bot to your server

    ### 2. Get an Auth Token (choose one)

    | Method | How to get it |
    |--------|--------------|
    | **Anthropic API Key** | Go to [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) → Create Key → copy the `sk-ant-api...` key |
    | **Zeabur AI Hub Token** | Go to [Zeabur AI Hub](https://zeabur.com/ai) → API Keys → Create → copy the token |
    | **Claude OAuth Token** | Run `claude setup-token` in your terminal (requires Claude Pro/Max/Team/Enterprise subscription) → visit the URL it shows → authorize → paste the code back → copy the `sk-ant-oat...` token it outputs |

    ### 3. Get Discord Channel IDs

    1. Open Discord → go to **User Settings** (gear icon) → **Advanced** → enable **Developer Mode**
    2. Right-click the channel where you want the bot to respond → **Copy Channel ID**
    3. For multiple channels, separate IDs with commas: `123456789012345678,234567890123456789`

    ### 4. Deploy

    Fill in the three template variables and click deploy. The service connects to Discord automatically.

    ## Usage

    - **@mention the bot** in an allowed channel to start a conversation
    - OpenAB creates a **thread** for multi-turn conversations — no @mention needed for follow-ups
    - Emoji reactions show status: 👀 queued → 🤔 thinking → 🔧 tool use → ✅ done / ❌ error
    - Each thread maps to a persistent Claude session (24h TTL)

    ## GitHub Integration (Optional)

    The agent can use `gh` (GitHub CLI) to review PRs, create issues, comment, merge, etc. Since the container is headless, authentication uses device flow:

    1. Ask the bot in Discord: **"log in to GitHub"**
    2. The bot will reply with a one-time code and a URL (e.g. `https://github.com/login/device`)
    3. Open the URL on your phone or computer, enter the code, and authorize
    4. The bot confirms login — `gh` is now authenticated for this session

    See [gh-auth-device-flow.md](https://github.com/openabdev/openab/blob/main/docs/gh-auth-device-flow.md) for technical details.

    ## Customization

    After deployment, you can customize the agent's behavior via the Zeabur dashboard (**Service → Exec**) or by asking the bot in Discord:

    | What to change | Where | How |
    |---|---|---|
    | Agent instructions (persona, language, rules) | `/home/node/CLAUDE.md` | Create or edit this file — Claude reads it automatically on every session. Example: "Always respond in Traditional Chinese" |
    | Max concurrent sessions | `/home/node/.config/openab/config.toml` | Edit `max_sessions` under `[pool]` (default: 10). Restart service after changing. |
    | Session TTL | `/home/node/.config/openab/config.toml` | Edit `session_ttl_hours` under `[pool]` (default: 24) |
    | Emoji reactions | `/home/node/.config/openab/config.toml` | Edit `[reactions.emojis]` section |
    | Permission mode | `/etc/claude-code/managed-settings.json` | Change `bypassPermissions` to `default` if you want the agent to ask before using tools |
    | Allowed channels | Zeabur Dashboard → Environment Variables | Edit `OPENAB_ALLOWED_CHANNELS`, then restart |

    **Note:** `config.toml` is regenerated from environment variables on every restart. To make permanent changes, either edit the environment variables in the Zeabur dashboard, or modify `/opt/start-openab.sh` to preserve your customizations.

    ## Disabling

    Leave `Discord Bot Token` empty. The service sleeps instead of crashing.

    ## Links

    - [OpenAB GitHub](https://github.com/openabdev/openab)
    - [Agent Client Protocol](https://github.com/anthropics/agent-protocol)
    - [Anthropic Console](https://console.anthropic.com/)
    - [Zeabur AI Hub](https://zeabur.com/ai)
  services:
    - name: openab
      icon: https://cdn-console.zeabur.com/f/WpysO/claude-color.webp
      template: PREBUILT_V2
      spec:
        source:
          image: ghcr.io/openabdev/openab-claude:latest
          command:
            - /bin/sh
            - -c
            - /opt/start-openab.sh
        configs:
          - path: /opt/start-openab.sh
            permission: 493
            template: |
              #!/bin/sh
              set -e

              if [ -z "$DISCORD_BOT_TOKEN" ] || [ -z "$OPENAB_AUTH_TOKEN" ]; then
                echo "openab: DISCORD_BOT_TOKEN or OPENAB_AUTH_TOKEN not set — sleeping"
                exec sleep infinity
              fi

              # Detect auth token type and set appropriate env var
              case "$OPENAB_AUTH_TOKEN" in
                sk-ant-oat*)
                  # Claude OAuth token (subscription)
                  export CLAUDE_CODE_OAUTH_TOKEN="$OPENAB_AUTH_TOKEN"
                  AUTH_ENV='CLAUDE_CODE_OAUTH_TOKEN = "${CLAUDE_CODE_OAUTH_TOKEN}"'
                  ;;
                sk-ant-*)
                  # Anthropic API key
                  export ANTHROPIC_API_KEY="$OPENAB_AUTH_TOKEN"
                  AUTH_ENV='ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"'
                  ;;
                *)
                  # Zeabur AI Hub token (or other provider)
                  export ANTHROPIC_API_KEY="$OPENAB_AUTH_TOKEN"
                  export ANTHROPIC_BASE_URL="https://hnd1.aihub.zeabur.ai"
                  export CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS=1
                  AUTH_ENV='ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}", ANTHROPIC_BASE_URL = "${ANTHROPIC_BASE_URL}", CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS = "${CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS}"'
                  ;;
              esac

              # Convert comma-separated channel IDs to TOML string array
              CHANNELS=""
              IFS=','
              for id in $OPENAB_ALLOWED_CHANNELS; do
                id=$(echo "$id" | tr -d ' ')
                [ -n "$id" ] && CHANNELS="${CHANNELS}\"${id}\","
              done
              unset IFS
              CHANNELS=$(echo "$CHANNELS" | sed 's/,$//')

              mkdir -p /home/node/.config/openab
              cat > /home/node/.config/openab/config.toml <<EOF
              [discord]
              bot_token = "\${DISCORD_BOT_TOKEN}"
              allowed_channels = [$CHANNELS]

              [agent]
              command = "claude-agent-acp"
              args = []
              working_dir = "/home/node"
              env = { $AUTH_ENV }

              [pool]
              max_sessions = 10
              session_ttl_hours = 24

              [reactions]
              enabled = true
              remove_after_reply = false

              [reactions.emojis]
              queued = "👀"
              thinking = "🤔"
              tool = "🔧"
              done = "✅"
              error = "❌"
              EOF

              chown -R node:node /home/node/.config/openab
              exec runuser -u node --preserve-environment -- openab /home/node/.config/openab/config.toml
          - path: /etc/claude-code/managed-settings.json
            template: |
              {"permissions":{"defaultMode":"bypassPermissions"}}
        env:
          DISCORD_BOT_TOKEN:
            default: ${DISCORD_BOT_TOKEN}
          OPENAB_AUTH_TOKEN:
            default: ${OPENAB_AUTH_TOKEN}
          OPENAB_ALLOWED_CHANNELS:
            default: ${OPENAB_ALLOWED_CHANNELS}
  locales:
    zh-TW:
      description: |
        Open Agent Broker — 輕量的 Rust 程式，透過 stdio JSON-RPC 將 Discord 橋接到任何 ACP 相容的 coding CLI（Claude Code、Codex、Gemini、Kiro）。
        來源：https://github.com/openabdev/openab
      variables:
        - key: DISCORD_BOT_TOKEN
          name: Discord Bot Token
          description: 從 https://discord.com/developers/applications 取得的 Token
        - key: OPENAB_AUTH_TOKEN
          name: 認證 Token
          description: "Anthropic API 金鑰、Zeabur AI Hub token 或 Claude OAuth token（透過 claude setup-token 取得）"
        - key: OPENAB_ALLOWED_CHANNELS
          name: Discord 頻道 ID
          description: "Bot 監聽的 Discord 頻道 ID，以逗號分隔。範例：123456789012345678,234567890123456789"
      readme: |
        # OpenAB（中文）

        [OpenAB](https://github.com/openabdev/openab) 是一個輕量的開源 Rust 程式，透過 stdio JSON-RPC 將 Discord 橋接到任何支援 [Agent Client Protocol](https://github.com/anthropics/agent-protocol) 的 coding CLI。

        此模板部署的是 Claude 變體（`openab-claude`），使用 `claude-agent-acp` 作為 agent 後端。

        ## 設定步驟

        ### 1. 取得 Discord Bot Token

        1. 前往 https://discord.com/developers/applications，點擊 **New Application**
        2. 進入 **Bot** 頁籤 → 點擊 **Reset Token** → 複製 token
        3. 同一頁面往下滑，在 Privileged Gateway Intents 下啟用 **Message Content Intent**
        4. 前往 **OAuth2 → URL Generator** → 勾選 scope `bot` → 勾選權限：Send Messages、Send Messages in Threads、Create Public Threads、Read Message History、Add Reactions、Manage Messages
        5. 複製產生的 URL，在瀏覽器中開啟以邀請 Bot 到你的伺服器

        ### 2. 取得 Auth Token（擇一）

        | 方式 | 取得方法 |
        |------|---------|
        | **Anthropic API Key** | 前往 [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) → Create Key → 複製 `sk-ant-api...` 金鑰 |
        | **Zeabur AI Hub Token** | 前往 [Zeabur AI Hub](https://zeabur.com/ai) → API Keys → Create → 複製 token |
        | **Claude OAuth Token** | 在終端執行 `claude setup-token`（需要 Claude Pro/Max/Team/Enterprise 訂閱）→ 開啟顯示的 URL → 授權 → 貼回驗證碼 → 複製輸出的 `sk-ant-oat...` token |

        ### 3. 取得 Discord 頻道 ID

        1. 開啟 Discord → 前往 **使用者設定**（齒輪圖示）→ **進階** → 啟用 **開發者模式**
        2. 對你要 Bot 回應的頻道按右鍵 → **複製頻道 ID**
        3. 多個頻道用逗號分隔：`123456789012345678,234567890123456789`

        ### 4. 部署

        填入三個模板變數後點擊部署即可。服務會自動連線到 Discord。

        ## 使用方式

        - 在允許的頻道中 **@mention Bot** 即可開始對話
        - OpenAB 會自動建立 **thread** 進行多輪對話 — 後續訊息不需要再 @mention
        - Emoji 反應顯示狀態：👀 排隊 → 🤔 思考中 → 🔧 工具呼叫 → ✅ 完成 / ❌ 錯誤
        - 每個 thread 對應一個持久的 Claude session（預設 24 小時 TTL）

        ## GitHub 整合（選用）

        Agent 可以使用 `gh`（GitHub CLI）來 review PR、建立 issue、留言、合併等。由於容器沒有瀏覽器，認證使用 device flow：

        1. 在 Discord 對 bot 說：**「登入 GitHub」**
        2. Bot 會回覆一組一次性代碼和 URL（例如 `https://github.com/login/device`）
        3. 在手機或電腦上開啟 URL，輸入代碼並授權
        4. Bot 確認登入完成 — `gh` 已在此 session 中認證

        詳見 [gh-auth-device-flow.md](https://github.com/openabdev/openab/blob/main/docs/gh-auth-device-flow.md)。

        ## 自訂設定

        部署後可透過 Zeabur Dashboard（**服務 → Exec**）或直接在 Discord 對 bot 說來自訂 agent 行為：

        | 要改什麼 | 在哪裡 | 怎麼改 |
        |---------|--------|--------|
        | Agent 指令（角色設定、語言、規則） | `/home/node/CLAUDE.md` | 建立或編輯此檔案 — Claude 每次 session 會自動讀取。例如：「永遠使用繁體中文回覆」 |
        | 最大同時 session 數 | `/home/node/.config/openab/config.toml` | 編輯 `[pool]` 下的 `max_sessions`（預設：10）。改完需重啟服務。 |
        | Session 存活時間 | `/home/node/.config/openab/config.toml` | 編輯 `[pool]` 下的 `session_ttl_hours`（預設：24） |
        | Emoji 反應 | `/home/node/.config/openab/config.toml` | 編輯 `[reactions.emojis]` 區段 |
        | 權限模式 | `/etc/claude-code/managed-settings.json` | 將 `bypassPermissions` 改為 `default`，讓 agent 在使用工具前先詢問 |
        | 允許的頻道 | Zeabur Dashboard → 環境變數 | 編輯 `OPENAB_ALLOWED_CHANNELS`，然後重啟 |

        **注意：** `config.toml` 在每次重啟時會從環境變數重新生成。要永久修改，請在 Zeabur Dashboard 中編輯環境變數，或修改 `/opt/start-openab.sh` 保留你的自訂設定。

        ## 停用

        部署時將 `Discord Bot Token` 留空即可。服務會進入 sleep 狀態，不會崩潰。

        ## 連結

        - [OpenAB GitHub](https://github.com/openabdev/openab)
        - [Agent Client Protocol](https://github.com/anthropics/agent-protocol)
        - [Anthropic Console](https://console.anthropic.com/)
        - [Zeabur AI Hub](https://zeabur.com/ai)
