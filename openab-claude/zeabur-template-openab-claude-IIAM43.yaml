        | 方法 | 取得手順 |
        |------|---------|
        | **Anthropic API Key** | [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) → Create Key → `sk-ant-api...` キーをコピー |
        | **Zeabur AI Hub Token** | [Zeabur AI Hub](https://zeabur.com/ai) → API Keys → Create → token をコピー |
        | **Claude OAuth Token** | ターミナルで `claude setup-token` を実行（Claude Pro/Max/Team/Enterprise サブスクリプションが必要）→ 表示された URL を開く → 認証 → コードを貼り付け → 出力された `sk-ant-oat...` token をコピー |

        ### 3. Discord チャンネル ID の取得

        1. Discord を開く → **ユーザー設定**（歯車アイコン）→ **詳細設定** → **開発者モード** を有効化
        2. Bot に応答させたいチャンネルを右クリック → **チャンネル ID をコピー**
        3. 複数チャンネルはカンマで区切る：`123456789012345678,234567890123456789`

        ### 4. デプロイ

        3 つのテンプレート変数を入力してデプロイをクリック。サービスは自動的に Discord に接続します。

        ## 使い方

        - 許可されたチャンネルで **Bot を @mention** して会話を開始
        - OpenAB は自動的に **thread** を作成してマルチターン会話を行います — 以降のメッセージでは @mention 不要
        - Emoji リアクションでステータスを表示：👀 キュー → 🤔 思考中 → 🔧 ツール使用 → ✅ 完了 / ❌ エラー
        - 各 thread は永続的な Claude session に対応（デフォルト 24 時間 TTL）

        ## GitHub 連携（オプション）

        エージェントは `gh`（GitHub CLI）を使って PR レビュー、Issue 作成、コメント、マージなどができます。コンテナにはブラウザがないため、device flow で認証します：

        1. Discord で Bot に **「GitHub にログイン」** と伝える
        2. Bot がワンタイムコードと URL（例：`https://github.com/login/device`）を返信
        3. スマートフォンまたは PC で URL を開き、コードを入力して認証
        4. Bot がログイン完了を確認 — `gh` がこのセッションで認証済みになります

        詳細は [gh-auth-device-flow.md](https://github.com/openabdev/openab/blob/main/docs/gh-auth-device-flow.md) を参照。

        ## カスタマイズ

        デプロイ後、Zeabur Dashboard（**サービス → Exec**）または Discord で Bot に指示することでエージェントの動作をカスタマイズできます：

        | 変更内容 | ファイルの場所 | 方法 |
        |---------|-------------|------|
        | エージェントの指示（ペルソナ、言語、ルール） | `/home/node/CLAUDE.md` | このファイルを作成・編集 — Claude は毎セッション自動的に読み込みます。例：「常に日本語で応答する」 |
        | 最大同時セッション数 | `/home/node/.config/openab/config.toml` | `[pool]` の `max_sessions` を編集（デフォルト：10）。変更後サービスを再起動。 |
        | セッション TTL | `/home/node/.config/openab/config.toml` | `[pool]` の `session_ttl_hours` を編集（デフォルト：24） |
        | Emoji リアクション | `/home/node/.config/openab/config.toml` | `[reactions.emojis]` セクションを編集 |
        | 権限モード | `/etc/claude-code/managed-settings.json` | `bypassPermissions` を `default` に変更すると、ツール使用前にエージェントが確認します |
        | 許可チャンネル | Zeabur Dashboard → 環境変数 | `OPENAB_ALLOWED_CHANNELS` を編集し、再起動 |

        **注意：** `config.toml` は再起動のたびに環境変数から再生成されます。永続的に変更するには、Zeabur Dashboard で環境変数を編集するか、`/opt/start-openab.sh` を修正してください。

        ## 無効化

        デプロイ時に `Discord Bot Token` を空にしてください。サービスはクラッシュせずスリープ状態になります。

        ## リンク

        - [OpenAB GitHub](https://github.com/openabdev/openab)
        - [Agent Client Protocol](https://github.com/anthropics/agent-protocol)
        - [Anthropic Console](https://console.anthropic.com/)
        - [Zeabur AI Hub](https://zeabur.com/ai)
