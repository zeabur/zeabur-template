      readme: |
        # OpenAB (Bahasa Indonesia)

        [OpenAB](https://github.com/openabdev/openab) adalah harness Rust yang ringan dan open-source yang menjembatani Discord ke CLI coding yang kompatibel dengan [Agent Client Protocol](https://github.com/anthropics/agent-protocol) melalui stdio JSON-RPC.

        Template ini men-deploy varian Claude (`openab-claude`) yang menggunakan `claude-agent-acp` sebagai backend agen.

        ## Pengaturan

        ### 1. Dapatkan Discord Bot Token

        1. Buka https://discord.com/developers/applications dan klik **New Application**
        2. Buka tab **Bot** → klik **Reset Token** → salin token
        3. Di halaman yang sama, scroll ke bawah dan aktifkan **Message Content Intent** di Privileged Gateway Intents
        4. Buka **OAuth2 → URL Generator** → centang scope `bot` → centang izin: Send Messages, Send Messages in Threads, Create Public Threads, Read Message History, Add Reactions, Manage Messages
        5. Salin URL yang dihasilkan dan buka di browser untuk mengundang Bot ke server Anda

        ### 2. Dapatkan Auth Token (pilih salah satu)

        | Metode | Cara mendapatkan |
        |--------|-----------------|
        | **Anthropic API Key** | Buka [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) → Create Key → salin kunci `sk-ant-api...` |
        | **Zeabur AI Hub Token** | Buka [Zeabur AI Hub](https://zeabur.com/ai) → API Keys → Create → salin token |
        | **Claude OAuth Token** | Jalankan `claude setup-token` di terminal (memerlukan langganan Claude Pro/Max/Team/Enterprise) → buka URL yang ditampilkan → otorisasi → tempel kode → salin token `sk-ant-oat...` yang dihasilkan |

        ### 3. Dapatkan ID Channel Discord

        1. Buka Discord → **Pengaturan Pengguna** (ikon roda gigi) → **Lanjutan** → aktifkan **Mode Pengembang**
        2. Klik kanan channel tempat Anda ingin Bot merespons → **Salin ID Channel**
        3. Untuk beberapa channel, pisahkan dengan koma: `123456789012345678,234567890123456789`

        ### 4. Deploy

        Isi tiga variabel template dan klik deploy. Layanan akan terhubung ke Discord secara otomatis.

        ## Penggunaan

        - **@mention bot** di channel yang diizinkan untuk memulai percakapan
        - OpenAB membuat **thread** untuk percakapan multi-giliran — tidak perlu @mention untuk pesan selanjutnya
        - Reaksi emoji menunjukkan status: 👀 antrian → 🤔 berpikir → 🔧 penggunaan alat → ✅ selesai / ❌ error
        - Setiap thread dipetakan ke sesi Claude yang persisten (TTL 24 jam secara default)

        ## Integrasi GitHub (Opsional)

        Agent dapat menggunakan `gh` (GitHub CLI) untuk review PR, membuat issue, komentar, merge, dll. Karena container tidak memiliki browser, autentikasi menggunakan device flow:

        1. Minta bot di Discord: **"log in to GitHub"**
        2. Bot akan membalas dengan kode satu kali dan URL (mis. `https://github.com/login/device`)
        3. Buka URL di ponsel atau komputer, masukkan kode dan otorisasi
        4. Bot mengonfirmasi login — `gh` sudah terautentikasi untuk sesi ini

        Lihat [gh-auth-device-flow.md](https://github.com/openabdev/openab/blob/main/docs/gh-auth-device-flow.md) untuk detail teknis.

        ## Kustomisasi

        Setelah deploy, Anda dapat menyesuaikan perilaku agent melalui Zeabur Dashboard (**Layanan → Exec**) atau dengan meminta bot di Discord:

        | Apa yang diubah | Di mana | Cara |
        |----------------|---------|------|
        | Instruksi agent (persona, bahasa, aturan) | `/home/node/CLAUDE.md` | Buat atau edit file ini — Claude membacanya secara otomatis di setiap sesi. Contoh: "Selalu balas dalam Bahasa Indonesia" |
        | Maks sesi bersamaan | `/home/node/.config/openab/config.toml` | Edit `max_sessions` di `[pool]` (default: 10). Restart layanan setelah mengubah. |
        | TTL sesi | `/home/node/.config/openab/config.toml` | Edit `session_ttl_hours` di `[pool]` (default: 24) |
        | Reaksi emoji | `/home/node/.config/openab/config.toml` | Edit bagian `[reactions.emojis]` |
        | Mode izin | `/etc/claude-code/managed-settings.json` | Ubah `bypassPermissions` menjadi `default` agar agent bertanya sebelum menggunakan alat |
        | Channel yang diizinkan | Zeabur Dashboard → Variabel Lingkungan | Edit `OPENAB_ALLOWED_CHANNELS`, lalu restart |

        **Catatan:** `config.toml` dibuat ulang dari variabel lingkungan setiap restart. Untuk perubahan permanen, edit variabel lingkungan di Zeabur Dashboard atau modifikasi `/opt/start-openab.sh`.

        ## Menonaktifkan

        Kosongkan `Discord Bot Token` saat deploy. Layanan akan tidur tanpa crash.

        ## Tautan

        - [OpenAB GitHub](https://github.com/openabdev/openab)
        - [Agent Client Protocol](https://github.com/anthropics/agent-protocol)
        - [Anthropic Console](https://console.anthropic.com/)
        - [Zeabur AI Hub](https://zeabur.com/ai)
