        | Agent 指令（角色设定、语言、规则） | `/home/node/CLAUDE.md` | 创建或编辑此文件 — Claude 每次 session 会自动读取。例如："永远使用简体中文回复" |
        | 最大同时 session 数 | `/home/node/.config/openab/config.toml` | 编辑 `[pool]` 下的 `max_sessions`（默认：10）。改完需重启服务。 |
        | Session 存活时间 | `/home/node/.config/openab/config.toml` | 编辑 `[pool]` 下的 `session_ttl_hours`（默认：24） |
        | Emoji 反应 | `/home/node/.config/openab/config.toml` | 编辑 `[reactions.emojis]` 区段 |
        | 权限模式 | `/etc/claude-code/managed-settings.json` | 将 `bypassPermissions` 改为 `default`，让 agent 在使用工具前先询问 |
        | 允许的频道 | Zeabur Dashboard → 环境变量 | 编辑 `OPENAB_ALLOWED_CHANNELS`，然后重启 |

        **注意：** `config.toml` 在每次重启时会从环境变量重新生成。要永久修改，请在 Zeabur Dashboard 中编辑环境变量，或修改 `/opt/start-openab.sh` 保留你的自定义设置。

        ## 停用

        部署时将 `Discord Bot Token` 留空即可。服务会进入 sleep 状态，不会崩溃。

