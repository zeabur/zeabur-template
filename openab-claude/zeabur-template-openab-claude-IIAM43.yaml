        Open Agent Broker — un arnés ligero en Rust que conecta Discord con cualquier CLI de coding compatible con ACP (Claude Code, Codex, Gemini, Kiro) a través de stdio JSON-RPC.
        Fuente: https://github.com/openabdev/openab
      variables:
        - key: DISCORD_BOT_TOKEN
          name: Token del Bot de Discord
          description: Token obtenido de https://discord.com/developers/applications
        - key: OPENAB_AUTH_TOKEN
          name: Token de Autenticación
          description: "Clave API de Anthropic, token de Zeabur AI Hub o token OAuth de Claude (obtenido con: claude setup-token)"
        - key: OPENAB_ALLOWED_CHANNELS
          name: IDs de Canales de Discord
          description: "IDs de canales de Discord donde el bot escucha, separados por comas. Ejemplo: 123456789012345678,234567890123456789"
      readme: |
        # OpenAB (Español)

        [OpenAB](https://github.com/openabdev/openab) es un arnés ligero de código abierto en Rust que conecta Discord con cualquier CLI de coding compatible con [Agent Client Protocol](https://github.com/anthropics/agent-protocol) a través de stdio JSON-RPC.

        Esta plantilla despliega la variante Claude (`openab-claude`), que utiliza `claude-agent-acp` como backend de agente.

        ## Configuración

        ### 1. Obtener el Discord Bot Token

        1. Ir a https://discord.com/developers/applications y hacer clic en **New Application**
        2. Ir a la pestaña **Bot** → clic en **Reset Token** → copiar el token
        3. En la misma página, bajar y habilitar **Message Content Intent** en Privileged Gateway Intents
        4. Ir a **OAuth2 → URL Generator** → marcar scope `bot` → marcar permisos: Send Messages, Send Messages in Threads, Create Public Threads, Read Message History, Add Reactions, Manage Messages
        5. Copiar la URL generada y abrirla en el navegador para invitar al Bot al servidor

        ### 2. Obtener un Auth Token (elegir uno)

        | Método | Cómo obtenerlo |
        |--------|---------------|
        | **Anthropic API Key** | Ir a [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) → Create Key → copiar la clave `sk-ant-api...` |
        | **Zeabur AI Hub Token** | Ir a [Zeabur AI Hub](https://zeabur.com/ai) → API Keys → Create → copiar el token |
        | **Claude OAuth Token** | Ejecutar `claude setup-token` en la terminal (requiere suscripción Claude Pro/Max/Team/Enterprise) → abrir la URL mostrada → autorizar → pegar el código → copiar el token `sk-ant-oat...` |

        ### 3. Obtener IDs de canales de Discord

        1. Abrir Discord → **Ajustes de usuario** (icono de engranaje) → **Avanzado** → activar **Modo desarrollador**
        2. Clic derecho en el canal donde quieres que el Bot responda → **Copiar ID del canal**
        3. Para múltiples canales, separar con comas: `123456789012345678,234567890123456789`

        ### 4. Desplegar

        Completar las tres variables de la plantilla y hacer clic en desplegar. El servicio se conecta a Discord automáticamente.

        ## Uso

        - **@mencionar al bot** en un canal permitido para iniciar una conversación
        - OpenAB crea un **thread** para conversaciones de múltiples turnos — no se necesita @mención en los mensajes siguientes
        - Las reacciones emoji muestran el estado: 👀 en cola → 🤔 pensando → 🔧 uso de herramientas → ✅ listo / ❌ error
        - Cada thread corresponde a una sesión persistente de Claude (TTL de 24h por defecto)

        ## Integración con GitHub (Opcional)

        El agente puede usar `gh` (GitHub CLI) para revisar PRs, crear issues, comentar, fusionar, etc. Como el contenedor no tiene navegador, la autenticación usa device flow:

        1. Dile al bot en Discord: **"log in to GitHub"**
        2. El bot responderá con un código único y una URL (ej. `https://github.com/login/device`)
        3. Abre la URL en tu teléfono o computadora, ingresa el código y autoriza
        4. El bot confirma el inicio de sesión — `gh` está autenticado para esta sesión

        Ver [gh-auth-device-flow.md](https://github.com/openabdev/openab/blob/main/docs/gh-auth-device-flow.md) para detalles técnicos.

        ## Personalización

        Después del despliegue, puedes personalizar el comportamiento del agente a través del Dashboard de Zeabur (**Servicio → Exec**) o pidiendo al bot en Discord:

        | Qué cambiar | Dónde | Cómo |
        |------------|-------|------|
        | Instrucciones del agente (persona, idioma, reglas) | `/home/node/CLAUDE.md` | Crea o edita este archivo — Claude lo lee automáticamente en cada sesión. Ejemplo: "Siempre responde en español" |
        | Máximo de sesiones simultáneas | `/home/node/.config/openab/config.toml` | Edita `max_sessions` en `[pool]` (por defecto: 10). Reiniciar el servicio después de cambiar. |
        | TTL de sesión | `/home/node/.config/openab/config.toml` | Edita `session_ttl_hours` en `[pool]` (por defecto: 24) |
        | Reacciones emoji | `/home/node/.config/openab/config.toml` | Edita la sección `[reactions.emojis]` |
        | Modo de permisos | `/etc/claude-code/managed-settings.json` | Cambia `bypassPermissions` a `default` para que el agente pregunte antes de usar herramientas |
        | Canales permitidos | Zeabur Dashboard → Variables de entorno | Edita `OPENAB_ALLOWED_CHANNELS` y reinicia |

        **Nota:** `config.toml` se regenera desde las variables de entorno en cada reinicio. Para cambios permanentes, edita las variables de entorno en el Dashboard de Zeabur o modifica `/opt/start-openab.sh`.

        ## Desactivar

        Dejar `Discord Bot Token` vacío al desplegar. El servicio entrará en modo sleep sin fallar.

        ## Enlaces

        - [OpenAB GitHub](https://github.com/openabdev/openab)
        - [Agent Client Protocol](https://github.com/anthropics/agent-protocol)
        - [Anthropic Console](https://console.anthropic.com/)
        - [Zeabur AI Hub](https://zeabur.com/ai)
