      readme: |
        # OpenAB（简体中文）

        [OpenAB](https://github.com/openabdev/openab) 是一个轻量的开源 Rust 程序，通过 stdio JSON-RPC 将 Discord 桥接到任何支持 [Agent Client Protocol](https://github.com/anthropics/agent-protocol) 的 coding CLI。

        此模板部署的是 Claude 变体（`openab-claude`），使用 `claude-agent-acp` 作为 agent 后端。

        ## 设置步骤

        ### 1. 获取 Discord Bot Token

        1. 前往 https://discord.com/developers/applications，点击 **New Application**
        2. 进入 **Bot** 页签 → 点击 **Reset Token** → 复制 token
        3. 同一页面往下滑，在 Privileged Gateway Intents 下启用 **Message Content Intent**
        4. 前往 **OAuth2 → URL Generator** → 勾选 scope `bot` → 勾选权限：Send Messages、Send Messages in Threads、Create Public Threads、Read Message History、Add Reactions、Manage Messages
        5. 复制生成的 URL，在浏览器中打开以邀请 Bot 到你的服务器

        ### 2. 获取 Auth Token（任选其一）

        | 方式 | 获取方法 |
        |------|---------|
        | **Anthropic API Key** | 前往 [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) → Create Key → 复制 `sk-ant-api...` 密钥 |
        | **Zeabur AI Hub Token** | 前往 [Zeabur AI Hub](https://zeabur.com/ai) → API Keys → Create → 复制 token |
        | **Claude OAuth Token** | 在终端运行 `claude setup-token`（需要 Claude Pro/Max/Team/Enterprise 订阅）→ 打开显示的 URL → 授权 → 粘贴验证码 → 复制输出的 `sk-ant-oat...` token |

        ### 3. 获取 Discord 频道 ID

        1. 打开 Discord → 前往 **用户设置**（齿轮图标）→ **高级** → 启用 **开发者模式**
        2. 右键点击你要 Bot 回应的频道 → **复制频道 ID**
        3. 多个频道用逗号分隔：`123456789012345678,234567890123456789`

        ### 4. 部署

        填入三个模板变量后点击部署即可。服务会自动连接到 Discord。

        ## 使用方式

        - 在允许的频道中 **@mention Bot** 即可开始对话
        - OpenAB 会自动创建 **thread** 进行多轮对话 — 后续消息不需要再 @mention
        - Emoji 反应显示状态：👀 排队 → 🤔 思考中 → 🔧 工具调用 → ✅ 完成 / ❌ 错误
        - 每个 thread 对应一个持久的 Claude session（默认 24 小时 TTL）

        ## GitHub 集成（可选）

        Agent 可以使用 `gh`（GitHub CLI）来 review PR、创建 issue、评论、合并等。由于容器没有浏览器，认证使用 device flow：

        1. 在 Discord 对 bot 说：**"登录 GitHub"**
        2. Bot 会回复一组一次性代码和 URL（例如 `https://github.com/login/device`）
        3. 在手机或电脑上打开 URL，输入代码并授权
        4. Bot 确认登录完成 — `gh` 已在此 session 中认证

        详见 [gh-auth-device-flow.md](https://github.com/openabdev/openab/blob/main/docs/gh-auth-device-flow.md)。

        ## 自定义设置

        部署后可通过 Zeabur Dashboard（**服务 → Exec**）或直接在 Discord 对 bot 说来自定义 agent 行为：

        | 要改什么 | 在哪里 | 怎么改 |
