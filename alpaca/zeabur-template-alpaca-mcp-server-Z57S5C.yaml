            原始项目：[github.com/alpacahq/alpaca-mcp-server](https://github.com/alpacahq/alpaca-mcp-server)（MIT 许可）。

            ## 1. 获取 Alpaca API 密钥

            1. 在 [alpaca.markets](https://alpaca.markets/) 注册
